めても、これらの規定は無効となる。", "本件契約において借地権の存続期間を 60 年と定めても、公正証書によらなければ、その 期間は 30 年となる。", "Ｂは、甲土地につき借地権登記を備えなくても、Ｂと同姓でかつ同居している未成年の長 男名義で保存登記をした建物を甲土地上に所有していれば、甲土地の所有者が替わって も、甲土地の新所有者に対し借地権を対抗することができる。"], "answer": 1, "exp": "存続期間20年で更新請求しない旨を定めるには事業用定期借地権にする必要があるが、本肢は居住用建物の所有が目的なので事業用定期借地権を設定できず、その特約は無効となる。よって記述2が正しい。記述3はひっかけで、借地権の存続期間に上限はなく、60年と定めれば公正証書でなくても60年となる。", "year": "H30-11", "diff": "B"}, {"id": "kako-ken-R1-11", "subject": "権利関係", "topic": "借地借家法（借地）", "type": "select", "q": "甲土地につき、期間を 50 年と定めて賃貸借契約を締結しようとする場合（以下「ケース①」という。）と、期間を 15 年と定めて賃貸借契約を締結しようとする場合（以下「ケース②」という。）に関する次の記述のうち、民法及び借地借家法の規定によれば、正しいものはどれか。なお、電磁的記録は考慮しないものとする。（改題）", "choices": ["賃貸借契約が建物を所有する目的ではなく、資材置場とする目的である場合、ケース①は 期間の定めのない契約になり、ケース②では期間は 15 年となる。", "賃貸借契約が建物の所有を目的とする場合、公正証書で契約を締結しなければ、ケース① の期間は 30 年となり、ケース②の期間は 15 年となる。", "賃貸借契約が居住の用に供する建物の所有を目的とする場合、ケース①では契約の更新が ないことを書面で定めればその特約は有効であるが、ケース②では契約の更新がないこと を書面で定めても無効であり、期間は 30 年となる。", "賃貸借契約が専ら工場の用に供する建物の所有を目的とする場合、ケース①では契約の更 新がないことを公正証書で定めた場合に限りその特約は有効であるが、ケース②では契約 の更新がないことを公正証書で定めても無効である。"], "answer": 2, "exp": "居住用建物所有目的で50年のケース①は一般定期借地権として更新なしの特約を書面で有効に定められるが、15年のケース②は50年未満で一般定期借地権にできず普通借地権となり、更新なし特約は無効で期間は30年になる。よって記述3が正しい。記述2はひっかけで、①は建物所有目的でも50年と定めれば50年であり30年ではない。", "year": "R1-11", "diff": "C"}, {"id": "kako-ken-R2-10月-11", "subject": "権利関係", "topic": "借地借家法（借地）", "type": "select", "q": "Ａ所有の甲土地につき、令和 2 年 7 月 1 日にＢとの間で居住の用に供する建物の所有を目的として存続期間 30 年の約定で賃貸借契約（以下この問において「本件契約」という。）が締結された場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。", "choices": ["Ｂは、借地権の登記をしていなくても、甲土地の引渡しを受けていれば、甲土地を令和 2 年 7 月 2 日に購入したＣに対して借地権を主張することができる。", "本件契約で「一定期間は借賃の額の増減を行わない」旨を定めた場合には、甲土地の借賃 が近傍類似の土地の借賃と比較して不相当となったときであっても、当該期間中は、Ａも Ｂも借賃の増減を請求することができない。", "本件契約で「Ｂの債務不履行により賃貸借契約が解除された場合には、ＢはＡに対して建 物買取請求権を行使することができない」旨を定めても、この合意は無効となる。", "ＡとＢとが期間満了に当たり本件契約を最初に更新する場合、更新後の存続期間を 15 年 と定めても、20 年となる。"], "answer": 3, "exp": "借地契約を最初に更新する場合の存続期間は20年以上でなければならず、15年と定めても借地権者に不利な特約として無効になり、期間は20年となる(借地借家法4条・9条)。よって記述4が正しい。記述1はひっかけで、借地権の対抗要件は借地権登記か借地上の建物登記であり、土地の引渡しでは対抗できない。", "year": "R2-10月-11", "diff": "A"}, {"id": "kako-ken-R2-12月-11", "subject": "権利関係", "topic": "借地借家法（借地）", "type": "select", "q": "次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。", "choices": ["借地権者が借地権の登記をしておらず、当該土地上に所有権の登記がされている建物を所 有しているときは、これをもって借地権を第三者に対抗することができるが、建物の表示 の登記によっては対抗することができない。", "借地権者が登記ある建物を火災で滅失したとしても、建物が滅失した日から 2 年以内に新 たな建物を築造すれば、 2 年を経過した後においても、これをもって借地権を第三者に対 抗することができる。", "土地の賃借人が登記ある建物を所有している場合であっても、その賃借人から当該土地建 物を賃借した転借人が対抗力を備えていなければ、当該転借人は転借権を第三者に対抗す ることができない。", "借地権者が所有する数棟の建物が一筆の土地上にある場合は、そのうちの一棟について登 記があれば、借地権の対抗力が当該土地全部に及ぶ。"], "answer": 3, "exp": "一筆の土地上に借地権者所有の建物が数棟ある場合でも、そのうち1棟に借地権者名義の登記があれば、借地権の対抗力は土地全部に及ぶ(借地借家法10条1項)。よって記述4が正しい。記述1は誤りで、借地上の建物の登記は権利登記でなく表示登記でも対抗要件として認められる。", "year": "R2-12月-11", "diff": "B"}, {"id": "kako-ken-R3-10月-11", "subject": "権利関係", "topic": "借地借家法（借地）", "type": "select", "q": "Ａは、所有している甲土地につき、Ｂとの間で建物所有を目的とする賃貸借契約（以下この問において「借地契約」という。）を締結する予定であるが、期間が満了した時点で、確実に借地契約が終了するようにしたい。この場合に関する次の記述のうち、借地借家法の規定によれば、誤っているものはどれか。なお、電磁的記録は考慮しないものとする。（改題）", "choices": ["事業の用に供する建物を所有する目的とし、期間を 60 年と定める場合には、契約の更新 や建物の築造による存続期間の延長がない旨を書面で合意すれば、公正証書で合意しなく ても、その旨を借地契約に定めることができる。", "居住の用に供する建物を所有することを目的とする場合には、公正証書によって借地契約 を締結するときであっても、期間を 20 年とし契約の更新や建物の築造による存続期間の 延長がない旨を借地契約に定めることはできない。", "居住の用に供する建物を所有することを目的とする場合には、借地契約を書面で行えば、 借地権を消滅させるため、借地権の設定から 20 年が経過した日に甲土地上の建物の所有 権を相当の対価でＢからＡに移転する旨の特約を有効に定めることができる。", "借地契約がＢの臨時設備の設置その他一時使用のためになされることが明らかである場合 には、期間を 5 年と定め、契約の更新や建物の築造による存続期間の延長がない旨を借地 契約に定めることができる。"], "answer": 2, "exp": "建物譲渡特約付借地権を設定するには存続期間を30年以上とする必要がある(借地借家法24条)。記述3は設定から20年経過日に建物を移転する内容で存続期間が短すぎ、この特約は有効に定められないため誤り(これが正解)。なお一般定期借地権(記述1)は存続期間50年以上あれば公正証書でなくても書面で足りる。", "year": "R3-10月-11", "diff": "A"}, {"id": "kako-ken-R3-12月-11", "subject": "権利関係", "topic": "借地借家法（借地）", "type": "select", "q": "次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。", "choices": ["借地権の存続期間を契約で 30 年と定めた場合には、当事者が借地契約を更新する際、そ の期間を更新の日から 30 年以下に定めることはできない。", "借地権の存続期間が満了する場合、借地権者が契約の更新を請求したとき、その土地上に 建物が存在する限り、借地権設定者は異議を述べることができない。", "借地権者が借地上の建物にのみ登記をしている場合、当該借地権を第三者に対抗すること ができるのは、当該建物の敷地の表示として記載されている土地のみである。", "借地権設定者は、弁済期の到来した最後の 3 年分の地代等について、借地権者がその土地 において所有する建物の上に先取特権を有する。"], "answer": 2, "exp": "借地上の建物にのみ登記がある場合、借地権を対抗できるのはその建物の敷地として登記簿に記載された土地に限られる(借地借家法10条1項)。よって記述3が正しい。記述4はひっかけで、借地権設定者の先取特権は最後の3年分ではなく最後の2年分の地代等について認められる(12条)。", "year": "R3-12月-11", "diff": "C"}, {"id": "kako-ken-R4-11", "subject": "権利関係", "topic": "借地借家法（借地）", "type": "select", "q": "建物の所有を目的とする土地の賃貸借契約（定期借地権及び一時使用目的の借地権となる契約を除く。）に関する次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。", "choices": ["借地権の存続期間が満了する前に建物の滅失があった場合において、借地権者が借地権の 残存期間を超えて存続すべき建物を築造したときは、その建物を築造することにつき借地 権設定者の承諾がない場合でも、借地権の期間の延長の効果が生ずる。", "転借地権が設定されている場合において、転借地上の建物が滅失したときは、転借地権は 消滅し、転借地権者（転借人）は建物を再築することができない。", "借地上の建物が滅失し、借地権設定者の承諾を得て借地権者が新たに建物を築造するに当 たり、借地権設定者が存続期間満了の際における借地の返還確保の目的で、残存期間を超 えて存続する建物を築造しない旨の特約を借地権者と結んだとしても、この特約は無効で ある。", "借地上の建物所有者が借地権設定者に建物買取請求権を適法に行使した場合、買取代金の 支払があるまでは建物の引渡しを拒み得るとともに、これに基づく敷地の占有について も、賃料相当額を支払う必要はない。"], "answer": 2, "exp": "存続期間中に建物が滅失した場合、借地権者は残存期間を超えて存続する建物を築造でき、これを妨げる築造しない旨の特約は借地権者に不利なため無効となる(借地借家法7条・9条)。よって記述3が正しい。記述4はひっかけで、建物買取請求で引渡しを拒める間も敷地を使用しているため、賃料相当額は返還しなければならない。", "year": "R4-11", "diff": "C"}, {"id": "kako-ken-R5-11", "subject": "権利関係", "topic": "借地借家法（借地）", "type": "select", "q": "ＡがＢとの間で、Ａ所有の甲土地につき建物所有目的で期間を 50 年とする賃貸借契約（以下この問において「本件契約」という。）を締結する場合に関する次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。", "choices": ["本件契約に、当初の 10 年間は地代を減額しない旨の特約を定めた場合、その期間内は、 ＢはＡに対して地代の減額請求をすることはできない。", "本件契約が甲土地上で専ら賃貸アパート事業用の建物を所有する目的である場合、契約の 更新や建物の築造による存続期間の延長がない旨を定めるためには、公正証書で合意しな ければならない。", "本件契約に建物買取請求権を排除する旨の特約が定められていない場合、本件契約が終了 したときは、その終了事由のいかんにかかわらず、ＢはＡに対してＢが甲土地上に所有し ている建物を時価で買い取るべきことを請求することができる。", "本件契約がＢの居住のための建物を所有する目的であり契約の更新がない旨を定めていな い契約であって、期間満了する場合において甲土地上に建物があり、Ｂが契約の更新を請 求したとしても、Ａが遅滞なく異議を述べ、その異議に更新を拒絶する正当な事由がある と認められる場合は、本件契約は更新されない。"], "answer": 3, "exp": "更新排除の定めがない普通借地権では、期間満了時に建物があり借地権者が更新を請求しても、借地権設定者が遅滞なく異議を述べ、その異議に更新拒絶の正当事由があると認められれば契約は更新されない(借地借家法5条)。よって記述4が正しい。記述3はひっかけで、賃借人の債務不履行で終了した場合は建物買取請求できず「終了事由のいかんにかかわらず」は誤り。", "year": "R5-11", "diff": "B"}, {"id": "kako-ken-R6-11", "subject": "権利関係", "topic": "借地借家法（借地）", "type": "select", "q": "建物の所有を目的とする土地の賃貸借契約（一時使用目的の借地契約を除く。）に関する次の記述のうち、借地借家法の規定によれば、正しいものはどれか。", "choices": ["専ら事業の用に供する建物（居住の用に供するものを除く。）の所有を目的とし、存続期 間を 20 年として借地権を設定する場合、建物買取請求権の規定は適用されず、また、そ の契約は、公正証書による等書面によってしなければならない。", "居住の用に供する建物の所有を目的として借地権を設定する場合において、借地権を消滅 させる目的で、その設定後 30 年を経過した日に借地権の目的である土地の上の建物を借 地権設定者に相当の対価で譲渡する旨の特約を定めても、この特約は無効である。", "借地権を設定する場合において、存続期間を定めなかったときは、その期間は 30 年とな る。", "当事者が借地権の設定後に最初に借地契約を更新する場合において、存続期間を定めな かったときは、その期間は更新の日から 10 年となる。"], "answer": 2, "exp": "借地権を設定する際に存続期間を定めなかった場合、その期間は30年となる(借地借家法3条)。よって記述3が正しい。記述1はひっかけで、期間20年の事業用定期借地権は公正証書による等書面ではなく必ず公正証書で契約しなければならない(23条)。最初の更新で期間を定めなければ20年となる点(記述4)も押さえたい。", "year": "R6-11", "diff": "B"}, {"id": "kako-ken-H27-11", "subject": "権利関係", "topic": "借地借家法（借家）", "type": "select", "q": "ＡがＢとの間で、Ａ所有の甲建物について、期間 3 年、賃料月額 10 万円と定めた賃貸借契約を締結した場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。", "choices": ["ＡがＢに対し、賃貸借契約の期間満了の 6 か月前までに更新しない旨の通知をしなかった ときは、ＡとＢは、期間 3 年、賃料月額 10 万円の条件で賃貸借契約を更新したものとみ なされる。", "賃貸借契約を期間を定めずに合意により更新した後に、ＡがＢに書面で解約の申入れをし た場合は、申入れの日から 3 か月後に賃貸借契約は終了する。", "Ｃが、ＡＢ間の賃貸借契約締結前に、Ａと甲建物の賃貸借契約を締結していた場合、Ａが Ｂに甲建物を引き渡しても、Ｃは、甲建物の賃借権をＢに対抗することができる。", "ＡＢ間の賃貸借契約がＢの賃料不払を理由として解除された場合、ＢはＡに対して、Ａの 同意を得てＢが建物に付加した造作の買取りを請求することはできない。"], "answer": 3, "exp": "建物賃貸借が賃借人の賃料不払という債務不履行で解除された場合、賃借人は造作買取請求権を行使できない(判例)。よって記述4が正しい。記述1はひっかけで、法定更新される場合の期間は従前の3年ではなく期間の定めのないものとなる(借地借家法26条)。建物の引渡しが借家の対抗要件である点(記述3)も押さえたい。", "year": "H27-11", "diff": "B"}, {"id": "kako-ken-H27-12", "subject": "権利関係", "topic": "借地借家法（借家）", "type": "select", "q": "賃貸人と賃借人との間で、建物につき、期間 5 年として借地借家法第 38 条に定める定期借家契約（以下「定期借家契約」という。）を締結する場合と、期間 5 年として定期借家契約ではない借家契約（以下「普通借家契約」という。）を締結する場合に関する次の記述のうち、民法及び借地借家法の規定によれば、正しいものはどれか。なお、借地借家法第 40 条に定める一時使用目的の賃貸借契約は考慮しないものとする。", "choices": ["賃借権の登記をしない限り賃借人は賃借権を第三者に対抗することができない旨の特約を 定めた場合、定期借家契約においても、普通借家契約においても、当該特約は無効である。", "賃貸借契約開始から 3 年間は賃料を増額しない旨の特約を定めた場合、定期借家契約にお いても、普通借家契約においても、当該特約は無効である。", "期間満了により賃貸借契約が終了する際に賃借人は造作買取請求をすることができない旨 の規定は、定期借家契約では有効であるが、普通借家契約では無効である。", "賃貸人も賃借人も契約期間中の中途解約をすることができない旨の規定は、定期借家契約 では有効であるが、普通借家契約では無効である。"], "answer": 0, "exp": "建物の引渡しがあれば賃借権を対抗できるとする規定に反し、登記しなければ対抗できないとする特約は賃借人に不利で、定期借家でも普通借家でも無効となる(借地借家法31条・37条)。よって記述1が正しい。他の記述の賃料を増額しない特約・造作買取排除特約・中途解約不可の特約は、いずれも両契約で有効である。", "year": "H27-12", "diff": "B"}, {"id": "kako-ken-H28-12", "subject": "権利関係", "topic": "借地借家法（借家）", "type": "select", "q": "ＡはＢと、Ｂ所有の甲建物につき、居住を目的として、期間 3 年、賃料月額 20 万円と定めて賃貸借契約（以下この問において「本件契約」という。）を締結した。この場合における次の記述のうち、借地借家法の規定及び判例によれば、誤っているものはどれか。", "choices": ["ＡもＢも相手方に対し、本件契約の期間満了前に何らの通知もしなかった場合、従前の契 約と同一の条件で契約を更新したものとみなされるが、その期間は定めがないものとな る。", "ＢがＡに対し、本件契約の解約を申し入れる場合、甲建物の明渡しの条件として、一定額 以上の財産上の給付を申し出たときは、Ｂの解約の申入れに正当事由があるとみなされ る。", "甲建物の適法な転借人であるＣが、Ｂの同意を得て甲建物に造作を付加した場合、期間満 了により本件契約が終了するときは、ＣはＢに対してその造作を時価で買い取るよう請求 することができる。", "本件契約が借地借家法第 38 条の定期建物賃貸借で、契約の更新がない旨を定めた場合で も、ＢはＡに対し、同条所定の通知期間内に、期間満了により本件契約が終了する旨の通 知をしなければ、期間 3 年での終了をＡに対抗することができない。"], "answer": 1, "exp": "賃貸人からの解約申入れに必要な正当事由は諸事情を総合して判断され、立退料など財産上の給付の申出はその一要素にすぎず、それだけで当然に正当事由があるとみなされるわけではない。よって記述2が誤りで、これが正解。記述4は正しく、期間1年以上の定期借家では期間満了の1年前から6か月前までに終了通知をしないと終了を賃借人に対抗できない。", "year": "H28-12", "diff": "B"}, {"id": "kako-ken-H29-12", "subject": "権利関係", "topic": "借地借家法（借家）", "type": "select", "q": "Ａが所有する甲建物をＢに対して 3 年間賃貸する旨の契約をした場合における次の記述のうち、借地借家法の規定によれば、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["ＡがＢに対し、甲建物の賃貸借契約の期間満了の 1 年前に更新をしない旨の通知をしてい れば、ＡＢ間の賃貸借契約は期間満了によって当然に終了し、更新されない。", "Ａが甲建物の賃貸借契約の解約の申入れをした場合には申入れ日から 3 月で賃貸借契約が 終了する旨を定めた特約は、Ｂがあらかじめ同意していれば、有効となる。", "Ｃが甲建物を適法に転借している場合、ＡＢ間の賃貸借契約が期間満了によって終了する ときに、Ｃがその旨をＢから聞かされていれば、ＡはＣに対して、賃貸借契約の期間満了 による終了を対抗することができる。", "ＡＢ間の賃貸借契約が借地借家法第 38 条の定期建物賃貸借で、契約の更新がない旨を定 めるものである場合、当該契約前にＡがＢに契約の更新がなく期間の満了により終了する 旨を記載した書面を交付して説明しなければ、契約の更新がない旨の約定は無効となる。"], "answer": 3, "exp": "定期建物賃貸借では、契約前に賃貸人が更新がなく期間満了で終了する旨を記載した書面を交付して説明しなければ、更新がない旨の定めは無効となる(借地借家法38条)。よって記述4が正しい。記述3はひっかけで、転貸借の終了は賃貸人自身が転借人に通知しなければ対抗できず、賃借人から聞かされていただけでは足りない(34条)。", "year": "H29-12", "diff": "A"}, {"id": "kako-ken-H30-12", "subject": "権利関係", "topic": "借地借家法（借家）", "type": "select", "q": "ＡとＢとの間で、Ａが所有する甲建物をＢが 5 年間賃借する旨の契約を締結した場合における次の記述のうち、民法及び借地借家法の規定によれば、正しいものはどれか（借地借家法第 39 条に定める取壊し予定の建物の賃貸借及び同法第 40 条に定める一時使用目的の建物の賃貸借は考慮しないものとする。）。", "choices": ["ＡＢ間の賃貸借契約が借地借家法第 38 条の定期建物賃貸借で、契約の更新がない旨を定 めた場合には、 5 年経過をもって当然に、ＡはＢに対して、期間満了による終了を対抗す ることができる。", "ＡＢ間の賃貸借契約が借地借家法第 38 条の定期建物賃貸借で、契約の更新がない旨を定 めた場合には、当該契約の期間中、Ｂから中途解約を申し入れることはできない。", "ＡＢ間の賃貸借契約が借地借家法第 38 条の定期建物賃貸借でない場合、Ａ及びＢのいず れからも期間内に更新しない旨の通知又は条件変更しなければ更新しない旨の通知がな かったときは、当該賃貸借契約が更新され、その契約は期間の定めがないものとなる。", "ＣがＢから甲建物を適法に賃貸された転借人で、期間満了によってＡＢ間及びＢＣ間の賃 貸借契約が終了する場合、Ａの同意を得て甲建物に付加した造作について、ＢはＡに対す る買取請求権を有するが、ＣはＡに対する買取請求権を有しない。"], "answer": 2, "exp": "普通建物賃貸借では、賃貸人・賃借人のいずれからも期間満了の1年前から6か月前までに更新拒絶等の通知がなければ従前と同一条件で法定更新され、その期間は定めのないものとなる(借地借家法26条)。よって記述3が正しい。記述4はひっかけで、賃貸人の同意を得た造作の買取請求は転借人にも準用され、Cも請求できる(33条)。", "year": "H30-12", "diff": "B"}, {"id": "kako-ken-R1-12", "subject": "権利関係", "topic": "借地借家法（借家）", "type": "select", "q": "ＡがＢに対し、Ａ所有の甲建物を 3 年間賃貸する旨の契約をした場合における次の記述のうち、民法及び借地借家法の規定によれば、正しいものはどれか（借地借家法第 39 条に定める取壊し予定の建物の賃貸借及び同法第 40 条に定める一時使用目的の建物の賃貸借は考慮しないものとする。）。なお、電磁的記録は考慮しないものとする。（改題）", "choices": ["ＡＢ間の賃貸借契約について、契約の更新がない旨を定めるには、公正証書による等書面 によって契約すれば足りる。", "甲建物が居住の用に供する建物である場合には、契約の更新がない旨を定めることはできない。", "ＡがＢに対して、期間満了の 3 月前までに更新しない旨の通知をしなければ、従前の契約 と同一の条件で契約を更新したものとみなされるが、その期間は定めがないものとなる。", "Ｂが適法に甲建物をＣに転貸していた場合、Ａは、Ｂとの賃貸借契約が解約の申入れに よって終了するときは、特段の事情がない限り、Ｃにその旨の通知をしなければ、賃貸借 契約の終了をＣに対抗することができない。"], "answer": 3, "exp": "適法な転貸借がある場合、賃貸借が解約申入れによって終了するときは、賃貸人は転借人にその旨を通知しなければ賃貸借の終了を転借人に対抗できない(借地借家法34条)。よって記述4が正しい。記述1はひっかけで、定期借家は書面での契約に加え、事前に更新がない旨を記載した書面を交付して説明することも必要で(38条)、用途制限もない。", "year": "R1-12", "diff": "A"}, {"id": "kako-ken-R2-10月-12", "subject": "権利関係", "topic": "借地借家法（借家）", "type": "select", "q": "ＡとＢとの間でＡ所有の甲建物をＢに対して、居住の用を目的として、期間 2 年、賃料月額 10 万円で賃貸する旨の賃貸借契約（以下この問において「本件契約」という。）を締結し、Ｂが甲建物の引渡しを受けた場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、誤っているものはどれか。", "choices": ["ＡがＣに甲建物を売却した場合、Ｂは、それまでに契約期間中の賃料全額をＡに前払いし ていたことを、Ｃに対抗することができる。", "本件契約が借地借家法第 38 条の定期建物賃貸借契約であって、賃料改定に関する特約が ない場合、経済事情の変動により賃料が不相当となったときは、ＡはＢに対し、賃料増額 請求をすることができる。", "本件契約が借地借家法第 38 条の定期建物賃貸借契約である場合、Ａは、転勤、療養、親 族の介護その他のやむを得ない事情があれば、Ｂに対し、解約を申し入れ、申入れの日か ら 1 月を経過することによって、本件契約を終了させることができる。", "本件契約が借地借家法第 38 条の定期建物賃貸借契約であって、造作買取請求に関する特 約がない場合、期間満了で本件契約が終了するときに、Ｂは、Ａの同意を得て甲建物に付 加した造作について買取請求をすることができる。"], "answer": 2, "exp": "定期借家で、やむを得ない事情により解約を申し入れて1か月で契約を終了させられるのは賃借人であって、賃貸人ではない(借地借家法38条7項)。記述3は主体を賃貸人Aとしており誤りで、これが正解。記述4は正しく、造作買取請求を排除する特約がなければ定期借家でも賃借人は造作買取請求ができる。", "year": "R2-10月-12", "diff": "A"}, {"id": "kako-ken-R2-12月-12", "subject": "権利関係", "topic": "借地借家法（借家）", "type": "select", "q": "賃貸人Ａと賃借人Ｂとの間で令和 2 年 7 月 1 日に締結した居住用建物の賃貸借契約に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、誤っているものはどれか。なお、電磁的記録及び電磁的方法は考慮しないものとする。（改題）", "choices": ["当該建物の修繕が必要である場合において、ＢがＡに修繕が必要である旨を通知したにも かかわらずＡが相当の期間内に必要な修繕をしないときは、Ｂは自ら修繕をすることがで きる。", "ＢがＡに無断でＣに当該建物を転貸した場合であっても、Ａに対する背信行為と認めるに 足りない特段の事情があるときは、Ａは賃貸借契約を解除することができない。", "賃貸借契約に期間を定め、賃貸借契約を書面によって行った場合には、ＡがＢに対しあら かじめ契約の更新がない旨を説明していれば、賃貸借契約は期間満了により終了する。", "Ｂが相続人なしに死亡した場合、Ｂと婚姻の届出をしていないが事実上夫婦と同様の関係 にあった同居者Ｄは、Ｂが相続人なしに死亡したことを知った後 1 月以内にＡに反対の意 思表示をしない限り、賃借人としてのＢの権利義務を承継する。"], "answer": 2, "exp": "定期借家契約とするには、書面による契約に加え、契約前に更新がなく期間満了で終了する旨を記載した書面を交付して説明する必要がある。記述3は書面交付をしておらず普通借家となるため、期間満了で当然に終了させることはできず誤り(これが正解)。記述4は正しく、内縁の同居者は反対の意思表示をしない限り借家権を承継する(36条)。", "year": "R2-12月-12", "diff": "A"}, {"id": "kako-ken-R3-10月-12", "subject": "権利関係", "topic": "借地借家法（借家）", "type": "select", "q": "Ａを賃貸人、Ｂを賃借人とする甲建物の賃貸借契約（以下この問において「本件契約」という。）が令和 3 年 7 月 1 日に締結された場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。", "choices": ["本件契約について期間の定めをしなかった場合、ＡはＢに対して、いつでも解約の申入れを することができ、本件契約は、解約の申入れの日から 3 月を経過することによって終了する。", "甲建物がＢに引き渡された後、甲建物の所有権がＡからＣに移転した場合、本件契約の敷 金は、他に特段の合意がない限り、ＢのＡに対する未払賃料債務に充当され、残額がＣに 承継される。", "甲建物が適法にＢからＤに転貸されている場合、ＡがＤに対して本件契約が期間満了に よって終了する旨の通知をしたときは、建物の転貸借は、その通知がされた日から 3 月を 経過することによって終了する。", "本件契約が借地借家法第 38 条の定期建物賃貸借契約で、期間を 5 年、契約の更新がない 旨を定めた場合、Ａは、期間満了の 1 年前から 6 月前までの間に、Ｂに対し賃貸借が終了 する旨の通知をしなければ、従前の契約と同一条件で契約を更新したものとみなされる。"], "answer": 1, "exp": "建物の所有権が移転すると賃貸人の地位と敷金返還債務が新所有者に承継され、旧所有者に対する未払賃料があれば敷金がこれに充当され、その残額が新所有者に承継される。よって記述2が正しい。記述3はひっかけで、転貸借の終了通知後に転貸借が終了するのは3か月ではなく6か月の経過による(借地借家法34条2項)。", "year": "R3-10月-12", "diff": "C"}, {"id": "kako-ken-R3-12月-12", "subject": "権利関係", "topic": "借地借家法（借家）", "type": "select", "q": "賃貸人Ａと賃借人Ｂとの間で令和 3 年 7 月 1 日に締結した一時使用目的ではない建物賃貸借契約（以下この問において「本件契約」という。）の終了に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。", "choices": ["本件契約に期間を 2 年とする旨の定めがあり、ＡもＢも更新拒絶の通知をしなかったため に本件契約が借地借家法に基づき更新される場合、更新後の期間について特段の合意がな ければ、更新後の契約期間は 2 年となる。", "本件契約において期間の定めがない場合、借地借家法第 28 条に定める正当事由を備えて Ａが解約の申入れをしたときには、解約の申入れをした日から 6 月を経過した日に、本件 契約は終了する。", "建物の転貸借がされている場合において、本件契約がＢ（転貸人）の債務不履行によって 解除されて終了するときは、Ａが転借人に本件契約の終了を通知した日から 6 月を経過す ることによって、転貸借契約は終了する。", "ＢがＡの同意を得て建物に付加した造作がある場合であっても、本件契約終了時にＡに対 して借地借家法第 33 条の規定に基づく造作買取請求権を行使することはできない、とい う特約は無効である。"], "answer": 1, "exp": "期間の定めのない建物賃貸借で、正当事由を備えた賃貸人が解約を申し入れたときは、その日から6か月を経過して契約が終了する(借地借家法27条)。よって記述2が正しい。記述4はひっかけで、造作買取請求権を排除する特約は賃借人に不利でも有効とされている(33条)。法定更新後は期間の定めのないものとなる点(記述1)も注意。", "year": "R3-12月-12", "diff": "B"}, {"id": "kako-ken-R4-12", "subject": "権利関係", "topic": "借地借家法（借家）", "type": "select", "q": "Ａは、Ｂ所有の甲建物（床面積 100 m2 ）につき、居住を目的として、期間 2 年、賃料月額 10 万円と定めた賃貸借契約（以下この問において「本件契約」という。）をＢと締結してその日に引渡しを受けた。この場合における次の記述のうち、民法及び借地借家法の規定並びに判例によれば、誤っているものはどれか。", "choices": ["ＢはＡに対して、本件契約締結前に、契約の更新がなく、期間の満了により賃貸借が終了 する旨を記載した賃貸借契約書を交付して説明すれば、本件契約を借地借家法第 38 条に 規定する定期建物賃貸借契約として締結することができる。", "本件契約が借地借家法第 38 条に規定する定期建物賃貸借契約であるか否かにかかわら ず、Ａは、甲建物の引渡しを受けてから 1 年後に甲建物をＢから購入したＣに対して、賃 借人であることを主張できる。", "本件契約が借地借家法第 38 条に規定する定期建物賃貸借契約である場合、Ａの中途解約 を禁止する特約があっても、やむを得ない事情によって甲建物を自己の生活の本拠として 使用することが困難になったときは、Ａは本件契約の解約の申入れをすることができる。", "ＡがＢに対して敷金を差し入れている場合、本件契約が期間満了で終了するに当たり、Ｂ は甲建物の返還を受けるまでは、Ａに対して敷金を返還する必要はない。"], "answer": 0, "exp": "定期建物賃貸借の締結には、書面（公正証書等）による契約とは別に、更新がない旨を記載した事前説明の書面を交付して説明することが必要で、判例上この書面は契約書とは別個のものでなければなりません。本肢は契約書を交付して説明しただけで独立した事前説明書面がないため、定期借家として成立せず誤りです。引渡しによる対抗力（31条）や敷金の返還が明渡し後である点は正しい。", "year": "R4-12", "diff": "C"}, {"id": "kako-ken-R5-12", "subject": "権利関係", "topic": "借地借家法（借家）", "type": "select", "q": "令和 5 年 7 月 1 日に締結された建物の賃貸借契約（定期建物賃貸借契約及び一時使用目的の建物の賃貸借契約を除く。）に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。", "choices": ["期間を 1 年未満とする建物の賃貸借契約は、期間を 1 年とするものとみなされる。", "当事者間において、一定の期間は建物の賃料を減額しない旨の特約がある場合、現行賃料 が不相当になったなどの事情が生じたとしても、この特約は有効である。", "賃借人が建物の引渡しを受けている場合において、当該建物の賃貸人が当該建物を譲渡す るに当たり、当該建物の譲渡人及び譲受人が、賃貸人たる地位を譲渡人に留保する旨及び 当該建物の譲受人が譲渡人に賃貸する旨の合意をしたときは、賃貸人たる地位は譲受人に 移転しない。", "現行賃料が定められた時から一定の期間が経過していなければ、賃料増額請求は、認めら れない。"], "answer": 2, "exp": "賃借人が引渡しを受けて対抗要件を備えた建物が譲渡されると賃貸人たる地位は原則として譲受人に移転しますが、譲渡人に地位を留保しかつ譲受人が譲渡人に賃貸する旨を合意したときは移転しません（民法605条の2第2項）ので肢3が正しい。ひっかけは、期間1年未満の借家契約は期間の定めがないものとみなされる点（肢1誤り）、賃料を減額しない特約は無効である点（肢2誤り）。", "year": "R5-12", "diff": "C"}, {"id": "kako-ken-R6-12", "subject": "権利関係", "topic": "借地借家法（借家）", "type": "select", "q": "賃貸人Ａと賃借人Ｂとが、居住目的で期間を３年として、借地借家法第 38 条の定期建物賃貸借契約（以下この問において「契約①」という。）を締結した場合と、定期建物賃貸借契約でも一時使用目的の賃貸借契約でもない普通建物賃貸借契約（以下この問において「契約②」という。）を締結した場合とに関する次の記述のうち、借地借家法の規定によれば、正しいものはどれか。", "choices": ["Ｂが建物の引渡しを受けた後にＡが建物をＣに売却して建物所有者がＣに変わった場合、 Ｂは、契約①の場合ではＣに対して賃借人であることを主張できるが、契約②の場合では Ｃに対して賃借人であることを主張できない。", "契約期間中は賃料の改定を行わない旨の特約を契約において定めていても、契約期間中に 賃料が不相当になったと考えるに至ったＢは、契約①の場合も契約②の場合も、借地借家 法第 32 条に基づく賃料減額請求をすることができる。", "Ｂが契約期間中に相続人なしで死亡した場合において、婚姻はしていないが事実上夫婦と 同様の関係にあった同居者Ｄがあるときは、契約①の場合も契約②の場合も、Ａに反対の 意思表示をしないＤは、建物の賃貸借契約に関し、Ｂの権利義務を承継する。", "契約①の場合、公正証書によって契約をするときに限り契約の更新がないことを有効に定 めることができ、契約②の場合、書面で契約し、かつ、Ａに正当な理由がない限り、Ａは 契約の更新を拒絶することができなくなる。"], "answer": 2, "exp": "借家人が相続人なく死亡した場合、事実上夫婦同様の同居者は反対の意思表示をしない限り借家権を承継し（借地借家法36条）、これは定期借家でも普通借家でも同じで肢3が正しい。対抗力は引渡しで両方に備わる点（肢1誤り）、定期借家では賃料を減額しない特約が有効で減額請求できない点（肢2誤り）、定期借家は公正証書に限らず書面等でよい点（肢4誤り）に注意。", "year": "R6-12", "diff": "B"}, {"id": "kako-ken-R2-10月-5", "subject": "権利関係", "topic": "委任", "type": "select", "q": "ＡとＢとの間で令和 2 年 7 月 1 日に締結された委任契約において、委任者Ａが受任者Ｂに対して報酬を支払うこととされていた場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["Ａの責めに帰すべき事由によって履行の途中で委任が終了した場合、Ｂは報酬全額をＡに 対して請求することができるが、自己の債務を免れたことによって得た利益をＡに償還し なければならない。", "Ｂは、契約の本旨に従い、自己の財産に対するのと同一の注意をもって委任事務を処理し なければならない。", "Ｂの責めに帰すべき事由によって履行の途中で委任が終了した場合、ＢはＡに対して報酬 を請求することができない。", "Ｂが死亡した場合、Ｂの相続人は、急迫の事情の有無にかかわらず、受任者の地位を承継 して委任事務を処理しなければならない。"], "answer": 0, "exp": "委任者の帰責事由で履行途中に委任が終了した場合、受任者は報酬全額を請求できますが、履行を免れて得た利益は償還しなければなりません（536条2項）ので肢1が正しい。受任者は報酬の有無を問わず善管注意義務を負う点（肢2誤り、自己財産と同一の注意ではない）、受任者の帰責で終了しても既履行割合に応じた報酬は請求できる点（肢3誤り）、受任者の死亡で委任は終了する点（肢4誤り）を押さえたい。", "year": "R2-10月-5", "diff": "C"}, {"id": "kako-ken-R3-10月-3", "subject": "権利関係", "topic": "委任", "type": "select", "q": "個人として事業を営むＡが死亡した場合に関する次の記述のうち、民法の規定によれば、誤っているものはいくつあるか。なお、いずれの契約も令和 3 年 7 月 1 日付けで締結されたものとする。ア ＡがＢとの間でＢ所有建物の清掃に関する準委任契約を締結していた場合、Ａの相続人は、Ｂとの間で特段の合意をしなくても、当該準委任契約に基づく清掃業務を行う義務を負う。イ ＡがＡ所有の建物について賃借人Ｃとの間で賃貸借契約を締結している期間中にＡが死亡した場合、Ａの相続人は、Ｃに賃貸借契約を継続するか否かを相当の期間を定めて催告し、期間内に返答がなければ賃貸借契約をＡの死亡を理由に解除することができる。ウ ＡがＡ所有の土地について買主Ｄとの間で売買契約を締結し、当該土地の引渡しと残代金決済の前にＡが死亡した場合、当該売買契約は原始的に履行が不能となって無効となる。エ ＡがＥ所有の建物について貸主Ｅとの間で使用貸借契約を締結していた場合、Ａの相続人は、Ｅとの間で特段の合意をしなくても、当該使用貸借契約の借主の地位を相続して当該建物を使用することができる。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "exp": "ア準委任は受任者Aの死亡で終了し相続人は業務義務を負わない、イ賃貸人が死亡しても賃貸借は終了せず相続人が地位を承継し死亡を理由に解除できない、ウ売主が死亡しても売買は終了せず相続人が承継し原始的不能・無効にはならない、エ使用貸借は借主の死亡で終了し相続人は借主の地位を相続しない、と四つとも誤りで答えは四つ。委任と使用貸借は当事者の死亡で終了するが賃貸借・売買は相続される、という対比が要点です。", "year": "R3-10月-3", "diff": "C"}, {"id": "kako-ken-R6-2", "subject": "権利関係", "topic": "委任", "type": "select", "q": "委任契約・準委任契約に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["売主が、売買契約の付随義務として、買主に対して、マンション専有部分内の防火戸の操 作方法につき説明義務を負う場合、業務において密接な関係にある売主から委託を受け、 売主と一体となって当該マンションの販売に関する一切の事務を行っていた宅地建物取引 業者も、買主に対して、防火戸の操作方法について説明する信義則上の義務を負うことが ある。", "受任者は、委任者の許諾を得たとき、又はやむを得ない事由があるときでなければ、復受 任者を選任することができない。", "委任契約で本人が死亡しても代理権が消滅しない旨を合意して代理人に代理権を与えた場 合、本人が死亡しても代理権は消滅しない。", "委任は、当事者の一方が仕事を完成することを相手方に約し、相手方がその仕事の結果に 対しその報酬を支払うことを約さなければ、その効力を生じない。"], "answer": 3, "exp": "肢4は「仕事の完成と報酬支払を約する」という請負の定義を委任の説明として述べており誤り。委任は法律行為の委託を相手方が承諾することで成立します（643条）。売主と一体で事務を行う宅建業者も信義則上の説明義務を負い得る点（肢1）、復受任者の選任には委任者の許諾かやむを得ない事由が必要な点（肢2）、本人死亡でも代理権を消滅させない特約が有効な点（肢3）はいずれも正しい。", "year": "R6-2", "diff": "C"}, {"id": "kako-ken-H29-7", "subject": "権利関係", "topic": "請負", "type": "select", "q": "請負契約に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。（改題）", "choices": ["請負契約が請負人の責めに帰すべき事由によって中途で終了し、請負人が施工済みの部分 に相当する報酬に限ってその支払を請求することができる場合、注文者が請負人に請求で きるのは、注文者が残工事の施工に要した費用のうち、請負人の未施工部分に相当する請 負代金額を超える額に限られる。", "請負契約が注文者の責めに帰すべき事由によって中途で終了した場合、請負人は、残債務 を免れるとともに、注文者に請負代金全額を請求できるが、自己の債務を免れたことによ る利益を注文者に償還しなければならない。", "請負契約の目的物に契約不適合があり、それが請負人の責めに帰すべき事由による場合、 注文者は、請負人から損害の賠償を受けていなくとも、特別の事情がない限り、報酬全額 を支払わなければならない。", "請負人が担保責任を負わない旨の特約をしたときであっても、知りながら告げなかった事 実については、その責任を免れることはできない。"], "answer": 2, "exp": "目的物の契約不適合について請負人に帰責事由があるとき、注文者の損害賠償請求権と請負人の報酬請求権は同時履行の関係に立ちます（533条）。したがって賠償を受けるまで報酬全額を支払う必要はなく、「支払わなければならない」とする肢3が誤り。担保責任を負わない特約をしても、知りながら告げなかった事実については責任を免れない点（肢4）などは正しい。", "year": "H29-7", "diff": "C"}, {"id": "kako-ken-R1-8", "subject": "権利関係", "topic": "請負", "type": "select", "q": "Ａを注文者、Ｂを請負人とする請負契約（以下「本件契約」という。）が締結された場合における次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。（改題）", "choices": ["本件契約の目的物たる建物が契約内容に適合しないためこれを建て替えざるを得ない場合 には、ＡはＢに対して当該建物の建替えに要する費用相当額の損害賠償を請求することが できる。", "本件契約が、事務所の用に供するコンクリート造の建物の建築を目的とする場合で、当該 建物が契約不適合のときは、Ａは、当該建物の引渡しを受けた時から 1 年以内にその旨を Ｂに通知しなければ、本件契約を解除することができない。", "本件契約の目的が建物の増築である場合、Ａの失火により当該建物が焼失し増築できなく なったときは、Ｂは本件契約に基づく未履行部分の仕事完成債務を免れる。", "Ｂが仕事を完成しない間は、ＡはいつでもＢに対して損害を賠償して本件契約を解除する ことができる。"], "answer": 1, "exp": "請負の契約不適合責任は、注文者が不適合を「知った時から1年以内」に通知しなければ追及できません（637条1項）。「引渡しを受けた時から1年以内」とする肢2が誤り。建て替えざるを得ない場合の建替費用相当額の損害賠償請求（肢1）、注文者の帰責による履行不能で請負人が仕事完成債務を免れる点（肢3）、完成前はいつでも損害賠償して解除できる点（肢4）は正しい。", "year": "R1-8", "diff": "C"}, {"id": "kako-ken-R5-3", "subject": "権利関係", "topic": "請負", "type": "select", "q": "Ａを注文者、Ｂを請負人として、Ａ所有の建物に対して独立性を有さずその構成部分となる増築部分の工事請負契約を締結し、Ｂは 3 か月間で増築工事を終了させた。この場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。なお、この問において「契約不適合」とは品質に関して契約の内容に適合しないことをいい、当該請負契約には契約不適合責任に関する特約は定められていなかったものとする。", "choices": ["ＡがＢに請負代金を支払っていなくても、Ａは増築部分の所有権を取得する。", "Ｂが材料を提供して増築した部分に契約不適合がある場合、Ａは工事が終了した日から 1 年以内にその旨をＢに通知しなければ、契約不適合を理由とした修補をＢに対して請求す ることはできない。", "Ｂが材料を提供して増築した部分に契約不適合があり、Ｂは不適合があることを知りなが らそのことをＡに告げずに工事を終了し、Ａが工事終了日から 3 年後に契約不適合を知っ た場合、ＡはＢに対して、消滅時効が完成するまでは契約不適合を理由とした修補を請求 することができる。", "増築した部分にＡが提供した材料の性質によって契約不適合が生じ、Ｂが材料が不適当で あることを知らずに工事を終了した場合、ＡはＢに対して、Ａが提供した材料によって生 じた契約不適合を理由とした修補を請求することはできない。"], "answer": 1, "exp": "請負の担保責任の通知期間は「不適合を知った時から1年以内」であり（637条1項）、「工事終了日から1年以内」とする肢2が誤り。独立性のない増築部分は付合により注文者が所有権を取得し代金支払は無関係な点（肢1）、請負人が不適合を知りながら告げなかった場合は期間制限を受けず消滅時効まで追及できる点（肢3）、注文者提供の材料の性質による不適合は原則担保責任を追及できない点（肢4、636条）は正しい。", "year": "R5-3", "diff": "C"}, {"id": "kako-ken-H27-8", "subject": "権利関係", "topic": "契約総合", "type": "select", "q": "同時履行の抗弁権に関する次の記述のうち、民法の規定及び判例によれば、正しいものはいくつあるか。ア マンションの賃貸借契約終了に伴う賃貸人の敷金返還債務と、賃借人の明渡債務は、特別の約定のない限り、同時履行の関係に立つ。イ マンションの売買契約がマンション引渡し後に債務不履行を理由に解除された場合、契約は遡及的に消滅するため、売主の代金返還債務と、買主の目的物返還債務は、同時履行の関係に立たない。ウ マンションの売買契約に基づく買主の売買代金支払債務と、売主の所有権移転登記に協力する債務は、特別の事情のない限り、同時履行の関係に立つ。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "exp": "正しいのはウのみで、代金支払債務と所有権移転登記への協力債務は特別の事情がない限り同時履行の関係に立ちます。アは敷金返還が明渡し後の後履行となり同時履行にならない点、イは解除による双方の原状回復義務が同時履行に立つ（本肢は立たないとして誤り）点が誤りです。よって正しいものは一つ。", "year": "H27-8", "diff": "B"}, {"id": "kako-ken-H30-3", "subject": "権利関係", "topic": "契約総合", "type": "select", "q": "ＡとＢとの間で、 5 か月後に実施される試験（以下この問において「本件試験」という。）にＢが合格したときにはＡ所有の甲建物をＢに贈与する旨を書面で約した（以下この問において「本件約定」という。）。この場合における次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["本件約定は、停止条件付贈与契約である。", "本件約定の後、Ａの放火により甲建物が滅失し、その後にＢが本件試験に合格した場合、 ＡはＢに対して損害賠償責任を負う。", "Ｂは、本件試験に合格したときは、本件約定の時点にさかのぼって甲建物の所有権を取得 する。", "本件約定の時点でＡに意思能力がなかった場合、Ｂは、本件試験に合格しても、本件約定 に基づき甲建物の所有権を取得することはできない。"], "answer": 2, "exp": "停止条件付法律行為は条件成就の時から効力を生じ、約定時にさかのぼりません。したがって「約定時にさかのぼって所有権を取得する」とする肢3が誤りで、正しくは合格時に取得します。条件成否が未定の間に故意に目的物を滅失させると相手方の期待利益を害し損害賠償責任を負う点（肢2）、意思能力を欠く者の法律行為は無効な点（肢4）は正しい。", "year": "H30-3", "diff": "C"}, {"id": "kako-ken-R2-12月-9", "subject": "権利関係", "topic": "契約総合", "type": "select", "q": "地役権に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["地役権は、継続的に行使されるもの、又は外形上認識することができるものに限り、時効 取得することができる。", "地役権者は、設定行為で定めた目的に従い、承役地を要役地の便益に供する権利を有する。", "設定行為又は設定後の契約により、承役地の所有者が自己の費用で地役権の行使のために 工作物を設け、又はその修繕をする義務を負担したときは、承役地の所有者の特定承継人 もその義務を負担する。", "要役地の所有権とともに地役権を取得した者が、所有権の取得を承役地の所有者に対抗し 得るときは、地役権の取得についても承役地の所有者に対抗することができる。"], "answer": 0, "exp": "地役権を時効取得できるのは、継続的に行使され「かつ」外形上認識することができるものに限られます（283条）。「又は」とする肢1が誤り。承役地所有者が工作物の設置・修繕義務を負う場合その特定承継人も承継する点（肢3、286条）、要役地の所有権とともに地役権も移転し対抗できる点（肢4、281条）は正しい。", "year": "R2-12月-9", "diff": "C"}, {"id": "kako-ken-R3-12月-1", "subject": "権利関係", "topic": "契約総合", "type": "select", "q": "次の 1 から 4 までの記述のうち、民法の規定、判例及び下記判決文によれば、正しいものはどれか。（判決文）私力の行使は、原則として法の禁止するところであるが、法律に定める手続によつたのでは、権利に対する違法な侵害に対抗して現状を維持することが不可能又は著しく困難であると認められる緊急やむを得ない特別の事情が存する場合においてのみ、その必要の限度を超えない範囲内で、例外的に許されるものと解することを妨げない。", "choices": ["権利に対する違法な侵害に対抗して法律に定める手続によらずに自力救済することは、そ の必要の限度を超えない範囲内であれば、事情のいかんにかかわらず許される。", "建物賃貸借契約終了後に当該建物内に家財などの残置物がある場合には、賃貸人の権利に 対する違法な侵害であり、賃貸人は賃借人の同意の有無にかかわらず、原則として裁判を 行わずに当該残置物を建物内から撤去することができる。", "建物賃貸借契約の賃借人が賃料を 1 年分以上滞納した場合には、賃貸人の権利を著しく侵 害するため、原則として裁判を行わずに、賃貸人は賃借人の同意なく当該建物の鍵とシリ ンダーを交換して建物内に入れないようにすることができる。", "裁判を行っていては権利に対する違法な侵害に対抗して現状を維持することが不可能又は 著しく困難であると認められる緊急やむを得ない特別の事情が存する場合には、その必要 の限度を超えない範囲内で例外的に私力の行使が許される。"], "answer": 3, "exp": "判決文は、自力救済は原則禁止で、法定手続では現状維持が不可能・著しく困難な緊急やむを得ない特別の事情がある場合に限り、必要な限度で例外的に許されるとしています。この趣旨をそのまま述べた肢4が正しい。肢1の「事情のいかんにかかわらず許される」、肢2の残置物撤去や肢3の鍵交換を原則として裁判なしにできるとする点は、いずれも自力救済禁止の原則に反し誤りです。", "year": "R3-12月-1", "diff": "A"}, {"id": "kako-ken-R3-12月-8", "subject": "権利関係", "topic": "契約総合", "type": "select", "q": "ＡはＢに対して、Ａが所有する甲土地を 1 ,000 万円で売却したい旨の申込みを郵便で令和 3 年 7 月1 日に発信した（以下この問において「本件申込み」という。）が、本件申込みがＢに到達する前にＡが死亡した場合における次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["Ｂが承諾の通知を発する前に、ＢがＡの死亡を知ったとしても、本件申込みは効力を失わ ない。", "Ａが、本件申込みにおいて、自己が死亡した場合には申込みの効力を失う旨の意思表示を していたときには、ＢがＡの死亡を知らないとしても本件申込みは効力を失う。", "本件申込みが効力を失わない場合、本件申込みに承諾をなすべき期間及び撤回をする権利 についての記載がなかったときは、Ａの相続人は、本件申込みをいつでも撤回することが できる。", "本件申込みが効力を失わない場合、Ｂが承諾の意思表示を発信した時点で甲土地の売買契 約が成立する。"], "answer": 1, "exp": "申込者が「自分が死亡したら申込みは効力を失う」旨の意思表示をしていた場合、相手方が死亡を知らなくても申込みは効力を失います（526条）ので肢2が正しい。肢1は相手方が承諾前に死亡を知れば効力を失う点、肢3は承諾期間を定めない申込みは相当期間経過まで撤回できない点、肢4は契約成立は承諾の到達時である点で、それぞれ誤り。", "year": "R3-12月-8", "diff": "C"}, {"id": "kako-ken-R4-5", "subject": "権利関係", "topic": "契約総合", "type": "select", "q": "期間の計算に関する次の記述のうち、民法の規定によれば、正しいものはどれか。なお、明記された日付は、日曜日、国民の祝日に関する法律に規定する休日その他の休日には当たらないものとする。", "choices": ["令和 4 年 10 月 17 日午前 10 時に、引渡日を契約締結日から 1 年後とする不動産の売買契約 を締結した場合、令和 5 年 10 月 16 日が引渡日である。", "令和 4 年 8 月 31 日午前 10 時に、弁済期限を契約締結日から 1 か月後とする金銭消費貸借 契約を締結した場合、令和 4 年 9 月 30 日の終了をもって弁済期限となる。", "期間の末日が日曜日、国民の祝日に関する法律に規定する休日その他の休日に当たるとき は、その日に取引をしない慣習がある場合に限り、期間はその前日に満了する。", "令和 4 年 5 月 30 日午前 10 時に、代金の支払期限を契約締結日から 1 か月後とする動産の 売買契約を締結した場合、令和 4 年 7 月 1 日の終了をもって支払期限となる。"], "answer": 1, "exp": "期間は初日不算入で翌日が起算日となり、末日の終了で満了します。肢2は8月31日契約の起算日が9月1日、1か月後の応当日10月1日の前日である9月30日終了で満了となり正しい。肢1は正しくは10月17日が引渡日、肢3は末日が休日なら翌日に満了（繰り下げ）、肢4は6月31日が存在しないため6月30日満了で、いずれも誤り。", "year": "R4-5", "diff": "B"}, {"id": "kako-ken-R6-8", "subject": "権利関係", "topic": "契約総合", "type": "select", "q": "次の記述のうち、民法の条文として規定されていないものはどれか。", "choices": ["隔地者間の契約は、承諾の通知を発した時に成立する。", "無効な行為に基づく債務の履行として給付を受けた者は、相手方を原状に復させる義務を 負う。", "代理人が自己又は第三者の利益を図る目的で代理権の範囲内の行為をした場合において、 相手方がその目的を知り、又は知ることができたときは、その行為は、代理権を有しない 者がした行為とみなす。", "未成年者が法律行為をするには、その法定代理人の同意を得なければならない。ただし、 単に権利を得、又は義務を免れる法律行為については、この限りでない。"], "answer": 0, "exp": "現行民法は到達主義を採り、契約は承諾の意思表示が到達した時に成立します（97条1項、522条1項）。肢1の「承諾の通知を発した時に成立」は改正前の発信主義で現在は規定されておらず、これが答え。原状回復義務（肢2、121条の2）、代理権の濫用（肢3、107条）、未成年者の同意（肢4、5条）はいずれも条文どおり規定されています。", "year": "R6-8", "diff": "C"}, {"id": "kako-ken-H28-7", "subject": "権利関係", "topic": "不法行為", "type": "select", "q": "ＡがＢから賃借する甲建物に、運送会社Ｃに雇用されているＤが居眠り運転するトラックが突っ込んで甲建物の一部が損壊した場合（以下「本件事故」という。）に関する次の記述のうち、民法の規定及び判例によれば、正しいものはいくつあるか。なお、ＤはＣの業務として運転をしていたものとする。（改題）ア ＡがＢに対して支払う賃料は、甲建物を使用することができなくなった部分の割合に応じて、減額される。イ Ａは、甲建物の残りの部分だけでは賃借した目的を達することができない場合、Ｂとの賃貸借契約を解除することができる。ウ Ｃは、使用者責任に基づき、Ｂに対して本件事故から生じた損害を賠償した場合、Ｄに対して求償することができるが、その範囲が信義則上相当と認められる限度に制限される場合がある。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 2, "exp": "アは賃借人に帰責のない一部使用不能で賃料が割合に応じて当然に減額される（611条1項）、イは残存部分では目的を達せない場合に賃借人が解除できる（611条2項）、ウは使用者が被害者に賠償した後は被用者に求償できるが信義則上相当な限度に制限され得る、と三つとも正しい。よって答えは三つ。", "year": "H28-7", "diff": "C"}, {"id": "kako-ken-R1-4", "subject": "権利関係", "topic": "不法行為", "type": "select", "q": "不法行為に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["放火によって家屋が滅失し、火災保険契約の被保険者である家屋所有者が当該保険契約に 基づく保険金請求権を取得した場合、当該家屋所有者は、加害者に対する損害賠償請求金 額からこの保険金額を、いわゆる損益相殺として控除しなければならない。", "被害者は、不法行為によって損害を受けると同時に、同一の原因によって損害と同質性の ある利益を既に受けた場合でも、その額を加害者の賠償すべき損害額から控除されること はない。", "第三者が債務者を教唆して、その債務の全部又は一部の履行を不能にさせたとしても、当 該第三者が当該債務の債権者に対して、不法行為責任を負うことはない。", "名誉を違法に侵害された者は、損害賠償又は名誉回復のための処分を求めることができる ほか、人格権としての名誉権に基づき、加害者に対し侵害行為の差止めを求めることがで きる。"], "answer": 3, "exp": "名誉を違法に侵害された者は、損害賠償や名誉回復処分に加えて、人格権としての名誉権に基づき侵害行為の差止めを請求できます（判例）ので肢4が正しい。肢1は保険金が損益相殺の対象とならない点、肢2は同質性のある利益を受けた場合は損害額から控除される点、肢3は債務者を教唆して履行不能にさせた第三者も不法行為責任を負う点で、それぞれ誤りです。", "year": "R1-4", "diff": "B"}, {"id": "kako-ken-R2-12月-1", "subject": "権利関係", "topic": "不法行為", "type": "select", "q": "不法行為（令和 2 年 4 月 1 日以降に行われたもの）に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["建物の建築に携わる設計者や施工者は、建物としての基本的な安全性が欠ける建物を設計 し又は建築した場合、設計契約や建築請負契約の当事者に対しても、また、契約関係にな い当該建物の居住者に対しても損害賠償責任を負うことがある。", "被用者が使用者の事業の執行について第三者に損害を与え、第三者に対してその損害を賠 償した場合には、被用者は、損害の公平な分担という見地から相当と認められる額につい て、使用者に対して求償することができる。", "責任能力がない認知症患者が線路内に立ち入り、列車に衝突して旅客鉄道事業者に損害を 与えた場合、当該責任無能力者と同居する配偶者は、法定の監督義務者として損害賠償責 任を負う。", "人の生命又は身体を害する不法行為による損害賠償請求権は、被害者又はその法定代理人 が損害及び加害者を知った時から 5 年間行使しない場合、時効によって消滅する。"], "answer": 2, "exp": "判例上、責任無能力者と同居する配偶者であるというだけでは法定の監督義務者には当たりません（JR東海事件）。したがって配偶者が当然に監督義務者として賠償責任を負うとする肢3が誤り。基本的安全性を欠く建物の設計者・施工者が居住者にも不法行為責任を負い得る点（肢1）、被用者から使用者への逆求償を認めた点（肢2）、生命・身体侵害の時効が知った時から5年である点（肢4）は正しい。", "year": "R2-12月-1", "diff": "B"}, {"id": "kako-ken-R3-10月-8", "subject": "権利関係", "topic": "不法行為", "type": "select", "q": "かしＡが 1 人で居住する甲建物の保存に瑕疵があったため、令和 3 年 7 月 1 日に甲建物の壁が崩れて通行人Ｂがケガをした場合（以下この問において「本件事故」という。）における次の記述のうち、民法の規定によれば、誤っているものはどれか。かし", "choices": ["Ａが甲建物をＣから賃借している場合、Ａは甲建物の保存の瑕 疵 による損害の発生の防止 に必要な注意をしなかったとしても、Ｂに対して不法行為責任を負わない。 か し", "Ａが甲建物を所有している場合、Ａは甲建物の保存の瑕 疵 による損害の発生の防止に必要 な注意をしたとしても、Ｂに対して不法行為責任を負う。", "本件事故について、ＡのＢに対する不法行為責任が成立する場合、ＢのＡに対する損害賠 償請求権は、Ｂ又はＢの法定代理人が損害又は加害者を知らないときでも、本件事故の時 から 20 年間行使しないときには時効により消滅する。", "本件事故について、ＡのＢに対する不法行為責任が成立する場合、ＢのＡに対する損害賠 償請求権は、Ｂ又はＢの法定代理人が損害及び加害者を知った時から 5 年間行使しないと きには時効により消滅する。"], "answer": 0, "exp": "工作物責任では、第一次的に占有者（賃借人A）が責任を負い、占有者が損害発生防止に必要な注意をしたときにのみ所有者が負います。したがって、Aが必要な注意をしなかったのに責任を負わないとする肢1が誤り。所有者の責任は無過失責任で注意を尽くしても免れない点（肢2）、時効が行為時から20年、生命・身体侵害は知った時から5年である点（肢3・4）は正しい。", "year": "R3-10月-8", "diff": "A"}, {"id": "kako-ken-R2-10月-1", "subject": "権利関係", "topic": "相隣関係", "type": "select", "q": "Ａが購入した甲土地が他の土地に囲まれて公道に通じない土地であった場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["甲土地が共有物の分割によって公道に通じない土地となっていた場合には、Ａは公道に至 るために他の分割者の所有地を、償金を支払うことなく通行することができる。", "Ａは公道に至るため甲土地を囲んでいる土地を通行する権利を有するところ、Ａが自動車 を所有していても、自動車による通行権が認められることはない。", "Ａが、甲土地を囲んでいる土地の一部である乙土地を公道に出るための通路にする目的で 賃借した後、甲土地をＢに売却した場合には、乙土地の賃借権は甲土地の所有権に従たる ものとして甲土地の所有権とともにＢに移転する。", "Ｃが甲土地を囲む土地の所有権を時効により取得した場合には、ＡはＣが時効取得した土 地を公道に至るために通行することができなくなる。"], "answer": 0, "exp": "共有物の分割によって公道に通じない袋地が生じたときは、その所有者は他の分割者の所有地のみを、償金を支払わずに通行できます（213条1項）ので肢1が正しい。自動車通行権も諸事情により認められ得る点（肢2）、通路目的で賃借した権利は当然には買主に移転しない点（肢3）、囲む土地が時効取得されても通行権は失われない点（肢4）に注意。", "year": "R2-10月-1", "diff": "B"}, {"id": "kako-ken-R3-12月-2", "subject": "権利関係", "topic": "相隣関係", "type": "select", "q": "相隣関係に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["土地の所有者は、隣地の所有者と共同の費用で、境界標を設けることができる。", "隣接する土地の境界線上に設けた障壁は、相隣者の共有に属するものと推定される。", "高地の所有者は、その高地が浸水した場合にこれを乾かすためであっても、公の水流又は 下水道に至るまで、低地に水を通過させることはできない。", "土地の所有者が直接に雨水を隣地に注ぐ構造の屋根を設けた場合、隣地所有者は、その所 有権に基づいて妨害排除又は予防の請求をすることができる。"], "answer": 2, "exp": "高地の所有者は、浸水した高地を乾かすためや自家用・農工業用の余水排出のため、損害の最も少ない場所・方法を選んで、公の水流・下水道に至るまで低地に水を通過させることができます（220条）。「できない」とする肢3が誤り。境界標の共同設置（肢1）、境界線上の障壁の共有推定（肢2）、雨水を直接隣地に注ぐ屋根への妨害排除請求（肢4、218条）は正しい。", "year": "R3-12月-2", "diff": "A"}, {"id": "kako-ken-R5-2", "subject": "権利関係", "topic": "相隣関係", "type": "select", "q": "相隣関係に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["土地の所有者は、境界標の調査又は境界に関する測量等の一定の目的のために必要な範囲 内で隣地を使用することができる場合であっても、住家については、その家の居住者の承 諾がなければ、当該住家に立ち入ることはできない。", "土地の所有者は、隣地の竹木の枝が境界線を越える場合、その竹木の所有者にその枝を切 除させることができるが、その枝を切除するよう催告したにもかかわらず相当の期間内に 切除しなかったときであっても、自らその枝を切り取ることはできない。", "相隣者の一人は、相隣者間で共有する障壁の高さを増すときは、他方の相隣者の承諾を得 なければならない。", "他の土地に囲まれて公道に通じない土地の所有者は、公道に出るためにその土地を囲んで いる他の土地を自由に選んで通行することができる。"], "answer": 0, "exp": "隣地使用権が認められる場合でも、住家には居住者の承諾がなければ立ち入れません（209条1項但書）ので肢1が正しい。改正法では、枝の切除を催告しても相当期間内に切除されないとき等は自ら切り取れる点（肢2誤り）、共有障壁の高さを増すのに相手の承諾は不要な点（肢3誤り）、囲繞地通行は損害が最も少ない場所・方法を選ぶ必要があり自由に選べない点（肢4誤り）に注意。", "year": "R5-2", "diff": "A"}]};

/* 講義動画（Googleドライブ・非公開）。章番号(ch)で要点と紐づく */
function vidsFor(subject, chapterNo){
  const ch = String(chapterNo).split("-")[0];

/* アプリ内プレーヤー（Drive埋め込み）。再生できない環境向けに「Driveで開く」も常設 */
function playVid(id,label){
  const old=document.getElementById('vmodal'); if(old)old.remove();
  const w=document.createElement('div'); w.className='vmodal'; w.id='vmodal';
  w.onclick=e=>{ if(e.target===w) w.remove(); };
  w.innerHTML=`<div class="vbox"><div class="vhead"><b>${esc(label||'講義動画')}</b>
    <a href="https://drive.google.com/file/d/${id}/view" target="_blank" rel="noopener">Driveで開く</a>
    <button onclick="document.getElementById('vmodal').remove()">✕</button></div>
    <iframe src="https://drive.google.com/file/d/${id}/preview" allow="autoplay; fullscreen" allowfullscreen></iframe></div>`;
  document.body.appendChild(w);
}

/* 動画ライブラリ（全動画へのダイレクトアクセス） */

/* 問題のtopicから最も近い「要点の章」を探す（復習リンク用） */
function findChapterByTopic(subject, topic){
  const chs = readingOf(subject); if(!chs.length||!topic) return null;
  let best=null, bestScore=0;
  for(const c of chs){
    let s=0;
    if(c.title===topic) s=100;
    else if(c.title.indexOf(topic)>=0) s=60+topic.length;
    else if(topic.indexOf(c.title)>=0) s=50+c.title.length;
    else{
      // トークン一致（2文字以上の共通部分文字列をざっくり評価）
      for(let i=0;i<topic.length-1;i++){ const bi=topic.slice(i,i+2); if(c.title.indexOf(bi)>=0) s+=3; }
      // 要点本文にも topic が出てくれば加点
      if((c.points||[]).some(p=>p.indexOf(topic)>=0)) s+=8;
    }
    if(s>bestScore){ bestScore=s; best=c; }
  }
  return bestScore>=8 ? best : null;
}
/* ペンギンマスコット画像。無ければ絵文字にフォールバック */
function mascot(name,size,emoji){
  if(window.MASCOT&&window.MASCOT[name]) return `<img src="${window.MASCOT[name]}" alt="" style="width:${size||100}px;height:auto;display:block;image-rendering:auto">`;
  return emoji?`<div style="font-size:${(size||100)*0.6}px">${emoji}</div>`:"";
}

const LS="takken_v1";

/* 問題バンク：過去問(COURSE) + 内蔵サンプル + 取り込み分（idで上書き） */
function bank(){
  const m={};
  ((window.COURSE&&window.COURSE.questions)||[]).forEach(q=>m[q.id]=q);
  (window.SAMPLE_QUESTIONS||[]).forEach(q=>m[q.id]=q);

}
function isKako(id){ return typeof id==="string" && id.indexOf("kako-")===0; }
/* 各問題の学習状況 */
function pg(id){ return S.p[id] || (S.p[id]={a:0,c:0,w:0,streak:0,last:null,mark:false,seen:0}); }
function isWeak(id){ const x=S.p[id]; return x && x.w>0 && x.streak<2; }      // 苦手＝間違えて、まだ克服(連続2正解)してない
function isMarked(id){ const x=S.p[id]; return x && x.mark; }

/* ============ 日付ユーティリティ ============ */
function todayKey(d){ d=d||new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function daysLeft(){
  const [y,m,dd]=(S.set.exam||EXAM_DATE_DEFAULT).split("-").map(Number);
  const exam=new Date(y,m-1,dd,13,0,0), now=new Date();
  return Math.ceil((exam-now)/86400000);
}
function streakDays(){
  let n=0, d=new Date();
  // 今日活動なければ昨日から数える（今日はこれから）
  if(!(S.log[todayKey(d)]&&S.log[todayKey(d)].ans>0)){ d.setDate(d.getDate()-1); }
  for(;;){ const k=todayKey(d); if(S.log[k]&&S.log[k].ans>0){ n++; d.setDate(d.getDate()-1);} else break; }
  return n;
}
function logAnswer(correct){
  const k=todayKey(); const e=S.log[k]||(S.log[k]={ans:0,c:0});
  e.ans++; if(correct)e.c++; save();
}

/* ============ 出題ロジック ============ */
function startQuiz(opt){
  const all=bank(); let pool=[];
  if(opt.src==="weak") pool=all.filter(q=>isWeak(q.id));
  else if(opt.src==="mark") pool=all.filter(q=>isMarked(q.id));
  else if(opt.src==="new") pool=all.filter(q=>!S.p[q.id]||!S.p[q.id].a);
  else if(opt.src==="today"){
    // 苦手優先（目標の半分まで）→ 新規 → その他 の順で、目標数まで埋める
    const goal=S.set.goalQ||10;
    const weak=all.filter(q=>isWeak(q.id)), fresh=all.filter(q=>!S.p[q.id]||!S.p[q.id].a), rest=all.filter(q=>!isWeak(q.id)&&S.p[q.id]&&S.p[q.id].a);
    pool=[...shuffle(weak).slice(0,Math.ceil(goal/2)),...shuffle(fresh),...shuffle(rest)].slice(0,goal);
  } else {
    pool=all.filter(q=>(!opt.subject||opt.subject==="all"||q.subject===opt.subject)&&(!opt.mode||opt.mode==="mix"||q.type===opt.mode)&&(!opt.onlyKako||isKako(q.id)));
  }
  if(!pool.length){ toast("対象の問題がありません"); return; }
  if(opt.src!=="today") pool=shuffle(pool);
  const limit = opt.src==="today"? pool.length : Math.min(pool.length, 20);
  QUIZ={list:pool.slice(0,limit), i:0, answered:false, chosen:null, correct:0, title:quizTitle(opt)};
  window.scrollTo(0,0); render();
}
function quizTitle(o){
  if(o.src==="weak")return "苦手復習"; if(o.src==="mark")return "チェック問題";
  if(o.src==="new")return "新規"; if(o.src==="today")return "今日の問題";
  if(o.subject&&o.subject!=="all")return o.subject+(o.onlyKako?" 過去問":""); return "全科目";
}
function viewQuiz(){
  const Q=QUIZ, q=Q.list[Q.i], st=pg(q.id);
  const pct=Math.round(Q.i/Q.list.length*100);
  let body="";
  if(q.type==="ox"){
    const cls=(v)=>!Q.answered?"":(v===q.answer?"ok":(v===Q.chosen?"ng":""));
    body=`<div class="ox">
      <button class="o ${cls(true)}" onclick="answer(true)" ${Q.answered?'disabled':''}>◯</button>
      <button class="x ${cls(false)}" onclick="answer(false)" ${Q.answered?'disabled':''}>✕</button></div>`;
  } else {
    body=`<div style="margin-top:10px">${q.choices.map((c,idx)=>{
      let cl=""; if(Q.answered){ if(idx===q.answer)cl="ok"; else if(idx===Q.chosen)cl="ng"; }
      return `<button class="opt ${cl}" onclick="answer(${idx})" ${Q.answered?'disabled':''}>
        <span class="n">${idx+1}</span><span>${esc(c)}</span></button>`}).join("")}</div>`;
  }
  let expl="";
  if(Q.answered){
    const ok=(q.type==="ox"? Q.chosen===q.answer : Q.chosen===q.answer);
    let review='';
    if(!ok){
      const rc=findChapterByTopic(q.subject,q.topic);
      const vs=rc?vidsFor(q.subject,rc.no):[];

          ${rc?`<button class="btn sm sec" style="width:100%;text-align:left;margin-bottom:6px" onclick="reviewChapter('${q.subject}','${(''+rc.no).replace(/'/g,"")}')">📖 要点『${esc(rc.title)}』${rc.page?'（テキストP'+rc.page+'）':''}</button>`:''}
          ${window.DOCS.texts[q.subject]?`<button class="btn sm sec" style="width:100%;text-align:left;margin-bottom:6px" onclick="playVid('${window.DOCS.texts[q.subject]}','基礎テキスト ${q.subject}')">📕 テキストPDF原本を開く${rc&&rc.page?'（P'+rc.page+'）':''}</button>`:''}
          ${vs.slice(0,2).map(v=>`<button class="btn sm sec" style="display:block;width:100%;text-align:left;margin-bottom:6px" onclick="playVid('${v.id}','${esc(v.label)}')">▶ 動画『${esc(v.label)}』</button>`).join("")}
          ${vs.length>2?`<div class="mut" style="font-size:11px">ほか${vs.length-2}本は要点ページから</div>`:''}

    expl=`${ok?`<div style="text-align:center;margin-top:10px;animation:pop .35s">${mascot('cheer',104,'🎉')}</div>`:''}
      <div class="expl">
      <div class="judge ${ok?'ok':'ng'}">${ok?'◯ 正解！':'✕ 不正解'}${q.type==='ox'?'（正答：'+(q.answer?'◯':'✕')+'）':''}</div>
      ${esc(q.exp)}</div>
      ${qv?`<button class="btn sm sec" style="display:block;width:100%;margin-top:10px;text-align:left;border-color:var(--pri);color:var(--pri);font-weight:800" onclick="playVid('${qv}','この問題の講師解説')">🎬 この問題の講師解説動画を見る</button>`:''}
      ${review}
      <button class="btn" style="margin-top:14px" onclick="next()">${Q.i+1<Q.list.length?'次の問題 →':'結果を見る'}</button>`;
  }
  return `<div class="wrap">
    <div class="between top">
      <button class="pill" onclick="go('quiz')">✕ やめる</button>
      <span class="sub" style="font-size:13px;font-weight:700">${Q.title}</span>
      <span class="pill">${Q.i+1} / ${Q.list.length}</span>
    </div>
    <div class="prog"><i style="width:${pct}%"></i></div>
    <div class="card">
      <div class="between" style="margin-bottom:8px">
        <div class="row"><span class="dot ${clsOf(q.subject)}"></span>
          <span class="mut" style="font-size:12px;font-weight:700">${q.subject}・${q.topic}${q.year?' <span style="opacity:.7">'+esc(q.year)+'</span>':''}</span></div>
        <button class="star" onclick="toggleMark('${q.id}')">${isMarked(q.id)?'⭐️':'☆'}</button>
      </div>
      <div class="q-stmt">${esc(q.q)}</div>
      ${q.type==='ox'?'<div class="mut" style="font-size:12px">正しければ◯／誤りなら✕</div>':''}
      ${body}
      ${expl}
    </div>
    <div style="height:20px"></div>
  </div>`;
}
function answer(v){
  const Q=QUIZ; if(Q.answered)return;
  const q=Q.list[Q.i], st=pg(q.id);
  const ok = v===q.answer;
  Q.chosen=v; Q.answered=true; if(ok)Q.correct++;
  st.a++; st.seen=Date.now(); st.last=ok?1:0;
  if(ok){ st.c++; st.streak++; } else { st.w++; st.streak=0; }
  logAnswer(ok); save(); render();
  if(navigator.vibrate) navigator.vibrate(ok?12:[10,40,10]);
}
function next(){
  const Q=QUIZ;
  if(Q.i+1<Q.list.length){ Q.i++; Q.answered=false; Q.chosen=null; window.scrollTo(0,0); render(); }
  else { showResult(); }
}

  const Q=QUIZ, n=Q.list.length, c=Q.correct, pct=Math.round(c/n*100);

function pickText(){ fileInput(".txt,text/plain",f=>{ const r=new FileReader();
  r.onload=()=>{ S.txt=r.result; save(); toast("テキストを保存しました"); if(TAB==="learn")mountLearn(); else go("learn"); }; r.readAsText(f); }); }

function pickQuestions(){ fileInput(".json,application/json",f=>{ const r=new FileReader();
  r.onload=()=>{ try{ const arr=JSON.parse(r.result); if(!Array.isArray(arr))throw 0;
    const ok=arr.filter(q=>q.id&&q.subject&&q.type&&q.q&&q.exp!==undefined);

    toast(`${ok.length}問を取り込みました`); render();
  }catch(e){ toast("JSONの形式が不正です"); } }; r.readAsText(f); }); }
function clearCustom(){ if(confirm("取り込んだ問題を削除しますか？")){ S.custom=[]; save(); toast("削除しました"); render(); } }
function exportData(){ const blob=new Blob([JSON.stringify(S)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="takken_backup_"+todayKey()+".json"; a.click(); toast("書き出しました"); }
function pickImport(){ fileInput(".json",f=>{ const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(!d.p)throw 0; S=Object.assign(fresh(),d); save(); toast("読み込みました"); go("home"); }
  catch(e){ toast("バックアップの形式が不正です"); } }; r.readAsText(f); }); }

/* ============ IndexedDB（動画などのBlob用） ============ */
let _db;
function idb(){ return new Promise((res,rej)=>{ if(_db)return res(_db);
  const rq=indexedDB.open("takken",1);
  rq.onupgradeneeded=()=>rq.result.createObjectStore("f");
  rq.onsuccess=()=>{_db=rq.result;res(_db)}; rq.onerror=()=>rej(rq.error); }); }
async function idbSet(k,v){ const db=await idb(); return new Promise((res,rej)=>{
  const t=db.transaction("f","readwrite"); t.objectStore("f").put(v,k); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }
async function idbGet(k){ const db=await idb(); return new Promise((res)=>{
  const r=db.transaction("f","readonly").objectStore("f").get(k); r.onsuccess=()=>res(r.result); r.onerror=()=>res(null); }); }
async function idbDel(k){ const db=await idb(); return new Promise((res)=>{
  const t=db.transaction("f","readwrite"); t.objectStore("f").delete(k); t.oncomplete=res; }); }

/* ============ ユーティリティ ============ */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
let _tt; function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show");
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove("show"),1800); }

/* ============ 起動 ============ */
render();
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
</script>
