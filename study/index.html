を得て許可した歩廊の柱その他これに類するものを除き、壁面線を越えて建築してはならない。", "特別用途地区内においては、地方公共団体は、その地区の指定の目的のために必要と認める場合は、国土交通大臣の承認を得て、条例で、法第48条第1項から第13項までの規定による用途制限を緩和することができる。", "都市計画により建蔽率の限度が10分の8と定められている準工業地域においては、防火地域内にある耐火建築物については、法第53条第1項から第5項までの規定に基づく建蔽率に関する制限は適用されない。", "田園住居地域内の建築物に対しては、法第56条第1項第3号の規定（北側斜線制限）は適用されない。"], "answer": 3, "exp": "誤りは4。北側斜線制限は第一種・第二種低層住居専用地域、田園住居地域、第一種・第二種中高層住居専用地域に適用され、田園住居地域も対象となる。他の肢は正しい。", "year": "R2-12月-18", "diff": "A"}, {"id": "kako-hou-R4-18", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "次の記述のうち、建築基準法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["第一種低層住居専用地域内においては、神社、寺院、教会を建築することはできない。", "その敷地内に一定の空地を有し、かつ、その敷地面積が一定規模以上である建築物で、特定行政庁が交通上、安全上、防火上及び衛生上支障がなく、かつ、その建蔽率、容積率及び各部分の高さについて総合的な配慮がなされていることにより市街地の環境の整備改善に資すると認めて許可したものの建蔽率、容積率又は各部分の高さは、その許可の範囲内において、関係規定による限度を超えるものとすることができる。", "法第3章の規定が適用されるに至った際、現に建築物が立ち並んでいる幅員1.8m未満の道で、あらかじめ、建築審査会の同意を得て特定行政庁が指定したものは、同章の規定における道路とみなされる。", "第一種住居地域内においては、建築物の高さは、10m又は12mのうち当該地域に関する都市計画において定められた建築物の高さの限度を超えてはならない。"], "answer": 2, "exp": "正しいのは3。幅員1.8m未満の道でも、建築審査会の同意を得て特定行政庁が指定すれば道路とみなされる。1は神社等はどの用途地域でも建築でき、2は建蔽率までは緩和されず、4は絶対高さ制限は第一種住居地域には適用されない。", "year": "R4-18", "diff": "C"}, {"id": "kako-hou-R5-18", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "次の記述のうち、建築基準法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["法第53条第1項及び第2項の建蔽率制限に係る規定の適用については、準防火地域内にある準耐火建築物であり、かつ、街区の角にある敷地又はこれに準ずる敷地で特定行政庁が指定するものの内にある建築物にあっては同条第1項各号に定める数値に10分の2を加えたものをもって当該各号に定める数値とする。", "建築物又は敷地を造成するための擁壁は、道路内に、又は道路に突き出して建築し、又は築造してはならず、地盤面下に設ける建築物においても同様である。", "地方公共団体は、その敷地が袋路状道路にのみ接する建築物であって、延べ面積が150m2を超えるものについては、一戸建ての住宅であっても、条例で、その敷地が接しなければならない道路の幅員、その敷地が道路に接する部分の長さその他その敷地又は建築物と道路との関係に関して必要な制限を付加することができる。", "冬至日において、法第56条の2第1項の規定による日影規制の対象区域内の土地に日影を生じさせるものであっても、対象区域外にある建築物であれば一律に、同項の規定は適用されない。"], "answer": 0, "exp": "正しいのは1。準防火地域内の準耐火建築物で角地指定を受けたものは、それぞれ10分の1ずつ、合わせて10分の2を加えられる。2は地盤面下の建築物は例外で建築でき、3は一戸建て住宅は除かれ、4は対象区域外でも日影を生じさせれば規制対象となる。", "year": "R5-18", "diff": "C"}, {"id": "kako-hou-H28-18", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、正しいものはどれか。", "choices": ["防火地域にある建築物で、外壁が耐火構造のものについては、その外壁を隣地境界線に接して設けることができる。", "高さ30mの建築物には、原則として非常用の昇降機を設けなければならない。", "準防火地域内においては、延べ面積が2,000m2の共同住宅は準耐火建築物等としなければならない。", "延べ面積が1,000m2を超える耐火建築物は、防火上有効な構造の防火壁又は防火床によって有効に区画し、かつ、各区画の床面積の合計をそれぞれ1,000m2以内としなければならない。"], "answer": 0, "exp": "正しいのは1。防火地域・準防火地域で外壁が耐火構造なら、隣地境界線に接して設けられる。2は高さ31m超が対象、3は延べ面積1,500m2超なら耐火建築物、4は耐火建築物なら防火壁で区画する必要はない。", "year": "H28-18", "diff": "A"}, {"id": "kako-hou-R2-12月-17", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。", "choices": ["建築物が防火地域及び準防火地域にわたる場合においては、その全部について、敷地の属する面積が大きい方の地域内の建築物に関する規定を適用する。", "倉庫の用途に供する建築物で、その用途に供する3階以上の部分の床面積の合計が500m2であるものは、耐火建築物としなければならない。", "高さ25mの建築物には、周囲の状況によって安全上支障がない場合を除き、有効に避雷設備を設けなければならない。", "高さ1m以下の階段の部分には、手すりを設けなくてもよい。"], "answer": 0, "exp": "誤りは1。防火地域と準防火地域にわたる場合は、面積の大小にかかわらず、厳しい方の防火地域の規定を全部に適用する。他の肢は正しい。", "year": "R2-12月-17", "diff": "A"}, {"id": "kako-hou-R5-17", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。", "choices": ["地方公共団体は、条例で、津波、高潮、出水等による危険の著しい区域を災害危険区域として指定し、当該区域内における住居の用に供する建築物の建築を禁止することができる。", "3階建て以上の建築物の避難階以外の階を、床面積の合計が1,500m2を超える物品販売業の店舗の売場とする場合には、当該階から避難階又は地上に通ずる2以上の直通階段を設けなければならない。", "建築物が防火地域及び準防火地域にわたる場合、その全部について準防火地域内の建築物に関する規定を適用する。", "石綿等をあらかじめ添加した建築材料は、石綿等を飛散又は発散させるおそれがないものとして国土交通大臣が定めたもの又は国土交通大臣の認定を受けたものを除き、使用してはならない。"], "answer": 2, "exp": "誤りは3。防火地域と準防火地域にわたる場合は、厳しい方の防火地域の規定を全部に適用する。準防火地域の規定ではない。他の肢は正しい。", "year": "R5-17", "diff": "C"}, {"id": "kako-hou-H27-17", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。", "choices": ["防火地域及び準防火地域外において建築物を改築する場合で、その改築に係る部分の床面積の合計が10m2以内であるときは、建築確認は不要である。", "都市計画区域外において階数2以上又は延べ面積200m2超の木造建築物を新築する場合、建築確認が必要である。", "事務所の用途に供する建築物をホテル（その用途に供する部分の床面積の合計が500m2）に用途変更する場合、建築確認は不要である。", "映画館の用途に供する建築物で、その用途に供する部分の床面積の合計が300m2であるものの改築をしようとする場合、建築確認が必要である。"], "answer": 2, "exp": "誤りは3。事務所を床面積200m2超のホテル（特殊建築物）に用途変更する場合は建築確認が必要となる。他の肢は正しい。", "year": "H27-17", "diff": "A"}, {"id": "kako-hou-H29-18", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。", "choices": ["鉄筋コンクリート造であって、階数が2の住宅を新築する場合において、特定行政庁が、安全上、防火上及び避難上支障がないと認めたときは、検査済証の交付を受ける前においても、仮に、当該建築物を使用することができる。", "長屋の各戸の界壁は、一定の場合を除いて、小屋裏又は天井裏に達するものとしなければならない。", "下水道法に規定する処理区域内においては、便所は、汚水管が公共下水道に連結された水洗便所としなければならない。", "ホテルの用途に供する建築物を共同住宅（その用途に供する部分の床面積の合計が300m2）に用途変更する場合、建築確認は不要である。"], "answer": 3, "exp": "誤りは4。ホテルと共同住宅は類似の用途ではなく、床面積200m2超の共同住宅（特殊建築物）への用途変更は建築確認が必要。他の肢は正しい。", "year": "H29-18", "diff": "B"}, {"id": "kako-hou-H30-18", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、正しいものはどれか。", "choices": ["建築物の高さ31m以下の部分にある全ての階には、非常用の進入口を設けなければならない。", "防火地域内にある3階建ての木造の建築物を増築する場合、その増築に係る部分の床面積の合計が10m2以内であれば、その工事が完了した際に、建築主事若しくは建築副主事又は指定確認検査機関の完了検査を受ける必要はない。", "4階建ての事務所の用途に供する建築物の2階以上の階にあるバルコニーその他これに類するものの周囲には、安全上必要な高さが1.1m以上の手すり壁、さく又は金網を設けなければならない。", "建築基準法の改正により、現に存する建築物が改正後の規定に適合しなくなった場合、当該建築物の所有者又は管理者は速やかに当該建築物を改正後の建築基準法の規定に適合させなければならない。"], "answer": 2, "exp": "正しいのは3。2階以上のバルコニー等の周囲には、高さ1.1m以上の手すり壁等を設けなければならない。1は3階以上の階が対象、2は防火地域内なので確認・完了検査が必要、4は既存不適格として適合させる必要はない。", "year": "H30-18", "diff": "C"}, {"id": "kako-hou-R1-17", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。", "choices": ["特定行政庁は、緊急の必要がある場合においては、建築基準法の規定に違反した建築物の所有者等に対して、仮に、当該建築物の使用禁止又は使用制限の命令をすることができる。", "地方公共団体は、条例で、津波、高潮、出水等による危険の著しい区域を災害危険区域として指定することができ、当該区域内における住居の用に供する建築物の建築の禁止その他建築物の建築に関する制限で災害防止上必要なものは当該条例で定めることとされている。", "防火地域内にある看板で建築物の屋上に設けるものは、その主要な部分を不燃材料で造り、又はおおわなければならない。", "共同住宅の住戸には、非常用の照明装置を設けなければならない。"], "answer": 3, "exp": "誤りは4。非常用照明装置は特殊建築物の居室等に義務付けられるが、一戸建て住宅や共同住宅の居室は設置が免除されている。他の肢は正しい。", "year": "R1-17", "diff": "C"}, {"id": "kako-hou-R2-10月-17", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、正しいものはどれか。", "choices": ["階数が2で延べ面積が200m2の鉄骨造の共同住宅の大規模の修繕をしようとする場合、建築主は、当該工事に着手する前に、確認済証の交付を受けなければならない。", "居室の天井の高さは、一室で天井の高さの異なる部分がある場合、室の床面から天井の最も低い部分までの高さを2.1m以上としなければならない。", "延べ面積が1,000m2を超える準耐火建築物は、防火上有効な構造の防火壁又は防火床によって有効に区画し、かつ、各区画の床面積の合計をそれぞれ1,000m2以内としなければならない。", "高さ30mの建築物には、非常用の昇降機を設けなければならない。"], "answer": 0, "exp": "正しいのは1。階数2以上又は延べ面積200m2超の建築物の大規模修繕は、着手前に確認済証の交付を受ける必要がある。2は平均の高さで判断、3は準耐火建築物なら区画不要、4は高さ31m超が対象。", "year": "R2-10月-17", "diff": "A"}, {"id": "kako-hou-R3-10月-17", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、正しいものはどれか。", "choices": ["居室の内装の仕上げには、ホルムアルデヒドを発散させる建築材料を使用することが認められていない。", "4階建ての共同住宅の敷地内には、避難階に設けた屋外への出口から道又は公園、広場その他の空地に通ずる幅員が2m以上の通路を設けなければならない。", "防火地域又は準防火地域内にある建築物で、外壁が防火構造であるものについては、その外壁を隣地境界線に接して設けることができる。", "建築主は、3階建ての木造の共同住宅を新築する場合において、特定行政庁が、安全上、防火上及び避難上支障がないと認めたときは、検査済証の交付を受ける前においても、仮に、当該共同住宅を使用することができる。"], "answer": 3, "exp": "正しいのは4。特殊建築物等でも、特定行政庁が支障がないと認めれば、検査済証の交付前に仮使用できる。1は一定の技術的基準に適合すれば使用可、2は幅員1.5m以上、3は外壁が耐火構造であることが要件。", "year": "R3-10月-17", "diff": "C"}, {"id": "kako-hou-R3-12月-17", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。", "choices": ["4階建ての建築物の避難階以外の階を劇場の用途に供し、当該階に客席を有する場合には、当該階から避難階又は地上に通ずる2以上の直通階段を設けなければならない。", "床面積の合計が500m2の映画館の用途に供する建築物を演芸場に用途変更する場合、建築主事又は指定確認検査機関の確認を受ける必要はない。", "換気設備を設けていない居室には、換気のための窓その他の開口部を設け、その換気に有効な部分の面積は、その居室の床面積に対して10分の1以上としなければならない。", "延べ面積が800m2の百貨店の階段の部分には、排煙設備を設けなくてもよい。"], "answer": 2, "exp": "誤りは3。換気に有効な開口部の面積は、居室の床面積に対して20分の1以上でなければならない。10分の1ではない。他の肢は正しい。", "year": "R3-12月-17", "diff": "B"}, {"id": "kako-hou-R4-17", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法（以下この問において「法」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["法の改正により、現に存する建築物が改正後の法の規定に適合しなくなった場合には、当該建築物は違反建築物となり、速やかに改正後の法の規定に適合させなければならない。", "延べ面積が500m2を超える建築物について、大規模な修繕をしようとする場合、都市計画区域外であれば建築確認を受ける必要はない。", "地方公共団体は、条例で、建築物の敷地、構造又は建築設備に関して安全上、防火上又は衛生上必要な制限を附加することができる。", "地方公共団体が、条例で、津波、高潮、出水等による危険の著しい区域を災害危険区域として指定した場合には、災害危険区域内における住居の用に供する建築物の建築は一律に禁止されることとなる。"], "answer": 2, "exp": "正しいのは3。地方公共団体は条例で、敷地・構造・建築設備について安全上・防火上・衛生上必要な制限を付加できる。1は既存不適格で違反ではなく、2は区域内外を問わず確認が必要、4は禁止等の内容は条例で定め一律ではない。", "year": "R4-17", "diff": "A"}, {"id": "kako-hou-R6-17", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。なお、建築副主事の確認にあっては、建築基準法に定める大規模建築物以外の建築物に限るものとする。", "choices": ["高さ25mの建築物には、周囲の状況によって安全上支障がない場合を除き、有効に避雷設備を設けなければならない。", "特定行政庁は、建築基準法の規定に違反した建築物（国、都道府県又は建築主事を置く市町村の建築物を除く。）の所有者に対して、緊急の必要があり、仮に当該建築物の使用禁止又は使用制限の命令をする場合であっても、意見書の提出先等を記載した通知書の交付等の手続をとらなければならない。", "防火地域内に存在する共同住宅（その用途に供する部分の床面積の合計が300m2）を増築する場合、その増築に係る部分の床面積の合計が10m2以内であっても、建築主事、建築副主事又は指定確認検査機関の確認を受ける必要がある。", "劇場の用途に供する建築物を映画館（その用途に供する部分の床面積の合計が500m2）に用途変更する場合、建築主事、建築副主事又は指定確認検査機関の確認を受ける必要はない。"], "answer": 1, "exp": "誤りは2。緊急の必要がある場合は、通知書の交付等の手続によらないで、仮に使用禁止・使用制限を命じることができる。他の肢は正しい。", "year": "R6-17", "diff": "B"}, {"id": "kako-hou-H27-18", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。", "choices": ["建築物の容積率の算定の基礎となる延べ面積には、エレベーターの昇降路の部分又は共同住宅の共用の廊下若しくは階段の用に供する部分の床面積は、一定の場合を除き、算入しない。", "建築物の敷地が建蔽率に関する制限を受ける地域又は区域の2以上にわたる場合においては、当該建築物の建蔽率は、当該各地域又は区域内の建築物の建蔽率の限度の合計の2分の1以下でなければならない。", "地盤面下に設ける建築物については、道路内に建築することができる。", "建築協定の目的となっている建築物に関する基準が建築物の借主の権限に係る場合においては、その建築協定については、当該建築物の借主は、土地の所有者等とみなす。"], "answer": 1, "exp": "誤りは2。敷地が建蔽率制限の異なる2以上の地域にわたる場合の建蔽率は、各地域の限度を面積割合で加重平均した値以下でなければならない。合計の2分の1ではない。他の肢は正しい。", "year": "H27-18", "diff": "A"}, {"id": "kako-hou-H27-21", "subject": "法令上の制限", "topic": "国土利用計画法", "type": "select", "q": "国土利用計画法第23条の事後届出（以下この問において「事後届出」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["都市計画区域外においてＡが所有する面積12,000㎡の土地について、Ａの死亡により当該土地を相続したＢは、事後届出を行う必要はない。", "市街化区域においてＡが所有する面積3,000㎡の土地について、Ｂが購入した場合、Ａ及びＢは事後届出を行わなければならない。", "市街化調整区域に所在する農地法第3条第1項の許可を受けた面積6,000㎡の農地を購入したＡは、事後届出を行わなければならない。", "市街化区域に所在する一団の土地である甲土地（面積1,500㎡）と乙土地（面積1,500㎡）について、甲土地については売買によって所有権を取得し、乙土地については対価の授受を伴わず賃借権の設定を受けたＡは、事後届出を行わなければならない。"], "answer": 0, "exp": "相続は土地売買等の契約ではないため、事後届出は不要です。よって1が正しい。事後届出をするのは権利取得者のみなので2は誤り。農地法3条の許可を受けた取引は届出不要で3も誤り。4は甲土地が2,000㎡未満、乙土地は対価のない賃借権設定で対象外です。", "year": "H27-21", "diff": "A"}, {"id": "kako-hou-H28-15", "subject": "法令上の制限", "topic": "国土利用計画法", "type": "select", "q": "国土利用計画法第23条に規定する届出（以下この問において「事後届出」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["市街化区域内の土地（面積2,500㎡）を購入する契約を締結した者は、その契約を締結した日から起算して3週間以内に事後届出を行わなければならない。", "Ａが所有する監視区域内の土地（面積10,000㎡）をＢが購入する契約を締結した場合、Ａ及びＢは事後届出を行わなければならない。", "都市計画区域外に所在し、一団の土地である甲土地（面積6,000㎡）と乙土地（面積5,000㎡）を購入する契約を締結した者は、事後届出を行わなければならない。", "市街化区域内の甲土地（面積3,000㎡）を購入する契約を締結した者が、その契約締結の1月後に甲土地と一団の土地である乙土地（面積4,000㎡）を購入することとしている場合においては、甲土地の事後届出は、乙土地の契約締結後に乙土地の事後届出と併せて行うことができる。"], "answer": 2, "exp": "都市計画区域外は10,000㎡以上で届出が必要で、一団の甲乙合計11,000㎡なので3が正しい。事後届出の期限は2週間以内なので1は誤り。監視区域内は事前届出が必要で2も誤り。届出対象面積を超える甲土地は締結後2週間以内に単独で届け出る必要があり4も誤りです。", "year": "H28-15", "diff": "A"}, {"id": "kako-hou-H30-15", "subject": "法令上の制限", "topic": "国土利用計画法", "type": "select", "q": "国土利用計画法第23条の届出（以下この問において「事後届出」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["事後届出に係る土地の利用目的について、甲県知事から勧告を受けた宅地建物取引業者Ａがその勧告に従わないときは、甲県知事は、その旨及びその勧告の内容を公表することができる。", "乙県が所有する都市計画区域内の土地（面積6,000㎡）を買い受けた者は、売買契約を締結した日から起算して2週間以内に、事後届出を行わなければならない。", "指定都市（地方自治法に基づく指定都市をいう。）の区域以外に所在する土地について、事後届出を行うに当たっては、市町村の長を経由しないで、直接都道府県知事に届け出なければならない。", "宅地建物取引業者Ｂが所有する市街化区域内の土地（面積2,500㎡）について、宅地建物取引業者Ｃが購入する契約を締結した場合、Ｃは事後届出を行う必要はない。"], "answer": 0, "exp": "勧告に従わないときは知事がその旨と内容を公表できるので1が正しい。当事者の一方が地方公共団体（乙県）なら届出は不要で2は誤り。届出は市町村長を経由して知事に行うため3も誤り。市街化区域2,000㎡以上は届出が必要で、2,500㎡の取得者Ｃは届出が必要なので4も誤りです。", "year": "H30-15", "diff": "A"}, {"id": "kako-hou-R1-22", "subject": "法令上の制限", "topic": "国土利用計画法", "type": "select", "q": "国土利用計画法第23条の届出（以下この問において「事後届出」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["宅地建物取引業者Ａが、自己の所有する市街化区域内の2,000㎡の土地を、個人Ｂ、個人Ｃに1,000㎡ずつに分割して売却した場合、Ｂ、Ｃは事後届出を行わなければならない。", "個人Ｄが所有する市街化区域内の3,000㎡の土地を、個人Ｅが相続により取得した場合、Ｅは事後届出を行わなければならない。", "宅地建物取引業者Ｆが所有する市街化調整区域内の6,000㎡の一団の土地を、宅地建物取引業者Ｇが一定の計画に従って、3,000㎡ずつに分割して購入した場合、Ｇは事後届出を行わなければならない。", "甲市が所有する市街化調整区域内の12,000㎡の土地を、宅地建物取引業者Ｈが購入した場合、Ｈは事後届出を行わなければならない。"], "answer": 2, "exp": "面積は権利取得者ごとに判定します。3は同一のＧが計画的に取得し合計6,000㎡で市街化調整区域5,000㎡以上に該当するため届出が必要で正しい。1はＢ・Ｃとも1,000㎡で対象未満、2は相続で契約でないため不要、4は当事者に地方公共団体（甲市）が含まれるため不要です。", "year": "R1-22", "diff": "A"}, {"id": "kako-hou-R2-10月-22", "subject": "法令上の制限", "topic": "国土利用計画法", "type": "select", "q": "国土利用計画法第23条の届出（以下この問において「事後届出」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["Ａが所有する市街化区域内の1,500㎡の土地をＢが購入した場合には、Ｂは事後届出を行う必要はないが、Ｃが所有する市街化調整区域内の6,000㎡の土地についてＤと売買に係る予約契約を締結した場合には、Ｄは事後届出を行う必要がある。", "Ｅが所有する市街化区域内の2,000㎡の土地をＦが購入した場合、Ｆは当該土地の所有権移転登記を完了した日から起算して2週間以内に事後届出を行う必要がある。", "Ｇが所有する都市計画区域外の15,000㎡の土地をＨに贈与した場合、Ｈは事後届出を行う必要がある。", "Ｉが所有する都市計画区域外の10,000㎡の土地とＪが所有する市街化調整区域内の10,000㎡の土地を交換した場合、Ｉ及びＪは事後届出を行う必要はない。"], "answer": 0, "exp": "市街化区域1,500㎡は対象未満でＢは不要、市街化調整区域6,000㎡の予約契約は届出対象なのでＤは必要となり1が正しい。届出期限は契約締結日から2週間以内で登記完了日ではないため2は誤り。贈与は対価がなく届出対象外で3も誤り。交換は届出対象で両当事者とも必要なので4も誤りです。", "year": "R2-10月-22", "diff": "A"}, {"id": "kako-hou-R2-12月-22", "subject": "法令上の制限", "topic": "国土利用計画法", "type": "select", "q": "国土利用計画法第23条の届出（以下この問において「事後届出」という。）に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市にあってはその長をいうものとする。", "choices": ["都道府県知事は、事後届出に係る土地の利用目的及び対価の額について、届出をした宅地建物取引業者に対し勧告することができ、都道府県知事から勧告を受けた当該業者が勧告に従わなかった場合、その旨及びその勧告の内容を公表することができる。", "事後届出が必要な土地売買等の契約により権利取得者となった者が事後届出を行わなかった場合、都道府県知事から当該届出を行うよう勧告されるが、罰則の適用はない。", "国が所有する市街化区域内の一団の土地である1,500㎡の土地と500㎡の土地を個人Ａが購入する契約を締結した場合、Ａは事後届出を行う必要がある。", "個人Ｂが所有する都市計画区域外の11,000㎡の土地について、個人ＣがＢとの間で対価を支払って地上権設定契約を締結した場合、Ｃは事後届出を行う必要がある。"], "answer": 3, "exp": "都市計画区域外10,000㎡以上で対価を伴う地上権設定は届出対象なので4が正しい。勧告できるのは利用目的についてのみで対価の額は対象外のため1は誤り。届出を怠ると勧告ではなく罰則が科されるので2も誤り。当事者に国が含まれる取引は届出不要で3も誤りです。", "year": "R2-12月-22", "diff": "A"}, {"id": "kako-hou-R3-10月-22", "subject": "法令上の制限", "topic": "国土利用計画法", "type": "select", "q": "国土利用計画法第23条の届出（以下この問において「事後届出」という。）に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市にあってはその長をいうものとする。", "choices": ["土地売買等の契約を締結した場合には、当事者のうち当該契約による権利取得者は、その契約を締結した日の翌日から起算して3週間以内に、事後届出を行わなければならない。", "都道府県知事は、事後届出をした者に対し、その届出に係る土地に関する権利の移転若しくは設定後における土地の利用目的又は土地に関する権利の移転若しくは設定の対価の額について、当該土地を含む "R4-22", "diff": "A"}, {"id": "kako-hou-R5-22", "subject": "法令上の制限", "topic": "国土利用計画法", "type": "select", "q": "土地を取得する場合における届出に関する次の記述のうち、正しいものはどれか。なお、この問において「事後届出」とは、国土利用計画法第23条の届出をいい、「重要土地等調査法」とは、重要施設周辺及び国境離島等における土地等の利用状況の調査及び利用の規制等に関する法律をいうものとする。", "choices": ["都市計画区域外において、国から一団の土地である6,000㎡と5,000㎡の土地を購入した者は、事後届出を行う必要はない。", "市街化区域を除く都市計画区域内において、Ａが所有する7,000㎡の土地をＢが相続により取得した場合、Ｂは事後届出を行う必要がある。", "市街化区域において、Ｃが所有する3,000㎡の土地をＤが購入する契約を締結した場合、Ｃ及びＤは事後届出を行わなければならない。", "重要土地等調査法の規定による特別注視区域内にある100㎡の規模の土地に関する所有権又はその取得を目的とする権利の移転をする契約を締結する場合には、当事者は、一定の事項を、あらかじめ、内閣総理大臣に届け出なければならない。"], "answer": 0, "exp": "当事者の一方が国である取引は区域や面積に関係なく届出不要なので1が正しい。相続は契約でないため届出対象外で2は誤り。事後届出の義務者は権利取得者のみでＤだけが行い売主Ｃは不要なので3も誤り。特別注視区域の事前届出は200㎡以上が対象で100㎡は不要なため4も誤りです。", "year": "R5-22", "diff": "A"}, {"id": "kako-hou-R6-22", "subject": "法令上の制限", "topic": "国土利用計画法", "type": "select", "q": "国土利用計画法（以下この問において「法」という。）第23条の届出（以下この問において「事後届出」という。）及び法第27条の7の監視区域内の届出（以下この問において「事前届出」という。）に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市にあってはその長をいうものとする。", "choices": ["Ａが所有する市街化区域以外の都市計画区域内の4,000㎡の土地について、宅地建物取引業者Ｂが地上権の設定を受ける契約を締結した場合、Ｂは事後届出を行わなければならない。", "宅地建物取引業者Ｃが所有する市街化区域内の3,000㎡の土地と宅地建物取引業者Ｄが所有する都市計画区域外に所在する12,000㎡の土地を金銭の授受を伴わずに交換する契約を締結した場合、Ｃ及びＤはともに事後届出を行う必要はない。", "事前届出又は事後届出が必要な土地について、売買契約を締結したにもかかわらず所定の期間内に当該届出をしなかった者は都道府県知事からの勧告を受けることがあるが、罰則の適用を受けることはない。", "監視区域に指定された市街化区域内に所在する土地2,500㎡について売買契約を締結しようとする当事者は、契約締結の少なくとも6週間前までに事前届出を行わなければならない。"], "answer": 3, "exp": "監視区域内では事前届出が必要で、届出後6週間は契約できないため実質的に締結の少なくとも6週間前までの届出が必要となり4が正しい。市街化区域以外は5,000㎡以上が対象で4,000㎡は不要な1は誤り。交換も届出対象で面積要件を満たす両者に必要な2も誤り。届出を怠ると勧告ではなく罰則が科され3も誤りです。", "year": "R6-22", "diff": "B"}, {"id": "kako-hou-H27-22", "subject": "法令上の制限", "topic": "農地法", "type": "select", "q": "農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、正しいものはどれか。", "choices": ["市街化区域内の農地を耕作目的で取得する場合には、あらかじめ農業委員会に届け出れば、法第3条第1項の許可を受ける必要はない。", "農業者が自己所有の市街化区域外の農地に賃貸住宅を建設するため転用する場合は、法第4条第1項の許可を受ける必要はない。", "農業者が自己所有の市街化区域外の農地に自己の居住用の住宅を建設するため転用する場合は、法第4条第1項の許可を受ける必要はない。", "農業者が住宅の改築に必要な資金を銀行から借りるため、市街化区域外の農地に抵当権の設定が行われ、その後、返済が滞ったため当該抵当権に基づき競売が行われ第三者が当該農地を取得する場合であっても、法第3条第1項又は法第5条第1項の許可を受ける必要がある。"], "answer": 3, "exp": "3条許可には市街化区域内の届出特例がなく、耕作目的の取得でも許可が必要。自己利用でも4条の転用許可は要る。抵当権設定自体は許可不要だが、競売で第三者が農地を取得する場面は権利移動なら3条、転用目的なら5条の許可が必要なので選択肢4が正しい。", "year": "H27-22", "diff": "A"}, {"id": "kako-hou-H28-22", "subject": "法令上の制限", "topic": "農地法", "type": "select", "q": "農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、正しいものはどれか。", "choices": ["相続により農地を取得する場合は、法第3条第1項の許可を要しないが、相続人に該当しない者に対する特定遺贈により農地を取得する場合も、同項の許可を受ける必要はない。", "法第2条第3項の農地所有適格法人の要件を満たしていない株式会社は、耕作目的で農地を借り入れることはできない。", "法第3条第1項又は法第5条第1項の許可が必要な農地の売買について、これらの許可を受けずに売買契約を締結しても、その所有権の移転の効力は生じない。", "農業者が、市街化調整区域内の耕作しておらず遊休化している自己の農地を、自己の住宅用地に転用する場合、あらかじめ農業委員会へ届出をすれば、法第4条第1項の許可を受ける必要がない。"], "answer": 2, "exp": "3条・5条の許可を受けずに結んだ農地売買は無効で所有権移転の効力が生じないので選択肢3が正しい。相続人以外への特定遺贈は3条許可が必要、適格法人でなくても耕作目的の借入れは可能、市街化調整区域の転用は届出でなく4条許可が要る。", "year": "H28-22", "diff": "B"}, {"id": "kako-hou-H29-15", "subject": "法令上の制限", "topic": "農地法", "type": "select", "q": "農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、正しいものはどれか。", "choices": ["市街化区域内の農地を耕作のために借り入れる場合、あらかじめ農業委員会に届出をすれば、法第3条第1項の許可を受ける必要はない。", "市街化調整区域内の4ヘクタールを超える農地について、これを転用するために所有権を取得する場合、農林水産大臣の許可を受ける必要がある。", "銀行から500万円を借り入れるために農地に抵当権を設定する場合、法第3条第1項又は第5条第1項の許可を受ける必要がある。", "相続により農地の所有権を取得した者は、遅滞なく、その農地の存する市町村の農業委員会にその旨を届け出なければならない。"], "answer": 3, "exp": "相続で農地を取得した者は3条許可は不要だが農業委員会への届出が必要なので選択肢4が正しい。3条に市街化区域の届出特例はなく借入れにも許可が要り、転用目的の取得は面積を問わず知事許可、抵当権設定は許可不要。", "year": "H29-15", "diff": "B"}, {"id": "kako-hou-H30-22", "subject": "法令上の制限", "topic": "農地法", "type": "select", "q": "農地法(以下この問において「法」という。)に関する次の記述のうち、正しいものはどれか。", "choices": ["市街化区域内の農地を宅地とする目的で権利を取得する場合は、あらかじめ農業委員会に届出をすれば法第5条の許可は不要である。", "遺産分割により農地を取得することとなった場合、法第3条第1項の許可を受ける必要がある。", "法第2条第3項の農地所有適格法人の要件を満たしていない株式会社は、耕作目的で農地を借り入れることはできない。", "雑種地を開墾し耕作している土地でも、登記簿上の地目が雑種地である場合は、法の適用を受ける農地に当たらない。"], "answer": 0, "exp": "市街化区域内の農地は転用目的の権利取得でも事前に農業委員会へ届出すれば5条許可が不要なので選択肢1が正しい。遺産分割は3条許可不要、適格法人でなくても借入れは可能、農地かどうかは登記地目でなく現況で判断する。", "year": "H30-22", "diff": "A"}, {"id": "kako-hou-R1-21", "subject": "法令上の制限", "topic": "農地法", "type": "select", "q": "農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、正しいものはどれか。", "choices": ["耕作目的で原野を農地に転用しようとする場合、法第4条第1項の許可は不要である。", "金融機関からの資金借入れのために農地に抵当権を設定する場合、法第3条第1項の許可が必要である。", "市街化区域内の農地を自家用駐車場に転用する場合、法第4条第1項の許可が必要である。", "砂利採取法による認可を受けた採取計画に従って砂利採取のために農地を一時的に貸し付ける場合、法第5条第1項の許可は不要である。"], "answer": 0, "exp": "4条許可は農地を農地以外にする転用の規制で、原野を農地にするのは対象外だから許可不要、選択肢1が正しい。抵当権設定は許可不要、市街化区域内の転用は届出で足り、砂利採取の一時貸付でも5条許可は必要。", "year": "R1-21", "diff": "B"}, {"id": "kako-hou-R2-10月-21", "subject": "法令上の制限", "topic": "農地法", "type": "select", "q": "農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、正しいものはどれか。", "choices": ["法第3条第1項の許可が必要な農地の売買については、この許可を受けずに売買契約を締結しても所有権移転の効力は生じない。", "市街化区域内の自己の農地を駐車場に転用する場合には、農地転用した後に農業委員会に届け出ればよい。", "相続により農地を取得することとなった場合には、法第3条第1項の許可を受ける必要がある。", "農地に抵当権を設定する場合には、法第3条第1項の許可を受ける必要がある。"], "answer": 0, "exp": "3条許可を受けない農地売買は無効で所有権移転の効力が生じないので選択肢1が正しい。市街化区域内の転用届出は事前に行う必要があり、相続は届出でよく許可は不要、抵当権設定も権利移動に当たらず許可不要。", "year": "R2-10月-21", "diff": "A"}, {"id": "kako-hou-R2-12月-21", "subject": "法令上の制限", "topic": "農地法", "type": "select", "q": "農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、正しいものはどれか。", "choices": ["山林を開墾し、農地として耕作している土地であっても、土地登記簿上の地目が山林であれば、法の適用を受ける農地に該当しない。", "親から子に対して、所有するすべての農地を一括して贈与する場合には、法第3条第1項の許可を受ける必要はない。", "耕作を目的として農業者が競売により農地を取得する場合であっても、法第3条第1項の許可を受ける必要がある。", "市街化区域以外の区域に存する4haを超える農地を転用する場合には、農林水産大臣の許可を受ける必要がある。"], "answer": 2, "exp": "競売で農地を取得する場合も権利移動であり3条許可が必要なので選択肢3が正しい。農地かどうかは現況で判断し登記地目は無関係、贈与は相続と違い3条許可が要り、4haを超える転用でも許可権者は農林水産大臣でなく知事等。", "year": "R2-12月-21", "diff": "A"}, {"id": "kako-hou-R3-10月-21", "subject": "法令上の制限", "topic": "農地法", "type": "select", "q": "農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、誤っているものはどれか。", "choices": ["遺産分割によって農地を取得する場合には、法第3条第1項の許可は不要であるが、農業委員会への届出が必要である。", "法第3条第1項の許可を受けなければならない場合の売買については、その許可を受けずに農地の売買契約を締結しても、所有権移転の効力は生じない。", "砂利採取法第16条の認可を受けて市街化調整区域内の農地を砂利採取のために一時的に借り受ける場合には、法第5条第1項の許可は不要である。", "都道府県が市街化調整区域内の農地を取得して病院を建設する場合には、都道府県知事(法第4条第1項に規定する指定市町村の区域内にあってはその長)との協議が成立すれば、法第5条第1項の許可があったものとみなされる。"], "answer": 2, "exp": "誤りを選ぶ問題。砂利採取のための一時的な借受けでも、農地を農地以外にする転用目的の権利移動なので5条許可が必要。よって不要とする選択肢3が誤り。遺産分割は届出、無許可売買は無効、都道府県の病院用取得は知事協議で許可みなしとなる。", "year": "R3-10月-21", "diff": "A"}, {"id": "kako-hou-R3-12月-21", "subject": "法令上の制限", "topic": "農地法", "type": "select", "q": "農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、正しいものはどれか。", "choices": ["自己所有の農地に住宅を建設する資金を借り入れるため、当該農地に抵当権の設定をする場合には、法第3条第1項の許可を受ける必要がある。", "農地の賃貸借の解除については、農地の所有者が、賃借人に対して一方的に解約の申入れを行う場合には、法第18条第1項の許可を受ける必要がない。", "登記簿の地目が宅地となっている場合には、現況が農地であっても法の規制の対象とはならない。", "市街化区域内の自己所有の農地を駐車場に転用するため、あらかじめ農業委員会に届け出た場合には、法第4条第1項の許可を受ける必要がない。"], "answer": 3, "exp": "市街化区域内の農地の転用は事前に農業委員会へ届出すれば4条許可が不要なので選択肢4が正しい。抵当権設定は権利移動に含まれず3条許可は不要、18条の解約申入れには知事許可が必要、現況が農地なら地目が宅地でも規制対象。", "year": "R3-12月-21", "diff": "A"}, {"id": "kako-hou-R4-21", "subject": "法令上の制限", "topic": "農地法", "type": "select", "q": "農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、正しいものはどれか。", "choices": ["農地の賃貸借及び使用貸借は、その登記がなくても農地の引渡しがあったときは、これをもってその後にその農地について所有権を取得した第三者に対抗することができる。", "法第2条第3項の農地所有適格法人の要件を満たしていない株式会社は、耕作目的で農地を借り入れることはできない。", "法第4条第1項、第5条第1項の違反について原状回復等の措置に係る命令の対象となる者(違反転用者等)には、当該規定に違反した者又はその一般承継人は含まれるが、当該違反に係る土地について工事を請け負った者は含まれない。", "法の適用については、土地の面積は、登記簿の地積によることとしているが、登記簿の地積が著しく事実と相違する場合及び登記簿の地積がない場合には、実測に基づき農業委員会が認定したところによる。"], "answer": 3, "exp": "面積は原則登記地積によるが、著しく相違する場合や地積がない場合は実測に基づき農業委員会が認定するので選択肢4が正しい。引渡しによる対抗力は賃貸借のみで使用貸借にはなく、適格法人でなくても借入れは可能、違反転用の措置命令は工事の請負人も対象。", "year": "R4-21", "diff": "C"}, {"id": "kako-hou-R5-21", "subject": "法令上の制限", "topic": "農地法", "type": "select", "q": "農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、誤っているものはどれか。", "choices": ["相続により農地を取得する場合は、法第3条第1項の許可を要しないが、相続人に該当しない者が特定遺贈により農地を取得する場合は、同項の許可を受ける必要がある。", "自己の所有する面積4アールの農地を農作物の育成又は養畜の事業のための農業用施設に転用する場合は、法第4条第1項の許可を受ける必要はない。", "法第3条第1項又は法第5条第1項の許可が必要な農地の売買について、これらの許可を受けずに売買契約を締結しても、その所有権の移転の効力は生じない。", "社会福祉事業を行うことを目的として設立された法人(社会福祉法人)が、農地をその目的に係る業務の運営に必要な施設の用に供すると認められる場合、農地所有適格法人でなくても、農業委員会の許可を得て、農地の所有権を取得することができる。"], "answer": 1, "exp": "誤りを選ぶ問題。農業用施設への転用で4条許可が不要になるのは2アール未満の場合で、4アールでは原則どおり許可が必要。よって不要とする選択肢2が誤り。相続人以外の特定遺贈は許可が必要、無許可売買は無効、社会福祉法人の取得は正しい。", "year": "R5-21", "diff": "A"}, {"id": "kako-hou-R6-21", "subject": "法令上の制限", "topic": "農地法", "type": "select", "q": "農地に関する次の記述のうち、農地法(以下この問において「法」という。)の規定によれば、誤っているものはどれか。", "choices": ["法第3条第1項の許可があったときは所有権が移転する旨の停止条件付売買契約を原因とする所有権移転の仮登記の申請を行う場合にも、農業委員会の許可が必要である。", "法第5条第1項の許可申請書の提出において、法ではその申請に係る権利の設定又は移転に関し民事調停法により調停が成立した場合など一定の場合を除き、当事者は連署した申請書を提出しなければならないとされている。", "法では、農地の賃貸借で期間の定めがあるものについては、一定の場合を除き、期間満了の1年前から6か月前までの間に更新拒絶の通知をしないと従前の賃貸借と同一の条件で更に賃貸借したものとみなされる。", "法では、農地の賃貸借の当事者は、当該賃貸借の合意による解約が民事調停法による農事調停によって行われる場合など一定の場合を除き、知事の許可を受けなければ、当該賃貸借について、解除、解約の申入れ、合意解約、更新拒絶の通知をしてはならないとされている。"], "answer": 0, "exp": "誤りを選ぶ問題。3条許可を停止条件とする売買を原因とする仮登記の申請には農業委員会の許可は不要。よって必要とする選択肢1が誤り。連署申請、更新拒絶通知の期間、解約等への知事許可は、いずれも正しい記述。", "year": "R6-21", "diff": "C"}, {"id": "kako-hou-H27-20", "subject": "法令上の制限", "topic": "土地区画整理法", "type": "select", "q": "土地区画整理法に関する次の記述のうち、誤っているものはどれか。", "choices": ["仮換地の指定は、その仮換地となるべき土地の所有者及び従前の宅地の所有者に対し、仮換地の位置及び地積並びに仮換地の指定の効力発生の日を通知してする。", "施行地区内の宅地について存する地役権は、土地区画整理事業の施行により行使する利益がなくなった場合を除き、換地処分があった旨の公告があった日の翌日以後においても、なお従前の宅地の上に存する。", "換地計画において定められた保留地は、換地処分があった旨の公告があった日の翌日において、施行者が取得する。", "土地区画整理事業の施行により生じた公共施設の用に供する土地は、換地処分があった旨の公告があった日の翌日において、すべて市町村に帰属する。"], "answer": 3, "exp": "公共施設の用に供する土地は、原則としてその公共施設を管理すべき者に帰属します。国が管理することもあるため、すべて市町村に帰属するわけではありません。よって4が誤りです。", "year": "H27-20", "diff": "A"}, {"id": "kako-hou-H28-21", "subject": "法令上の制限", "topic": "土地区画整理法", "type": "select", "q": "土地区画整理法に関する次の記述のうち、誤っているものはどれか。", "choices": ["施行者は、換地処分を行う前において、換地計画に基づき換地処分を行うため必要がある場合においては、施行地区内の宅地について仮換地を指定することができる。", "仮換地が指定された場合においては、従前の宅地について権原に基づき使用し、又は収益することができる者は、仮換地の指定の効力発生の日から換地処分の公告がある日まで、仮換地について、従前の宅地について有する権利の内容である使用又は収益と同じ使用又は収益をすることができる。", "施行者は、仮換地を指定した場合において、特別の事情があるときは、その仮換地について使用又は収益を開始することができる日を仮換地の指定の効力発生日と別に定めることができる。", "土地区画整理組合の設立の認可の公告があった日後、換地処分の公告がある日までは、施行地区内において、土地区画整理事業の施行の障害となるおそれがある土地の形質の変更を行おうとする者は、当該土地区画整理組合の許可を受けなければならない。"], "answer": 3, "exp": "施行地区内で施行の障害となる土地の形質変更や建築等を行うには、組合ではなく都道府県知事等の許可が必要です。組合の許可ではないため、4が誤りです。", "year": "H28-21", "diff": "B"}, {"id": "kako-hou-H29-21", "subject": "法令上の制限", "topic": "土地区画整理法", "type": "select", "q": "土地区画整理法に関する次の記述のうち、誤っているものはどれか。なお、この問において「組合」とは、土地区画整理組合をいう。", "choices": ["組合は、事業の完成により解散しようとする場合においては、都道府県知事の認可を受けなければならない。", "施行地区内の宅地について組合員の有する所有権の全部又は一部を承継した者がある場合においては、その組合員がその所有権の全部又は一部について組合に対して有する権利義務は、その承継した者に移転する。", "組合を設立しようとする者は、事業計画の決定に先立って組合を設立する必要があると認める場合においては、7人以上共同して、定款及び事業基本方針を定め、その組合の設立について都道府県知事の認可を受けることができる。", "組合が施行する土地区画整理事業に係る施行地区内の宅地について借地権のみを有する者は、その組合の組合員とはならない。"], "answer": 3, "exp": "施行地区内の宅地について所有権又は借地権を有する者は、すべて組合員となります。借地権のみを有する者も組合員となるため、4が誤りです。", "year": "H29-21", "diff": "C"}, {"id": "kako-hou-H30-21", "subject": "法令上の制限", "topic": "土地区画整理法", "type": "select", "q": "土地区画整理法に関する次の記述のうち、正しいものはどれか。", "choices": ["土地区画整理事業とは、公共施設の整備改善及び宅地の利用の増進を図るため、土地区画整理法で定めるところに従って行われる、都市計画区域内及び都市計画区域外の土地の区画形質の変更に関する事業をいう。", "土地区画整理組合の設立の認可の公告があった日以後、換地処分の公告がある日までは、施行地区内において、土地区画整理事業の施行の障害となるおそれがある建築物その他の工作物の新築を行おうとする者は、都道府県知事及び市町村長の許可を受けなければならない。", "土地区画整理事業の施行者は、仮換地を指定した場合において、従前の宅地に存する建築物を移転し、又は除却することが必要となったときは、当該建築物を移転し、又は除却することができる。", "土地区画整理事業の施行者は、仮換地を指定した場合において、当該仮換地について使用又は収益を開始することができる日を当該仮換地の効力発生の日と同一の日として定めなければならない。"], "answer": 2, "exp": "施行者は、仮換地の指定に伴い従前の宅地の建築物を移転・除却する必要が生じたとき、これを移転・除却できます。よって3が正しいです。事業対象は都市計画区域内で、許可権者は知事等、使用収益開始日は別に定められます。", "year": "H30-21", "diff": "C"}, {"id": "kako-hou-R2-10月-20", "subject": "法令上の制限", "topic": "土地区画整理法", "type": "select", "q": "土地区画整理組合（以下この問において「組合」という。）に関する次の記述のうち、土地区画整理法の規定によれば、正しいものはどれか。", "choices": ["組合の設立認可を申請しようとする者は、施行地区となるべき区域内の宅地について借地権を有するすべての者の3分の2以上の同意を得なければならないが、未登記の借地権を有する者の同意を得る必要はない。", "組合の総会の会議は、定款に特別な定めがある場合を除くほか、組合員の半数以上が出席しなければ開くことができない。", "組合が賦課金を徴収する場合、賦課金の額は、組合員が施行地区内に有する宅地又は借地の地積等にかかわらず一律に定めなければならない。", "組合の施行する土地区画整理事業に参加することを希望する者のうち、当該土地区画整理事業に参加するのに必要な資力及び信用を有する者であって定款で定められたものは、参加組合員として組合員となる。"], "answer": 1, "exp": "組合の総会は、定款に特別の定めがある場合を除き、組合員の半数以上が出席しなければ開けません。よって2が正しいです。未登記でも申告があれば同意が必要、賦課金は地積等を考慮して公平に定め、参加組合員は機構等に限られます。", "year": "R2-10月-20", "diff": "C"}, {"id": "kako-hou-R2-12月-20", "subject": "法令上の制限", "topic": "土地区画整理法", "type": "select", "q": "土地区画整理法に関する次の記述のうち、正しいものはどれか。", "choices": ["市町村が施行する土地区画整理事業の施行後の宅地の価額の総額が土地区画整理事業の施行前の宅地の価額の総額より減少した場合においては、その差額に相当する金額を、従前の宅地に存する建築物について賃借権を有する者に対して支払わなければならない。", "施行者は、仮換地を指定した時に、清算金を徴収し、又は交付しなければならない。", "換地計画において換地を定める場合においては、換地及び従前の宅地の位置、地積、土質、水利、利用状況、環境等が照応するように定めなければならない。", "土地区画整理組合が施行する土地区画整理事業の換地計画においては、災害を防止し、及び衛生の向上を図るために宅地の地積の規模を適正にする特別な必要があると認められる場合は、その換地計画に係る区域内の地積が小である宅地について、過小宅地とならないように換地を定めることができる。"], "answer": 2, "exp": "換地照応の原則により、換地と従前の宅地の位置・地積・利用状況・環境等が照応するように定めなければなりません。よって3が正しいです。減価補償金は宅地の権利者に交付、清算金は換地処分時、過小宅地の規定は公的施行のものです。", "year": "R2-12月-20", "diff": "C"}, {"id": "kako-hou-R3-10月-20", "subject": "法令上の制限", "topic": "土地区画整理法", "type": "select", "q": "土地区画整理法に関する次の記述のうち、誤っているものはどれか。", "choices": ["換地計画において参加組合員に対して与えるべきものとして定められた宅地は、換地処分の公告があった日の翌日において、当該宅地の所有者となるべきものとして換地計画において定められた参加組合員が取得する。", "換地計画において換地を定める場合においては、換地及び従前の宅地の位置、地積、土質、水利、利用状況、環境等が照応するように定めなければならない。", "土地区画整理組合の設立の認可の公告があった日後、換地処分の公告がある日までは、施行地区内において、土地区画整理事業の施行の障害となるおそれがある土地の形質の変更を行おうとする者は、当該土地区画整理組合の許可を受けなければならない。", "土地区画整理組合の組合員は、組合員の3分の1以上の連署をもって、その代表者から理由を記載した書面を土地区画整理組合に提出して、理事又は監事の解任を請求することができる。"], "answer": 2, "exp": "施行の障害となる土地の形質変更等の許可は、組合ではなく都道府県知事等が行います。組合の許可を受けるのではないため、3が誤りです。", "year": "R3-10月-20", "diff": "B"}, {"id": "kako-hou-R3-12月-20", "subject": "法令上の制限", "topic": "土地区画整理法", "type": "select", "q": "土地区画整理法（以下この問において「法」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["土地区画整理組合が施行する土地区画整理事業に係る施行地区内の宅地について借地権のみを有する者は、その土地区画整理組合の組合員とはならない。", "法において、「公共施設」とは、道路、公園、広場、河川その他政令で定める公共の用に供する施設をいう。", "施行者は、換地処分の公告があった場合においては、直ちに、その旨を換地計画に係る区域を管轄する登記所に通知しなければならない。", "市町村が施行する土地区画整理事業では、事業ごとに、市町村に土地区画整理審議会が設置され、換地計画、仮換地の指定及び減価補償金の交付に関する事項について法に定める権限を行使する。"], "answer": 0, "exp": "施行地区内の宅地について所有権又は借地権を有する者は、すべて組合員となります。借地権のみを有する者も組合員となるため、1が誤りです。", "year": "R3-12月-20", "diff": "A"}, {"id": "kako-hou-R4-20", "subject": "法令上の制限", "topic": "土地区画整理法", "type": "select", "q": "次の記述のうち、土地区画整理法の規定及び判例によれば、誤っているものはどれか。", "choices": ["土地区画整理組合の設立の認可の公告があった日以後、換地処分の公告がある日までは、施行地区内において、土地区画整理事業の施行の障害となるおそれがある建築物の新築を行おうとする者は、土地区画整理組合の許可を受けなければならない。", "土地区画整理組合は、定款に別段の定めがある場合においては、換地計画に係る区域の全部について工事が完了する以前においても換地処分をすることができる。", "仮換地を指定したことにより、使用し、又は収益することができる者のなくなった従前の宅地については、当該宅地を使用し、又は収益することができる者のなくなった時から換地処分の公告がある日までは、施行者が当該宅地を管理する。", "清算金の徴収又は交付に関する権利義務は、換地処分の公告によって換地についての所有権が確定することと併せて、施行者と換地処分時点の換地所有者との間に確定的に発生するものであり、換地処分後に行われた当該換地の所有権の移転に伴い当然に移転する性質を有するものではない。"], "answer": 0, "exp": "建築物の新築等の許可権者は、組合ではなく都道府県知事等です。組合の許可を受けるのではないため、1が誤りです。", "year": "R4-20", "diff": "C"}, {"id": "kako-hou-R5-20", "subject": "法令上の制限", "topic": "土地区画整理法", "type": "select", "q": "土地区画整理法に関する次の記述のうち、誤っているものはどれか。", "choices": ["換地計画において定められた清算金は、換地処分の公告があった日の翌日において確定する。", "現に施行されている土地区画整理事業の施行地区となっている区域については、その施行者の同意を得なければ、その施行者以外の者は、土地区画整理事業を施行することができない。", "施行者は、換地処分の公告があった場合において、施行地区内の土地及び建物について土地区画整理事業の施行により変動があったときは、遅滞なく、その変動に係る登記を申請し、又は嘱託しなければならない。", "土地区画整理組合は、仮換地を指定しようとする場合においては、あらかじめ、その指定について、土地区画整理審議会の同意を得なければならない。"], "answer": 3, "exp": "組合が仮換地を指定するには、総会もしくは部会又は総代会の同意が必要で、土地区画整理審議会の同意ではありません。審議会の関与は公的施行で意見を聴く場合です。よって4が誤りです。", "year": "R5-20", "diff": "C"}, {"id": "kako-hou-R6-20", "subject": "法令上の制限", "topic": "土地区画整理法", "type": "select", "q": "土地区画整理法に関する次の記述のうち、誤っているものはどれか。なお、この問において、同法第136条の3による大都市等の特例及び条例で定める事務処理の特例は考慮しないものとする。", "choices": ["仮換地が指定された場合においては、従前の宅地について権原に基づき使用し、又は収益することができる者は、仮換地の指定の効力発生の日から換地処分の公告がある日まで、仮換地又は仮換地について仮に使用し、若しくは収益することができる権利の目的となるべき宅地若しくはその部分について、従前の宅地について有する権利の内容である使用又は収益と同じ使用又は収益をすることができる。", "市町村施行の土地区画整理事業において、市町村は、換地処分をした場合においては、その旨を公告しなければならない。", "換地計画において定められた保留地は、換地処分の公告があった日の翌日において、施行者が取得する。", "施行者は、仮換地を指定した場合において、特別の事情があるときは、その仮換地について使用又は収益を開始することができる日を仮換地の指定の効力発生の日と別に定めることができる。"], "answer": 1, "exp": "施行者が市町村等の場合、換地処分の公告は都道府県知事が行います。市町村自身が公告するのではないため、2が誤りです。", "year": "R6-20", "diff": "B"}, {"id": "kako-hou-H27-19", "subject": "法令上の制限", "topic": "盛土規制法", "type": "select", "q": "宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["都道府県知事は、宅地造成等工事規制区域内の土地について、宅地造成等に伴う災害を防止するために必要があると認める場合には、その土地の所有者に対して、擁壁等の設置等の措置をとることを勧告することができる。", "宅地造成等工事規制区域の指定の際に、当該宅地造成等工事規制区域内において宅地造成等に関する工事を行っている者は、当該工事について改めて都道府県知事の許可を受けなければならない。", "宅地造成等に関する工事の許可を受けた者が、工事施行者を変更する場合には、遅滞なくその旨を都道府県知事に届け出ればよく、改めて許可を受ける必要はない。", "宅地造成等工事規制区域内において、宅地を造成するために切土をする土地の面積が500㎡であって盛土が生じない場合、切土をした部分に生じる崖の高さが1.5mであれば、都道府県知事の許可は必要ない。"], "answer": 1, "exp": "区域の指定の際にすでに区域内で工事中の者は、改めて許可を受けるのではなく、指定日から21日以内に都道府県知事へ届け出れば足りる。よって許可が必要とする選択肢2が誤り。切土500㎡ちょうど・崖1.5mは許可基準に達しない。", "year": "H27-19", "diff": "A"}, {"id": "kako-hou-H28-20", "subject": "法令上の制限", "topic": "盛土規制法", "type": "select", "q": "宅地造成及び特定盛土等規制法（以下この問において「法」という。）に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["宅地造成等工事規制区域外に盛土によって造成された一団の造成宅地の区域において、造成された盛土の高さが5m未満の場合は、都道府県知事は、当該区域を造成宅地防災区域として指定することができない。", "宅地造成等工事規制区域内において、切土又は盛土をする土地の面積が600㎡である場合、その土地における排水施設は、政令で定める資格を有する者によって設計される必要はない。", "宅地造成等工事規制区域内の土地（公共施設用地を除く。）において、高さが2mを超える擁壁を除却する工事を行おうとする者は、一定の場合を除き、その工事に着手する日の14日前までにその旨を都道府県知事に届け出なければならない。", "宅地造成等工事規制区域内において、公共施設用地を宅地又は農地等に転用した者は、一定の場合を除き、その転用した日から14日以内にその旨を都道府県知事に届け出なければならない。"], "answer": 0, "exp": "盛土の高さが5m未満でも、面積3000㎡以上で地下水位が盛土前の地盤面を超えて盛土内部に浸入している場合などは造成宅地防災区域に指定できる。一律に指定できないとする選択肢1が誤り。排水施設の有資格者設計は面積1500㎡超の場合に必要となる。", "year": "H28-20", "diff": "C"}, {"id": "kako-hou-H29-20", "subject": "法令上の制限", "topic": "盛土規制法", "type": "select", "q": "宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["都道府県知事は、宅地造成等工事規制区域内の土地で、宅地造成若しくは特定盛土等に伴う災害の防止のため必要な擁壁が設置されていないために、これを放置するときは、宅地造成等に伴う災害の発生のおそれが大きいと認められる場合、一定の限度のもとに、当該土地の所有者、管理者又は占有者に対して、擁壁の設置を命ずることができる。", "都道府県知事は、宅地造成等工事規制区域内の宅地において行われている工事の状況について、その工事が宅地造成等に関する工事であるか否かにかかわらず、当該宅地の所有者、管理者又は占有者に対して報告を求めることができる。", "都道府県知事は、一定の場合には都道府県（指定都市、中核市又は施行時特例市の区域にあっては、それぞれ指定都市、中核市又は施行時特例市）の規則で、宅地造成等工事規制区域内において行われる宅地造成に関する工事の技術的基準を強化することができる。", "宅地造成等工事規制区域内において、政令で定める技術的基準を満たす地表水等を排除するための排水施設の除却工事を行おうとする場合は、一定の場合を除き、都道府県知事への届出が必要となるが、当該技術的基準を満たす必要のない地表水等を排除するための排水施設を除却する工事を行おうとする場合は、都道府県知事に届け出る必要はない。"], "answer": 3, "exp": "高さ2mを超える擁壁や排水施設の除却工事は、政令の技術的基準を満たすか否かに関係なく、着手14日前までの届出が必要。基準を満たさなければ届出不要とする選択肢4が誤り。", "year": "H29-20", "diff": "B"}, {"id": "kako-hou-H30-20", "subject": "法令上の制限", "topic": "盛土規制法", "type": "select", "q": "宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["宅地造成等工事規制区域内において、過去に宅地造成等に関する工事が行われ現在は工事主とは異なる者がその工事が行われた宅地を所有している場合、当該土地の所有者は、宅地造成等に伴う災害が生じないよう、その土地を常時安全な状態に維持するように努めなければならない。", "宅地造成等工事規制区域内において行われる宅地造成等に関する工事について許可をする都道府県知事は、当該許可に、工事の施行に伴う災害を防止するために必要な条件を付することができる。", "宅地以外の土地を宅地にするために行う盛土その他の土地の形質の変更で、政令で定めるものを宅地造成という。", "宅地造成等工事規制区域内において、切土であって、当該切土をする土地の面積が400㎡で、かつ、高さ1mの崖を生ずることとなるものに関する工事を行う場合には、一定の場合を除き、都道府県知事の許可を受けなければならない。"], "answer": 3, "exp": "許可が必要となるのは切土で2m超の崖、盛土で1m超の崖、面積500㎡超などの場合。面積400㎡かつ高さ1mの崖の切土はいずれにも当たらず許可不要なので、許可が必要とする選択肢4が誤り。", "year": "H30-20", "diff": "A"}, {"id": "kako-hou-R1-19", "subject": "法令上の制限", "topic": "盛土規制法", "type": "select", "q": "宅地造成及び特定盛土等規制法に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["宅地造成等工事規制区域及び特定盛土等規制区域外において行われる宅地造成等に関する工事については、工事主は、工事に着手する日の14日前までに都道府県知事に届け出なければならない。", "宅地造成等工事規制区域内において行われる宅地造成等に関する工事の許可を受けた者は、主務省令で定める軽微な変更を除き、当該許可に係る工事の計画の変更をしようとするときは、遅滞なくその旨を都道府県知事に届け出なければならない。", "宅地造成等工事規制区域の指定の際に、当該宅地造成等工事規制区域内において宅地造成等に関する工事を行っている者は、当該工事について都道府県知事の許可を受ける必要はない。", "都道府県知事は、宅地造成又は特定盛土等（宅地において行うものに限る。）に伴い災害が生ずるおそれが大きい市街地又は市街地となろうとする土地の区域であって、宅地造成等に関する工事について規制を行う必要があるものを、造成宅地防災区域として指定することができる。"], "answer": 2, "exp": "指定の際にすでに区域内で工事中の者は許可を受ける必要がなく、指定日から21日以内の届出で足りるので選択肢3が正しい。選択肢2は計画変更に許可が必要な点で誤り、選択肢4は造成宅地防災区域でなく規制区域の説明で誤り。", "year": "R1-19", "diff": "C"}, {"id": "kako-hou-R2-10月-19", "subject": "法令上の制限", "topic": "盛土規制法", "type": "select", "q": "宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["土地の占有者又は所有者は、都道府県知事が、基礎調査のために当該土地に立ち入って測量又は調査を行う場合、正当な理由がない限り、立入りを拒み、又は妨げてはならない。", "宅地以外の土地を宅地にするために行う盛土その他の土地の形質の変更で、政令で定めるものを宅地造成という。", "宅地造成等工事規制区域内において、公共施設用地を宅地又は農地等に転用する者は、宅地造成等に関する工事を行わない場合でも、都道府県知事の許可を受けなければならない。", "宅地造成等に関する工事の許可を受けた者が、工事施行者を変更する場合には、遅滞なくその旨を都道府県知事に届け出ればよく、改めて許可を受ける必要はない。"], "answer": 2, "exp": "公共施設用地を宅地や農地等に転用した者は、許可ではなく転用日から14日以内に都道府県知事へ届け出れば足りる。許可が必要とする選択肢3が誤り。工事施行者の変更は軽微な変更で届出のみでよい。", "year": "R2-10月-19", "diff": "A"}, {"id": "kako-hou-R2-12月-19", "subject": "法令上の制限", "topic": "盛土規制法", "type": "select", "q": "宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。", "choices": ["宅地造成等工事規制区域は、宅地造成等に伴い災害が生ずるおそれが大きい市街地又は市街地になろうとする土地の区域であって、宅地造成等に関する工事につき規制を行う必要があるものについて、国土交通大臣が指定することができる。", "宅地造成等工事規制区域内において宅地造成等に関する工事を行う場合、宅地造成に伴う災害を防止するために行う高さが5mを超える擁壁の設置に係る工事については、政令で定める資格を有する者の設計によらなければならない。", "都道府県（地方自治法に基づく指定都市、中核市又は施行時特例市の区域にあっては、それぞれ指定都市、中核市又は施行時特例市）は、基礎調査のために行う測量又は調査のため他人の占有する土地に立ち入ったことにより他人に損失を与えた場合においては、その損失を受けた者に対して、通常生ずべき損失を補償しなければならない。", "宅地造成又は特定盛土等に関する工事について第12条第1項の許可を受けた宅地造成等に関する工事が完了した場合、工事主は、都道府県知事（地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長）の検査を申請しなければならない。"], "answer": 0, "exp": "宅地造成等工事規制区域を指定するのは国土交通大臣ではなく都道府県知事。指定主体を誤った選択肢1が誤り。高さ5m超の擁壁設置は有資格者の設計が必要で、工事完了時は工事主が知事の検査を申請する。", "year": "R2-12月-19", "diff": "A"}, {"id": "kako-hou-R3-10月-19", "subject": "法令上の制限", "topic": "盛土規制法", "type": "select", "q": "宅地造成及び特定盛土等規制法（以下この問において「法」という。）に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["宅地造成等工事規制区域内において、宅地を造成するために切土をする土地の面積が500㎡であって盛土を生じない場合、切土をした部分に生じる崖の高さが1.5mであれば、都道府県知事の法第12条第1項の工事の許可は不要である。", "都道府県知事は、法第12条第1項の工事の許可の申請があったときは、遅滞なく、文書をもって許可又は不許可の処分を申請者に通知しなければならない。", "都道府県知事は、一定の場合には都道府県（地方自治法に基づく指定都市、中核市又は施行時特例市の区域にあっては、それぞれ指定都市、中核市又は施行時特例市）の規則で、宅地造成等工事規制区域内において行われる宅地造成等に関する工事の技術的基準を強化し、又は付加することができる。", "都道府県知事は、宅地造成等工事規制区域内で、宅地造成又は特定盛土等（宅地において行うものに限る。）に伴う災害で相当数の居住者等に危害を生ずるものの発生のおそれが大きい一団の造成宅地の区域であって一定の基準に該当するものを、造成宅地防災区域として指定することができる。"], "answer": 3, "exp": "造成宅地防災区域は宅地造成等工事規制区域外の造成宅地に指定するもので、規制区域内に重ねて指定することはできない。区域内で指定できるとする選択肢4が誤り。切土500㎡ちょうど・崖1.5mは許可不要。", "year": "R3-10月-19", "diff": "A"}, {"id": "kako-hou-R3-12月-19", "subject": "法令上の制限", "topic": "盛土規制法", "type": "select", "q": "宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["宅地造成等工事規制区域外において行われる宅地造成等に関する工事について、工事主は、工事に着手する前に都道府県知事に届け出なければならない。", "都道府県知事は、宅地造成等工事規制区域内の土地の所有者、管理者又は占有者に対して、当該土地又は当該土地において行われている工事の状況について報告を求めることができる。", "宅地造成等工事規制区域内において宅地造成等に関する工事（宅地造成等に伴う災害の発生のおそれがないと認められるものとして政令で定める工事については除く。）を行う場合、宅地造成等に伴う災害を防止するために行う高さ5mを超える擁壁に係る工事については、政令で定める資格を有する者の設計によらなければならない。", "都道府県知事は、偽りその他不正な手段によって宅地造成等工事規制区域内において行われる宅地造成等に関する工事の許可を受けた者に対して、その許可を取り消すことができる。"], "answer": 0, "exp": "宅地造成等工事規制区域外で行う工事は規制の対象外であり、許可も届出も不要。届出が必要とする選択肢1が誤り。高さ5m超の擁壁工事は有資格者の設計が必要で、不正取得の許可は取消しの対象となる。", "year": "R3-12月-19", "diff": "A"}, {"id": "kako-hou-R4-19", "subject": "法令上の制限", "topic": "盛土規制法", "type": "select", "q": "宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["宅地造成等工事規制区域内において、雨水その他の地表水又は地下水を排除するための排水施設の除却工事を行おうとする場合は、一定の場合を除き、都道府県知事への届出が必要となる。", "宅地造成等工事規制区域内において、森林を宅地にするために行う切土であって、高さ3mの崖を生ずることとなるものに関する工事については、工事主は、都市計画法第29条第1項又は第2項の許可を受けて行われる当該許可の内容に適合した工事を除き、工事に着手する前に、都道府県知事の許可を受けなければならない。", "宅地造成等工事規制区域内で過去に宅地造成等に関する工事が行われ、現在は工事主とは異なる者がその工事が行われた土地を所有している場合において、当該土地の所有者は宅地造成等に伴う災害が生じないよう、その土地を常時安全な状態に維持するよう努めなければならない。", "宅地造成等工事規制区域外に盛土によって造成された一団の造成宅地の区域において、造成された盛土の高さが5m未満の場合は、都道府県知事は、当該区域を造成宅地防災区域として指定することができない。"], "answer": 3, "exp": "盛土5m未満でも、面積3000㎡以上で地下水位が盛土前の地盤面を超えて浸入している等の場合は造成宅地防災区域に指定できる。一律に指定できないとする選択肢4が誤り。高さ3m超の崖を生ずる切土は許可が必要。", "year": "R4-19", "diff": "A"}, {"id": "kako-hou-R5-19", "subject": "法令上の制限", "topic": "盛土規制法", "type": "select", "q": "宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["都道府県知事は、基本方針に基づき、かつ、基礎調査の結果を踏まえ、宅地造成等工事規制区域内で、宅地造成等に伴う災害で相当数の居住者等に危害を生ずるものの発生のおそれが大きい一団の造成宅地の区域であって一定の基準に該当するものを、造成宅地防災区域として指定することができる。", "都道府県知事は、その地方の気候、風土又は地勢の特殊性により、宅地造成等規制法の規定のみによっては宅地造成に伴うがけ崩れ又は土砂の流出の防止の目的を達し難いと認める場合は、都道府県（地方自治法に基づく指定都市、中核市又は施行時特例市の区域にあっては、それぞれ指定都市、中核市又は施行時特例市）の規則で、宅地造成工事規制区域内において行われる宅地造成に関する工事の技術的基準を強化し、又は付加することができる。", "都道府県知事は、宅地造成工事規制区域内の宅地について、宅地造成に伴う災害を防止するために必要があると認める場合には、その宅地の所有者に対して、擁壁等の設置等の措置をとることを勧告することができる。", "宅地造成工事規制区域内の宅地において、雨水その他の地表水又は地下水を排除するための排水施設の除却工事を行おうとする場合は、一定の場合を除き、都道府県知事への届出が必要となる。"], "answer": 0, "exp": "造成宅地防災区域は宅地造成等工事規制区域外の造成宅地に指定するもので、規制区域内には指定できない。区域内に指定できるとする選択肢1が誤り。技術的基準の強化・付加、勧告、排水施設除却の届出はいずれも正しい。", "year": "R5-19", "diff": "A"}, {"id": "kako-hou-R6-19", "subject": "法令上の制限", "topic": "盛土規制法", "type": "select", "q": "宅地造成及び特定盛土等規制法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市及び中核市にあってはその長をいうものとし、地方自治法に基づく施行時特例市に係る経過措置については考慮しないものとする。", "choices": ["都道府県知事は、基礎調査のために他人の占有する土地に立ち入って測量又は調査を行う必要があるときは、その必要の限度において、当該土地に、自ら立ち入り、又はその命じた者若しくは委任した者に立ち入らせることができ、当該土地の占有者は、正当な理由がない限り、その立入りを拒み、又は妨げてはならない。", "都道府県知事は、宅地造成等工事規制区域内の土地について、宅地造成等に伴う災害を防止するために必要があると認める場合には、その土地の所有者に対して、擁壁等の設置等の措置をとることを勧告することができる。", "工事主は、宅地造成等工事規制区域において行われる宅地造成等に関する工事について、工事着手後2週間以内に、宅地造成等に関する工事の施行に係る土地の周辺地域の住民に対し、説明会の開催その他の当該宅地造成等に関する工事の内容を周知させるため必要な措置を講じなければならない。", "特定盛土等規制区域内において行われる特定盛土等又は土石の堆積に関する工事については、工事主は、当該工事に着手する日の30日前までに、主務省令で定めるところにより、当該工事の計画を都道府県知事に届け出なければならない。ただし、特定盛土等又は土石の堆積に伴う災害の発生のおそれがないと認められるものとして政令で定める工事については、この限りでない。"], "answer": 2, "exp": "周辺住民への説明会など工事内容の周知措置は、許可の申請前にあらかじめ講じる必要がある。工事着手後2週間以内とする選択肢3が誤り。特定盛土等規制区域内の届出は着手30日前まででよい。", "year": "R6-19", "diff": "A"}, {"id": "kako-zei-H27-49", "subject": "税その他", "topic": "土地", "type": "select", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["我が国の低地は、ここ数千年の間に形成され、湿地や旧河道であった若い軟弱な地盤の地域がほとんどである。", "臨海部の低地は、洪水、高潮、地震による津波などの災害が多く、住宅地として利用するには、十分な防災対策と注意が必要である。", "台地上の池沼を埋め立てた地盤は、液状化に対して安全である。", "都市周辺の丘陵や山麓に広がった住宅地は、土砂災害が起こる場合があり、注意する必要がある。"], "answer": 2, "exp": "台地は一般に安定していますが、その上の池沼を埋め立てた地盤は液状化しやすく、安全とはいえません。よって3が不適当です。", "year": "H27-49", "diff": "B"}, {"id": "kako-zei-H28-49", "subject": "税その他", "topic": "土地", "type": "select", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["豪雨による深層崩壊は、山体岩盤の深い所に亀裂が生じ、巨大な岩塊が滑落し、山間の集落などに甚大な被害を及ぼす。", "花崗岩が風化してできた、まさ土地帯においては、近年発生した土石流災害によりその危険性が再認識された。", "山麓や火山麓の地形の中で、土石流や土砂崩壊による堆積でできた地形は危険性が低く、住宅地として好適である。", "丘陵地や台地の縁辺部の崖崩れについては、山腹で傾斜角が25度を超えると急激に崩壊地が増加する。"], "answer": 2, "exp": "土石流や土砂崩壊による堆積でできた地形は危険性が高く、住宅地に適しません。危険性が低い・好適とする3が不適当です。", "year": "H28-49", "diff": "C"}, {"id": "kako-zei-H29-49", "subject": "税その他", "topic": "土地", "type": "select", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["扇状地は、山地から河川により運ばれてきた砂礫等が堆積して形成された地盤である。", "三角州は、河川の河口付近に見られる軟弱な地盤である。", "台地は、一般に地盤が安定しており、低地に比べ、自然災害に対して安全度は高い。", "埋立地は、一般に海面に対して比高を持ち、干拓地に比べ、水害に対して危険である。"], "answer": 3, "exp": "埋立地は海面に対して比高を持つため、海面以下になりやすい干拓地よりむしろ水害には強いです。危険とする4が不適当です。", "year": "H29-49", "diff": "A"}, {"id": "kako-zei-H30-49", "subject": "税その他", "topic": "土地", "type": "select", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["山麓の地形の中で、地すべりによってできた地形は一見なだらかで、水はけもよく、住宅地として好適のように見えるが、末端の急斜面部等は斜面崩壊の危険度が高い。", "台地の上の浅い谷は、豪雨時には一時的に浸水することがあり、現地に入っても気付かないことが多いが、住宅地としては注意を要する。", "大都市の大部分は低地に立地しているが、この数千年の間に形成され、かつては湿地や旧河道であった地域が多く、地震災害に対して脆弱で、また洪水、高潮、津波等の災害の危険度も高い。", "低地の中で特に災害の危険度の高い所は、扇状地の中の微高地、自然堤防、廃川敷となった旧天井川等であり、比較的危険度の低い所が沿岸部の標高の低いデルタ地域、旧河道等である。"], "answer": 3, "exp": "微高地や自然堤防は比較的安全で、沿岸部の低いデルタ地域や旧河道が危険です。危険度の高低が逆の4が不適当です。", "year": "H30-49", "diff": "A"}, {"id": "kako-zei-R1-49", "subject": "税その他", "topic": "土地", "type": "select", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["台地、段丘は、農地として利用され、また都市的な土地利用も多く、地盤も安定している。", "台地を刻む谷や台地上の池沼を埋め立てた所では、地盤の液状化が発生し得る。", "台地、段丘は、水はけも良く、宅地として積極的に利用されているが、自然災害に対して安全度の低い所である。", "旧河道や低湿地、海浜の埋立地では、地震による地盤の液状化対策が必要である。"], "answer": 2, "exp": "台地・段丘は水はけがよく地盤も安定していて自然災害への安全度は高い所です。安全度が低いとする3が不適当です。", "year": "R1-49", "diff": "A"}, {"id": "kako-zei-R2-10-49", "subject": "税その他", "topic": "土地", "type": "select", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["都市の中小河川の氾濫の原因の一つは、急速な都市化、宅地化に伴い、降雨時に雨水が短時間に大量に流れ込むようになったことである。", "中小河川に係る防災の観点から、宅地選定に当たっては、その地点だけでなく、周辺の地形と防災施設に十分注意することが必要である。", "地盤の液状化については、宅地の地盤条件について調べるとともに、過去の地形についても古地図などで確認することが必要である。", "地形や地質的な条件については、宅地に適しているか調査する必要があるが、周辺住民の意見は聴かなくてよい。"], "answer": 3, "exp": "宅地の適否を判断するには地形・地質の調査に加え、過去の被災経験などを知る周辺住民の意見も参考にすべきです。聴かなくてよいとする4が不適当です。", "year": "R2-10月-49", "diff": "B"}, {"id": "kako-zei-R2-12-49", "subject": "税その他", "topic": "土地", "type": "select", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["山地は、地形がかなり急峻で、大部分が森林となっている。", "低地は、一般に洪水や地震などに対して弱く、防災的見地からは住宅地として好ましくない。", "埋立地は、一般に海面に対して数mの比高を持ち、干拓地に比べ自然災害に対して危険度が高い。", "台地は、一般に地盤が安定しており、低地に比べ自然災害に対して安全度が高い。"], "answer": 2, "exp": "埋立地は海面より数mの比高を持つのに対し、干拓地は海面以下のこともあり、埋立地の方が危険度は低いです。危険度が高いとする3が不適当です。", "year": "R2-12月-49", "diff": "A"}, {"id": "kako-zei-R3-10-49", "subject": "税その他", "topic": "土地", "type": "select", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["森林は、木材資源としても重要で、水源涵養、洪水防止等の大きな役割を担っている。", "活動度の高い火山の火山麓では、火山活動に伴う災害にも留意する必要がある。", "林相は良好でも、破砕帯や崖錐等の上の杉の植林地は、豪雨に際して崩壊することがある。", "崖錐や小河川の出口で堆積物の多い所等は、土石流の危険が少ない。"], "answer": 3, "exp": "崖錐や小河川の出口で堆積物の多い所は、土石流の危険が高い場所です。危険が少ないとする4が不適当です。", "year": "R3-10月-49", "diff": "A"}, {"id": "kako-zei-R3-12-49", "subject": "税その他", "topic": "土地", "type": "select", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["沿岸地域における地震時の津波を免れるためには、巨大な防波堤が必要であるが、それには限度があり、完全に津波の襲来を防ぐことはできない。", "一般に凝灰岩、頁岩、花崗岩(風化してマサ土化したもの)は、崩壊しにくい。", "低地は、大部分が水田や宅地として利用され、大都市の大部分もここに立地している。", "平地に乏しい都市の周辺では、住宅地が丘陵や山麓に広がり、土砂崩壊等の災害を引き起こす例も多い。"], "answer": 1, "exp": "凝灰岩・頁岩・風化した花崗岩はいずれも軟弱で崩壊の危険が高い地質です。崩壊しにくいとする2が不適当です。", "year": "R3-12月-49", "diff": "A"}, {"id": "kako-zei-R4-49", "subject": "税その他", "topic": "土地", "type": "select", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["台地の上の浅い谷は、豪雨時には一時的に浸水することがあり、注意を要する。", "低地は、一般に洪水や地震などに対して強く、防災的見地から住宅地として好ましい。", "埋立地は、平均海面に対し4〜5mの比高があり護岸が強固であれば、住宅地としても利用が可能である。", "国土交通省が運営するハザードマップポータルサイトでは、洪水、土砂災害、高潮、津波のリスク情報などを地図や写真に重ねて表示できる。"], "answer": 1, "exp": "低地は洪水や地震に対して弱く、防災上は住宅地として好ましくありません。強く好ましいとする2が不適当です。", "year": "R4-49", "diff": "A"}, {"id": "kako-zei-R5-49", "subject": "税その他", "topic": "土地", "type": "select", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["自然堤防の後背湿地側の縁は、砂が緩く堆積していて、地下水位も浅いため、地震時に液状化被害が生じやすい地盤である。", "谷底低地に軟弱層が厚く堆積している所では、地震動が凝縮されて、震動が小さくなる。", "1923年の関東地震の際には、東京の谷底低地で多くの水道管や建物が被害を受けた。", "大都市の近郊の丘陵地では、丘を削り谷部に盛土し造成宅地が造られたが、盛土造成に際しては、地下水位を下げるため排水施設を設け、締め固める等の必要がある。"], "answer": 1, "exp": "軟弱層が厚い谷底低地では地震動が増幅されて震動は大きくなります。凝縮されて小さくなるとする2が不適当です。", "year": "R5-49", "diff": "B"}, {"id": "kako-zei-R6-49", "subject": "税その他", "topic": "土地", "type": "select", "q": "土地に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["30度以上の角度をなす斜面を背後に控える宅地は、崖面への保護対策を講じるか、擁壁を設けるなどの必要がある。", "高さ2m以下の擁壁であれば、水抜き孔を有しなくても、地震による被害が生じることはない。", "重力式擁壁は、擁壁の自重により、背面からの土圧に抵抗するコンクリート構造物である。", "工場跡地や埋立地などでは、重金属や揮発性有機化合物などによる土壌汚染が問題となることがある。"], "answer": 1, "exp": "高さ2m以下の擁壁でも、水抜き孔がないと水圧で被害が生じることがあります。被害が生じないとする2が不適当です。", "year": "R6-49", "diff": "C"}, {"id": "kako-zei-H27-50", "subject": "税その他", "topic": "建物", "type": "select", "q": "建物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["木造は湿気に強い構造であり、地盤面からの基礎の立上がりをとる必要はない。", "基礎の種類には、直接基礎、杭基礎等がある。", "杭基礎には、木杭、既製コンクリート杭、鋼杭等がある。", "建物は、上部構造と基礎構造からなり、基礎構造は上部構造を支持する役目を負うものである。"], "answer": 0, "exp": "木造は湿気に弱いため、地盤面から基礎を立ち上げて防湿する必要があります。湿気に強く立上がり不要とする1が不適当です。", "year": "H27-50", "diff": "B"}, {"id": "kako-zei-H28-50", "subject": "税その他", "topic": "建物", "type": "select", "q": "建築物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["鉄骨造は、自重が大きく、靭性が小さいことから、大空間の建築や高層建築にはあまり使用されない。", "鉄筋コンクリート造においては、骨組の形式はラーメン式の構造が一般に用いられる。", "鉄骨鉄筋コンクリート造は、鉄筋コンクリート造にさらに強度と靭性を高めた構造である。", "ブロック造を耐震的な構造にするためには、鉄筋コンクリートの布基礎及び臥梁により壁体の底部と頂部を固めることが必要である。"], "answer": 0, "exp": "鉄骨造は自重が軽く靭性(粘り強さ)も大きいため、大空間や高層建築に適します。逆に述べる1が不適当です。", "year": "H28-50", "diff": "B"}, {"id": "kako-zei-H29-50", "subject": "税その他", "topic": "建物", "type": "select", "q": "建物の構造と材料に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["木材の強度は、含水率が小さい状態の方が低くなる。", "鉄筋は、炭素含有量が多いほど、引張強度が増大する傾向がある。", "常温、常圧において、鉄筋と普通コンクリートを比較すると、熱膨張率はほぼ等しい。", "鉄筋コンクリート構造は、耐火性、耐久性があり、耐震性、耐風性にも優れた構造である。"], "answer": 0, "exp": "木材は含水率が小さい(乾燥している)ほど強度は高くなります。低くなるとする1が不適当です。", "year": "H29-50", "diff": "A"}, {"id": "kako-zei-H30-50", "subject": "税その他", "topic": "建物", "type": "select", "q": "建築物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["木造建物を造る際には、強度や耐久性において、できるだけ乾燥している木材を使用するのが好ましい。", "集成木材構造は、集成木材で骨組を構成したもので、大規模な建物にも使用されている。", "鉄骨構造は、不燃構造であり、耐火材料による耐火被覆がなくても耐火構造にすることができる。", "鉄筋コンクリート構造は、耐久性を高めるためには、中性化の防止やコンクリートのひび割れ防止の注意が必要である。"], "answer": 2, "exp": "鉄骨は火災時に耐力が大きく低下するため、耐火被覆がなければ耐火構造にはできません。被覆なしでよいとする3が不適当です。", "year": "H30-50", "diff": "A"}, {"id": "kako-zei-R1-50", "subject": "税その他", "topic": "建物", "type": "select", "q": "建築物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["地震に対する建物の安全確保においては、耐震、制震、免震という考え方がある。", "制震は制振ダンパーなどの制振装置を設置し、地震等の周期に建物が共振することで起きる大きな揺れを制御する技術である。", "免震はゴムなどの免震装置を設置し、上部構造の揺れを減らす技術である。", "耐震は、建物の強度や粘り強さで地震に耐える技術であるが、既存不適格建築物の地震に対する補強には利用されていない。"], "answer": 3, "exp": "耐震の技術は既存不適格建築物の耐震補強にも用いられています。利用されていないとする4が不適当です。", "year": "R1-50", "diff": "B"}, {"id": "kako-zei-R2-10-50", "subject": "税その他", "topic": "建物", "type": "select", "q": "建築物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["建物の構成は、大きく基礎構造と上部構造からなっており、基礎構造は地業と基礎盤から構成されている。", "基礎の種類には、基礎の底面が建物を支持する地盤に直接接する直接基礎と、建物を支持する地盤が深い場合に使用する杭基礎(杭地業)がある。", "直接基礎の種類には、形状により、柱の下に設ける独立基礎、壁体等の下に設けるべた基礎、建物の底部全体に設ける布基礎(連続基礎)等がある。", "上部構造は、重力、風力、地震力等の荷重に耐える役目を負う主要構造と、屋根、壁、床等の仕上げ部分等から構成されている。"], "answer": 2, "exp": "壁体等の下に設けるのは布基礎、建物の底部全体に設けるのがべた基礎で、記述が逆です。よって3が不適当です。", "year": "R2-10月-50", "diff": "B"}, {"id": "kako-zei-R2-12-50", "subject": "税その他", "topic": "建物", "type": "select", "q": "建築物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["基礎は、硬質の支持地盤に設置するとともに、上部構造とも堅固に緊結する必要がある。", "木造建物を耐震、耐風的な構造にするためには、できるだけ建物の形態を単純にすることが適切である。", "鉄骨造は、不燃構造であり、靭性が大きいことから、鋼材の防錆処理を行う必要はない。", "近年、コンクリートと鉄筋の強度が向上しており、鉄筋コンクリート造の超高層共同住宅建物もみられる。"], "answer": 2, "exp": "鉄骨は錆びると強度が落ちるため、鋼材には防錆処理が必要です。処理不要とする3が不適当です。", "year": "R2-12月-50", "diff": "A"}, {"id": "kako-zei-R3-10-50", "subject": "税その他", "topic": "建物", "type": "select", "q": "建物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["鉄骨構造は、主要構造の構造形式にトラス、ラーメン、アーチ等が用いられ、高層建築の骨組に適している。", "鉄骨構造の床は既製気泡コンクリート板、プレキャストコンクリート板等でつくられる。", "鉄骨構造は、耐火被覆や鋼材の加工性の問題があり、現在は住宅、店舗等の建物には用いられていない。", "鉄骨構造は、工場、体育館、倉庫等の単層で大空間の建物に利用されている。"], "answer": 2, "exp": "鉄骨構造は耐火被覆をすれば住宅や店舗にも用いられています。用いられていないとする3が不適当です。", "year": "R3-10月-50", "diff": "A"}, {"id": "kako-zei-R3-12-50", "subject": "税その他", "topic": "建物", "type": "select", "q": "建物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["組積式構造は、耐震性は劣るものの、熱、音などを遮断する性能が優れている。", "組積式構造を耐震的な構造にするためには、大きな開口部を造ることを避け、壁厚を大きくする必要がある。", "補強コンクリートブロック造は、壁式構造の一種であり、コンクリートブロック造を鉄筋コンクリートで耐震的に補強改良したものである。", "補強コンクリートブロック造は、壁量を多く必要とはせず、住宅等の小規模の建物には使用されていない。"], "answer": 3, "exp": "補強コンクリートブロック造は耐震性等が劣るため、住宅など小規模建物に多く使われます。使用されていないとする4が不適当です。", "year": "R3-12月-50", "diff": "B"}, {"id": "kako-zei-R4-50", "subject": "税その他", "topic": "建物", "type": "select", "q": "建築物の構造に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["木構造は、主要構造を木質系材料で構成するものであり、在来軸組構法での主要構造は、一般に軸組、小屋組、床組からなる。", "在来軸組構法の軸組は、通常、水平材である土台、桁、胴差と、垂直材の柱及び耐力壁からなる。", "小屋組は、屋根の骨組であり、小屋梁、小屋束、母屋、垂木等の部材を組み合わせた和小屋と、陸梁、束、方杖等の部材で形成するトラス構造の洋小屋がある。", "軸組に仕上げを施した壁には、真壁と大壁があり、真壁のみで構成する洋風構造と、大壁のみで構成する和風構造があるが、これらを併用する場合はない。"], "answer": 3, "exp": "真壁のみが和風、大壁のみが洋風で記述が逆であり、真壁と大壁は併用する場合もあります。よって4が不適当です。", "year": "R4-50", "diff": "A"}, {"id": "kako-zei-R5-50", "subject": "税その他", "topic": "建物", "type": "select", "q": "建物の構造と材料に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["鉄筋コンクリート構造は、地震や風の力を受けても、躯体の変形は比較的小さく、耐火性にも富んでいる。", "鉄筋コンクリート構造は、躯体の断面が大きく、材料の質量が大きいので、建物の自重が大きくなる。", "鉄筋コンクリート構造では、鉄筋とコンクリートを一体化するには、断面が円形の棒鋼である丸鋼の方が表面に突起をつけた棒鋼である異形棒鋼より、優れている。", "鉄筋コンクリート構造は、コンクリートが固まって所定の強度が得られるまでに日数がかかり、現場での施工も多いので、工事期間が長くなる。"], "answer": 2, "exp": "一体化には付着力の高い異形棒鋼の方が丸鋼より優れています。丸鋼が優れるとする3が不適当です。", "year": "R5-50", "diff": "B"}, {"id": "kako-zei-R6-50", "subject": "税その他", "topic": "建物", "type": "select", "q": "建物の構造と材料に関する次の記述のうち、最も不適当なものはどれか。", "choices": ["ラーメン構造は、柱を鉛直方向、梁を水平方向に配置し、接合部を強く固めた構造である。", "ブレース構造は、柱や梁などで構成された四角形の対角線上に部材を入れた構造である。", "ブレース構造は、骨組全てに用いることが多く、ラーメン構造など他の構造と併用することはない。", "壁式構造は、板状の壁と床を箱形に組み、建物とする構造で、原則として、柱や梁は用いない。"], "answer": 2, "exp": "ブレース構造は骨組全てに用いることは少なく、ラーメン構造など他の構造と併用されることが多いです。併用しないとする3が不適当です。", "year": "R6-50", "diff": "C"}, {"id": "kako-zei-H27-46", "subject": "税その他", "topic": "住宅金融支援機構", "type": "select", "q": "独立行政法人住宅金融支援機構に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、高齢者が自ら居住する住宅に対して行うバリアフリー工事又は耐震改修工事に係る貸付けについて、貸付金の償還を高齢者の死亡時に一括して行うという制度を設けている。", "証券化支援事業(買取型)において、機構による譲受けの対象となる貸付債権は、償還方法が毎月払いの元利均等の方法であるものに加え、毎月払いの元金均等の方法であるものもある。", "証券化支援事業(買取型)において、機構は、いずれの金融機関に対しても、譲り受けた貸付債権に係る元金及び利息の回収その他回収に関する業務を委託することができない。", "機構は、災害により住宅が滅失した場合におけるその住宅に代わるべき住宅の建設又は購入に係る貸付金について、一定の元金返済の据置期間を設けることができる。"], "answer": 2, "exp": "機構は譲り受けた貸付債権の元金・利息の回収業務を金融機関に委託することができます。できないとする3が誤りです。", "year": "H27-46", "diff": "C"}, {"id": "kako-zei-H28-46", "subject": "税その他", "topic": "住宅金融支援機構", "type": "select", "q": "独立行政法人住宅金融支援機構に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、子どもを育成する家庭又は高齢者の家庭に適した良好な居住性能及び居住環境を有する賃貸住宅の建設又は改良に必要な資金の貸付けを業務として行っている。", "機構は、証券化支援事業(買取型)において、債務者又は債務者の親族が居住する住宅のみならず、賃貸住宅の建設又は購入に必要な資金の貸付けに係る金融機関の貸付債権についても譲受けの対象としている。", "機構は、証券化支援事業(買取型)において、バリアフリー性、省エネルギー性、耐震性、耐久性・可変性に優れた住宅を取得する場合に、貸付金の利率を一定期間引き下げる制度を実施している。", "機構は、マンション管理組合や区分所有者に対するマンション共用部分の改良に必要な資金の貸付けを業務として行っている。"], "answer": 1, "exp": "買取型の対象は自己や親族が居住する住宅で、賃貸住宅の建設・購入資金の貸付債権は対象外です。対象とする2が誤りです。", "year": "H28-46", "diff": "C"}, {"id": "kako-zei-H29-46", "subject": "税その他", "topic": "住宅金融支援機構", "type": "select", "q": "独立行政法人住宅金融支援機構に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、団体信用生命保険業務として、貸付けを受けた者が死亡した場合のみならず、重度障害となった場合においても、支払われる生命保険の保険金を当該貸付けに係る債務の弁済に充当することができる。", "機構は、直接融資業務において、高齢者の死亡時に一括償還をする方法により貸付金の償還を受けるときは、当該貸付金の貸付けのために設定された抵当権の効力の及ぶ範囲を超えて、弁済の請求をしないことができる。", "証券化支援業務(買取型)に係る貸付金の利率は、貸付けに必要な資金の調達に係る金利その他の事情を勘案して機構が定めるため、どの金融機関においても同一の利率が適用される。", "証券化支援業務(買取型)において、機構による譲受けの対象となる住宅の購入に必要な資金の貸付けに係る金融機関の貸付債権には、当該住宅の購入に付随する改良に必要な資金も含まれる。"], "answer": 2, "exp": "買取型の住宅ローン金利は各金融機関が定めるため、金融機関ごとに異なります。どこでも同一とする3が誤りです。", "year": "H29-46", "diff": "B"}, {"id": "kako-zei-H30-46", "subject": "税その他", "topic": "住宅金融支援機構", "type": "select", "q": "独立行政法人住宅金融支援機構に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、住宅の建設又は購入に必要な資金の貸付けに係る金融機関の貸付債権の譲受けを業務として行っているが、当該住宅の建設又は購入に付随する土地又は借地権の取得に必要な資金の貸付けに係る金融機関の貸付債権については、譲受けの対象としていない。", "機構は、金融機関による住宅資金の供給を支援するため、金融機関が貸し付けた住宅ローンについて、住宅融資保険を引き受けている。", "機構は、証券化支援事業(買取型)において、MBS(資産担保証券)を発行することにより、債券市場(投資家)から資金を調達している。", "機構は、高齢者の家庭に適した良好な居住性能及び居住環境を有する住宅とすることを主たる目的とする住宅の改良(高齢者が自ら居住する住宅について行うものに限る。)に必要な資金の貸付けを業務として行っている。"], "answer": 0, "exp": "住宅の建設・購入に付随する土地や借地権の取得資金に係る貸付債権も譲受けの対象です。対象外とする1が誤りです。", "year": "H30-46", "diff": "A"}, {"id": "kako-zei-R1-46", "subject": "税その他", "topic": "住宅金融支援機構", "type": "select", "q": "独立行政法人住宅金融支援機構に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、証券化支援事業(買取型)において、中古住宅を購入するための貸付債権を買取りの対象としていない。", "機構は、証券化支援事業(買取型)において、バリアフリー性、省エネルギー性、耐震性又は耐久性・可変性に優れた住宅を取得する場合に、貸付金の利率を一定期間引き下げる制度を実施している。", "機構は、マンション管理組合や区分所有者に対するマンション共用部分の改良に必要な資金の貸付けを業務として行っている。", "機構は、災害により住宅が滅失した場合において、それに代わるべき建築物の建設又は購入に必要な資金の貸付けを業務として行っている。"], "answer": 0, "exp": "買取型の対象には新築だけでなく中古住宅の購入資金も含まれます。中古を対象外とする1が誤りです。", "year": "R1-46", "diff": "B"}, {"id": "kako-zei-R2-10-46", "subject": "税その他", "topic": "住宅金融支援機構", "type": "select", "q": "独立行政法人住宅金融支援機構に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、証券化支援事業(買取型)において、金融機関から買い取った住宅ローン債権を担保としてMBS(資産担保証券)を発行している。", "機構は、災害により住宅が滅失した場合におけるその住宅に代わるべき住宅の建設又は購入に係る貸付金については、元金据置期間を設けることができない。", "機構は、証券化支援事業(買取型)において、賃貸住宅の建設又は購入に必要な資金の貸付けに係る金融機関の貸付債権については譲受けの対象としていない。", "機構は、貸付けを受けた者とあらかじめ契約を締結して、その者が死亡した場合に支払われる生命保険の保険金を当該貸付けに係る債務の弁済に充当する団体信用生命保険を業務として行っている。"], "answer": 1, "exp": "災害で住宅が滅失した場合の代替住宅の貸付金には元金据置期間を設けることができます。できないとする2が誤りです。", "year": "R2-10月-46", "diff": "A"}, {"id": "kako-zei-R2-12-46", "subject": "税その他", "topic": "住宅金融支援機構", "type": "select", "q": "独立行政法人住宅金融支援機構に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、地震に対する安全性の向上を主たる目的とする住宅の改良に必要な資金の貸付けを業務として行っている。", "証券化支援事業(買取型)における民間金融機関の住宅ローン金利は、金融機関によって異なる場合がある。", "機構は、高齢者が自ら居住する住宅に対して行うバリアフリー工事に係る貸付けについて、貸付金の償還を高齢者の死亡時に一括して行うという制度を設けている。", "証券化支援業務(買取型)において、機構による譲受けの対象となる住宅の購入に必要な資金の貸付けに係る金融機関の貸付債権には、当該住宅の購入に付随する改良に必要な資金は含まれない。"], "answer": 3, "exp": "買取型では住宅の購入に付随する改良に必要な資金も貸付債権に含まれます。含まれないとする4が誤りです。", "year": "R2-12月-46", "diff": "A"}, {"id": "kako-zei-R3-10-46", "subject": "税その他", "topic": "住宅金融支援機構", "type": "select", "q": "独立行政法人住宅金融支援機構に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、証券化支援事業(買取型)において、賃貸住宅の購入に必要な資金の貸付けに係る金融機関の貸付債権を譲受けの対象としている。", "機構は、市街地の土地の合理的な利用に寄与する一定の建築物の建設に必要な資金の貸付けを業務として行っている。", "機構は、証券化支援事業(買取型)において、省エネルギー性に優れた住宅を取得する場合について、貸付金の利率を一定期間引き下げる制度を設けている。", "機構は、経済事情の変動に伴い、貸付けを受けた者の住宅ローンの元利金の支払が著しく困難になった場合に、償還期間の延長等の貸付条件の変更を行っている。"], "answer": 0, "exp": "買取型の対象は自己や親族が居住する住宅で、賃貸住宅の購入資金の貸付債権は対象外です。対象とする1が誤りです。", "year": "R3-10月-46", "diff": "B"}, {"id": "kako-zei-R3-12-46", "subject": "税その他", "topic": "住宅金融支援機構", "type": "select", "q": "独立行政法人住宅金融支援機構に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、子どもを育成する家庭又は高齢者の家庭に適した良好な居住性能及び居住環境を有する賃貸住宅の建設に必要な資金の貸付けを業務として行っていない。", "機構は、災害により住宅が滅失した場合において、それに代わるべき建築物の建設又は購入に必要な資金の貸付けを業務として行っている。", "機構が証券化支援事業(買取型)により譲り受ける貸付債権は、自ら居住する住宅又は自ら居住する住宅以外の親族の居住の用に供する住宅を建設し、又は購入する者に対する貸付けに係るものでなければならない。", "機構は、マンション管理組合や区分所有者に対するマンション共用部分の改良に必要な資金の貸付けを業務として行っている。"], "answer": 0, "exp": "機構は子育て・高齢者家庭向けの賃貸住宅の建設・改良資金の貸付けを業務として行っています。行っていないとする1が誤りです。", "year": "R3-12月-46", "diff": "B"}, {"id": "kako-zei-R4-46", "subject": "税その他", "topic": "住宅金融支援機構", "type": "select", "q": "独立行政法人住宅金融支援機構に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、住宅の建設又は購入に必要な資金の貸付けに係る金融機関の貸付債権の譲受けを業務として行っているが、当該住宅の建設又は購入に付随する土地又は借地権の取得に必要な資金については、譲受けの対象としていない。", "機構は、団体信用生命保険業務において、貸付けを受けた者が死亡した場合のみならず、重度障害となった場合においても、支払われる生命保険の保険金を当該貸付けに係る債務の弁済に充当することができる。", "証券化支援事業(買取型)において、機構による譲受けの対象となる貸付債権の償還方法には、元利均等の方法であるものに加え、元金均等の方法であるものもある。", "機構は、証券化支援事業(買取型)において、MBS(資産担保証券)を発行することにより、債券市場(投資家)から資金を調達している。"], "answer": 0, "exp": "住宅の建設・購入に付随する土地や借地権の取得資金に係る貸付債権も譲受けの対象です。対象外とする1が誤りです。", "year": "R4-46", "diff": "A"}, {"id": "kako-zei-R5-46", "subject": "税その他", "topic": "住宅金融支援機構", "type": "select", "q": "独立行政法人住宅金融支援機構に関する次の記述のうち、誤っているものはどれか。", "choices": ["機構は、子どもを育成する家庭又は高齢者の家庭(単身の世帯を含む。)に適した良好な居住性能及び居住環境を有する賃貸住宅の建設に必要な資金の貸付けを業務として行っている。", "機構は、証券化支援事業(買取型)において、新築住宅に対する貸付債権のみを買取りの対象としている。", "機構は、証券化支援事業(買取型)において、ZEH(ネット・ゼロ・エネルギーハウス)及び省エネルギー性、耐震性、バリアフリー性、耐久性・可変性に優れた住宅を取得する場合に、貸付金の利率を一定期間引き下げる制度を実施している。", "機構は、マンション管理組合や区分所有者に対するマンション共用部分の改良に必要な資金の貸付けを業務として行っている。"], "answer": 1, "exp": "買取型は新築住宅だけでなく中古住宅の貸付債権も買取りの対象です。新築のみとする2が誤りです。", "year": "R5-46", "diff": "B"}, {"id": "kako-zei-R6-46", "subject": "税その他", "topic": "住宅金融支援機構", "type": "select", "q": "独立行政法人住宅金融支援機構に関する次の記述のうち、誤っているものはどれか。", "choices": ["証券化支援業務(買取型)において、機構による譲受けの対象となる住宅の購入に必要な資金の貸付けに係る金融機関の貸付債権には、当該住宅の購入に付随する当該住宅の改良に必要な資金は含まれない。", "機構は、地震に対する安全性の向上を主たる目的とする住宅の改良に必要な資金の貸付けを業務として行っている。", "機構は、民間金融機関による住宅資金の供給を支援するため、民間金融機関が貸し付けた住宅ローンについて、住宅融資保険を引き受けている。", "機構は、住宅のエネルギー消費性能の向上を主たる目的とする住宅の改良に必要な資金の貸付けを業務として行っている。"], "answer": 0, "exp": "買取型では住宅の購入に付随する改良に必要な資金も貸付債権に含まれます。含まれないとする1が誤りです。", "year": "R6-46", "diff": "A"}, {"id": "kako-zei-H27-47", "subject": "税その他", "topic": "景品表示法", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。", "choices": ["新築分譲マンションを数期に分けて販売する場合に、第1期の販売分に売れ残りがあるにもかかわらず、第2期販売の広告に「第1期完売御礼!いよいよ第2期販売開始!」と表示しても、結果として第2期販売期間中に第1期の売れ残り分を売り切っていれば、不当表示にはならない。", "新築分譲マンションの広告に住宅ローンについても記載する場合、返済例を表示すれば、当該ローンを扱っている金融機関や借入金の利率等について表示する必要はない。", "販売しようとしている土地が、都市計画法に基づく告示が行われた都市計画施設の区域に含まれている場合は、都市計画道路の工事が未着手であっても、広告においてその旨を明示しなければならない。", "築15年の企業の社宅を買い取って大規模にリフォームし、分譲マンションとして販売する場合、一般消費者に販売することは初めてであるため、「新発売」と表示して広告を出すことができる。"], "answer": 2, "exp": "都市計画施設の区域内の土地は、工事が未着手でも広告にその旨を明示する必要があります。よって3が正しいです。", "year": "H27-47", "diff": "B"}, {"id": "kako-zei-H28-47", "subject": "税その他", "topic": "景品表示法", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。", "choices": ["インターネット上に掲載した賃貸物件の広告について、掲載直前に契約済みとなったとしても、消費者からの問合せに対し既に契約済みであり取引できない旨を説明すれば、その時点で消費者の誤認は払拭されるため、不当表示に問われることはない。", "宅地の造成及び建物の建築が禁止されており、宅地の造成及び建物の建築が可能となる予定がない市街化調整区域内の土地を販売する際の新聞折込広告においては、当該土地が市街化調整区域内に所在する旨を16ポイント以上の大きさの文字で表示すれば、宅地の造成や建物の建築ができない旨まで表示する必要はない。", "半径300m以内に小学校及び市役所が所在している中古住宅の販売広告においては、当該住宅からの道路距離の表示を省略して、「小学校、市役所近し」と表示すればよい。", "近くに新駅の設置が予定されている分譲住宅の販売広告を行うに当たり、当該鉄道事業者が新駅設置及びその予定時期を公表している場合、広告の中に新駅設置の予定時期を明示して表示してもよい。"], "answer": 3, "exp": "新設予定の駅は運行主体が公表したものに限り、予定時期を明示して表示できます。よって4が正しいです。", "year": "H28-47", "diff": "B"}, {"id": "kako-zei-H29-47", "subject": "税その他", "topic": "景品表示法", "type": "select", "q": "宅地建物取引業者がインターネット不動産情報サイトにおいて行った広告表示に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。", "choices": ["物件の所有者に媒介を依頼された宅地建物取引業者Aから入手した当該物件に関する情報を、宅地建物取引業者Bが、そのままインターネット不動産情報サイトに表示し広告を行っていれば、仮に入手した物件に関する情報が間違っていたとしても不当表示に問われることはない。", "新築の建売住宅について、建築中で外装が完成していなかったため、当該建売住宅と規模、外観等は同一ではないが同じ施工業者が他の地域で手掛けた建売住宅の外観を、施工例である旨を明記して掲載した。この広告表示が不当表示に問われることはない。", "取引しようとする賃貸物件から最寄りの甲駅までの徒歩所要時間を表示するため、当該物件から甲駅までの道路距離を80mで除して算出したところ5.25分であったので、1分未満を四捨五入して「甲駅から5分」と表示した。この広告表示が不当表示に問われることはない。", "新築分譲マンションについて、パンフレットには当該マンションの全戸数の専有面積を表示したが、インターネット広告には当該マンションの全戸数の専有面積のうち、最小面積及び最大面積のみを表示した。この広告表示が不当表示に問われることはない。"], "answer": 3, "exp": "専有面積はパンフレット等以外の媒体では最小面積と最大面積のみの表示が認められます。よって4が正しいです。", "year": "H29-47", "diff": "B"}, {"id": "kako-zei-H30-47", "subject": "税その他", "topic": "景品表示法", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。", "choices": ["新築分譲住宅について、価格Aで販売を開始してから3か月以上経過したため、価格Aから価格Bに値下げをすることとし、価格Aと価格Bを併記して、値下げをした旨を表示する場合、値下げ金額が明確になっていれば、価格Aの公表日や値下げした日を表示する必要はない。", "土地上に古家が存在する場合に、当該古家が、住宅として使用することが可能な状態と認められる場合であっても、古家がある旨を表示すれば、売地と表示して販売しても不当表示に問われることはない。", "新築分譲マンションの広告において、当該マンションの完成図を掲載する際に、敷地内にある電柱及び電線を消去する加工を施した場合であっても、当該マンションの外観を消費者に対し明確に示すためであれば、不当表示に問われることはない。", "複数の売買物件を1枚の広告に掲載するに当たり、取引態様が複数混在している場合には、広告の下部にまとめて表示すれば、どの物件がどの取引態様かを明示していなくても不当表示に問われることはない。"], "answer": 1, "exp": "土地上に古家等がある場合その旨を明示すれば売地と表示して販売できます。古家がある旨を表示している2が正しいです。", "year": "H30-47", "diff": "A"}, {"id": "kako-zei-R1-47", "subject": "税その他", "topic": "景品表示法", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。", "choices": ["土地を販売するに当たり、購入者に対し、購入後一定期間内に当該土地に建物を建築することを条件としていても、建物建築の発注先を購入者が自由に選定できることとなっていれば、当該土地の広告に「建築条件付土地」と表示する必要はない。", "新築賃貸マンション又は新築賃貸アパートの賃料については、パンフレット等の媒体を除き、標準的な1住戸1か月当たりの賃料を表示すれば、不当表示に問われることはない。", "改装済みの中古住宅については、改装済みである旨を必ず表示しなければならない。", "分譲住宅について、住宅の購入者から買い取って再度販売する場合、当該住宅が建築後1年未満で居住の用に供されたことがないものであるときは、広告に「新築」と表示しても、不当表示に問われることはない。"], "answer": 3, "exp": "新築とは建築後1年未満で未使用のものをいい、これは買取り再販でも同じです。要件を満たす4が正しいです。", "year": "R1-47", "diff": "B"}, {"id": "kako-zei-R2-10-47", "subject": "税その他", "topic": "景品表示法", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。", "choices": ["路地状部分(敷地延長部分)のみで道路に接する土地であって、その路地状部分の面積が当該土地面積のおおむね30%以上を占める場合には、路地状部分を含む旨及び路地状部分の割合又は面積を明示しなければならない。", "新築住宅を販売するに当たり、当該物件から最寄駅まで実際に歩いたときの所要時間が15分であれば、物件から最寄駅までの道路距離にかかわらず、広告中に「最寄駅まで徒歩15分」と表示することができる。", "新築分譲住宅を販売するに当たり、予告広告である旨及び契約又は予約の申込みには応じられない旨を明瞭に表示すれば、当該物件が建築確認を受けていなくても広告表示をすることができる。", "新築分譲マンションを販売するに当たり、住戸により管理費の額が異なる場合であって、すべての住戸の管理費を示すことが広告スペースの関係で困難なときは、全住戸の管理費の平均額を表示すればよい。"], "answer": 0, "exp": "路地状部分の面積がおおむね30%以上を占める場合は、その旨と割合又は面積を明示する必要があります。よって1が正しいです。", "year": "R2-10月-47", "diff": "A"}, {"id": "kako-zei-R2-12-47", "subject": "税その他", "topic": "景品表示法", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。", "choices": ["建築基準法第42条第2項の規定により道路とみなされる部分(セットバックを要する部分)を含む土地については、セットバックを要する旨及びその面積を必ず表示しなければならない。", "取引態様については、「売主」、「貸主」、「代理」又は「媒介(仲介)」の別を表示しなければならず、これらの用語以外の「直販」、「委託」等の用語による表示は、取引態様の表示とは認められない。", "インターネット上に掲載している賃貸物件について、掲載した後に契約済みとなり実際には取引できなくなっていたとしても、当該物件について消費者からの問合せがなく、故意に掲載を継続していたものでなければ、不当表示に問われることはない。", "新築分譲住宅を販売するに当たり、販売価格が確定していないため直ちに取引することができない場合、その取引開始時期をあらかじめ告知する予告広告を行うことはできない。"], "answer": 1, "exp": "取引態様は所定の用語で表示する必要があり、「直販」「委託」等では取引態様の表示と認められません。よって2が正しいです。", "year": "R2-12月-47", "diff": "B"}, {"id": "kako-zei-R3-10-47", "subject": "税その他", "topic": "景品表示法", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。", "choices": ["住宅の居室の広さを畳数で表示する場合には、畳1枚当たりの広さにかかわらず、実際に当該居室に敷かれている畳の数を表示しなければならない。", "団地と駅その他の施設との間の道路距離又は所要時間は、取引する区画のうちそれぞれの施設ごとにその施設から最も近い区画を起点として算出した数値とともに、その施設から最も遠い区画を起点として算出した数値も表示しなければならない。", "新築分譲マンションを完成予想図により表示する場合、完成予想図である旨を表示すれば、緑豊かな環境であることを訴求するために周囲に存在しない公園等を表示することができる。", "新築分譲住宅の販売に当たって行う二重価格表示は、実際に過去において販売価格として公表していた価格を比較対照価格として用いて行うのであれば、値下げの日から1年以内の期間は表示することができる。"], "answer": 1, "exp": "団地と施設間の距離等は最も近い区画と最も遠い区画の双方を起点として表示する必要があります。よって2が正しいです。", "year": "R3-10月-47", "diff": "B"}, {"id": "kako-zei-R3-12-47", "subject": "税その他", "topic": "景品表示法", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。", "choices": ["新築分譲マンションの販売広告において、近隣のデパート、スーパーマーケット、商店等の商業施設は、将来確実に利用できる施設であっても、現に利用できるものでなければ表示することができない。", "有名な旧跡から直線距離で1,100mの地点に所在する新築分譲マンションの名称に当該旧跡の名称を用いることができる。", "土地の販売価格については、1区画当たりの価格並びに1m2当たりの価格及び1区画当たりの土地面積のいずれも表示しなければならない。", "新築分譲マンションの修繕積立金が住戸により異なる場合、広告スペースの関係で全ての住戸の修繕積立金を示すことが困難であっても、修繕積立金について全住戸の平均額で表示することはできない。"], "answer": 3, "exp": "修繕積立金が住戸で異なり全て示すのが困難なときは最低額・最高額のみで表示でき、平均額表示はできません。よって4が正しいです。", "year": "R3-12月-47", "diff": "B"}, {"id": "kako-zei-R4-47", "subject": "税その他", "topic": "景品表示法", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。", "choices": ["物件からスーパーマーケット等の商業施設までの徒歩所要時間は、道路距離80mにつき1分間を要するものとして算出し、1分未満の端数が生じたときは、端数を切り捨てて表示しなければならない。", "インターネット上に掲載した賃貸物件の広告について、掲載直前に契約済みとなっていたとしても、消費者からの問合せに対して既に契約済みであり取引できない旨を説明すれば、不当表示に問われることはない。", "マンションの管理費について、住戸により管理費の額が異なる場合において、その全ての住宅の管理費を示すことが困難であるときは、最高額のみを表示すればよい。", "建築条件付土地の取引の広告においては、当該条件の内容、当該条件が成就しなかったときの措置の内容だけでなく、そもそも当該取引の対象が土地であることも明らかにして表示しなければならない。"], "answer": 3, "exp": "建築条件付土地の広告では、対象が土地である旨・条件の内容・不成就時の措置を明らかにする必要があります。よって4が正しいです。", "year": "R4-47", "diff": "A"}, {"id": "kako-zei-R5-47", "subject": "税その他", "topic": "景品表示法", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。", "choices": ["実際には取引する意思がない物件であっても実在するものであれば、当該物件を広告に掲載しても不当表示に問われることはない。", "直線距離で50m以内に街道が存在する場合、物件名に当該街道の名称を用いることができる。", "物件の近隣に所在するスーパーマーケットを表示する場合は、物件からの自転車による所要時間を明示しておくことで、徒歩による所要時間を明示する必要がなくなる。", "一棟リノベーションマンションについては、一般消費者に対し、初めて購入の申込みの勧誘を行う場合であっても、「新発売」との表示を行うことはできない。"], "answer": 1, "exp": "物件から直線距離で50m以内にある街道等の道路の名称は物件名に用いることができます。よって2が正しいです。", "year": "R5-47", "diff": "B"}, {"id": "kako-zei-R6-47", "subject": "税その他", "topic": "景品表示法", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、不当景品類及び不当表示防止法(不動産の表示に関する公正競争規約を含む。)の規定によれば、正しいものはどれか。", "choices": ["新築分譲住宅の予告広告(価格が確定していないため、直ちに取引することができない物件について、取引開始時期をあらかじめ告知する広告)を新聞折込チラシを用いて行った場合は、本広告を新聞折込チラシ以外の媒体を用いて行ってはならない。", "土地取引において、当該土地上に廃屋が存在するとき、実際の土地を見れば廃屋が存在することは明らかであるため、廃屋が存在する旨を明示する必要はない。", "交通の利便性について、電車、バス等の交通機関の所要時間を表示する場合は、朝の通勤ラッシュ時の所要時間ではなく、平常時の所要時間を明示しなければならない。", "居住の用に供されたことはないが建築後1年以上経過した一戸建て住宅について、新築である旨を表示することはできない。"], "answer": 3, "exp": "新築は建築後1年未満で未使用のものに限られ、1年以上経過した住宅は新築と表示できません。よって4が正しいです。", "year": "R6-47", "diff": "A"}, {"id": "kako-zei-H28-25", "subject": "税その他", "topic": "不動産鑑定評価基準", "type": "select", "q": "不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、正しいものはどれか。", "choices": ["不動産の鑑定評価によって求める価格は、基本的には正常価格であるが、市場性を有しない不動産については、鑑定評価の依頼目的及び条件に応じて限定価格、特定価格又は特殊価格を求める場合がある。", "同一需給圏とは、一般に対象不動産と代替関係が成立して、その価格の形成について相互に影響を及ぼすような関係にある他の不動産の存する圏域をいうが、不動産の種類、性格及び規模に応じた需要者の選好性によって、その地域的範囲は狭められる場合もあれば、広域的に形成される場合もある。", "鑑定評価の各手法の適用に当たって必要とされる取引事例等については、取引等の事情が正常なものと認められるものから選択すべきであり、売り急ぎ、買い進み等の特殊な事情が存在する事例を用いてはならない。", "収益還元法は、対象不動産が将来生み出すであろうと期待される純収益の現在価値の総和を求めることにより対象不動産の試算価格を求める手法であるが、市場における土地の取引価格の上昇が著しいときは、その価格と収益価格との乖離が増大するものであるため、この手法の適用は避けるべきである。"], "answer": 1, "exp": "同一需給圏は需要者の選好性により地域的範囲が狭くも広くもなる、との記述は正しいです。1は市場性を有しない不動産は特殊価格のみ、3は事情補正すれば特殊事例も利用可、4は乖離が大きいときこそ収益還元法を活用すべきで誤りです。", "year": "H28-25", "diff": "C"}, {"id": "kako-zei-H30-25", "subject": "税その他", "topic": "不動産鑑定評価基準", "type": "select", "q": "不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、正しいものはどれか。", "choices": ["不動産の価格は、その不動産の効用が最高度に発揮される可能性に最も富む使用を前提として把握される価格を標準として形成されるが、これを最有効使用の原則という。", "収益還元法は、賃貸用不動産又は賃貸以外の事業の用に供する不動産の価格を求める場合に特に有効な手法であるが、事業の用に供さない自用の不動産の鑑定評価には適用すべきではない。", "鑑定評価の基本的な手法は、原価法、取引事例比較法及び収益還元法に大別され、実際の鑑定評価に際しては、地域分析及び個別分析により把握した対象不動産に係る市場の特性等を適切に反映した手法をいずれか1つ選択して、適用すべきである。", "限定価格とは、市場性を有する不動産について、法令等による社会的要請を背景とする鑑定評価目的の下で、正常価格の前提となる諸条件を満たさないことにより正常価格と同一の市場概念の下において形成されるであろう市場価値と乖離することとなる場合における不動産の経済価値を適正に表示する価格のことをいい、民事再生法に基づく鑑定評価目的の下で、早期売却を前提として求められる価格が例としてあげられる。"], "answer": 0, "exp": "最有効使用の原則の説明として1が正しいです。2は自用不動産も賃貸を想定して適用可、3は複数の手法を適用すべき、4は特定価格の説明で誤りです。", "year": "H30-25", "diff": "C"}, {"id": "kako-zei-R2-10-25", "subject": "税その他", "topic": "不動産鑑定評価基準", "type": "select", "q": "不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、誤っているものはどれか。", "choices": ["不動産の価格は、その不動産の効用が最高度に発揮される可能性に最も富む使用を前提として把握される価格を標準として形成されるが、不動産についての現実の使用方法は当該不動産が十分な効用を発揮していない場合があることに留意すべきである。", "対象建築物に関する工事が完了していない場合でも、当該工事の完了を前提として鑑定評価を行うことがある。", "特殊価格とは、一般的に市場性を有しない不動産について、その利用現況等を前提とした不動産の経済価値を適正に表示する価格をいい、例としては、文化財の指定を受けた建造物について、その保存等に主眼をおいた鑑定評価を行う場合において求められる価格があげられる。", "原価法は、対象不動産が建物及びその敷地である場合において、再調達原価の把握及び減価修正を適切に行うことができるときに有効な手法であるが、対象不動産が土地のみである場合には、この手法を適用することはできない。"], "answer": 3, "exp": "原価法は土地のみでも再調達原価を適切に求められる場合には適用できます。適用できないとする4が誤りです。", "year": "R2-10月-25", "diff": "A"}, {"id": "kako-zei-R3-10-25", "subject": "税その他", "topic": "不動産鑑定評価基準", "type": "select", "q": "不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、誤っているものはどれか。", "choices": ["不動産鑑定士の通常の調査の範囲では、対象不動産の価格への影響の程度を判断するための事実の確認が困難な特定の価格形成要因がある場合、鑑定評価書の利用者の利益を害するおそれがないと判断されるときに限り、当該価格形成要因について調査の範囲に係る条件を設定することができる。", "対象不動産を価格時点において再調達することを想定した場合において必要とされる適正な原価の総額を再調達原価というが、建設資材、工法等の変遷により、対象不動産の再調達原価を求めることが困難な場合には、対象不動産と同等の有用性を持つものに置き換えて求めた原価を再調達原価とみなすものとする。", "取引事例等に係る取引が特殊な事情を含み、これが当該取引事例等に係る価格等に影響を及ぼしている場合に、適切に補正することを時点修正という。", "不動産の鑑定評価によって求める賃料は、一般的には正常賃料又は継続賃料であるが、鑑定評価の依頼目的に対応した条件により限定賃料を求めることができる場合がある。"], "answer": 2, "exp": "特殊な事情を補正することは事情補正であり、時点修正ではありません。時点修正とする3が誤りです。", "year": "R3-10月-25", "diff": "C"}, {"id": "kako-zei-R5-25", "subject": "税その他", "topic": "不動産鑑定評価基準", "type": "select", "q": "不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、正しいものはどれか。", "choices": ["原価法は、価格時点における対象不動産の収益価格を求め、この収益価格について減価修正を行って対象不動産の比準価格を求める手法である。", "原価法は、対象不動産が建物又は建物及びその敷地である場合には適用することができるが、対象不動産が土地のみである場合においては、いかなる場合も適用することができない。", "取引事例比較法における取引事例が、特殊事情のある事例である場合、その具体的な状況が判明し、事情補正できるものであっても採用することは許されない。", "取引事例比較法は、近隣地域若しくは同一需給圏内の類似地域等において対象不動産と類似の不動産の取引が行われている場合又は同一需給圏内の代替競争不動産の取引が行われている場合に有効である。"], "answer": 3, "exp": "取引事例比較法が有効な場面を述べた4が正しいです。1は再調達原価を求める手法、2は土地のみでも適用可能、3は事情補正できれば採用可で誤りです。", "year": "R5-25", "diff": "B"}, {"id": "kako-zei-R6-25", "subject": "税その他", "topic": "不動産鑑定評価基準", "type": "select", "q": "不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、誤っているものはどれか。", "choices": ["同一需給圏とは、一般に対象不動産と代替関係が成立して、その価格の形成について相互に影響を及ぼすような関係にある他の不動産の存する圏域をいう。", "対象不動産について、依頼目的に応じ対象不動産に係る価格形成要因のうち地域要因又は個別的要因について想定上の条件を設定する場合がある。", "不動産の価格は、その不動産の効用が最高度に発揮される可能性に最も富む使用を前提として把握される価格を標準として形成されるが、これを適合の原則という。", "収益還元法は、対象不動産が将来生み出すであろうと期待される純収益の現在価値の総和を求めることにより対象不動産の試算価格を求める手法であり、賃貸用不動産又は賃貸以外の事業の用に供する不動産の価格を求める場合に特に有効である。"], "answer": 2, "exp": "効用が最高度に発揮される使用を前提とする原則は最有効使用の原則であり、適合の原則ではありません。よって3が誤りです。", "year": "R6-25", "diff": "C"}, {"id": "kako-zei-H27-25", "subject": "税その他", "topic": "地価公示法", "type": "select", "q": "地価公示法に関する次の記述のうち、誤っているものはどれか。", "choices": ["都市計画区域外の区域を公示区域とすることはできない。", "正常な価格とは、土地について、自由な取引が行われるとした場合におけるその取引において通常成立すると認められる価格をいい、この「取引」には住宅地とするための森林の取引も含まれる。", "土地鑑定委員会が標準地の単位面積当たりの正常な価格を判定する際は、二人以上の不動産鑑定士の鑑定評価を求めなければならない。", "土地鑑定委員会が標準地の単位面積当たりの正常な価格を判定したときは、標準地の形状についても公示しなければならない。"], "answer": 0, "exp": "公示区域は都市計画区域その他の土地取引が相当程度見込まれる区域から選定され、都市計画区域外も対象になり得ます。できないとする1が誤りです。", "year": "H27-25", "diff": "A"}, {"id": "kako-zei-H29-25", "subject": "税その他", "topic": "地価公示法", "type": "select", "q": "地価公示法に関する次の記述のうち、正しいものはどれか。", "choices": ["土地鑑定委員会は、標準地の単位面積当たりの価格及び当該標準地の前回の公示価格からの変化率等一定の事項を官報により公示しなければならないとされている。", "土地鑑定委員会は、公示区域内の標準地について、毎年2回、2人以上の不動産鑑定士の鑑定評価を求め、その結果を審査し、必要な調整を行って、一定の基準日における当該標準地の単位面積当たりの正常な価格を判定し、これを公示するものとされている。", "標準地は、土地鑑定委員会が、自然的及び社会的条件からみて類似の利用価値を有すると認められる地域において、土地の利用状況、環境等が通常であると認められる一団の土地について選定するものとされている。", "土地の取引を行なう者は、取引の対象となる土地が標準地である場合には、当該標準地について公示された価格により取引を行なう義務を有する。"], "answer": 2, "exp": "標準地の選定基準を述べた3が正しいです。1の前回価格からの変化率は公示事項でなく、2は毎年1回、4は公示価格に従う義務はなく指標とする努力義務にとどまり誤りです。", "year": "H29-25", "diff": "B"}, {"id": "kako-zei-R1-25", "subject": "税その他", "topic": "地価公示法", "type": "select", "q": "地価公示法に関する次の記述のうち、正しいものはどれか。", "choices": ["都市及びその周辺の地域等において、土地の取引を行う者は、取引の対象土地から最も近傍の標準地について公示された価格を指標として取引を行うよう努めなければならない。", "標準地は、都市計画区域外や国土利用計画法の規定により指定された規制区域内からは選定されない。", "標準地の正常な価格とは、土地について、自由な取引が行われるとした場合におけるその取引(一定の場合を除く。)において通常成立すると認められる価格をいい、当該土地に関して地上権が存する場合は、この権利が存しないものとして通常成立すると認められる価格となる。", "土地鑑定委員会は、自然的及び社会的条件からみて類似の利用価値を有すると認められる地域において、土地の利用状況、環境等が特に良好と認められる一団の土地について標準地を選定する。"], "answer": 2, "exp": "正常な価格は地上権等の権利が存しないものとして求めるとする3が正しいです。1は近傍でなく類似の標準地、2は都市計画区域外も選定可、4は環境等が通常の土地を選定するため誤りです。", "year": "R1-25", "diff": "A"}, {"id": "kako-zei-R2-12-25", "subject": "税その他", "topic": "地価公示法", "type": "select", "q": "地価公示法に関する次の記述のうち、正しいものはどれか。", "choices": ["土地鑑定委員会は、その土地に地上権が存する場合であっても、標準地として選定することができる。", "土地鑑定委員会は、標準地について、2人以上の不動産鑑定士の鑑定評価を求めるものとし、当該2人以上の不動産鑑定士は、土地鑑定委員会に対し、鑑定評価書を連名で提出しなければならない。", "土地鑑定委員会は、標準地の正常な価格を判定したときは、標準地の単位面積当たりの価格のほか、当該標準地の価格の総額についても官報で公示しなければならない。", "土地収用法その他の法律によって土地を収用することができる事業を行う者は、標準地として選定されている土地を取得する場合において、当該土地の取得価格を定めるときは、公示価格と同額としなければならない。"], "answer": 0, "exp": "地上権が存する土地も、権利が存しないものとして評価するため標準地に選定できます。よって1が正しいです。2は連名提出の規定なし、3は価格の総額は公示不要、4は公示価格と同額でなく規準とするため誤りです。", "year": "R2-12月-25", "diff": "A"}, {"id": "kako-zei-R3-12-25", "subject": "税その他", "topic": "地価公示法", "type": "select", "q": "地価公示法に関する次の記述のうち、誤っているものはどれか。", "choices": ["地価公示法の目的は、都市及びその周辺の地域等において、標準地を選定し、その正常な価格を公示することにより、一般の土地の取引価格に対して指標を与え、及び公共の利益となる事業の用に供する土地に対する適正な補償金の額の算定等に資し、もって適正な地価の形成に寄与することである。", "不動産鑑定士は、公示区域内の土地について鑑定評価を行う場合において、当該土地の正常な価格を求めるときは、公示価格と実際の取引価格を規準としなければならない。", "不動産鑑定士は、土地鑑定委員会の求めに応じて標準地の鑑定評価を行うに当たっては、近傍類地の取引価格から算定される推定の価格、近傍類地の地代等から算定される推定の価格及び同等の効用を有する土地の造成に要する推定の費用の額を勘案しなければならない。", "関係市町村の長は、土地鑑定委員会が公示した事項のうち、当該市町村が属する都道府県に存する標準地に係る部分を記載した書面等を、当該市町村の事務所において一般の閲覧に供しなければならない。"], "answer": 1, "exp": "公示区域内の土地の正常な価格を求めるときは公示価格を規準とすべきで、実際の取引価格を規準とするのではありません。よって2が誤りです。", "year": "R3-12月-25", "diff": "B"}, {"id": "kako-zei-R4-25", "subject": "税その他", "topic": "地価公示法", "type": "select", "q": "地価公示法に関する次の記述のうち、誤っているものはどれか。", "choices": ["土地鑑定委員会は、標準地の正常な価格を判定したときは、標準地の単位面積当たりの価格のほか、当該標準地の地積及び形状についても官報で公示しなければならない。", "正常な価格とは、土地について、自由な取引が行われるとした場合におけるその取引(一定の場合を除く。)において通常成立すると認められる価格をいい、当該土地に建物がある場合には、当該建物が存するものとして通常成立すると認められる価格をいう。", "公示区域内の土地について鑑定評価を行う場合において、当該土地の正常な価格を求めるときは、公示価格を規準とする必要があり、その際には、当該土地とこれに類似する利用価値を有すると認められる1又は2以上の標準地との位置、地積、環境等の土地の客観的価値に作用する諸要因についての比較を行い、その結果に基づき、当該標準地の公示価格と当該土地の価格との間に均衡を保たせる必要がある。", "公示区域とは、都市計画法第4条第2項に規定する都市計画区域その他の土地取引が相当程度見込まれるものとして国土交通省令で定める区域のうち、国土利用計画法第12条第1項の規定により指定された規制区域を除いた区域をいう。"], "answer": 1, "exp": "正常な価格は、土地に建物や権利が存する場合でもこれらが存しないものとして求めます。建物が存するものとする2が誤りです。", "year": "R4-25", "diff": "A"}, {"id": "kako-zei-H28-24", "subject": "税その他", "topic": "不動産取得税", "type": "select", "q": "不動産取得税に関する次の記述のうち、正しいものはどれか。", "choices": ["家屋が新築された日から3年を経過して、なお、当該家屋について最初の使用又は譲渡が行われない場合においては、当該家屋が新築された日から3年を経過した日において家屋の取得がなされたものとみなし、当該家屋の所有者を取得者とみなして、これに対して不動産取得税を課する。", "不動産取得税は、不動産の取得に対して課される税であるので、法人の合併により不動産を取得した場合にも、不動産取得税は課される。", "平成28年4月に取得した床面積240m2である新築住宅に係る不動産取得税の課税標準の算定については、当該新築住宅の価格から1,200万円が控除される。", "平成28年4月に個人が取得した住宅及び住宅用地に係る不動産取得税の税率は3%であるが、住宅用以外の家屋及びその土地に係る不動産取得税の税率は4%である。"], "answer": 2, "exp": "床面積50m2以上240m2以下の新築住宅の取得では価格から1,200万円が控除されます。よって3が正しいです。1は3年でなく6か月(業者は1年)、2は合併は非課税、4は住宅用以外の土地も特例で3%のため誤りです。", "year": "H28-24", "diff": "A"}, {"id": "kako-zei-H30-24", "subject": "税その他", "topic": "不動産取得税", "type": "select", "q": "不動産取得税に関する次の記述のうち、正しいものはどれか。", "choices": ["不動産取得税は、不動産の取得があった日の翌日から起算して3月以内に当該不動産が所在する都道府県に申告納付しなければならない。", "不動産取得税は不動産の取得に対して課される税であるので、家屋を改築したことにより当該家屋の価格が増加したとしても、新たな不動産の取得とはみなされないため、不動産取得税は課されない。", "相続による不動産の取得については、不動産取得税は課されない。", "一定の面積に満たない土地の取得については、不動産取得税は課されない。"], "answer": 2, "exp": "相続による不動産の取得は形式的な移転として不動産取得税が課されません。よって3が正しいです。1は普通徴収、2は改築で価格が増えれば課税、4は免税点は金額基準で面積ではないため誤りです。", "year": "H30-24", "diff": "A"}, {"id": "kako-zei-R2-10-24", "subject": "税その他", "topic": "不動産取得税", "type": "select", "q": "不動産取得税に関する次の記述のうち、正しいものはどれか。", "choices": ["令和2年4月に個人が取得した住宅及び住宅用地に係る不動産取得税の税率は3%であるが、住宅用以外の土地に係る不動産取得税の税率は4%である。", "一定の面積に満たない土地の取得に対しては、狭小な不動産の取得者に対する税負担の排除の観点から、不動産取得税を課することができない。", "不動産取得税は、不動産の取得に対して課される税であるので、家屋を改築したことにより、当該家屋の価格が増加したとしても、不動産取得税は課されない。", "共有物の分割による不動産の取得については、当該不動産の取得者の分割前の当該共有物に係る持分の割合を超えない部分の取得であれば、不動産取得税は課されない。"], "answer": 3, "exp": "共有物の分割で従前の持分の割合を超えない部分の取得には不動産取得税は課されません。よって4が正しいです。1は土地は用途を問わず3%、2は面積基準の非課税規定はなく、3は改築で価格が増えれば課税で誤りです。", "year": "R2-10月-24", "diff": "A"}, {"id": "kako-zei-R3-10-24", "subject": "税その他", "topic": "不動産取得税", "type": "select", "q": "不動産取得税に関する次の記述のうち、正しいものはどれか。", "choices": ["平成28年に新築された既存住宅(床面積210m2)を個人が自己の居住のために取得した場合、当該取得に係る不動産取得税の課税標準の算定については、当該住宅の価格から1,200万円が控除される。", "家屋が新築された日から3年を経過して、なお、当該家屋について最初の使用又は譲渡が行われない場合においては、当該家屋が新築された日から3年を経過した日において家屋の取得がなされたものとみなし、当該家屋の所有者を取得者とみなして、これに対して不動産取得税を課する。", "不動産取得税は、不動産の取得があった日の翌日から起算して2か月以内に当該不動産の所在する都道府県に申告納付しなければならない。", "不動産取得税は、不動産を取得するという比較的担税力のある機会に相当の税負担を求める観点から創設されたものであるが、不動産取得税の税率は4%を超えることができない。"], "answer": 0, "exp": "床面積50m2以上240m2以下の既存住宅を自己居住用に取得した場合は価格から一定額(新築時期に応じ最大1,200万円)が控除されます。よって1が正しいです。2は3年でなく6か月、3は普通徴収、4は標準税率で4%超も可能なため誤りです。", "year": "R3-10月-24", "diff": "A"}, {"id": "kako-zei-R5-24", "subject": "税その他", "topic": "不動産取得税", "type": "select", "q": "不動産取得税に関する次の記述のうち、正しいものはどれか。", "choices": ["不動産取得税の徴収については、特別徴収の方法によることができる。", "不動産取得税は、目的税である。", "不動産取得税は、不動産の取得に対し、当該不動産所在の市町村及び特別区において、当該不動産の取得者に課する。", "不動産取得税は、市町村及び特別区に対して、課することができない。"], "answer": 3, "exp": "国や地方公共団体等に対しては不動産取得税を課すことができないため、市町村・特別区に対しても課せません。よって4が正しいです。1は普通徴収、2は普通税、3は都道府県が課す都道府県税のため誤りです。", "year": "R5-24", "diff": "B"}, {"id": "kako-zei-R6-24", "subject": "税その他", "topic": "不動産取得税", "type": "select", "q": "不動産取得税に関する次の記述のうち、正しいものはどれか。", "choices": ["不動産取得税の課税標準は、不動産を取得した時における当該不動産の売買価格であるから、固定資産税の課税標準である固定資産の評価額とは異なるものである。", "不動産取得税の課税標準となるべき額が、土地の取得にあっては10万円、家屋の取得のうち建築に係るものにあっては1戸につき23万円、その他のものにあっては1戸につき12万円に満たない場合においては、不動産取得税が課されない。", "不動産取得税は、不動産の取得に対して課される税であるので、法人の合併により不動産を取得した場合においても、不動産取得税が課される。", "令和6年4月に個人が取得した住宅及び住宅用地に係る不動産取得税の税率は3%であるが、住宅以外の家屋及び土地に係る不動産取得税の税率は4%である。"], "answer": 1, "exp": "免税点(土地10万円、建築の家屋23万円、その他の家屋12万円)未満なら課税されないとする2が正しいです。1は課税標準は原則固定資産課税台帳の登録価格、3は合併は非課税、4は土地は用途を問わず3%のため誤りです。", "year": "R6-24", "diff": "A"}, {"id": "kako-zei-H27-24", "subject": "税その他", "topic": "固定資産税", "type": "select", "q": "固定資産税に関する次の記述のうち、正しいものはどれか。", "choices": ["平成27年1月15日に新築された家屋に対する平成27年度分の固定資産税は、新築住宅に係る特例措置により税額の2分の1が減額される。", "固定資産税の税率は、1.7%を超えることができない。", "区分所有家屋の土地に対して課される固定資産税は、各区分所有者が連帯して納税義務を負う。", "市町村は、財政上その他特別の必要がある場合を除き、当該市町村の区域内において同一の者が所有する土地に係る固定資産税の課税標準額が30万円未満の場合には課税できない。"], "answer": 3, "exp": "同一人が所有する土地の課税標準額が30万円未満(免税点未満)の場合は原則課税できません。よって4が正しいです。1は賦課期日は1月1日で27年度は課税対象外、2は標準税率1.4%で超過も可、3は持分に応じ按分して納税のため誤りです。", "year": "H27-24", "diff": "B"}, {"id": "kako-zei-H29-24", "subject": "税その他", "topic": "固定資産税", "type": "select", "q": "固定資産税に関する次の記述のうち、正しいものはどれか。", "choices": ["固定資産税は、固定資産が賃借されている場合、所有者ではなく当該固定資産の賃借人に対して課税される。", "家屋に対して課する固定資産税の納税者が、その納付すべき当該年度の固定資産税に係る家屋について家屋課税台帳等に登録された価格と当該家屋が所在する市町村内の他の家屋の価格とを比較することができるよう、当該納税者は、家屋価格等縦覧帳簿をいつでも縦覧することができる。", "固定資産税の納税者は、その納付すべき当該年度の固定資産課税に係る固定資産について、固定資産課税台帳に登録された価格について不服があるときは、一定の場合を除いて、文書をもって、固定資産評価審査委員会に審査の申出をすることができる。", "平成29年1月1日現在において更地であっても住宅の建設が予定されている土地においては、市町村長が固定資産課税台帳に当該土地の価格を登録した旨の公示をするまでに当該住宅の敷地の用に供された場合には、当該土地に係る平成29年度の固定資産税について、住宅用地に対する課税標準の特例が適用される。"], "answer": 2, "exp": "登録価格に不服があるときは文書で固定資産評価審査委員会に審査の申出ができるとする3が正しいです。1は所有者に課税、2は縦覧期間は限定、4は賦課期日1月1日に更地なら特例は適用されず誤りです。", "year": "H29-24", "diff": "A"}, {"id": "kako-zei-R1-24", "subject": "税その他", "topic": "固定資産税", "type": "select", "q": "固定資産税に関する次の記述のうち、地方税法の規定によれば、正しいものはどれか。", "choices": ["居住用超高層建築物(いわゆるタワーマンション)に対して課する固定資産税は、当該居住用超高層建築物に係る固定資産税額を、各専有部分の取引価格の当該居住用超高層建築物の全ての専有部分の取引価格の合計額に対する割合により按分した額を、各専有部分の所有者に対して課する。", "住宅用地のうち、小規模住宅用地に対して課する固定資産税の課税標準は、当該小規模住宅用地に係る固定資産税の課税標準となるべき価格の3分の1の額とされている。", "固定資産税の納期は、他の税目の納期と重複しないようにとの配慮から、4月、7月、12月、2月と定められており、市町村はこれと異なる納期を定めることはできない。", "固定資産税は、固定資産の所有者に対して課されるが、質権又は100年より永い存続期間の定めのある地上権が設定されている土地については、所有者ではなくその質権者又は地上権者が固定資産税の納税義務者となる。"], "answer": 3, "exp": "質権又は100年より永い地上権が設定された土地は、その質権者又は地上権者が納税義務者になるとする4が正しいです。1は階層別補正で按分、2は小規模住宅用地は6分の1、3は特別の事情があれば異なる納期も可で誤りです。", "year": "R1-24", "diff": "B"}, {"id": "kako-zei-R2-12-24", "subject": "税その他", "topic": "固定資産税", "type": "select", "q": "固定資産税に関する次の記述のうち、正しいものはどれか。", "choices": ["固定資産税を既に全納した者が、年度の途中において土地の譲渡を行った場合には、その譲渡後の月数に応じて税額の還付を受けることができる。", "固定資産税の税率は、1.7%を超えることができない。", "固定資産税の納期は、4月、7月、12月及び2月中において、当該市町村の条例で定めることとされているが、特別の事情がある場合においては、これと異なる納期を定めることができる。", "200m2以下の住宅用地に対して課する固定資産税の課税標準は、課税標準となるべき価格の2分の1の額とする特例措置が講じられている。"], "answer": 2, "exp": "納期は原則4月・7月・12月・2月だが、特別の事情があれば異なる納期も定められるとする3が正しいです。1は1月1日の所有者が全額負担で還付なし、2は1.7%超も手続を経て可能、4は小規模住宅用地は6分の1のため誤りです。", "year": "R2-12月-24", "diff": "A"}, {"id": "kako-zei-R3-12-24", "subject": "税その他", "topic": "固定資産税", "type": "select", "q": "固定資産税に関する次の記述のうち、正しいものはどれか。", "choices": ["市町村長は、固定資産課税台帳に登録された価格等に重大な錯誤があることを発見した場合においては、直ちに決定された価格等を修正して、これを固定資産課税台帳に登録しなければならない。", "固定資産税の納税義務者は、その納付すべき当該年度の固定資産課税に係る固定資産について、固定資産課税台帳に登録された価格について不服があるときは、公示の日から納税通知書の交付を受けた日後1月を経過するまでの間において、文書をもって、固定資産評価審査委員会に審査の申出をすることができる。", "年度の途中において家屋の売買が行われた場合、売主と買主は、当該年度の固定資産税を、固定資産課税台帳に所有者として登録されている日数で按分して納付しなければならない。", "住宅用地のうち小規模住宅用地に対して課する固定資産税の課税標準は、当該小規模住宅用地に係る固定資産税の課税標準となるべき価格の3分の1の額である。"],
