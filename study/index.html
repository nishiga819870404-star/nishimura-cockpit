"answer": 0, "exp": "登録価格等に重大な錯誤を発見したときは直ちに修正して登録すべきとする1が正しいです。2は申出は交付日後3か月まで、3は1月1日の所有者が全額納付、4は小規模住宅用地は6分の1のため誤りです。", "year": "R3-12月-24", "diff": "C"}, {"id": "kako-zei-R4-24", "subject": "税その他", "topic": "固定資産税", "type": "select", "q": "固定資産税に関する次の記述のうち、正しいものはどれか。", "choices": ["固定資産税の徴収については、特別徴収の方法によらなければならない。", "土地価格等縦覧帳簿及び家屋価格等縦覧帳簿の縦覧期間は、毎年4月1日から、4月20日又は当該年度の最初の納期限の日のいずれか遅い日以後の日までの間である。", "固定資産税の賦課期日は、市町村の条例で定めることとされている。", "固定資産税は、固定資産の所有者に課するのが原則であるが、固定資産が賃借されている場合は、当該固定資産の賃借権者に対して課される。"], "answer": 1, "exp": "縦覧帳簿の縦覧期間を述べた2が正しいです。1は普通徴収、3は賦課期日は1月1日で条例で定めるものでない、4は所有者に課税で賃借人ではないため誤りです。", "year": "R4-24", "diff": "B"}, {"id": "kako-zei-R1-23", "subject": "税その他", "topic": "所得税", "type": "select", "q": "個人が令和元年(平成31年)中に平成31年1月1日において所有期間が10年を超える居住用財産を譲渡した場合のその譲渡に係る譲渡所得の課税に関する次の記述のうち、誤っているものはどれか。", "choices": ["その譲渡について収用交換等の場合の譲渡所得等の5,000万円特別控除の適用を受ける場合であっても、その特別控除後の譲渡益について、居住用財産を譲渡した場合の軽減税率の特例の適用を受けることができる。", "居住用財産を譲渡した場合の軽減税率の特例は、その個人が平成29年において既にその特例の適用を受けている場合であっても、令和元年(平成31年)中の譲渡による譲渡益について適用を受けることができる。", "居住用財産の譲渡所得の3,000万円特別控除は、その個人がその個人と生計を一にしていない孫に譲渡した場合には、適用を受けることができない。", "その譲渡について収用等に伴い代替資産を取得した場合の課税の特例の適用を受ける場合には、その譲渡があったものとされる部分の譲渡益について、居住用財産を譲渡した場合の軽減税率の特例の適用を受けることができない。"], "answer": 1, "exp": "居住用財産の軽減税率の特例は前年・前々年に適用を受けていると使えず、平成29年に適用済みなら令和元年は使えません。よって2が誤りです。", "year": "R1-23", "diff": "C"}, {"id": "kako-zei-R6-23", "subject": "税その他", "topic": "所得税", "type": "select", "q": "住宅借入金等を有する場合の所得税額の特別控除(住宅ローン控除)に関する次の記述のうち、正しいものはどれか。なお、以下の居住用家屋は、令和5年に建築確認を受けたものとする。", "choices": ["令和6年中に居住用家屋を居住の用に供した場合において、その前年において居住用財産を譲渡した場合の軽減税率の特例の適用を受けているときであっても、令和6年分以後の所得税について住宅ローン控除の適用を受けることができる。", "令和6年中に居住用家屋を居住の用に供した場合において、その前年において居住用財産の買換え等の場合の譲渡損失の損益通算の適用を受けているときであっても、令和6年分以後の所得税について住宅ローン控除の適用を受けることができる。", "令和5年中に居住用家屋の敷地の用に供するための土地を取得した場合において、令和6年中に居住用家屋を新築して居住の用に供したときは、令和5年分の所得税について住宅ローン控除の適用を受けることができる。", "令和6年中に居住用家屋を居住の用に供した場合において、その居住用家屋の取得に係る住宅借入金等の償還期間等が契約において3年とされているときは、令和6年以後3年間の所得税について住宅ローン控除の適用を受けることができる。"], "answer": 1, "exp": "居住用財産の買換え等の譲渡損失の損益通算を受けていても住宅ローン控除は併用できるとする2が正しいです。1は軽減税率と併用不可、3は居住前の年は適用不可、4は償還期間10年以上が要件のため誤りです。", "year": "R6-23", "diff": "C"}, {"id": "kako-zei-H30-23", "subject": "税その他", "topic": "登録免許税", "type": "select", "q": "住宅用家屋の所有権の移転登記に係る登録免許税の税率の軽減措置に関する次の記述のうち、正しいものはどれか。", "choices": ["個人が他の個人と共有で住宅用の家屋を購入した場合、当該個人は、その住宅用の家屋の所有権の移転登記について、床面積に自己が有する共有持分の割合を乗じたものが50m2以上でなければ、この税率の軽減措置の適用を受けることができない。", "この税率の軽減措置は、登記の対象となる住宅用の家屋の取得原因を限定しており、交換を原因として取得した住宅用の家屋について受ける所有権の移転登記には適用されない。", "所有権の移転登記に係る住宅用の家屋が一定の耐震基準に適合していないときは、この税率の軽減措置の適用を受けることができない。", "この税率の軽減措置の適用を受けるためには、登記の申請書に、その家屋が一定の要件を満たす住宅用の家屋であることについての税務署長の証明書を添付しなければならない。"], "answer": 1, "exp": "軽減措置は取得原因が売買又は競落の場合に限られ、交換による取得には適用されません。よって2が正しいです。1は家屋全体の床面積で判定、3は昭和57年以降建築なら適用可、4は市区町村長等の証明書が必要のため誤りです。", "year": "H30-23", "diff": "B"}, {"id": "kako-zei-R2-12-23", "subject": "税その他", "topic": "登録免許税", "type": "select", "q": "住宅用家屋の所有権の移転登記に係る登録免許税の税率の軽減措置に関する次の記述のうち、正しいものはどれか。", "choices": ["この税率の軽減措置の適用を受けるためには、やむを得ない事情がある場合を除き、その住宅用家屋の取得後1年以内に所有権の移転登記を受けなければならない。", "この税率の軽減措置は、住宅用家屋を相続により取得した場合に受ける所有権の移転登記についても適用される。", "この税率の軽減措置に係る登録免許税の課税標準となる不動産の価額は、売買契約書に記載されたその住宅用家屋の実際の取引価格である。", "過去にこの税率の軽減措置の適用を受けたことがある者は、再度この措置の適用を受けることはできない。"], "answer": 0, "exp": "軽減措置は取得後1年以内に移転登記を受けることが要件とされるため1が正しいです。2は相続には適用不可、3は課税標準は固定資産課税台帳の登録価格、4は再度の適用も可能で誤りです。", "year": "R2-12月-23", "diff": "A"}, {"id": "kako-zei-R3-12-23", "subject": "税その他", "topic": "登録免許税", "type": "select", "q": "住宅用家屋の所有権の移転登記に係る登録免許税の税率の軽減措置に関する次の記述のうち、正しいものはどれか。", "choices": ["この税率の軽減措置の適用対象となる住宅用家屋は、床面積が100m2以上で、その住宅用家屋を取得した個人の居住の用に供されるものに限られる。", "この税率の軽減措置の適用対象となる住宅用家屋は、売買又は競落により取得したものに限られる。", "この税率の軽減措置は、一定の要件を満たせばその住宅用家屋の敷地の用に供されている土地の所有権の移転登記についても適用される。", "この税率の軽減措置の適用を受けるためには、登記の申請書に、一定の要件を満たす住宅用家屋であることの都道府県知事の証明書を添付しなければならない。"], "answer": 1, "exp": "移転登記の軽減措置は取得原因が売買又は競落の場合に限られるとする2が正しいです。1は床面積50m2以上、3は土地には適用されない、4は市区町村長の証明書が必要のため誤りです。", "year": "R3-12月-23", "diff": "C"}, {"id": "kako-zei-H28-23", "subject": "税その他", "topic": "印紙税", "type": "select", "q": "印紙税に関する次の記述のうち、正しいものはどれか。", "choices": ["印紙税の課税文書である不動産譲渡契約書を作成したが、印紙税を納付せず、その事実が税務調査により判明した場合は、納付しなかった印紙税額と納付しなかった印紙税額の10%に相当する金額の合計額が過怠税として徴収される。", "「Aの所有する甲土地(価額3,000万円)とBの所有する乙土地(価額3,500万円)を交換する」旨の土地交換契約書を作成した場合、印紙税の課税標準となる当該契約書の記載金額は3,500万円である。", "「Aの所有する甲土地(価額3,000万円)をBに贈与する」旨の贈与契約書を作成した場合、印紙税の課税標準となる当該契約書の記載金額は、3,000万円である。", "売上代金に係る金銭の受取書(領収書)は記載された受取金額が3万円未満の場合、印紙税が課されないことから、不動産売買の仲介手数料として、現金49,500円(消費税及び地方消費税を含む。)を受け取り、それを受領した旨の領収書を作成した場合、受取金額に応じた印紙税が課される。"], "answer": 1, "exp": "交換契約書に双方の価額が記載されている場合は高い方の金額が記載金額となるため、3,500万円とする2が正しいです。1は過怠税は3倍、3は贈与は記載金額なしで200円、4は受取書は5万円未満なら非課税のため誤りです。", "year": "H28-23", "diff": "A"}, {"id": "kako-zei-R2-10-23", "subject": "税その他", "topic": "印紙税", "type": "select", "q": "印紙税に関する次の記述のうち、正しいものはどれか。", "choices": ["「建物の電気工事に係る請負代金は1,100万円(うち消費税額及び地方消費税額100万円)とする」旨を記載した工事請負契約書について、印紙税の課税標準となる当該契約書の記載金額は1,100万円である。", "「Aの所有する土地(価額5,000万円)とBの所有する土地(価額4,000万円)とを交換する」旨の土地交換契約書を作成した場合、印紙税の課税標準となる当該契約書の記載金額は4,000万円である。", "国を売主、株式会社Cを買主とする土地の売買契約において、共同で売買契約書を2通作成し、国とC社がそれぞれ1通ずつ保存することとした場合、C社が保存する契約書には印紙税は課されない。", "「契約期間は10年間、賃料は月額10万円、権利金の額は100万円とする」旨が記載された土地の賃貸借契約書は、記載金額1,300万円の土地の賃借権の設定に関する契約書として印紙税が課される。"], "answer": 2, "exp": "国等と国等以外の者が共同作成した文書は、国等以外の者が保存するものは国等が作成したものとみなされ非課税です。C社保存分を非課税とする3が正しいです。1は消費税を除く1,000万円、2は高い方の5,000万円、4は記載金額は権利金100万円のため誤りです。", "year": "R2-10月-23", "diff": "A"}, {"id": "kako-zei-R4-23", "subject": "税その他", "topic": "印紙税", "type": "select", "q": "印紙税に関する次の記述のうち、正しいものはどれか。なお、以下の覚書又は契約書はいずれも書面により作成されたものとする。", "choices": ["土地を8,000万円で譲渡することを証した覚書を売主Aと買主Bが作成した場合、本契約書を後日作成することを文書上で明らかにしていれば、当該覚書には印紙税が課されない。", "一の契約書に甲土地の譲渡契約(譲渡金額6,000万円)と、乙建物の譲渡契約(譲渡金額3,000万円)をそれぞれ区分して記載した場合、印紙税の課税標準となる当該契約書の記載金額は、6,000万円である。", "当初作成した土地の賃貸借契約書において「契約期間は5年とする」旨の記載がされていた契約期間を変更するために、「契約期間は10年とする」旨を記載した覚書を貸主Cと借主Dが作成した場合、当該覚書には印紙税が課される。", "駐車場経営者Eと車両所有者Fが、Fの所有する車両を駐車場としての設備のある土地の特定の区画に駐車させる旨の賃貸借契約書を作成した場合、土地の賃借権の設定に関する契約書として印紙税が課される。"], "answer": 2, "exp": "契約内容の変更を証する覚書は課税文書となるため、契約期間変更の覚書に課税されるとする3が正しいです。1は仮文書でも課税事項を証すれば課税、2は同種契約なので合算9,000万円、4は駐車場施設の賃貸借で土地の賃借権に当たらず誤りです。", "year": "R4-23", "diff": "C"}, {"id": "kako-zei-R5-23", "subject": "税その他", "topic": "印紙税", "type": "select", "q": "印紙税に関する次の記述のうち、正しいものはどれか。なお、以下の契約書はいずれも書面により作成されたものとする。", "choices": ["売主Aと買主Bが土地の譲渡契約書を3通作成し、A、B及び仲介人Cがそれぞれ1通ずつ保存する場合、当該契約書3通には印紙税が課される。", "一の契約書に土地の譲渡契約(譲渡金額5,000万円)と建物の建築請負契約(請負金額6,000万円)をそれぞれ区分して記載した場合、印紙税の課税標準となる当該契約書の記載金額は1億1,000万円である。", "「Dの所有する甲土地(時価2,000万円)をEに贈与する」旨を記載した贈与契約書を作成した場合、印紙税の課税標準となる当該契約書の記載金額は、2,000万円である。", "当初作成の「土地を1億円で譲渡する」旨を記載した土地譲渡契約書の契約金額を変更するために作成する契約書で、「当初の契約書の契約金額を1,000万円減額し、9,000万円とする」旨を記載した変更契約書について、印紙税の課税標準となる当該変更契約書の記載金額は、1,000万円である。"], "answer": 0, "exp": "同一内容の課税文書が複数作成されればそのすべてに印紙税が課されるため、3通に課税されるとする1が正しいです。2は異種契約で高い方の6,000万円、3は贈与は記載金額なし、4は減額の変更契約書は記載金額なしのため誤りです。", "year": "R5-23", "diff": "B"}, {"id": "kako-ken-H28-2", "subject": "権利関係", "topic": "制限行為能力", "type": "select", "q": "制限行為能力者に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["古着の仕入販売に関する営業を許された未成年者は、成年者と同一の行為能力を有するの で、法定代理人の同意を得ないで、自己が居住するために建物を第三者から購入したとし ても、その法定代理人は当該売買契約を取り消すことができない。", "被保佐人が、不動産を売却する場合には、保佐人の同意が必要であるが、贈与の申し出を 拒絶する場合には、保佐人の同意は不要である。", "成年後見人が、成年被後見人に代わって、成年被後見人が居住している建物を売却する 際、後見監督人がいる場合には、後見監督人の許可があれば足り、家庭裁判所の許可は不 要である。", "被補助人が、補助人の同意を得なければならない行為について、同意を得ていないにもか かわらず、詐術を用いて相手方に補助人の同意を得たと信じさせていたときは、被補助人 は当該行為を取り消すことができない。"], "answer": 3, "exp": "制限行為能力者が詐術を用いて相手方に行為能力者であると信じさせたときは、その行為を取り消せません（民法21条）。判例上、補助人の同意を得たと詐術で信じさせた場合も同様に取消し不可とされ、肢4が正しい。ひっかけは肢1で、営業を許された未成年者でも、許可範囲外である自己の居住用建物の購入は法定代理人が取り消せる点に注意。", "year": "H28-2", "diff": "B"}, {"id": "kako-ken-R3-10月-5", "subject": "権利関係", "topic": "制限行為能力", "type": "select", "q": "次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。（改題）", "choices": ["18 歳の者は未成年であるので、携帯電話サービスの契約や不動産の賃貸借契約を 1 人で 締結することができない。", "養育費は、子供が未成熟であって経済的に自立することを期待することができない期間を 対象として支払われるものであるから、子供が成年に達したときは、当然に養育費の支払 義務が終了する。", "営業を許された未成年者が、その営業に関するか否かにかかわらず、第三者から法定代理 人の同意なく負担付贈与を受けた場合には、法定代理人は当該行為を取り消すことができ ない。", "意思能力を有しないときに行った不動産の売買契約は、後見開始の審判を受けているか否 かにかかわらず効力を有しない。"], "answer": 3, "exp": "意思能力を有しない者がした法律行為は無効であり（民法3条の2）、後見開始の審判を受けているかどうかは関係ありません。よって肢4が正しい。肢1は18歳が成年で単独契約できる点、肢3は「営業に関するか否かにかかわらず」が誤りで、営業に関しない贈与なら法定代理人が取り消せる点がひっかけ。", "year": "R3-10月-5", "diff": "B"}, {"id": "kako-ken-R3-12月-3", "subject": "権利関係", "topic": "制限行為能力", "type": "select", "q": "成年後見人が、成年被後見人を代理して行う次に掲げる法律行為のうち、民法の規定によれば、家庭裁判所の許可を得なければ代理して行うことができないものはどれか。", "choices": ["成年被後見人が所有する乗用車の第三者への売却", "成年被後見人が所有する成年被後見人の居住の用に供する建物への第三者の抵当権の設定", "成年被後見人が所有するオフィスビルへの第三者の抵当権の設定", "成年被後見人が所有する倉庫についての第三者との賃貸借契約の解除"], "answer": 1, "exp": "成年後見人が成年被後見人の居住用建物やその敷地について売却・賃貸・抵当権設定などをするには家庭裁判所の許可が必要です（民法859条の3）。許可が要るのは居住用不動産の処分に限られるので、肢2の居住用建物への抵当権設定が該当。乗用車・オフィスビル・倉庫は居住用ではないため許可不要である点がポイント。", "year": "R3-12月-3", "diff": "B"}, {"id": "kako-ken-R4-3", "subject": "権利関係", "topic": "制限行為能力", "type": "select", "q": "制限行為能力者に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["成年後見人は、後見監督人がいる場合には、後見監督人の同意を得なければ、成年被後見 人の法律行為を取り消すことができない。", "相続の放棄は相手方のない単独行為であるから、成年後見人が成年被後見人に代わってこ れを行っても、利益相反行為となることはない。", "成年後見人は成年被後見人の法定代理人である一方、保佐人は被保佐人の行為に対する同 意権と取消権を有するが、代理権が付与されることはない。", "令和 4 年 4 月 1 日からは、成年年齢が 18 歳となったため、18 歳の者は、年齢を理由とす る後見人の欠格事由に該当しない。"], "answer": 3, "exp": "令和4年から成年年齢が18歳となり、18歳の者は成年なので年齢を理由とする後見人の欠格事由に当たらず、肢4が正しい。ひっかけとして、肢1は後見監督人の同意なしでも取消し可、肢2は相続放棄でも利益相反になりうる、肢3は保佐人も審判で代理権を付与されうる点を押さえておく。", "year": "R4-3", "diff": "C"}, {"id": "kako-ken-R5-8", "subject": "権利関係", "topic": "制限行為能力", "type": "select", "q": "未成年者Ａが、法定代理人Ｂの同意を得ずに、Ｃから甲建物を買い受ける契約（以下この問において「本件売買契約」という。）を締結した場合における次の記述のうち、民法の規定によれば、正しいものはどれか。なお、Ａに処分を許された財産はなく、Ａは、営業を許されてはいないものとする。", "choices": ["ＡがＢの同意を得ずに制限行為能力を理由として本件売買契約を取り消した場合、Ｂは、 自己が本件売買契約の取消しに同意していないことを理由に、Ａの当該取消しの意思表示 を取り消すことができる。", "本件売買契約締結時にＡが未成年者であることにつきＣが善意無過失であった場合、Ｂ は、Ａの制限行為能力を理由として、本件売買契約を取り消すことはできない。", "本件売買契約につき、取消しがなされないままＡが成年に達した場合、本件売買契約につ いてＢが反対していたとしても、自らが取消権を有すると知ったＡは、本件売買契約を追 認することができ、追認後は本件売買契約を取り消すことはできなくなる。", "本件売買契約につき、Ｂが追認しないまま、Ａが成年に達する前にＢの同意を得ずに甲建 物をＤに売却した場合、ＢがＤへの売却について追認していないときでも、Ａは制限行為 能力を理由として、本件売買契約を取り消すことはできなくなる。"], "answer": 2, "exp": "未成年者が成年に達し、取消権があると知ったうえで追認すれば、以後は取り消せなくなります（民法124条・122条）。よって法定代理人が反対でも追認は有効で、肢3が正しい。肢1は本人も単独で取消しできる、肢2は相手方が善意無過失でも取消しできる、肢4は追認できる時より前の処分は法定追認にならず取消し可、という点がひっかけ。", "year": "R5-8", "diff": "A"}, {"id": "kako-ken-H27-2", "subject": "権利関係", "topic": "意思表示", "type": "select", "q": "Ａは、その所有する甲土地を譲渡する意思がないのに、Ｂと通謀して、Ａを売主、Ｂを買主とする甲土地の仮装の売買契約を締結した。この場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。なお、この問において「善意」又は「悪意」とは、虚偽表示の事実についての善意又は悪意とする。", "choices": ["善意のＣがＢから甲土地を買い受けた場合、Ｃがいまだ登記を備えていなくても、ＡはＡ Ｂ間の売買契約の無効をＣに主張することができない。", "善意のＣが、Ｂとの間で、Ｂが甲土地上に建てた乙建物の賃貸借契約（貸主Ｂ、借主Ｃ） を締結した場合、ＡはＡＢ間の売買契約の無効をＣに主張することができない。", "Ｂの債権者である善意のＣが、甲土地を差し押さえた場合、ＡはＡＢ間の売買契約の無効 をＣに主張することができない。", "甲土地がＢから悪意のＣへ、Ｃから善意のＤへと譲渡された場合、ＡはＡＢ間の売買契約 の無効をＤに主張することができない。"], "answer": 1, "exp": "誤りを選ぶ問題。虚偽表示の無効を対抗できない善意の第三者とは、その表示の目的について法律上利害関係を持つに至った者を指します。肢2のCは建物の賃貸借契約を結んだだけで売買契約とは無関係の者なので、AはCに無効を主張できます。よって「主張できない」とする肢2が誤り。第三者は善意なら登記がなくても保護される点も併せて確認。", "year": "H27-2", "diff": "C"}, {"id": "kako-ken-H30-1", "subject": "権利関係", "topic": "意思表示", "type": "select", "q": "ＡがＢに甲土地を売却した場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。（改題）", "choices": ["甲土地につき売買代金の支払と登記の移転がなされた後、第三者の詐欺を理由に売買契約 が取り消された場合、原状回復のため、ＢはＡに登記を移転する義務を、ＡはＢに代金を 返還する義務を負い、各義務は同時履行の関係となる。", "Ａが甲土地を売却した意思表示に錯誤があったとしても、Ａに重大な過失があって取消し を主張することができない場合は、ＢもＡの錯誤を理由として取消しを主張することはで きない。", "ＡＢ間の売買契約が仮装譲渡であり、その後ＢがＣに甲土地を転売した場合、Ｃが仮装譲 渡の事実を知らなければ、Ａは、Ｃに虚偽表示による無効を対抗することができない。", "Ａが第三者の詐欺によってＢに甲土地を売却し、その後ＢがＤに甲土地を転売した場合、 Ｂが第三者の詐欺の事実について善意無過失であったとしても、Ｄが第三者の詐欺の事実 を知っていれば、Ａは詐欺を理由にＡＢ間の売買契約を取り消すことができる。"], "answer": 3, "exp": "誤りを選ぶ問題。第三者による詐欺では、相手方Bがその事実を知りまたは知り得たときに限り取り消せます（民法96条2項）。肢4はBが善意無過失なので、たとえ転得者Dが悪意でもAは取り消せません。よって「取り消すことができる」とする肢4が誤り。判断基準はあくまで直接の相手方Bの善意悪意である点がポイント。", "year": "H30-1", "diff": "B"}, {"id": "kako-ken-R2-10月-6", "subject": "権利関係", "topic": "意思表示", "type": "select", "q": "ＡとＢとの間で令和 2 年 7 月 1 日に締結された売買契約に関する次の記述のうち、民法の規定によれば、売買契約締結後、ＡがＢに対し、錯誤による取消しができるものはどれか。", "choices": ["Ａは、自己所有の自動車を 100 万円で売却するつもりであったが、重大な過失によりＢに 対し「10 万円で売却する」と言ってしまい、Ｂが過失なく「Ａは本当に 10 万円で売るつ もりだ」と信じて購入を申し込み、ＡＢ間に売買契約が成立した場合 つぼ", "Ａは、自己所有の時価 100 万円の壺 を 10 万円程度であると思い込み、Ｂに対し「手元にお 金がないので、10 万円で売却したい」と言ったところ、ＢはＡの言葉を信じ「それなら 10 万円で購入する」と言って、ＡＢ間に売買契約が成立した場合 がんさく がんさく", "Ａは、自己所有の時価 100 万円の名匠の絵画を贋 作だと思い込み、Ｂに対し「贋 作である がんさく がんさく ので、10 万円で売却する」と言ったところ、Ｂも同様に贋 作だと思い込み「贋 作なら 10 万円で購入する」と言って、ＡＢ間に売買契約が成立した場合", "Ａは、自己所有の腕時計を 100 万円で外国人Ｂに売却する際、当日の正しい為替レート（ 1 ドル 100 円）を重大な過失により 1 ドル 125 円で計算して「8 ,000 ドルで売却する」と言っ てしまい、Ａの錯誤について過失なく知らなかったＢが「8 ,000 ドルなら買いたい」と言っ て、ＡＢ間に売買契約が成立した場合"], "answer": 2, "exp": "錯誤取消しができるものを選ぶ問題。動機（法律行為の基礎事情）の錯誤は、その事情が法律行為の基礎とされていると表示されていた場合に限り取り消せます（民法95条2項）。肢3はAが「贋作である」と表示しているため取消し可能。肢2は動機を表示しておらず不可、肢1・肢4は表意者に重大な過失があり取り消せない点がひっかけ。", "year": "R2-10月-6", "diff": "B"}, {"id": "kako-ken-R6-1", "subject": "権利関係", "topic": "意思表示", "type": "select", "q": "法律行為に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["営業を許された未成年者が、その営業に関する意思表示をした時に意思能力を有しなかっ た場合は、その法律行為は無効である。", "公の秩序に反する法律行為であっても、当事者が納得して合意した場合には、その法律行 為は有効である。", "詐欺による意思表示は取り消すことによって初めから無効であったとみなされるのに対 し、強迫による意思表示は取り消すまでもなく無効である。", "他人が所有している土地を目的物にした売買契約は無効であるが、当該他人がその売買契 約を追認した場合にはその売買契約は有効となる。"], "answer": 0, "exp": "正しいものを選ぶ問題。営業を許された未成年者でも、意思能力を欠く状態でした行為は無効です（民法3条の2）。よって肢1が正しい。肢2の公序良俗違反は合意があっても無効、肢3の強迫も取消しによって無効となるだけで当然無効ではない、肢4の他人物売買は追認がなくても有効、という点がそれぞれ誤り。", "year": "R6-1", "diff": "B"}, {"id": "kako-ken-H29-1", "subject": "権利関係", "topic": "代理", "type": "select", "q": "代理に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["売買契約を締結する権限を与えられた代理人は、特段の事情がない限り、相手方からその 売買契約を取り消す旨の意思表示を受領する権限を有する。", "委任による代理人は、本人の許諾を得たときのほか、やむを得ない事由があるときにも、 復代理人を選任することができる。", "復代理人が委任事務を処理するに当たり金銭を受領し、これを代理人に引き渡したとき は、特段の事情がない限り、代理人に対する受領物引渡義務は消滅するが、本人に対する 受領物引渡義務は消滅しない。", "夫婦の一方は、個別に代理権の授権がなくとも、日常家事に関する事項について、他の一 方を代理して法律行為をすることができる。"], "answer": 2, "exp": "誤りを選ぶ問題。判例上、復代理人が受領した金銭を代理人に引き渡せば、代理人への引渡義務だけでなく本人への引渡義務も消滅します。よって「本人に対する引渡義務は消滅しない」とする肢3が誤り。肢2の復代理人選任要件（本人の許諾かやむを得ない事由）や肢4の日常家事代理は正しい記述。", "year": "H29-1", "diff": "C"}, {"id": "kako-ken-H30-2", "subject": "権利関係", "topic": "代理", "type": "select", "q": "Ａが、所有する甲土地の売却に関する代理権をＢに授与し、ＢがＣとの間で、Ａを売主、Ｃを買主とする甲土地の売買契約（以下この問において「本件契約」という。）を締結した場合における次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["Ｂが売買代金を着服する意図で本件契約を締結し、Ｃが本件契約の締結時点でこのことを 知っていた場合であっても、本件契約の効果はＡに帰属する。", "ＡがＢに代理権を授与するより前にＢが補助開始の審判を受けていた場合、Ｂは有効に代 理権を取得することができない。", "ＢがＣの代理人にもなって本件契約を成立させた場合、Ａの許諾の有無にかかわらず、本 件契約は無効となる。", "ＡがＢに代理権を授与した後にＢが後見開始の審判を受け、その後に本件契約が締結され た場合、Ｂによる本件契約の締結は無権代理行為となる。"], "answer": 3, "exp": "正しいものを選ぶ問題。代理権授与後に代理人が後見開始の審判を受けると代理権は消滅し（民法111条1項）、その後の契約は無権代理となるため肢4が正しい。肢1は相手方が悪意なら効果は本人に帰属しない、肢2は代理人は行為能力者でなくてよい、肢3は双方代理も本人の許諾があれば有効、という点がひっかけ。", "year": "H30-2", "diff": "B"}, {"id": "kako-ken-R1-5", "subject": "権利関係", "topic": "代理", "type": "select", "q": "次の 1 から 4 までの記述のうち、民法の規定及び判例並びに下記判決文によれば、誤っているものはどれか。（判決文）本人が無権代理行為の追認を拒絶した場合には、その後に無権代理人が本人を相続したとしても、無権代理行為が有効になるものではないと解するのが相当である。けだし、無権代理人がした行為は、本人がその追認をしなければ本人に対してその効力を生ぜず（民法 113 条 1 項）、本人が追認を拒絶すれば無権代理行為の効力が本人に及ばないことが確定し、追認拒絶の後は本人であっても追認によって無権代理行為を有効とすることができず、右追認拒絶の後に無権代理人が本人を相続したとしても、右追認拒絶の効果に何ら影響を及ぼすものではないからである。", "choices": ["本人が無権代理行為の追認を拒絶した場合、その後は本人であっても無権代理行為を追認 して有効な行為とすることはできない。", "本人が追認拒絶をした後に無権代理人が本人を相続した場合と、本人が追認拒絶をする前 に無権代理人が本人を相続した場合とで、法律効果は同じである。", "無権代理行為の追認は、別段の意思表示がないときは、契約の時にさかのぼってその効力 を生ずる。ただし、第三者の権利を害することはできない。", "本人が無権代理人を相続した場合、当該無権代理行為は、その相続により当然には有効と ならない。"], "answer": 1, "exp": "誤りを選ぶ問題。判決文は本人が追認拒絶した「後」に無権代理人が相続しても有効にならないと述べるだけです。追認拒絶「前」に無権代理人が本人を相続した場合は無権代理行為が有効になり、両者で法律効果が異なります。よって「同じ」とする肢2が誤り。", "year": "R1-5", "diff": "B"}, {"id": "kako-ken-R2-12月-2", "subject": "権利関係", "topic": "代理", "type": "select", "q": "ＡがＢに対して、Ａ所有の甲土地を売却する代理権を令和 2 年 7 月 1 日に授与した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["Ｂが自己又は第三者の利益を図る目的で、Ａの代理人として甲土地をＤに売却した場合、 Ｄがその目的を知り、又は知ることができたときは、Ｂの代理行為は無権代理とみなされ る。", "ＢがＣの代理人も引き受け、ＡＣ双方の代理人として甲土地に係るＡＣ間の売買契約を締 結した場合、Ａに損害が発生しなければ、Ｂの代理行為は無権代理とはみなされない。", "ＡがＢに授与した代理権が消滅した後、ＢがＡの代理人と称して、甲土地をＥに売却した 場合、ＡがＥに対して甲土地を引き渡す責任を負うことはない。", "Ｂが、Ａから代理権を授与されていないＡ所有の乙土地の売却につき、Ａの代理人として Ｆと売買契約を締結した場合、ＡがＦに対して追認の意思表示をすれば、Ｂの代理行為は 追認の時からＡに対して効力を生ずる。"], "answer": 0, "exp": "正しいものを選ぶ問題。代理人が自己または第三者の利益を図る目的で代理行為をし、相手方がその目的を知りまたは知り得たときは無権代理とみなされます（民法107条）。よって肢1が正しい。肢2の双方代理は損害の有無を問わず無権代理、肢3は代理権消滅後の表見代理で本人が責任を負う場合がある、肢4の追認は契約時に遡って効力を生じる、という点が誤り。", "year": "R2-12月-2", "diff": "B"}, {"id": "kako-ken-R3-12月-5", "subject": "権利関係", "topic": "代理", "type": "select", "q": "ＡがＢの代理人として行った行為に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、いずれの行為もＢの追認はないものとし、令和 3 年 7 月 1 日以降になされたものとする。", "choices": ["ＡがＢの代理人として第三者の利益を図る目的で代理権の範囲内の行為をした場合、相手 方Ｃがその目的を知っていたとしても、ＡＣ間の法律行為の効果はＢに帰属する。", "ＢがＡに代理権を与えていないにもかかわらず代理権を与えた旨をＣに表示し、Ａが当該 代理権の範囲内の行為をした場合、ＣがＡに代理権がないことを知っていたとしても、Ｂ はその責任を負わなければならない。", "ＡがＢから何ら代理権を与えられていないにもかかわらずＢの代理人と詐称してＣとの間 で法律行為をし、ＣがＡにＢの代理権があると信じた場合であっても、原則としてその法 律行為の効果はＢに帰属しない。", "ＢがＡに与えた代理権が消滅した後にＡが行った代理権の範囲内の行為について、相手方 Ｃが過失によって代理権消滅の事実を知らなかった場合でも、Ｂはその責任を負わなけれ ばならない。 4 手 付 Q 4-0 該当過去問なし"], "answer": 2, "exp": "正しいものを選ぶ問題。本人に何ら帰責性のない無権代理（勝手に代理人と詐称）では、相手方が代理権を信じたか否かにかかわらず、その効果は本人に帰属しません。よって肢3が正しい。肢1は相手方が悪意なら帰属しない、肢2はCが悪意なので表見代理不成立、肢4はCが有過失なので本人は責任を負わない点がひっかけ。", "year": "R3-12月-5", "diff": "C"}, {"id": "kako-ken-H27-6", "subject": "権利関係", "topic": "抵当権", "type": "select", "q": "抵当権に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["賃借地上の建物が抵当権の目的となっているときは、一定の場合を除き、敷地の賃借権に も抵当権の効力が及ぶ。", "抵当不動産の被担保債権の主債務者は、抵当権消滅請求をすることはできないが、その債 務について連帯保証をした者は、抵当権消滅請求をすることができる。", "抵当不動産を買い受けた第三者が、抵当権者の請求に応じてその代価を抵当権者に弁済し たときは、抵当権はその第三者のために消滅する。", "土地に抵当権が設定された後に抵当地に建物が築造されたときは、一定の場合を除き、抵 当権者は土地とともに建物を競売することができるが、その優先権は土地の代価について のみ行使することができる。"], "answer": 1, "exp": "誤りを選ぶ問題。抵当権消滅請求ができるのは抵当不動産の第三取得者であり、主たる債務者・保証人およびその承継人はできません（民法380条）。連帯保証人も保証人なので請求できず、「連帯保証人ができる」とする肢2が誤り。本来弁済すべき立場の者には認められないと押さえる。", "year": "H27-6", "diff": "B"}, {"id": "kako-ken-H27-7", "subject": "権利関係", "topic": "抵当権", "type": "select", "q": "債務者Ａが所有する甲土地には、債権者Ｂが一番抵当権（債権額 2 ,000 万円）、債権者Ｃが二番抵当権（債権額 2 ,400 万円）、債権者Ｄが三番抵当権（債権額 4 ,000 万円）をそれぞれ有しており、Ａにはその他に担保権を有しない債権者Ｅ（債権額 2 ,000 万円）がいる。甲土地の競売に基づく売却代金 5 ,400 万円を配当する場合に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["ＢがＥの利益のため、抵当権を譲渡した場合、Ｂの受ける配当は 0 円である。", "ＢがＤの利益のため、抵当権の順位を譲渡した場合、Ｂの受ける配当は 800 万円である。", "ＢがＥの利益のため、抵当権を放棄した場合、Ｂの受ける配当は 1 ,000 万円である。", "ＢがＤの利益のため、抵当権の順位を放棄した場合、Ｂの受ける配当は 1,000 万円である。"], "answer": 1, "exp": "誤りを選ぶ計算問題。抵当権の順位の譲渡では、譲渡人Bと譲受人Dの本来の配当額の合計（2000万＋1000万＝3000万）をまずDに割り振ります。Dの債権額4000万に対し3000万全額がDに行き、Bの配当は0円です。よって「Bは800万」とする肢2が誤り。順位の譲渡は当事者間の合計を優先者に先取りさせる点がポイント。", "year": "H27-7", "diff": "C"}, {"id": "kako-ken-H28-4", "subject": "権利関係", "topic": "抵当権", "type": "select", "q": "Ａは、Ａ所有の甲土地にＢから借り入れた 3 ,000 万円の担保として抵当権を設定した。この場合における次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Ａが甲土地に抵当権を設定した当時、甲土地上にＡ所有の建物があり、当該建物をＡがＣ に売却した後、Ｂの抵当権が実行されてＤが甲土地を競落した場合、ＤはＣに対して、甲 土地の明渡しを求めることはできない。", "甲土地上の建物が火災によって焼失してしまったが、当該建物に火災保険が付されていた 場合、Ｂは、甲土地の抵当権に基づき、この火災保険契約に基づく損害保険金を請求する ことができる。", "ＡがＥから 500 万円を借り入れ、これを担保するために甲土地にＥを抵当権者とする第 2 順位の抵当権を設定した場合、ＢとＥが抵当権の順位を変更することに合意すれば、Ａの 同意がなくても、甲土地の抵当権の順位を変更することができる。", "Ｂの抵当権設定後、Ａが第三者であるＦに甲土地を売却した場合、ＦはＢに対して、民法 第 383 条所定の書面を送付して抵当権の消滅を請求することができる。"], "answer": 1, "exp": "誤りを選ぶ問題。抵当権は甲土地に設定されており、土地上の建物には及びません。したがって建物が焼失しても、その火災保険金にBは物上代位できず、「請求できる」とする肢2が誤り。肢3の順位変更に債務者Aの同意が不要である点も併せて確認しておく。", "year": "H28-4", "diff": "C"}, {"id": "kako-ken-H29-10", "subject": "権利関係", "topic": "抵当権", "type": "select", "q": "①不動産質権と②抵当権に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["①では、被担保債権の利息のうち、満期となった最後の 2 年分についてのみ担保される が、②では、設定行為に別段の定めがない限り、被担保債権の利息は担保されない。", "①は、10 年を超える存続期間を定めたときであっても、その期間は 10 年となるのに対し、 ②は、存続期間に関する制限はない。", "①は、目的物の引渡しが効力の発生要件であるのに対し、②は、目的物の引渡しは効力の 発生要件ではない。", "①も②も不動産に関する物権であり、登記を備えなければ第三者に対抗することができな い。"], "answer": 0, "exp": "誤りを選ぶ問題。不動産質権は原則として利息を請求できず（設定行為で別段の定めをすれば可）、抵当権は満期となった最後の2年分について優先弁済を受けられます。肢1はこの説明が逆になっており誤り。質権は引渡しが効力発生要件、抵当権は不要という違い（肢3）は正しい。", "year": "H29-10", "diff": "B"}, {"id": "kako-ken-H30-6", "subject": "権利関係", "topic": "抵当権", "type": "select", "q": "Ａが所有する甲土地上にＢが乙建物を建築して所有権を登記していたところ、ＡがＢから乙建物を買い取り、その後、Ａが甲土地にＣのために抵当権を設定し登記した。この場合の法定地上権に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Ａが乙建物の登記をＡ名義に移転する前に甲土地に抵当権を設定登記していた場合、甲土 地の抵当権が実行されたとしても、乙建物のために法定地上権は成立しない。", "Ａが乙建物を取り壊して更地にしてから甲土地に抵当権を設定登記し、その後にＡが甲土 地上に丙建物を建築していた場合、甲土地の抵当権が実行されたとしても、丙建物のため に法定地上権は成立しない。", "Ａが甲土地に抵当権を設定登記するのと同時に乙建物にもＣのために共同抵当権を設定登 記した後、乙建物を取り壊して丙建物を建築し、丙建物にＣのために抵当権を設定しない まま甲土地の抵当権が実行された場合、丙建物のために法定地上権は成立しない。", "Ａが甲土地に抵当権を設定登記した後、乙建物をＤに譲渡した場合、甲土地の抵当権が実 行されると、乙建物のために法定地上権が成立する。"], "answer": 0, "exp": "誤りを選ぶ問題。法定地上権は抵当権設定時に土地と建物が同一所有者に属していれば成立し、建物登記が所有者名義に移っている必要はありません（判例）。よって「成立しない」とする肢1が誤り。設定時に更地だった肢2や、建替え後の丙建物の肢3は成立しない点と区別する。", "year": "H30-6", "diff": "B"}, {"id": "kako-ken-R1-10", "subject": "権利関係", "topic": "抵当権", "type": "select", "q": "債務者Ａが所有する甲土地には、債権者Ｂが一番抵当権（債権額 2 ,000 万円）、債権者Ｃが二番抵当権（債権額 2 ,400 万円）、債権者Ｄが三番抵当権（債権額 3 ,000 万円）をそれぞれ有しているが、ＢはＤの利益のために抵当権の順位を譲渡した。甲土地の競売に基づく売却代金が 6 ,000 万円であった場合、Ｂの受ける配当額として、民法の規定によれば、正しいものはどれか。", "choices": ["600 万円", "1 ,000 万円", "1 ,440 万円", "1 ,600 万円"], "answer": 0, "exp": "正しい配当額を選ぶ計算問題。売却代金6000万円で本来の配当はB2000万・C2400万・D1600万。BがDに順位を譲渡すると、BとDの本来配当の合計3600万円をまずDに割り当て、D3000万を先取りし、残る600万円がBの配当となります。よって肢1の600万円が正しい。", "year": "R1-10", "diff": "C"}, {"id": "kako-ken-R3-12月-10", "subject": "権利関係", "topic": "抵当権", "type": "select", "q": "Ａは、Ｂからの借入金の担保として、Ａ所有の甲建物に第一順位の抵当権（以下この問において「本件抵当権」という。）を設定し、その登記を行った。ＡＣ間にＣを賃借人とする甲建物の一時使用目的ではない賃貸借契約がある場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。", "choices": ["本件抵当権設定登記後にＡＣ間の賃貸借契約が締結され、ＡのＢに対する借入金の返済が 債務不履行となった場合、Ｂは抵当権に基づき、ＡがＣに対して有している賃料債権を差 し押さえることができる。", "Ｃが本件抵当権設定登記より前に賃貸借契約に基づき甲建物の引渡しを受けていたとして も、ＡＣ間の賃貸借契約の期間を定めていない場合には、Ｃの賃借権は甲建物の競売によ る買受人に対抗することができない。", "本件抵当権設定登記後にＡＣ間で賃貸借契約を締結し、その後抵当権に基づく競売手続に よる買受けがなされた場合、買受けから賃貸借契約の期間満了までの期間が 1 年であった ときは、Ｃは甲建物の競売における買受人に対し、期間満了までは甲建物を引き渡す必要 はない。", "Ｃが本件抵当権設定登記より前に賃貸借契約に基づき甲建物の引渡しを受けていたとして も、Ｃは、甲建物の競売による買受人に対し、買受人の買受けの時から 1 年を経過した時 点で甲建物を買受人に引き渡さなければならない。"], "answer": 0, "exp": "正しいものを選ぶ問題。抵当権は被担保債権に不履行があった後は、抵当不動産から生じる賃料などの果実に及ぶため（民法371条）、Bは賃料債権を差し押さえられます。よって肢1が正しい。肢2は先に引渡しを受けた賃借人は対抗できる、肢3の明渡猶予は6か月（1年ではない）、肢4は先に引渡しを受けた賃借人は引き渡す必要がない点がひっかけ。", "year": "R3-12月-10", "diff": "B"}, {"id": "kako-ken-R4-4", "subject": "権利関係", "topic": "抵当権", "type": "select", "q": "Ａ所有の甲土地にＢのＣに対する債務を担保するためにＣの抵当権（以下この問において「本件抵当権」という。）が設定され、その旨の登記がなされた場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["Ａから甲土地を買い受けたＤが、Ｃの請求に応じてその代価を弁済したときは、本件抵当 権はＤのために消滅する。", "Ｃに対抗することができない賃貸借により甲土地を競売手続の開始前から使用するＥは、 甲土地の競売における買受人Ｆの買受けの時から 6 か月を経過するまでは、甲土地をＦに 引き渡すことを要しない。", "本件抵当権設定登記後に、甲土地上に乙建物が築造された場合、Ｃが本件抵当権の実行と して競売を申し立てるときには、甲土地とともに乙建物の競売も申し立てなければならな い。", "ＢがＡから甲土地を買い受けた場合、Ｂは抵当不動産の第三取得者として、本件抵当権に ついて、Ｃに対して抵当権消滅請求をすることができる。"], "answer": 0, "exp": "正しいものを選ぶ問題。第三取得者Dが抵当権者Cの請求に応じて代価を弁済すれば、抵当権はDのために消滅します（代価弁済、民法378条）。よって肢1が正しい。肢2の6か月の明渡猶予は建物のみで土地には適用されない、肢3の建物競売は任意、肢4は債務者Bは抵当権消滅請求できない点がそれぞれ誤り。", "year": "R4-4", "diff": "A"}, {"id": "kako-ken-R2-10月-7", "subject": "権利関係", "topic": "保証・連帯保証", "type": "select", "q": "保証に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。なお、保証契約は令和 2 年 4 月 1 日以降に締結されたものとする。", "choices": ["特定物売買における売主の保証人は、特に反対の意思表示がない限り、売主の債務不履行 により契約が解除された場合には、原状回復義務である既払代金の返還義務についても保 証する責任がある。", "主たる債務の目的が保証契約の締結後に加重されたときは、保証人の負担も加重され、主 たる債務者が時効の利益を放棄すれば、その効力は連帯保証人に及ぶ。", "委託を受けた保証人が主たる債務の弁済期前に債務の弁済をしたが、主たる債務者が当該 保証人からの求償に対して、当該弁済日以前に相殺の原因を有していたことを主張すると きは、保証人は、債権者に対し、その相殺によって消滅すべきであった債務の履行を請求 することができる。", "委託を受けた保証人は、履行の請求を受けた場合だけでなく、履行の請求を受けずに自発 的に債務の消滅行為をする場合であっても、あらかじめ主たる債務者に通知をしなけれ ば、同人に対する求償が制限されることがある。"], "answer": 1, "exp": "誤りを選ぶ問題。主たる債務の目的が保証契約後に加重されても保証人の負担は加重されず（民法448条2項）、また主債務者の時効利益の放棄は相対効なので連帯保証人には及びません。よって肢2が誤り。加重も時効利益の放棄も保証人に不利益を及ぼさないと押さえる。", "year": "R2-10月-7", "diff": "C"}, {"id": "kako-ken-H29-8", "subject": "権利関係", "topic": "連帯債務", "type": "select", "q": "Ａ、Ｂ、Ｃの 3 人がＤに対して 900 万円の連帯債務を負っている場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、Ａ、Ｂ、Ｃの負担部分は等しいものとする。（改題）", "choices": ["ＤがＡに対して履行の請求をした場合、Ｂ及びＣについても、その効力が生じる。", "Ａが、Ｄに対する債務と、Ｄに対して有する 200 万円の債権を対当額で相殺する旨の意思 表示をＤにした場合、Ｂ及びＣのＤに対する連帯債務も 200 万円が消滅する。", "Ｂのために時効が完成した場合、Ａ及びＣのＤに対する連帯債務も時効によって全部消滅 する。", "ＣがＤに対して 100 万円を弁済した場合は、Ｃの負担部分の範囲内であるから、Ｃは、Ａ 及びＢに対して求償することはできない。"], "answer": 1, "exp": "正しいものを選ぶ問題。連帯債務者の1人が自分の債権で相殺を援用すると、その額について全員の利益のため債務が消滅します（民法439条1項）。よってB・Cの債務も200万円消滅し肢2が正しい。肢1の履行請求と肢3の時効完成はいずれも相対効で他の債務者に影響せず、肢4は負担部分内の弁済でも他の連帯債務者に求償できる点がひっかけ。", "year": "H29-8", "diff": "B"}, {"id": "kako-ken-R3-10月-2", "subject": "権利関係", "topic": "連帯債務", "type": "select", "q": "債務者Ａ、Ｂ、Ｃの 3 名が、令和 3 年 7 月 1 日に、内部的な負担部分の割合は等しいものとして合意した上で、債権者Ｄに対して 300 万円の連帯債務を負った場合に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["ＤがＡに対して裁判上の請求を行ったとしても、特段の合意がなければ、ＢとＣがＤに対 して負う債務の消滅時効の完成には影響しない。", "ＢがＤに対して 300 万円の債権を有している場合、Ｂが相殺を援用しない間に 300 万円の 支払の請求を受けたＣは、ＢのＤに対する債権で相殺する旨の意思表示をすることができ る。", "ＤがＣに対して債務を免除した場合でも、特段の合意がなければ、ＤはＡに対してもＢに 対しても、弁済期が到来した 300 万円全額の支払を請求することができる。", "ＡとＤとの間に更改があったときは、300 万円の債権は、全ての連帯債務者の利益のため に消滅する。"], "answer": 1, "exp": "誤りは肢2。連帯債務者の一人Ｃは、他の連帯債務者Ｂが持つ反対債権を使って自分から相殺の意思表示をすることはできず、できるのはＢの負担部分100万円を限度に履行を拒むことだけ（439条2項）。相殺できると述べる点がひっかけ。肢1の裁判上の請求（時効更新）や肢3の免除は相対効で他の債務者に及ばず、肢4の更改は絶対効で全員の債務が消える、という改正民法の効力の区別を押さえる。", "year": "R3-10月-2", "diff": "B"}, {"id": "kako-ken-R2-12月-4", "subject": "権利関係", "topic": "債務不履行", "type": "select", "q": "債務不履行に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。なお、債務は令和 2 年 4 月 1 日以降に生じたものとする。", "choices": ["債務の履行について不確定期限があるときは、債務者は、その期限が到来したことを知ら なくても、期限到来後に履行の請求を受けた時から遅滞の責任を負う。", "債務の目的が特定物の引渡しである場合、債権者が目的物の引渡しを受けることを理由な く拒否したため、その後の履行の費用が増加したときは、その増加額について、債権者と 債務者はそれぞれ半額ずつ負担しなければならない。", "債務者がその債務について遅滞の責任を負っている間に、当事者双方の責めに帰すること ができない事由によってその債務の履行が不能となったときは、その履行不能は債務者の 責めに帰すべき事由によるものとみなされる。", "契約に基づく債務の履行が契約の成立時に不能であったとしても、その不能が債務者の責 めに帰することができない事由によるものでない限り、債権者は、履行不能によって生じ た損害について、債務不履行による損害の賠償を請求することができる。"], "answer": 1, "exp": "誤りは肢2。債権者が正当な理由なく受領を拒んだ（受領遅滞）ために増えた履行費用は、その全額を債権者が負担する（413条2項）。半額ずつという点がひっかけで、受領遅滞の不利益は拒んだ債権者側が負うのが原則。肢3の履行不能のみなし帰責（413条の2）や肢4の原始的不能でも賠償請求できる点（412条の2）は改正民法どおりで正しい。", "year": "R2-12月-4", "diff": "C"}, {"id": "kako-ken-R3-10月-6", "subject": "権利関係", "topic": "債権譲渡", "type": "select", "q": "売買代金債権（以下この問において「債権」という。）の譲渡（令和 3 年 7 月 1 日に譲渡契約が行われたもの）に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["譲渡制限の意思表示がされた債権が譲渡された場合、当該債権譲渡の効力は妨げられない が、債務者は、その債権の全額に相当する金銭を供託することができる。", "債権が譲渡された場合、その意思表示の時に債権が現に発生していないときは、譲受人 は、その後に発生した債権を取得できない。", "譲渡制限の意思表示がされた債権の譲受人が、その意思表示がされていたことを知ってい たときは、債務者は、その債務の履行を拒むことができ、かつ、譲渡人に対する弁済その 他の債務を消滅させる事由をもって譲受人に対抗することができる。", "債権の譲渡は、譲渡人が債務者に通知し、又は債務者が承諾をしなければ、債務者その他 の第三者に対抗することができず、その譲渡の通知又は承諾は、確定日付のある証書に よってしなければ、債務者以外の第三者に対抗することができない。"], "answer": 1, "exp": "誤りは肢2。まだ発生していない将来債権でも譲渡は有効で、譲受人は債権が発生した時点で当然にその債権を取得する（466条の6）。取得できないとする点が誤り。肢1の譲渡制限特約付き債権も譲渡自体は有効で債務者は供託できる（466条の2）点、肢3の悪意重過失の譲受人には履行拒絶できる点、肢4の対抗要件（通知・承諾、第三者には確定日付）も正しい。", "year": "R3-10月-6", "diff": "C"}, {"id": "kako-ken-R1-7", "subject": "権利関係", "topic": "弁済", "type": "select", "q": "Ａを売主、Ｂを買主として甲建物の売買契約が締結された場合におけるＢのＡに対する代金債務（以下「本件代金債務」という。）に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Ｂが、本件代金債務につき受領権限のないＣに対して弁済した場合、Ｃに受領権限がない ことを知らないことにつきＢに過失があれば、Ｃが受領した代金をＡに引き渡したとして も、Ｂの弁済は有効にならない。", "Ｂが、Ａの代理人と称するＤに対して本件代金債務を弁済した場合、Ｄに受領権限がない ことにつきＢが善意かつ無過失であれば、Ｂの弁済は有効となる。", "Ｂが、Ａの相続人と称するＥに対して本件代金債務を弁済した場合、Ｅに受領権限がない ことにつきＢが善意かつ無過失であれば、Ｂの弁済は有効となる。", "Ｂは、本件代金債務の履行期が過ぎた場合であっても、特段の事情がない限り、甲建物の 引渡しに係る履行の提供を受けていないことを理由として、Ａに対して代金の支払を拒む ことができる。"], "answer": 0, "exp": "誤りは肢1。受領権限のないＣへの弁済でも、Ｃが受け取った代金を債権者Ａに引き渡し、Ａが利益を受けた限度では弁済は有効になる（479条）。過失があっても無効のままとする点がひっかけ。肢2・3の受領権者としての外観を有する者への善意無過失の弁済（478条）、肢4の同時履行の抗弁（533条）はいずれも正しい。", "year": "R1-7", "diff": "C"}, {"id": "kako-ken-H30-9", "subject": "権利関係", "topic": "相殺", "type": "select", "q": "Ａは、令和 4 年 10 月 1 日、Ａ所有の甲土地につき、Ｂとの間で、代金 1 ,000 万円、支払期日を同年12 月 1 日とする売買契約を締結した。この場合の相殺に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。（改題）", "choices": ["ＢがＡに対して同年 12 月 31 日を支払期日とする貸金債権を有している場合には、Ｂは同 年 12 月 1 日に売買代金債務と当該貸金債権を対当額で相殺することができる。", "同年 11 月 1 日にＡの売買代金債権がＡの債権者Ｃにより差し押さえられても、Ｂは、同 年 11 月 2 日から 12 月 1 日までの間にＡに対する別の債権を取得した場合には、同年 12 月 1 日に売買代金債務と当該債権を対当額で相殺することができる。", "同年 10 月 10 日、ＢがＡの自動車事故によって負傷し、Ａに対して不法行為に基づく損害 賠償債権を取得した場合には、Ｂは売買代金債務と当該損害賠償債権を対当額で相殺する ことができる。", "ＢがＡに対し同年 9 月 30 日に消滅時効の期限が到来する貸金債権を有していた場合に は、Ａが当該消滅時効を援用したとしても、Ｂは売買代金債務と当該貸金債権を対当額で 相殺することができる。"], "answer": 2, "exp": "正しいのは肢3。人の生命・身体の侵害による損害賠償債権は、加害者側が受働債権として相殺するのは禁止だが、被害者側から自働債権として相殺するのは許される。ここでは被害者Ｂが相殺するので可能。肢1は自働債権が弁済期未到来なので不可、肢2は差押え後に取得した債権での相殺は差押債権者に対抗できず（511条）、肢4は時効完成前に相殺適状になかったため相殺できず、いずれも誤り。", "year": "H30-9", "diff": "C"}, {"id": "kako-ken-H28-3", "subject": "権利関係", "topic": "対抗要件", "type": "select", "q": "ＡがＡ所有の甲土地をＢに売却した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。（改題）", "choices": ["Ａが甲土地をＢに売却する前にＣにも売却していた場合、Ｃは所有権移転登記を備えてい なくても、Ｂに対して甲土地の所有権を主張することができる。", "ＡがＢの詐欺を理由に甲土地の売却の意思表示を取り消しても、取消しより前にＢが甲土 地をＤに売却し、Ｄが所有権移転登記を備えた場合には、ＤがＢの詐欺の事実を知ってい たか否かにかかわらず、ＡはＤに対して甲土地の所有権を主張することができない。", "Ａから甲土地を購入したＢは、所有権移転登記を備えていなかった。Ｅがこれに乗じてＢ に高値で売りつけて利益を得る目的でＡから甲土地を購入し所有権移転登記を備えた場 合、ＥはＢに対して甲土地の所有権を主張することができない。", "ＡＢ間の売買契約が、Ｂの意思表示の動機に錯誤があって締結されたものである場合、Ｂ が所有権移転登記を備えていても、ＡはＢの錯誤を理由にＡＢ間の売買契約を取り消すこ とができる。"], "answer": 2, "exp": "正しいのは肢3。高値で売りつける目的で買い受けたＥは背信的悪意者にあたり、たとえ登記を備えてもＢに所有権を主張できず、逆にＢは登記なくてもＥに対抗できる（177条）。肢1は二重譲渡なのでＣは登記を備えないとＢに対抗できず誤り、肢2は取消前の第三者Ｄが詐欺を知っていれば（悪意なら）Ａは取消しを対抗できるので誤り、肢4は錯誤取消しは原則表意者本人しかできず誤り。", "year": "H28-3", "diff": "A"}, {"id": "kako-ken-R1-2", "subject": "権利関係", "topic": "対抗要件", "type": "select", "q": "ＡがＢに甲土地を売却し、Ｂが所有権移転登記を備えた場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。（改題）", "choices": ["ＡがＢとの売買契約をＢの詐欺を理由に取り消した後、ＣがＢから甲土地を買い受けて所 有権移転登記を備えた場合、ＡＣ間の関係は対抗問題となり、Ａは、いわゆる背信的悪意 者ではないＣに対して、登記なくして甲土地の返還を請求することができない。", "ＡがＢとの売買契約をＢの詐欺を理由に取り消す前に、Ｂの詐欺について悪意のＣが、Ｂ から甲土地を買い受けて所有権移転登記を備えていた場合、ＡはＣに対して、甲土地の返 還を請求することができる。", "Ａの売却の意思表示に、それに対応する意思を欠く錯誤があり、その錯誤が法律行為の目 的及び取引上の社会通念に照らして重要なものである場合、Ａに重大な過失がなければ、 Ａは、Ｂから甲土地を買い受けた悪意のＣに対して、錯誤による当該意思表示の取消しを 主張して、甲土地の返還を請求することができる。", "Ａの売却の意思表示に、それに対応する意思を欠く錯誤があり、その錯誤が法律行為の目 的及び取引上の社会通念に照らして重要なものである場合、Ａに重大な過失があったとし ても、ＡはＢに対して、常に錯誤による当該意思表示の取消しを主張して、甲土地の返還 を請求することができる。"], "answer": 3, "exp": "誤りは肢4。錯誤による取消しは、表意者に重大な過失があるときは原則として主張できない（95条3項）。常に取り消せるとする点がひっかけ。肢1の取消後の第三者Ｃとは対抗問題となり登記で決まる点、肢2の取消前の第三者は善意無過失かどうかで決まり悪意なら返還請求できる点、肢3の重過失なしなら悪意の第三者にも錯誤取消しを対抗できる点は正しい。", "year": "R1-2", "diff": "A"}, {"id": "kako-ken-R3-12月-6", "subject": "権利関係", "topic": "対抗要件", "type": "select", "q": "不動産に関する物権変動の対抗要件に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["不動産の所有権がＡからＢ、ＢからＣ、ＣからＤと転々譲渡された場合、Ａは、Ｄと対抗 関係にある第三者に該当する。", "土地の賃借人として当該土地上に登記ある建物を所有する者は、当該土地の所有権を新た に取得した者と対抗関係にある第三者に該当する。", "第三者のなした登記後に時効が完成して不動産の所有権を取得した者は、当該第三者に対 して、登記を備えなくても、時効取得をもって対抗することができる。", "共同相続財産につき、相続人の一人から相続財産に属する不動産につき所有権の全部の譲 渡を受けて移転登記を備えた第三者に対して、他の共同相続人は、自己の持分を登記なく して対抗することができる。"], "answer": 0, "exp": "誤りは肢1。Ａ→Ｂ→Ｃ→Ｄと転々譲渡された場合、すでに無権利者となった前主Ａは、Ｄと対抗関係に立つ第三者にはあたらない（判例）。該当するとする点が誤り。肢2の借地上の登記ある建物所有者、肢3の時効完成前の第三者には登記なく対抗できる点、肢4の共同相続で他の相続人は自己の持分（法定相続分）を登記なく対抗できる点は正しい。", "year": "R3-12月-6", "diff": "C"}, {"id": "kako-ken-R4-1", "subject": "権利関係", "topic": "対抗要件", "type": "select", "q": "次の 1 から 4 までの記述のうち、民法の規定、判例及び下記判決文によれば、正しいものはどれか。（判決文）所有者甲から乙が不動産を買い受け、その登記が未了の間に、丙が当該不動産を甲から二重に買い受け、更に丙から転得者丁が買い受けて登記を完了した場合に、たとい丙が背信的悪意者に当たるとしても、丁は、乙に対する関係で丁自身が背信的悪意者と評価されるのでない限り、当該不動産の所有権取得をもって乙に対抗することができるものと解するのが相当である。", "choices": ["所有者ＡからＢが不動産を買い受け、その登記が未了の間に、Ｃが当該不動産をＡから二 重に買い受けて登記を完了した場合、Ｃは、自らが背信的悪意者に該当するときであって も、当該不動産の所有権取得をもってＢに対抗することができる。", "所有者ＡからＢが不動産を買い受け、その登記が未了の間に、背信的悪意者ではないＣが 当該不動産をＡから二重に買い受けた場合、先に買い受けたＢは登記が未了であっても当 該不動産の所有権取得をもってＣに対抗することができる。", "所有者ＡからＢが不動産を買い受け、その登記が未了の間に、背信的悪意者であるＣが当 該不動産をＡから二重に買い受け、更にＣから転得者Ｄが買い受けて登記を完了した場 合、ＤもＢに対する関係で背信的悪意者に該当するときには、Ｄは当該不動産の所有権取 得をもってＢに対抗することができない。", "所有者ＡからＢが不動産を買い受け、その登記が未了の間に、Ｃが当該不動産をＡから二 重に買い受け登記を完了した場合、Ｃが背信的悪意者に該当しなくてもＢが登記未了であ ることにつき悪意であるときには、Ｃは当該不動産の所有権取得をもってＢに対抗するこ とができない。"], "answer": 2, "exp": "正しいのは肢3。判決文のとおり、背信的悪意者Ｃからの転得者Ｄであっても、Ｄ自身がＢとの関係で背信的悪意者と評価されるときは、登記を備えてもＢに所有権を主張できない。肢1は背信的悪意者Ｃは登記があってもＢに対抗できず誤り、肢2は登記未了のＢは背信的悪意者でないＣに対抗できず誤り、肢4は単なる悪意者Ｃは登記を備えればＢに対抗できるので誤り。", "year": "R4-1", "diff": "A"}, {"id": "kako-ken-H28-14", "subject": "権利関係", "topic": "不動産登記法", "type": "select", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。", "choices": ["新築した建物又は区分建物以外の表題登記がない建物の所有権を取得した者は、その所有 権の取得の日から 1 月以内に、所有権の保存の登記を申請しなければならない。", "登記することができる権利には、抵当権及び賃借権が含まれる。", "建物が滅失したときは、表題部所有者又は所有権の登記名義人は、その滅失の日から 1 月 以内に、当該建物の滅失の登記を申請しなければならない。", "区分建物の所有権の保存の登記は、表題部所有者から所有権を取得した者も、申請するこ とができる。"], "answer": 0, "exp": "誤りは肢1。表題登記がない建物の所有権を取得した者が取得日から1か月以内に申請すべきなのは表題登記であって、所有権保存登記ではない（47条1項）。保存登記は義務ではない点がひっかけ。肢2の抵当権・賃借権が登記できる権利である点、肢3の建物滅失登記の1か月以内の申請義務、肢4の区分建物で取得者も保存登記できる点は正しい。", "year": "H28-14", "diff": "A"}, {"id": "kako-ken-H29-14", "subject": "権利関係", "topic": "不動産登記法", "type": "select", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。", "choices": ["建物の名称があるときは、その名称も当該建物の表示に関する登記の登記事項となる。", "地上権の設定の登記をする場合において、地上権の存続期間の定めがあるときは、その定 めも登記事項となる。", "賃借権の設定の登記をする場合において、敷金があるときであっても、その旨は登記事項 とならない。", "事業用定期借地権として借地借家法第 23 条第 1 項の定めのある賃借権の設定の登記をす る場合、その定めも登記事項となる。"], "answer": 2, "exp": "誤りは肢3。賃借権の設定登記において敷金があるときは、その旨が登記事項となる（81条4号）。登記事項とならないとする点が誤り。肢1の建物の名称、肢2の地上権の存続期間、肢4の事業用定期借地権の定めは、いずれも登記事項として正しい。", "year": "H29-14", "diff": "C"}, {"id": "kako-ken-H30-14", "subject": "権利関係", "topic": "不動産登記法", "type": "select", "q": "不動産の登記に関する次の記述のうち、誤っているものはどれか。", "choices": ["登記は、法令に別段の定めがある場合を除き、当事者の申請又は官庁若しくは公署の嘱託 がなければ、することができない。", "表示に関する登記は、登記官が、職権ですることができる。", "所有権の登記名義人は、建物の床面積に変更があったときは、当該変更のあった日から 1 月以内に、変更の登記を申請しなければならない。", "所有権の登記名義人は、その住所について変更があったときは、当該変更のあった日から 1 月以内に、変更の登記を申請しなければならない。"], "answer": 3, "exp": "誤りは肢4。登記名義人の氏名・住所の変更登記は権利に関する登記であり、申請義務も1か月以内という期限もない。床面積変更のような表示に関する登記（1か月以内の義務あり）と混同させるひっかけ。肢1の申請主義、肢2の表示登記の職権登記、肢3の床面積変更の1か月以内申請義務は正しい。", "year": "H30-14", "diff": "C"}, {"id": "kako-ken-R1-14", "subject": "権利関係", "topic": "不動産登記法", "type": "select", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。", "choices": ["登記の申請に係る不動産の所在地が当該申請を受けた登記所の管轄に属しないときは、登 記官は、理由を付した決定で、当該申請を却下しなければならない。", "所有権の登記名義人が相互に異なる土地の合筆の登記は、することができない。", "登記官は、一筆の土地の一部が別の地目となったときであっても、職権で当該土地の分筆 の登記をすることはできない。", "登記の申請をする者の委任による代理人の権限は、本人の死亡によっては、消滅しない。"], "answer": 2, "exp": "誤りは肢3。一筆の土地の一部が別の地目になったときは、申請がなくても登記官が職権で分筆の登記をしなければならない（39条2項）。できないとする点が誤り。肢1の管轄違いの却下、肢2の名義人が異なる土地の合筆不可、肢4の委任代理人の権限は本人死亡で消滅しない（民法の任意代理と異なる）点は正しい。", "year": "R1-14", "diff": "C"}, {"id": "kako-ken-R2-10月-14", "subject": "権利関係", "topic": "不動産登記法", "type": "select", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、正しいものはどれか。", "choices": ["敷地権付き区分建物の表題部所有者から所有権を取得した者は、当該敷地権の登記名義人 の承諾を得なければ、当該区分建物に係る所有権の保存の登記を申請することができな い。", "所有権に関する仮登記に基づく本登記は、登記上の利害関係を有する第三者がある場合で あっても、その承諾を得ることなく、申請することができる。", "債権者Ａが債務者Ｂに代位して所有権の登記名義人ＣからＢへの所有権の移転の登記を申 請した場合において、当該登記を完了したときは、登記官は、Ａに対し、当該登記に係る 登記識別情報を通知しなければならない。", "配偶者居住権は、登記することができる権利に含まれない。"], "answer": 0, "exp": "正しいのは肢1。敷地権付き区分建物では、表題部所有者から所有権を取得した者が保存登記を申請するには、敷地権の登記名義人の承諾が必要（74条2項）。肢2は仮登記に基づく本登記は利害関係人の承諾が必要なので誤り、肢3は代位申請したＡは名義人にならず登記識別情報は通知されないので誤り、肢4は配偶者居住権も登記できる権利なので誤り。", "year": "R2-10月-14", "diff": "C"}, {"id": "kako-ken-R2-12月-14", "subject": "権利関係", "topic": "不動産登記法", "type": "select", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。（改題）", "choices": ["表題部所有者が表示に関する登記の申請人となることができる場合において、当該表題部 所有者について相続があったときは、その相続人は、当該表示に関する登記を申請するこ とができる。", "所有権の登記以外の権利に関する登記がある土地については、分筆の登記をすることがで きない。", "区分建物が属する一棟の建物が新築された場合における当該区分建物についての表題登記 の申請は、当該新築された一棟の建物についての表題登記の申請と併せてしなければなら ない。", "登記の申請書の閲覧は、請求人に正当な理由がある場合に限り、することができる。"], "answer": 1, "exp": "誤りは肢2。所有権の登記以外の権利に関する登記がある土地でも、分筆の登記はできる（できないのは合筆）。分筆と合筆を入れ替えたひっかけ。肢1の相続人による表示登記の申請、肢3の一棟の建物と各区分建物の表題登記の一括申請、肢4の申請書等の閲覧は正当な理由がある場合に限る点は正しい。", "year": "R2-12月-14", "diff": "C"}, {"id": "kako-ken-R3-10月-14", "subject": "権利関係", "topic": "不動産登記法", "type": "select", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、正しいものはどれか。", "choices": ["所有権の登記の抹消は、所有権の移転の登記がある場合においても、所有権の登記名義人 が単独で申請することができる。", "登記の申請をする者の委任による代理人の権限は、本人の死亡によって消滅する。", "法人の合併による権利の移転の登記は、登記権利者が単独で申請することができる。", "信託の登記は、受託者が単独で申請することができない。"], "answer": 2, "exp": "正しいのは肢3。相続または法人の合併による権利移転の登記は、登記権利者が単独で申請できる（63条2項）。肢1は所有権移転登記がある場合は抹消を単独申請できないので誤り、肢2は委任代理人の権限は本人死亡で消滅しないので誤り、肢4は信託の登記は受託者が単独申請できるので誤り。", "year": "R3-10月-14", "diff": "C"}, {"id": "kako-ken-R3-12月-14", "subject": "権利関係", "topic": "不動産登記法", "type": "select", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。", "choices": ["表題登記がない土地の所有権を取得した者は、その所有権の取得の日から 1 月以内に、表 題登記を申請しなければならない。", "共用部分である旨の登記がある建物について、合併の登記をすることができる。", "登記官は、表示に関する登記について申請があった場合において、必要があると認めると きは、当該不動産の表示に関する事項を調査することができる。", "区分建物である建物を新築した場合において、その所有者について相続その他の一般承継 があったときは、相続人その他の一般承継人も、被承継人を表題部所有者とする当該建物 についての表題登記を申請することができる。"], "answer": 1, "exp": "誤りは肢2。共用部分である旨の登記がある建物については、合併の登記をすることができない（56条1項）。できるとする点が誤り。肢1の表題登記のない土地の1か月以内の申請義務、肢3の登記官の調査権限、肢4の相続人による被承継人名義の表題登記申請は正しい。", "year": "R3-12月-14", "diff": "B"}, {"id": "kako-ken-R5-14", "subject": "権利関係", "topic": "不動産登記法", "type": "select", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。", "choices": ["建物が滅失したときは、表題部所有者又は所有権の登記名義人は、その滅失の日から 1 か 月以内に、当該建物の滅失の登記を申請しなければならない。", "何人も、理由の有無にかかわらず、登記官に対し、手数料を納付して、登記簿の附属書類 である申請書を閲覧することができる。", "共有物分割禁止の定めに係る権利の変更の登記の申請は、当該権利の共有者である全ての 登記名義人が共同してしなければならない。", "区分建物の所有権の保存の登記は、表題部所有者から所有権を取得した者も、申請するこ とができる。"], "answer": 1, "exp": "誤りは肢2。附属書類のうち申請書などの閲覧は、何人でも理由なくできるわけではなく、正当な理由がある者が、正当と認められる部分に限りできる（121条3項）。土地所在図など一定の図面が誰でも閲覧できるのと混同させるひっかけ。肢1の建物滅失登記、肢3の共有物分割禁止の変更登記の全員共同申請、肢4の区分建物の保存登記は正しい。", "year": "R5-14", "diff": "C"}, {"id": "kako-ken-R6-14", "subject": "権利関係", "topic": "不動産登記法", "type": "select", "q": "不動産の登記に関する次の記述のうち、不動産登記法の規定によれば、誤っているものはどれか。", "choices": ["買戻しの特約に関する登記がされている場合において、契約の日から 10 年を経過したと きは、登記権利者は、単独で当該登記の抹消を申請することができる。", "不動産の収用による所有権の移転の登記は、起業者が単独で申請することができる。", "相続人ではない者に対する遺贈による所有権の移転の登記は、登記権利者が単独で申請す ることができる。", "登記名義人の住所についての変更の登記は、登記名義人が単独で申請することができる。"], "answer": 2, "exp": "誤りは肢3。相続人でない者に対する遺贈による所有権移転登記は、受遺者（登記権利者）と相続人（登記義務者）の共同申請になる。単独申請できるのは相続人に対する遺贈の場合。単独申請できるとする点が誤り。肢1の買戻特約登記の10年経過後の単独抹消、肢2の収用による移転登記の起業者単独申請、肢4の名義人の住所変更登記の単独申請は正しい。", "year": "R6-14", "diff": "C"}, {"id": "kako-ken-R2-10月-3", "subject": "権利関係", "topic": "契約の解除", "type": "select", "q": "次の 1 から 4 までの契約に関する記述のうち、民法の規定及び下記判決文によれば、誤っているものはどれか。なお、これらの契約は令和 2 年 4 月 1 日以降に締結されたものとする。（判決文）法律が債務の不履行による契約の解除を認める趣意は、契約の要素をなす債務の履行がないために、該契約をなした目的を達することができない場合を救済するためであり、当事者が契約をなした主たる目的の達成に必須的でない附随的義務の履行を怠ったに過ぎないような場合には、特段の事情の存しない限り、相手方は当該契約を解除することができないものと解するのが相当である。", "choices": ["土地の売買契約において、売主が負担した当該土地の税金相当額を買主が償還する付随的 義務が定められ、買主が売買代金を支払っただけで税金相当額を償還しなかった場合、特 段の事情がない限り、売主は当該売買契約の解除をすることができない。", "債務者が債務を履行しない場合であっても、債務不履行について債務者の責めに帰すべき 事由がないときは付随的義務の不履行となり、特段の事情がない限り、債権者は契約の解 除をすることができない。", "債務不履行に対して債権者が相当の期間を定めて履行を催告してその期間内に履行がなさ れない場合であっても、催告期間が経過した時における債務不履行がその契約及び取引上 の社会通念に照らして軽微であるときは、債権者は契約の解除をすることができない。", "債務者が債務を履行しない場合であって、債務者がその債務の全部の履行を拒絶する意思 を明確に表示したときは、債権者は、相当の期間を定めてその履行を催告することなく、 直ちに契約の解除をすることができる。"], "answer": 1, "exp": "誤りは肢2。改正民法では契約の解除に債務者の帰責事由は不要であり、帰責事由がないからといって付随的義務の不履行になるわけでもない。帰責事由の有無と付随的義務かどうかを結びつける論理がひっかけ。肢1の付随的義務不履行だけでは解除できない（判決文の趣旨）点、肢3の軽微な不履行は解除できない点（541条ただし書）、肢4の全部履行拒絶なら無催告解除できる点（542条）は正しい。", "year": "R2-10月-3", "diff": "B"}, {"id": "kako-ken-H29-5", "subject": "権利関係", "topic": "契約不適合責任", "type": "select", "q": "Ａは、中古自動車を売却するため、Ｂに売買の媒介を依頼し、報酬として売買代金の 3 ％を支払うことを約した。Ｂの媒介によりＡは当該自動車をＣに 100 万円で売却した。この場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。（改題）", "choices": ["Ｂが報酬を得て売買の媒介を行っているので、ＣはＡから当該自動車の引渡しを受ける前 に、100 万円をＡに支払わなければならない。", "当該自動車が契約内容に適合しない場合には、ＣはＡに対しても、Ｂに対しても、担保責 任を追及することができる。", "売買契約が締結された際に、Ｃが解約手付として手付金 10 万円をＡに支払っている場合 には、Ａはいつでも 20 万円を償還して売買契約を解除することができる。", "売買契約締結時には当該自動車がＡの所有物ではなく、Ａの父親の所有物であったとして も、ＡＣ間の売買契約は有効に成立する。"], "answer": 3, "exp": "正しいのは肢4。売買契約の時点で目的物が売主Ａの所有でなく他人（父）の所有であっても、いわゆる他人物売買として契約は有効に成立する（561条）。肢1は特約がなければ代金と引渡しは同時履行なので先払い義務はなく誤り、肢2は担保責任を負うのは売主Ａだけで媒介したＢには追及できず誤り、肢3は手付解除は相手が履行に着手するまでで、いつでもできるわけではないので誤り。", "year": "H29-5", "diff": "A"}, {"id": "kako-ken-R1-3", "subject": "権利関係", "topic": "契約不適合責任", "type": "select", "q": "事業者ではないＡが所有し居住している建物につきＡＢ間で売買契約を締結するに当たり、Ａは建物引渡しから 3 か月に限り担保責任を負う旨の特約を付けたが、売買契約締結時点において当該建物の構造耐力上主要な部分に契約内容に適合しない不適合（以下「契約不適合」という。）が存在しており、Ａはそのことを知っていたがＢに告げず、Ｂはそのことを知らなかった。この場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。（改題）", "choices": ["Ｂが当該契約不適合の存在を建物引渡しから 1 年が経過した時に知った場合、当該契約不 適合の存在を知った時から 2 年後にその旨をＡに通知しても、ＢはＡに対して担保責任を 追及することができる。", "建物の構造耐力上主要な部分の契約不適合については、契約の目的を達成することができ ない場合でなければ、Ｂは本件契約不適合を理由に売買契約を解除することができない。", "Ｂが契約不適合を理由にＡに対して損害賠償請求をすることができるのは、契約不適合を 理由に売買契約を解除することができない場合に限られる。", "ＡＢ間の売買をＢと媒介契約を締結した宅地建物取引業者Ｃが媒介していた場合には、Ｂ はＣに対して担保責任を追及することができる。"], "answer": 0, "exp": "正しいのは肢1。担保責任を3か月に限定する特約は有効だが、売主が不適合を知りながら告げなかった場合はその責任を免れない（572条）。さらに売主が不適合を知っていたときは、買主に課される「知った時から1年以内の通知」という期間制限が適用されず、Ｂは知った時から2年後の通知でも担保責任を追及できる。肢2の解除は契約目的不達成に限られない点、肢3の解除できる場合でも損害賠償できる点、肢4の売主Ａが責任を負い媒介業者は負わない点から他は誤り。", "year": "R1-3", "diff": "A"}, {"id": "kako-ken-R2-10月-9", "subject": "権利関係", "topic": "契約不適合責任", "type": "select", "q": "Ａがその所有する甲建物について、Ｂとの間で、①Ａを売主、Ｂを買主とする売買契約を締結した場合と、②Ａを贈与者、Ｂを受贈者とする負担付贈与契約を締結した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、これらの契約は、令和 2 年 7 月 1 日に締結され、担保責任に関する特約はないものとする。", "choices": ["①の契約において、Ｂが手付を交付し、履行期の到来後に代金支払の準備をしてＡに履行 の催告をした場合、Ａは、手付の倍額を現実に提供して契約の解除をすることができる。", "②の契約が書面によらずになされた場合、Ａは、甲建物の引渡し及び所有権移転登記の両 方が終わるまでは、書面によらないことを理由に契約の解除をすることができる。", "②の契約については、Ａは、その負担の限度において、売主と同じく担保責任を負う。", "①の契約については、Ｂの債務不履行を理由としてＡに解除権が発生する場合があるが、 ②の契約については、Ｂの負担の不履行を理由としてＡに解除権が発生することはない。"], "answer": 2, "exp": "正しいのは肢3。負担付贈与では、贈与者はその負担の限度で、売主と同じ担保責任（契約不適合責任）を負う（551条2項）。肢1は買主が代金支払の準備をして催告した時点で履行の着手にあたり、売主は手付倍返しで解除できないので誤り、肢2は引渡しか移転登記のいずれかで履行が終わり書面によらない贈与の解除はできなくなるので誤り、肢4は負担付贈与にも解除の規定が準用され受贈者の負担不履行で解除できるので誤り。", "year": "R2-10月-9", "diff": "B"}, {"id": "kako-ken-R2-12月-7", "subject": "権利関係", "topic": "契約不適合責任", "type": "select", "q": "Ａを売主、Ｂを買主として、令和 2 年 7 月 1 日に甲土地の売買契約（以下この問において「本件契約」という。）が締結された場合における次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["甲土地の実際の面積が本件契約の売買代金の基礎とした面積より少なかった場合、Ｂはそ のことを知った時から 2 年以内にその旨をＡに通知しなければ、代金の減額を請求するこ とができない。", "ＡがＢに甲土地の引渡しをすることができなかった場合、その不履行がＡの責めに帰する ことができない事由によるものであるときを除き、ＢはＡに対して、損害賠償の請求をす ることができる。", "Ｂが売買契約で定めた売買代金の支払期日までに代金を支払わなかった場合、売買契約に 特段の定めがない限り、ＡはＢに対して、年 5 ％の割合による遅延損害金を請求すること ができる。", "本件契約が、Ａの重大な過失による錯誤に基づくものであり、その錯誤が重要なものであ るときは、Ａは本件契約の無効を主張することができる。"], "answer": 1, "exp": "正しいのは肢2。売主が引渡しをできず損害が生じた場合、その不履行が売主の責めに帰することができない事由によるときを除き、買主は債務不履行に基づく損害賠償を請求できる（415条）。肢1は数量不適合には通知期間の制限がなく（制限があるのは種類・品質）誤り、肢3は法定利率は3％（3年ごと見直し）で年5％とは限らず誤り、肢4は錯誤の効果は無効ではなく取消しで、重過失があれば原則取り消せないので誤り。", "year": "R2-12月-7", "diff": "A"}, {"id": "kako-ken-R3-10月-7", "subject": "権利関係", "topic": "契約不適合責任", "type": "select", "q": "Ａを売主、Ｂを買主として、Ａ所有の甲自動車を 50 万円で売却する契約（以下この問において「本件契約」という。）が令和 3 年 7 月 1 日に締結された場合に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["Ｂが甲自動車の引渡しを受けたが、甲自動車のエンジンに契約の内容に適合しない欠陥が あることが判明した場合、ＢはＡに対して、甲自動車の修理を請求することができる。", "Ｂが甲自動車の引渡しを受けたが、甲自動車に契約の内容に適合しない修理不能な損傷が あることが判明した場合、ＢはＡに対して、売買代金の減額を請求することができる。", "Ｂが引渡しを受けた甲自動車が故障を起こしたときは、修理が可能か否かにかかわらず、 ＢはＡに対して、修理を請求することなく、本件契約の解除をすることができる。", "甲自動車について、第三者ＣがＡ所有ではなくＣ所有の自動車であると主張しており、Ｂ が所有権を取得できないおそれがある場合、Ａが相当の担保を供したときを除き、ＢはＡ に対して、売買代金の支払を拒絶することができる。"], "answer": 2, "exp": "誤りは選択肢3。契約解除には原則として履行の催告が必要で、修理が可能なのに催告なしで解除はできません。修理が不能な場合に限り催告なしで解除できるので、「修理が可能か否かにかかわらず催告なしで解除できる」とする点が誤りです。契約不適合では追完(修補)請求も、修理不能時の無催告の代金減額請求も、権利を失うおそれがある場合の代金支払拒絶も認められます。", "year": "R3-10月-7", "diff": "A"}, {"id": "kako-ken-R3-12月-4", "subject": "権利関係", "topic": "契約不適合責任", "type": "select", "q": "いずれも宅地建物取引業者ではない売主Ａと買主Ｂとの間で令和 3 年 7 月 1 日に締結した売買契約に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["ＢがＡに対して手付を交付した場合、Ａは、目的物を引き渡すまではいつでも、手付の倍 額を現実に提供して売買契約を解除することができる。", "売買契約の締結と同時に、Ａが目的物を買い戻すことができる旨の特約をする場合、買戻 しについての期間の合意をしなければ、買戻しの特約自体が無効となる。", "Ｂが購入した目的物が第三者Ｃの所有物であり、Ａが売買契約締結時点でそのことを知ら なかった場合には、Ａは損害を賠償せずに売買契約を解除することができる。", "目的物の引渡しの時点で目的物が品質に関して契約の内容に適合しないことをＡが知って いた場合には、当該不適合に関する請求権が消滅時効にかかっていない限り、ＢはＡの担 保責任を追及することができる。"], "answer": 3, "exp": "正しいのは選択肢4。売主が引渡時に契約不適合を知っていた(悪意)または善意重過失だった場合は、不適合を知った時から1年以内の通知という期間制限は適用されず、消滅時効にかからない限り担保責任を追及できます。手付解除は相手方が履行に着手した後はできず(選択肢1)、買戻し期間を定めなくても特約は無効にならず5年となり(選択肢2)、他人物売買の解除権は買主にあり売主から解除はできません(選択肢3)。", "year": "R3-12月-4", "diff": "B"}, {"id": "kako-ken-R6-10", "subject": "権利関係", "topic": "契約不適合責任", "type": "select", "q": "売買契約の目的物が品質に関して契約の内容に適合しない場合において、当該契約不適合が売主及び買主のいずれの責めにも帰することができない事由によるものであるとき、履行の追完請求権、代金の減額請求権、損害賠償請求権及び契約の解除権のうち、民法の規定によれば、買主が行使することができない権利のみを掲げたものとして正しいものは次の記述のうちどれか。なお、上記帰責性以外の点について、権利の行使を妨げる事情はないものとする。", "choices": ["履行の追完請求権、損害賠償請求権、契約の解除権", "代金の減額請求権、損害賠償請求権、契約の解除権", "履行の追完請求権、代金の減額請求権", "損害賠償請求権"], "answer": 3, "exp": "売主に帰責事由がないときに買主が行使できないのは損害賠償請求権のみなので、正解は選択肢4。損害賠償は債務者の帰責事由が要件です(民法415条但書)。一方、追完請求・代金減額請求・契約解除は、売主の帰責事由がなくても行使できる点がポイントです。「帰責事由が不要な3つ」と「必要な損害賠償」を切り分けて考えます。", "year": "R6-10", "diff": "B"}, {"id": "kako-ken-H27-4", "subject": "権利関係", "topic": "時効", "type": "select", "q": "Ａ所有の甲土地を占有しているＢによる権利の時効取得に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["Ｂが父から甲土地についての賃借権を相続により承継して賃料を払い続けている場合で あっても、相続から 20 年間甲土地を占有したときは、Ｂは、時効によって甲土地の所有 権を取得することができる。", "Ｂの父が 11 年間所有の意思をもって平穏かつ公然に甲土地を占有した後、Ｂが相続によ りその占有を承継し、引き続き 9 年間所有の意思をもって平穏かつ公然に占有していて も、Ｂは、時効によって甲土地の所有権を取得することはできない。", "Ａから甲土地を買い受けたＣが所有権の移転登記を備えた後に、Ｂについて甲土地所有権 の取得時効が完成した場合、Ｂは、Ｃに対し、登記がなくても甲土地の所有者であること を主張することができる。", "甲土地が農地である場合、ＢがＡと甲土地につき賃貸借契約を締結して 20 年以上にわたっ て賃料を支払って継続的に耕作していても、農地法の許可がなければ、Ｂは、時効によっ て甲土地の賃借権を取得することはできない。"], "answer": 2, "exp": "正しいのは選択肢3。時効完成前に登場した第三者Cと時効取得者Bは対抗関係に立たず、BはCに登記がなくても所有権を主張できます(A→C→Bと権利が移った形にすぎないため)。賃借権を相続して賃料を払い続けても所有の意思がなく所有権は時効取得できず(選択肢1)、父の占有を併せれば20年で取得でき(選択肢2は誤り)、農地の賃借権の時効取得には農地法の許可は不要です(選択肢4)。", "year": "H27-4", "diff": "B"}, {"id": "kako-ken-H29-2", "subject": "権利関係", "topic": "時効", "type": "select", "q": "所有権の移転又は取得に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["Ａの所有する甲土地をＢが時効取得した場合、Ｂが甲土地の所有権を取得するのは、取得 時効の完成時である。", "Ａを売主、Ｂを買主としてＣの所有する乙建物の売買契約が締結された場合、ＢがＡの無 権利について善意無過失であれば、ＡＢ間で売買契約が成立した時点で、Ｂは乙建物の所 有権を取得する。", "Ａを売主、Ｂを買主として、丙土地の売買契約が締結され、代金の完済までは丙土地の所 有権は移転しないとの特約が付された場合であっても、当該売買契約締結の時点で丙土地 の所有権はＢに移転する。", "ＡがＢに丁土地を売却したが、ＡがＢの強迫を理由に売買契約を取り消した場合、丁土地 の所有権はＡに復帰し、初めからＢに移転しなかったことになる。"], "answer": 3, "exp": "正しいのは選択肢4。強迫による意思表示は取り消すことができ、取り消すと初めから無効となるため、所有権はAに復帰し初めからBに移らなかったことになります。時効取得の効果は起算日(占有開始時)に遡り完成時ではなく(選択肢1)、他人物売買で買主が善意無過失でも真の所有者は権利を失わず(選択肢2)、所有権移転時期に特約があればそれに従います(選択肢3)。", "year": "H29-2", "diff": "B"}, {"id": "kako-ken-H30-4", "subject": "権利関係", "topic": "時効", "type": "select", "q": "時効の援用に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["消滅時効完成後に主たる債務者が時効の利益を放棄した場合であっても、保証人は時効を 援用することができる。", "後順位抵当権者は、先順位抵当権の被担保債権の消滅時効を援用することができる。", "詐害行為の受益者は、債権者から詐害行為取消権を行使されている場合、当該債権者の有 する被保全債権について、消滅時効を援用することができる。", "債務者が時効の完成の事実を知らずに債務の承認をした場合、その後、債務者はその完成 した消滅時効を援用することはできない。"], "answer": 1, "exp": "誤りは選択肢2。後順位抵当権者は、先順位抵当権の被担保債権の消滅時効を援用することはできません(先順位が消えても配当額が増えるだけで直接利益とは扱われない)。時効利益を放棄した主債務者と異なり保証人は援用でき(選択肢1)、詐害行為の受益者は被保全債権の消滅時効を援用でき(選択肢3)、時効完成後に承認すると知不知を問わず援用できなくなります(選択肢4)。", "year": "H30-4", "diff": "C"}, {"id": "kako-ken-R1-1", "subject": "権利関係", "topic": "時効", "type": "select", "q": "Ａは、Ａが所有している甲土地をＢに売却した。この場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["甲土地を何らの権原なく不法占有しているＣがいる場合、ＢがＣに対して甲土地の所有権 を主張して明渡請求をするには、甲土地の所有権移転登記を備えなければならない。", "Ｂが甲土地の所有権移転登記を備えていない場合には、Ａから建物所有目的で甲土地を賃 借して甲土地上にＤ名義の登記ある建物を有するＤに対して、Ｂは自らが甲土地の所有者 であることを主張することができない。", "Ｂが甲土地の所有権移転登記を備えないまま甲土地をＥに売却した場合、Ｅは、甲土地の 所有権移転登記なくして、Ａに対して甲土地の所有権を主張することができる。", "Ｂが甲土地の所有権移転登記を備えた後に甲土地につき取得時効が完成したＦは、甲土地 の所有権移転登記を備えていなくても、Ｂに対して甲土地の所有権を主張することができ る。"], "answer": 0, "exp": "誤りは選択肢1。不法占拠者は登記の欠缺を主張する正当な利益を持たないため、Bは登記がなくてもCに所有権を主張して明渡しを請求できます。賃借人Dに対しては登記が必要で(選択肢2)、A→B→Eと順次譲渡された場合EはAに登記なく主張でき(選択肢3)、時効完成前の第三者Bに対しFは登記なく主張できます(選択肢4)。", "year": "R1-1", "diff": "C"}, {"id": "kako-ken-R1-9", "subject": "権利関係", "topic": "時効", "type": "select", "q": "ＡがＢに対して金銭の支払を求めて訴えを提起した場合の時効の更新に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。（改題）", "choices": ["訴えの提起後に当該訴えが取り下げられた場合には、特段の事情がない限り、時効更新の 効力は生じない。", "訴えの提起後に当該訴えの却下の判決が確定した場合には、時効更新の効力は生じない。", "訴えの提起後に請求棄却の判決が確定した場合には、時効更新の効力は生じない。", "訴えの提起後に裁判上の和解が成立した場合には、時効更新の効力は生じない。"], "answer": 3, "exp": "誤りは選択肢4。裁判上の和解が成立した場合は時効が更新されるので、「更新の効力は生じない」とするのは誤りです。これに対し、訴えの取下げ(選択肢1)、却下判決の確定(選択肢2)、請求棄却判決の確定(選択肢3)では、権利が確定しないため時効更新の効力は生じません。「権利が確定したか否か」で更新の有無を判断します。", "year": "R1-9", "diff": "C"}, {"id": "kako-ken-R2-10月-10", "subject": "権利関係", "topic": "時効", "type": "select", "q": "Ａが甲土地を所有している場合の時効に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Ｂが甲土地を所有の意思をもって平穏かつ公然に 17 年間占有した後、ＣがＢを相続し甲 土地を所有の意思をもって平穏かつ公然に 3 年間占有した場合、Ｃは甲土地の所有権を時 効取得することができる。", "Ｄが、所有者と称するＥから、Ｅが無権利者であることについて善意無過失で甲土地を買 い受け、所有の意思をもって平穏かつ公然に 3 年間占有した後、甲土地がＡの所有である ことに気付いた場合、そのままさらに 7 年間甲土地の占有を継続したとしても、Ｄは、甲 土地の所有権を時効取得することはできない。", "Ｄが、所有者と称するＥから、Ｅが無権利者であることについて善意無過失で甲土地を買 い受け、所有の意思をもって平穏かつ公然に 3 年間占有した後、甲土地がＡの所有である ことを知っているＦに売却し、Ｆが所有の意思をもって平穏かつ公然に甲土地を 7 年間占 有した場合、Ｆは甲土地の所有権を時効取得することができる。", "Ａが甲土地を使用しないで 20 年以上放置していたとしても、Ａの有する甲土地の所有権 が消滅時効にかかることはない。"], "answer": 1, "exp": "誤りは選択肢2。善意無過失は占有開始時に判断され、途中で他人の物と気付いても、開始時が善意無過失なら10年で時効取得できます。よって「取得できない」は誤りです。占有を併せて17年+3年=20年で取得でき(選択肢1)、前主の善意無過失な占有を併せれば悪意の承継人でも10年で取得でき(選択肢3)、所有権は消滅時効にかかりません(選択肢4)。", "year": "R2-10月-10", "diff": "B"}, {"id": "kako-ken-R2-12月-5", "subject": "権利関係", "topic": "時効", "type": "select", "q": "時効に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。なお、時効の対象となる債権の発生原因は、令和 2 年 4 月 1 日以降に生じたものとする。", "choices": ["消滅時効の援用権者である「当事者」とは、権利の消滅について正当な利益を有する者で あり、債務者のほか、保証人、物上保証人、第三取得者も含まれる。", "裁判上の請求をした場合、裁判が終了するまでの間は時効が完成しないが、当該請求を途 中で取り下げて権利が確定することなく当該請求が終了した場合には、その終了した時か ら新たに時効の進行が始まる。", "権利の承認があったときは、その時から新たに時効の進行が始まるが、権利の承認をする には、相手方の権利についての処分につき行為能力の制限を受けていないことを要しない。", "夫婦の一方が他方に対して有する権利については、婚姻の解消の時から 6 箇月を経過する までの間は、時効が完成しない。"], "answer": 1, "exp": "誤りは選択肢2。裁判上の請求を取下げ等で権利が確定せずに終えた場合、時効は更新されず、終了から6か月間の完成猶予が続くだけです。「新たに時効の進行が始まる(更新)」とするのは誤りです。援用権者に保証人や物上保証人等が含まれる点(選択肢1)、承認に行為能力が不要な点(選択肢3)、夫婦間の権利が婚姻解消から6か月猶予される点(選択肢4)はいずれも正しい記述です。", "year": "R2-12月-5", "diff": "B"}, {"id": "kako-ken-H27-10", "subject": "権利関係", "topic": "相続", "type": "select", "q": "遺言及び遺留分に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。\b \u0007（改題）", "choices": ["自筆証書の内容を遺言者が一部削除する場合、遺言者が変更する箇所に二重線を引いて、 その箇所に押印するだけで、一部削除の効力が生ずる。", "自筆証書による遺言をする場合、遺言書の本文の自署名下に押印がなければ、自署と離れ た箇所に押印があっても、押印の要件として有効となることはない。", "遺言執行者が管理する相続財産を相続人が無断で処分した場合、当該処分行為は、遺言執 行者に対する関係で無効となるが、第三者に対する関係では無効とならない。", "遺留分権利者は、受遺者又は受贈者に対し、遺留分侵害額に相当する金銭の支払を請求す ることができる。"], "answer": 3, "exp": "正しいのは選択肢4。改正民法では遺留分侵害額請求権は金銭債権化され、遺留分権利者は受遺者・受贈者に対し侵害額に相当する金銭の支払を請求できます。自筆証書の一部削除には変更箇所への押印だけでなく付記・署名も必要で(選択肢1)、封筒の封じ目の押印でも押印要件を満たす場合があり(選択肢2)、遺言執行者の管理財産を相続人が無断処分した行為は善意の第三者には対抗できません(選択肢3)。", "year": "H27-10", "diff": "C"}, {"id": "kako-ken-H28-10", "subject": "権利関係", "topic": "相続", "type": "select", "q": "甲建物を所有するＡが死亡し、相続人がそれぞれＡの子であるＢ及びＣの 2 名である場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Ｂが甲建物を不法占拠するＤに対し明渡しを求めたとしても、Ｂは単純承認をしたものと はみなされない。", "Ｃが甲建物の賃借人Ｅに対し相続財産である未払賃料の支払いを求め、これを収受領得し たときは、Ｃは単純承認をしたものとみなされる。", "Ｃが単純承認をしたときは、Ｂは限定承認をすることができない。", "Ｂが自己のために相続の開始があったことを知らない場合であっても、相続の開始から 3 か月が経過したときは、Ｂは単純承認をしたものとみなされる。"], "answer": 3, "exp": "誤りは選択肢4。単純承認とみなされる3か月の起算点は「自己のために相続開始があったことを知った時」からであり、知らなければ開始から3か月経過しても単純承認とはみなされません。不法占拠者への明渡請求は保存行為で単純承認とならず(選択肢1)、未払賃料の収受は処分行為で単純承認となり(選択肢2)、限定承認は共同相続人全員でしかできません(選択肢3)。", "year": "H28-10", "diff": "B"}, {"id": "kako-ken-H29-6", "subject": "権利関係", "topic": "相続", "type": "select", "q": "Ａが死亡し、相続人がＢとＣの 2 名であった場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["①ＢがＡの配偶者でＣがＡの子である場合と、②ＢとＣがいずれもＡの子である場合とで は、Ｂの法定相続分は①の方が大きい。", "Ａの死亡後、いずれもＡの子であるＢとＣとの間の遺産分割協議が成立しないうちにＢが 死亡したときは、Ｂに配偶者Ｄと子Ｅがいる場合であっても、Ａの遺産分割についてはＥ が代襲相続人として分割協議を行う。", "遺産分割協議が成立するまでの間に遺産である不動産から賃料債権が生じていて、ＢとＣ がその相続分に応じて当該賃料債権を分割単独債権として確定的に取得している場合、遺 産分割協議で当該不動産をＢが取得することになっても、Ｃが既に取得した賃料債権につ き清算する必要はない。", "Ｂが自己のために相続の開始があったことを知った時から 3 か月以内に家庭裁判所に対し て、相続によって得た財産の限度においてのみＡの債務及び遺贈を弁済すべきことを留保 して相続を承認する限定承認をする旨を申述すれば、Ｃも限定承認をする旨を申述したと みなされる。"], "answer": 2, "exp": "正しいのは選択肢3。遺産分割までに生じた賃料債権は各相続人が相続分に応じて確定的に取得するので、後の分割で不動産をBが取得しても、Cが既に取得した賃料を清算する必要はありません(最判平17.9.8)。配偶者でも子でもBの相続分は変わらず(選択肢1)、A死亡後のB死亡は代襲でなくBの相続人が承継し(選択肢2)、限定承認は共同相続人全員で行います(選択肢4)。", "year": "H29-6", "diff": "C"}, {"id": "kako-ken-H29-9", "subject": "権利関係", "topic": "相続", "type": "select", "q": "1 億 2 ,000 万円の財産を有するＡが死亡した。Ａには、配偶者はなく、子Ｂ、Ｃ、Ｄがおり、Ｂには子Ｅが、Ｃには子Ｆがいる。Ｂは相続を放棄した。また、Ｃは生前のＡを強迫して遺言作成を妨害したため、相続人となることができない。この場合における法定相続分に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["Ｄが 4 ,000 万円、Ｅが 4 ,000 万円、Ｆが 4 ,000 万円となる。", "Ｄが 1 億 2 ,000 万円となる。", "Ｄが 6 ,000 万円、Ｆが 6 ,000 万円となる。", "Ｄが 6 ,000 万円、Ｅが 6 ,000 万円となる。"], "answer": 2, "exp": "正解は選択肢3。Bは相続放棄しており、放棄は代襲原因ではないためBの子Eは代襲できません。一方Cは相続欠格ですが、欠格は代襲原因なのでCの子Fは代襲相続します。結果、相続人はDとFの2人で各2分の1、1億2000万円を分けてD6000万円・F6000万円となります。放棄と欠格で代襲の可否が分かれる点がポイントです。", "year": "H29-9", "diff": "B"}, {"id": "kako-ken-H30-10", "subject": "権利関係", "topic": "相続", "type": "select", "q": "相続に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。（改題）", "choices": ["無権代理人が本人に無断で本人の不動産を売却した後に、単独で本人を相続した場合、本 人が自ら当該不動産を売却したのと同様な法律上の効果が生じる。", "相続財産に属する不動産について、遺産分割前に単独の所有権移転登記をした共同相続人 から移転登記を受けた第三取得者に対し、他の共同相続人は、自己の持分を登記なくして 対抗することができる。", "連帯債務者の一人が死亡し、その相続人が数人ある場合、相続人らは被相続人の債務の分 割されたものを承継し、各自その承継した範囲において本来の債務者とともに連帯債務者 となる。", "共同相続に基づく共有物の持分価格が過半数を超える相続人は、協議なくして単独で共有 物を占有する他の相続人に対して、その共有物の明渡しを請求することはできない。"], "answer": 3, "exp": "誤りは選択肢4。持分価格が過半数を超える相続人は、共有物の管理行為として、協議なく単独占有する他の相続人に対し明渡しを請求できるので、「請求できない」は誤りです。無権代理人が本人を単独相続すると本人が自ら行為したのと同じ効果が生じ(選択肢1)、遺産分割前の単独登記からの第三取得者に他の共同相続人は登記なく持分を対抗でき(選択肢2)、連帯債務は相続人が分割して承継します(選択肢3)。", "year": "H30-10", "diff": "C"}, {"id": "kako-ken-R1-6", "subject": "権利関係", "topic": "相続", "type": "select", "q": "遺産分割に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。", "choices": ["被相続人は、遺言によって遺産分割を禁止することはできず、共同相続人は、遺産分割協 議によって遺産の全部又は一部の分割をすることができる。", "共同相続人は、既に成立している遺産分割協議につき、その全部又は一部を全員の合意に より解除した上、改めて遺産分割協議を成立させることができる。", "遺産に属する預貯金債権は、相続開始と同時に当然に相続分に応じて分割され、共同相続 人は、その持分に応じて、単独で預貯金債権に関する権利を行使することができる。", "遺産の分割は、共同相続人の遺産分割協議が成立した時から効力を生ずるが、第三者の権 利を害することはできない。"], "answer": 1, "exp": "正しいのは選択肢2。既に成立した遺産分割協議も、共同相続人全員の合意で解除して改めて協議をやり直すことができます(最判平2.9.27)。被相続人は遺言で5年以内なら遺産分割を禁止でき(選択肢1)、預貯金債権は当然分割されず遺産分割の対象となり(選択肢3)、遺産分割の効力は協議成立時ではなく相続開始時に遡って生じます(選択肢4)。", "year": "R1-6", "diff": "C"}, {"id": "kako-ken-R2-10月-8", "subject": "権利関係", "topic": "相続", "type": "select", "q": "相続（令和 2 年 7 月 1 日に相続の開始があったもの）に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["相続回復の請求権は、相続人又はその法定代理人が相続権を侵害された事実を知った時か ら 5 年間行使しないときは、時効によって消滅する。", "被相続人の子が相続開始以前に死亡したときは、その者の子がこれを代襲して相続人とな るが、さらに代襲者も死亡していたときは、代襲者の子が相続人となることはない。", "被相続人に相続人となる子及びその代襲相続人がおらず、被相続人の直系尊属が相続人と なる場合には、被相続人の兄弟姉妹が相続人となることはない。", "被相続人の兄弟姉妹が相続人となるべき場合であっても、相続開始以前に兄弟姉妹及びそ の子がいずれも死亡していたときは、その者の子（兄弟姉妹の孫）が相続人となることは ない。"], "answer": 1, "exp": "誤りは選択肢2。子の代襲者(孫)も相続開始前に死亡していれば、その子(ひ孫)が再代襲して相続人となります。直系卑属には再代襲があるので「相続人となることはない」は誤りです。相続回復請求権は5年・20年で時効消滅し(選択肢1)、直系尊属が相続する場合は兄弟姉妹は相続人にならず(選択肢3)、兄弟姉妹の系統には再代襲がなく甥姪の子は相続人になりません(選択肢4)。", "year": "R2-10月-8", "diff": "B"}, {"id": "kako-ken-R2-12月-8", "subject": "権利関係", "topic": "相続", "type": "select", "q": "1 億 2 ,000 万円の財産を有するＡが死亡した場合の法定相続分についての次の記述のうち、民法の規定によれば、正しいものの組み合わせはどれか。ア Ａの長男の子Ｂ及びＣ、Ａの次男の子Ｄのみが相続人になる場合の法定相続分は、それぞれ 4 ,000 万円である。イ Ａの長男の子Ｂ及びＣ、Ａの次男の子Ｄのみが相続人になる場合の法定相続分は、Ｂ及びＣがそれぞれ 3 ,000 万円、Ｄが 6 ,000 万円である。ウ Ａの父方の祖父母Ｅ及びＦ、Ａの母方の祖母Ｇのみが相続人になる場合の法定相続分は、それぞれ 4 ,000 万円である。エ Ａの父方の祖父母Ｅ及びＦ、Ａの母方の祖母Ｇのみが相続人になる場合の法定相続分は、Ｅ及びＦがそれぞれ 3 ,000 万円、Ｇが 6 ,000 万円である。", "choices": ["ア、ウ", "ア、エ", "イ、ウ", "イ、エ"], "answer": 2, "exp": "正しい組合せはイとウで、正解は選択肢3。イ…長男・次男が各6000万円で、代襲する長男の子B・Cはこれを分けて各3000万円、次男の子Dは6000万円(株分け)。ウ…直系尊属が相続人のときは各自均等なので、祖父母E・F・Gは各4000万円。よって、頭数で均等とするア、直系尊属を均等にしないエはいずれも誤りです。", "year": "R2-12月-8", "diff": "A"}, {"id": "kako-ken-R3-10月-4", "subject": "権利関係", "topic": "相続", "type": "select", "q": "被相続人Ａの配偶者Ｂが、Ａ所有の建物に相続開始の時に居住していたため、遺産分割協議によって配偶者居住権を取得した場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["遺産分割協議でＢの配偶者居住権の存続期間を 20 年と定めた場合、存続期間が満了した 時点で配偶者居住権は消滅し、配偶者居住権の延長や更新はできない。", "Ｂは、配偶者居住権の存続期間内であれば、居住している建物の所有者の承諾を得ること なく、第三者に当該建物を賃貸することができる。", "配偶者居住権の存続期間中にＢが死亡した場合、Ｂの相続人ＣはＢの有していた配偶者居 住権を相続する。", "Ｂが配偶者居住権に基づいて居住している建物が第三者Ｄに売却された場合、Ｂは、配偶 者居住権の登記がなくてもＤに対抗することができる。"], "answer": 0, "exp": "正しいのは選択肢1。配偶者居住権は原則終身ですが、遺産分割協議で存続期間を20年と定めればその満了で消滅し、延長や更新はできません。所有者の承諾なく第三者へ賃貸することはできず(選択肢2)、配偶者居住権は配偶者の死亡で終了し相続されず(選択肢3)、登記がなければ建物の買主など第三者に対抗できません(選択肢4)。", "year": "R3-10月-4", "diff": "C"}, {"id": "kako-ken-R3-10月-9", "subject": "権利関係", "topic": "相続", "type": "select", "q": "Ａには死亡した夫Ｂとの間に子Ｃがおり、Ｄには離婚した前妻Ｅとの間に子Ｆ及び子Ｇがいる。Ｆの親権はＥが有し、Ｇの親権はＤが有している。ＡとＤが婚姻した後にＤが令和 3 年 7 月 1 日に死亡した場合における法定相続分として、民法の規定によれば、正しいものはどれか。", "choices": ["Ａが 2 分の 1 、Ｆが 4 分の 1 、Ｇが 4 分の 1", "Ａが 2 分の 1 、Ｃが６分の 1 、Ｆが 6 分の 1 、Ｇが 6 分の 1", "Ａが 2 分の 1 、Ｇが 2 分の 1", "Ａが 2 分の 1 、Ｃが 4 分の 1 、Ｇが 4 分の 1"], "answer": 0, "exp": "正解は選択肢1。婚姻したAは配偶者として2分の1を相続し、Dの子F・Gが残り2分の1を均等に4分の1ずつ相続します。親権の有無は相続分に関係なく、Aの連れ子CはDと血族関係がないため、養子縁組をしていない以上Dの相続人にはなりません。よってA2分の1・F4分の1・G4分の1となります。", "year": "R3-10月-9", "diff": "B"}, {"id": "kako-ken-R3-12月-7", "subject": "権利関係", "topic": "相続", "type": "select", "q": "令和 3 年 7 月 1 日になされた遺言に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["自筆証書によって遺言をする場合、遺言者は、その全文、日付及び氏名を自書して押印し なければならないが、これに添付する相続財産の目録については、遺言者が毎葉に署名押 印すれば、自書でないものも認められる。", "公正証書遺言の作成には、証人 2 人以上の立会いが必要であるが、推定相続人は、未成年 者でなくとも、証人となることができない。", "船舶が遭難した場合、当該船舶中にいて死亡の危急に迫った者は、証人 2 人以上の立会い があれば、口頭で遺言をすることができる。", "遺贈義務者が、遺贈の義務を履行するため、受遺者に対し、相当の期間を定めて遺贈の承 認をすべき旨の催告をした場合、受遺者がその期間内に意思表示をしないときは、遺贈を 放棄したものとみなされる。"], "answer": 3, "exp": "誤りは選択肢4。受遺者が催告期間内に承認・放棄の意思表示をしないときは、遺贈を「承認」したものとみなされます(放棄ではありません)。自筆証書に添付する財産目録は毎葉に署名押印すれば自書でなくてもよく(選択肢1)、推定相続人は成年でも証人になれず(選択肢2)、船舶遭難時は証人2人以上の立会いで口頭遺言ができます(選択肢3)。", "year": "R3-12月-7", "diff": "C"}, {"id": "kako-ken-R4-2", "subject": "権利関係", "topic": "相続", "type": "select", "q": "相続に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["被相続人の生前においては、相続人は、家庭裁判所の許可を受けることにより、遺留分を 放棄することができる。", "家庭裁判所への相続放棄の申述は、被相続人の生前には行うことができない。", "相続人が遺留分の放棄について家庭裁判所の許可を受けると、当該相続人は、被相続人の 遺産を相続する権利を失う。", "相続人が被相続人の兄弟姉妹である場合、当該相続人には遺留分がない。"], "answer": 2, "exp": "誤りは選択肢3。遺留分を放棄しても相続権そのものは失わず、遺産を相続する権利は残ります。相続開始前は家裁の許可を得て遺留分を放棄でき(選択肢1)、相続放棄は被相続人の生前にはできず(選択肢2)、兄弟姉妹には遺留分がありません(選択肢4)。遺留分の放棄と相続放棄・相続権喪失を混同させるひっかけです。", "year": "R4-2", "diff": "A"}, {"id": "kako-ken-R5-1", "subject": "権利関係", "topic": "相続", "type": "select", "q": "次の 1 から 4 までの記述のうち、民法の規定、判例及び下記判決文によれば、誤っているものはどれか。（判決文）遺産は、相続人が数人あるときは、相続開始から遺産分割までの間、共同相続人の共有に属するものであるから、この間に遺産である賃貸不動産を使用管理した結果生ずる金銭債権たる賃料債権は、遺産とは別個の財産というべきであって、各共同相続人がその相続分に応じて分割単独債権として確定的に取得するものと解するのが相当である。", "choices": ["遺産である不動産から、相続開始から遺産分割までの間に生じた賃料債権は、遺産である 不動産が遺産分割によって複数の相続人のうちの一人に帰属することとなった場合、当該 不動産が帰属することになった相続人が相続開始時にさかのぼって取得する。", "相続人が数人あるときは、相続財産は、その共有に属し、各共同相続人は、その相続分に 応じて被相続人の権利義務を承継する。", "遺産分割の効力は、相続開始の時にさかのぼって生ずる。ただし、第三者の権利を害する ことはできない。", "遺産である不動産が遺産分割によって複数の相続人のうちの一人に帰属することとなった 場合、当該不動産から遺産分割後に生じた賃料債権は、遺産分割によって当該不動産が帰 属した相続人が取得する。"], "answer": 0, "exp": "誤りは選択肢1。判決文は、遺産分割までに生じた賃料債権は遺産とは別個の財産で各共同相続人が相続分に応じて確定的に取得するとしています。よって不動産が一人に帰属しても賃料が相続開始時に遡ってその相続人のものになるわけではなく、選択肢1は判決文と矛盾します。共有と相続分承継(選択肢2)、遺産分割の遡及効(選択肢3)、分割後の賃料は帰属した相続人が取得する点(選択肢4)は正しい記述です。", "year": "R5-1", "diff": "C"}, {"id": "kako-ken-R5-7", "subject": "権利関係", "topic": "相続", "type": "select", "q": "甲建物を所有するＡが死亡し、Ａの配偶者Ｂが甲建物の配偶者居住権を、Ａの子Ｃが甲建物の所有権をそれぞれ取得する旨の遺産分割協議が成立した場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["遺産分割協議において、Ｂの配偶者居住権の存続期間が定められなかった場合、配偶者居 住権の存続期間は 20 年となる。", "Ｂが高齢となり、バリアフリーのマンションに転居するための資金が必要になった場合、 Ｂは、Ｃの承諾を得ずに甲建物を第三者Ｄに賃貸することができる。", "Ｃには、Ｂに対し、配偶者居住権の設定の登記を備えさせる義務がある。", "Ｃは、甲建物の通常の必要費を負担しなければならない。"], "answer": 2, "exp": "正しいのは選択肢3。居住建物の所有者Cは、配偶者居住権を取得したBに対し設定登記を備えさせる義務を負います。存続期間を定めなければ配偶者の終身の間となり20年ではなく(選択肢1)、所有者の承諾なく第三者へ賃貸することはできず(選択肢2)、通常の必要費は配偶者Bが負担します(選択肢4)。", "year": "R5-7", "diff": "B"}, {"id": "kako-ken-R6-4", "subject": "権利関係", "topic": "相続", "type": "select", "q": "Ａを売主、Ｂを買主として甲土地の売買契約（以下この問において「本件契約」という。）が締結された直後にＡが死亡し、ＣがＡを単独相続した場合における次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["売買代金を受領したＣが甲土地の引渡しを拒絶する意思を明確に表示したとしても、Ｂ は、Ｃに対して相当の期間を定めた催告をしなければ、本件契約を解除することができな い。", "Ｂが期日までに売買代金を支払わない場合であっても、本件契約の解除権はＡの一身に専 属した権利であるため、Ｃは本件契約を解除することはできない。", "Ｂは、売買代金が支払い済みだったとしても、甲土地の所有権登記を備えなければ、Ｃに 対して甲土地の引渡しを請求することはできない。", "本件契約が、Ａの詐欺により締結されたものである場合、ＢはＣに対して、本件契約の取 消しを主張することができる。"], "answer": 3, "exp": "相続人は被相続人の財産上の地位（権利義務）を包括して承継します。売主Ａの詐欺で結ばれた契約なら買主Ｂは取消しでき、その相手方の地位はＣが引き継ぐので、ＢはＣに対して取消しを主張できます。ひっかけとして、1は債務全部の履行拒絶を明確に表示した場合は無催告で解除でき（542条）催告は不要、2の解除権は一身専属権ではなく相続の対象、3の売買当事者ＢとＣは対抗関係でないため登記不要、といずれも誤りです。", "year": "R6-4", "diff": "A"}, {"id": "kako-ken-H29-3", "subject": "権利関係", "topic": "共有", "type": "select", "q": "次の 1 から 4 までの記述のうち、民法の規定及び下記判決文によれば、誤っているものはどれか。（判決文）共有者の一部の者から共有者の協議に基づかないで共有物を占有使用することを承認された第三者は、その者の占有使用を承認しなかった共有者に対して共有物を排他的に占有する権原を主張することはできないが、現にする占有がこれを承認した共有者の持分に基づくものと認められる限度で共有物を占有使用する権原を有するので、第三者の占有使用を承認しなかった共有者は右第三者に対して当然には共有物の明渡しを請求することはできないと解するのが相当である。", "choices": ["共有者は、他の共有者との協議に基づかないで当然に共有物を排他的に占有する権原を有 するものではない。", "ＡとＢが共有する建物につき、ＡＢ間で協議することなくＡがＣと使用貸借契約を締結し た場合、Ｂは当然にはＣに対して当該建物の明渡しを請求することはできない。", "ＤとＥが共有する建物につき、ＤＥ間で協議することなくＤがＦと使用貸借契約を締結し た場合、Ｆは、使用貸借契約を承認しなかったＥに対して当該建物全体を排他的に占有す る権原を主張することができる。", "ＧとＨが共有する建物につき、Ｇがその持分を放棄した場合は、その持分はＨに帰属する。"], "answer": 2, "exp": "判決文のポイントは、共有者の一部から占有を承認された第三者は、承認しなかった共有者に対して共有物を排他的に占有する権原までは主張できない、という点です。よって3のＦがＥに対し建物全体の排他的占有権原を主張できるとする記述が誤りで、これが正解となります。ＥはＦに当然には明渡しを請求できないものの、それはＦが持分に応じた占有権原を持つからにすぎません。", "year": "H29-3", "diff": "B"}, {"id": "kako-ken-R2-12月-10", "subject": "権利関係", "topic": "共有", "type": "select", "q": "不動産の共有に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。（改題）", "choices": ["共有物の各共有者の持分が不明な場合、持分は平等と推定される。", "各共有者は、他の共有者の同意を得なければ、共有物に変更（その形状又は効用の著しい 変更を伴わないものを除く。）を加えることができない。", "共有物の保存行為については、各共有者が単独ですることができる。", "共有者の一人が死亡して相続人がないときは、その持分は国庫に帰属する。"], "answer": 3, "exp": "共有者の一人が死亡して相続人がいないとき、その持分は国庫ではなく他の共有者に帰属します（255条）。よって国庫帰属とする4が誤りで正解です。持分が不明なら平等と推定、変更（軽微なものを除く）は全員の同意、保存行為は各自単独で可、という1・2・3はいずれも正しい内容です。", "year": "R2-12月-10", "diff": "A"}, {"id": "kako-ken-R6-3", "subject": "権利関係", "topic": "共有", "type": "select", "q": "甲土地につき、Ａ、Ｂ、Ｃ、Ｄの４人がそれぞれ４分の１の共有持分を有していて、Ａ、Ｂ、ＣのいずれもＤの所在を知ることができない場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、Ｄの共有持分は、相続財産には属していないものとする。", "choices": ["甲土地に、その形状又は効用の著しい変更を伴う変更を加える場合には、共有者の過半数 の同意が必要であり、本件ではＡ、Ｂ、Ｃ３人の同意が必要となる。", "甲土地の所有権の登記名義人となっている者が所有者ではないＥである場合、持分に基づ いてＥに対して登記の抹消を求めるためには、所在が判明しているＡ、Ｂ、Ｃのうち２人 の同意が必要である。", "Ａ、Ｂ、Ｃ３人の同意があれば、甲土地を資材置場として賃借したいＦとの間で期間を３ 年とする賃貸借契約を締結することができる。", "Ａが裁判所に請求して、裁判所がＤの持分をＡに取得させる旨の決定をした場合、Ｄは、 その決定から３年以内に限り、Ａが取得したＤの共有持分の時価相当額をＡに対して支払 うよう請求することができる。"], "answer": 2, "exp": "土地で5年以内（建物なら3年以内）の短期賃貸借の設定は管理行為にあたり、持分価格の過半数で決められます。持分4分の1ずつのＡＢＣ3人で4分の3となり過半数を満たすため、3年の資材置場賃貸借を締結できる3が正解です。1の重大変更は全員同意が必要で過半数では足りず、2の登記抹消請求は保存行為で単独可、4の所在等不明共有者の持分取得後の時価相当額支払請求に3年の制限はなく、いずれも誤りです。", "year": "R6-3", "diff": "C"}, {"id": "kako-ken-H27-13", "subject": "権利関係", "topic": "区分所有法", "type": "select", "q": "建物の区分所有等に関する法律に関する次の記述のうち、正しいものはどれか。", "choices": ["管理者が選任されていない場合、集会においては、規約に別段の定めがある場合及び別段 の決議をした場合を除いて、集会を招集した区分所有者の 1 人が議長となる。", "集会の招集の通知は、会日より少なくとも 2 週間前に発しなければならないが、この期間 は規約で伸縮することができる。", "集会の議事録が書面で作成されているときは、議長及び集会に出席した区分所有者の 1 人 がこれに署名し、押印をしなければならない。", "区分所有者は、規約に別段の定めがない限り集会の決議によって、管理者を選任すること ができる。この場合、任期は 2 年以内としなければならない。"], "answer": 0, "exp": "管理者が選任されていない場合、規約や別段の決議がなければ、集会を招集した区分所有者の一人が議長となります（41条）。よって1が正しく正解です。2の招集通知は1週間前で規約で伸長できるだけ、3の議事録は議長と出席区分所有者2人が署名し押印は不要、4の管理者選任に任期の定めはなく、いずれも誤りです。", "year": "H27-13", "diff": "B"}, {"id": "kako-ken-H28-13", "subject": "権利関係", "topic": "区分所有法", "type": "select", "q": "建物の区分所有等に関する法律に関する次の記述のうち、正しいものはどれか。", "choices": ["管理者は、集会において、毎年 2 回一定の時期に、その事務に関する報告をしなければな らない。", "管理者は、規約に特別の定めがあるときは、共用部分を所有することができる。", "管理者は、自然人であるか法人であるかを問わないが、区分所有者でなければならない。", "各共有者の共用部分の持分は、規約で別段の定めをしない限り、共有者数で等分すること とされている。"], "answer": 1, "exp": "管理者は、規約に特別の定めがあれば共用部分を所有できます（管理所有、27条）。よって2が正しく正解です。1の事務報告は毎年1回（2回ではない）、3の管理者は区分所有者でなくてもよい、4の共用部分の持分は専有部分の床面積割合が原則で人数等分ではない、といずれも誤りです。", "year": "H28-13", "diff": "B"}, {"id": "kako-ken-H29-13", "subject": "権利関係", "topic": "区分所有法", "type": "select", "q": "建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれか。（改題）", "choices": ["管理者は、少なくとも毎年 1 回集会を招集しなければならない。", "区分所有者（議決権を有しないものを除く。）の５分の１以上の者であって議決権の５分 の１以上を有するものは、管理者に対し、会議の目的たる事項を示して、集会の招集を請 求することができるが、この定数は、規約で減ずることはできない。", "集会の招集の通知は、区分所有者が管理者に対して通知を受け取る場所をあらかじめ通知 した場合には、管理者はその場所にあててすれば足りる。", "集会は、区分所有者（議決権を有しないものを除く。）全員の同意があるときは、招集の 手続を経ないで開くことができる。"], "answer": 1, "exp": "集会招集を請求できる区分所有者の定数（5分の1以上）は、規約で減ずることができます（34条3項）。よって「減ずることはできない」とする2が誤りで正解です。毎年1回以上の集会招集、通知場所の指定、全員同意による招集手続の省略、という1・3・4は正しい内容です。", "year": "H29-13", "diff": "B"}, {"id": "kako-ken-H30-13", "subject": "権利関係", "topic": "区分所有法", "type": "select", "q": "建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれか。なお、集会成立の定足数は満たしているものとする。（改題）", "choices": ["規約の設定、変更又は廃止を行う場合は、出席した区分所有者の過半数による集会の決議 によってなされなければならない。", "規約を保管する者は、利害関係人の請求があったときは、正当な理由がある場合を除い て、規約の閲覧を拒んではならず、閲覧を拒絶した場合は 20 万円以下の過料に処される。", "規約の保管場所は、建物内の見やすい場所に掲示しなければならない。", "占有者は、建物又はその敷地若しくは附属施設の使用方法につき、区分所有者が規約又は 集会の決議に基づいて負う義務と同一の義務を負う。"], "answer": 0, "exp": "規約の設定・変更・廃止は、区分所有者および議決権の各4分の3以上という特別多数決で行います（31条）。よって「出席した区分所有者の過半数」とする1が誤りで正解です。閲覧拒絶の過料、保管場所の掲示、占有者の義務、という2・3・4は正しい内容です。", "year": "H30-13", "diff": "A"}, {"id": "kako-ken-R1-13", "subject": "権利関係", "topic": "区分所有法", "type": "select", "q": "建物の区分所有等に関する法律（以下この問において「法」という。）に関する次の記述のうち、正しいものはどれか。（改題）", "choices": ["専有部分が数人の共有に属するときは、共有者は、集会においてそれぞれ議決権を行使す ることができる。", "区分所有者の承諾を得て専有部分を占有する者は、会議の目的たる事項につき利害関係を 有する場合には、集会に出席して議決権を行使することができる。", "集会においては、規約に別段の定めがある場合及び別段の決議をした場合を除いて、管理 者又は集会を招集した区分所有者の 1 人が議長となる。", "集会の議事は、法又は規約に別段の定めがない限り、区分所有者（議決権を有しないもの を除く。）及び議決権の各 4 分の 3 以上の多数で決する。"], "answer": 2, "exp": "集会の議長は、規約や別段の決議がなければ管理者または招集した区分所有者の一人が務めます（41条）。よって3が正しく正解です。1の共有の専有部分は議決権行使者を1人に定める必要があり各自行使は不可、2の占有者は意見は述べられるが議決権は行使できない、4の集会の議事は原則として各過半数（4分の3ではない）で決する、といずれも誤りです。", "year": "R1-13", "diff": "A"}, {"id": "kako-ken-R2-10月-13", "subject": "権利関係", "topic": "区分所有法", "type": "select", "q": "建物の区分所有等に関する法律に関する次の記述のうち、正しいものはどれか。なお、集会成立の定足数は満たしているものとする。（改題）", "choices": ["共用部分の変更（その形状又は効用の著しい変更を伴わないものを除く。）は、出席した 区分所有者及びその議決権の各過半数（規約で定めた場合にあっては、その割合）以上の 多数による集会の決議で決する。", "共用部分の管理に係る費用については、規約に別段の定めがない限り、共有者で等分する。", "共用部分の保存行為をするには、規約に別段の定めがない限り、集会の決議で決する必要 があり、各共有者ですることはできない。", "一部共用部分は、これを共用すべき区分所有者の共有に属するが、規約で別段の定めをす ることにより、区分所有者全員の共有に属するとすることもできる。"], "answer": 3, "exp": "一部共用部分は本来それを共用すべき区分所有者の共有ですが、規約で区分所有者全員の共有とすることもできます（11条2項）。よって4が正しく正解です。1の重大変更は各4分の3以上で過半数では足りず、2の費用は持分に応じて負担し等分ではなく、3の保存行為は各共有者が単独ででき集会決議は不要、といずれも誤りです。", "year": "R2-10月-13", "diff": "B"}, {"id": "kako-ken-R2-12月-13", "subject": "権利関係", "topic": "区分所有法", "type": "select", "q": "建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれか。", "choices": ["規約の保管場所は、建物内の見やすい場所に掲示しなければならない。", "管理者は、規約に特別の定めがあるときは、共用部分を所有することができる。", "規約及び集会の決議は、区分所有者の特定承継人に対しては、その効力を生じない。", "区分所有者は、規約に別段の定めがない限り集会の決議によって、管理者を解任すること ができる。"], "answer": 2, "exp": "規約および集会の決議は、区分所有者の特定承継人（買主など）に対しても効力を生じます（46条）。よって「効力を生じない」とする3が誤りで正解です。保管場所の掲示、管理所有、集会決議による管理者の解任、という1・2・4は正しい内容です。", "year": "R2-12月-13", "diff": "A"}, {"id": "kako-ken-R3-10月-13", "subject": "権利関係", "topic": "区分所有法", "type": "select", "q": "建物の区分所有等に関する法律（以下この問において「法」という。）に関する次の記述のうち、誤っているものはどれか。なお、集会成立の定足数は満たしているものとする。（改題）", "choices": ["法又は規約により集会において決議をすべき場合において、区分所有者（議決権を有しな いものを除く。）が１人でも反対するときは、集会を開催せずに書面又は電磁的方法によっ て決議をすることはできない。", "形状又は効用の著しい変更を伴う共用部分の変更については、出席した区分所有者及びそ の議決権の各過半数（規約で定めた場合にあっては、その割合）以上の多数による集会の 決議で決する。", "敷地利用権が数人で有する所有権その他の権利である場合には、規約に別段の定めがある ときを除いて、区分所有者は、その有する専有部分とその専有部分に係る敷地利用権とを 分離して処分することができない。", "各共有者の共用部分の持分は、規約に別段の定めがある場合を除いて、その有する専有部 分の床面積の割合によるが、この床面積は壁その他の区画の中心線で囲まれた部分の水平 投影面積である。"], "answer": 3, "exp": "共用部分の持分の基礎となる専有部分の床面積は、壁など区画の内側線で囲まれた部分の水平投影面積（内法計算）で測ります。よって「中心線」とする4が誤りで正解です。なお形状・効用の著しい変更を伴う共用部分の変更は各4分の3以上の多数で決する点、書面決議には全員の承諾が要る点、分離処分の禁止も併せて押さえましょう。", "year": "R3-10月-13", "diff": "B"}, {"id": "kako-ken-R3-12月-13", "subject": "権利関係", "topic": "区分所有法", "type": "select", "q": "建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれか。", "choices": ["区分所有者以外の者であって区分所有者の承諾を得て専有部分を占有する者は、会議の目 的たる事項につき利害関係を有する場合には、集会に出席して議決権を行使することはで きないが、意見を述べることはできる。", "最初に建物の専有部分の全部を所有する者は、公正証書により、共用部分（数個の専有部 分に通ずる廊下又は階段室その他構造上区分所有者の全員又はその一部の共用に供される べき建物の部分）の規約を設定することができる。", "共用部分は、区分所有者全員の共有に属するが、規約に特別の定めがあるときは、管理者 を共用部分の所有者と定めることもできる。", "管理組合法人を設立する場合は、理事を置かなければならず、理事が数人ある場合におい て、規約に別段の定めがないときは、管理組合法人の事務は、理事の過半数で決する。"], "answer": 1, "exp": "公正証書で規約を設定できるのは、規約共用部分・規約敷地・分離処分の禁止・敷地利用権の割合の4事項に限られます。廊下や階段室のような構造上当然の共用部分は法定共用部分で、公正証書規約の対象にはできないため、これを設定できるとする2が誤りで正解です。占有者の意見陳述権、管理所有、管理組合法人の理事の過半数決、という1・3・4は正しい内容です。", "year": "R3-12月-13", "diff": "C"}, {"id": "kako-ken-R4-13", "subject": "権利関係", "topic": "区分所有法", "type": "select", "q": "建物の区分所有等に関する法律（以下この問において「法」という。）に関する次の記述のうち、誤っているものはどれか。なお、集会成立の定足数は満たしているものとする。（改題）", "choices": ["管理者は、規約により、その職務に関し、区分所有者のために、原告又は被告となったと きは、その旨を各区分所有者に通知しなくてよい。", "管理者がないときは、区分所有者の５分の１以上の者であって議決権の 5 分の 1 以上を有 するものは、集会を招集することができる。ただし、この定数は、規約で減ずることがで きる。", "集会において、管理者の選任を行う場合、規約に別段の定めがない限り、区分所有者及び 議決権の各過半数で決する。", "管理組合（法第３条に規定する区分所有者の団体をいう。）は、出席した区分所有者及び その議決権の各４分の３以上の多数による決議で法人となる旨並びにその名称及び事務所 を定め、かつ、その主たる事務所の所在地において登記をすることによって法人となる。"], "answer": 0, "exp": "管理者が規約の定めにより訴訟の原告・被告となったときは、区分所有者にその旨を通知しなければなりません（26条5項）。集会決議による場合と違い規約による場合は区分所有者が知り得ないためで、「通知しなくてよい」とする1が誤りで正解です。招集請求の定数と規約での減少、管理者選任の各過半数、法人化の要件、という2・3・4は正しい内容です。", "year": "R4-13", "diff": "B"}, {"id": "kako-ken-R5-13", "subject": "権利関係", "topic": "区分所有法", "type": "select", "q": "建物の区分所有等に関する法律（以下この問において「法」という。）に関する次の記述のうち、誤っているものはどれか。（改題）", "choices": ["集会においては、法で集会の決議につき特別の定数が定められている事項を除き、規約で 別段の定めをすれば、あらかじめ通知した事項以外についても決議することができる。", "集会は、区分所有者（議決権を有しないものを除く。）の 4 分の 3 以上の同意があるとき は、招集の手続を経ないで開くことができる。", "共用部分の保存行為は、規約に別段の定めがある場合を除いて、各共有者がすることがで きるため集会の決議を必要としない。", "一部共用部分に関する事項で区分所有者全員の利害に関係しないものについての区分所有 者全員の規約は、当該一部共用部分を共用すべき区分所有者（議決権を有しないものを除 く。）が８人である場合、 3 人が反対したときは変更することができない。"], "answer": 1, "exp": "招集手続を省略して集会を開けるのは、区分所有者全員の同意があるときに限られます（36条）。よって「4分の3以上」で足りるとする2が誤りで正解です。4は一部共用部分の全員規約は4分の1を超える反対で不可であり、8人ならその4分の1である2人を超える3人の反対で変更できず、正しい記述です。", "year": "R5-13", "diff": "B"}, {"id": "kako-ken-R6-13", "subject": "権利関係", "topic": "区分所有法", "type": "select", "q": "建物の区分所有等に関する法律に関する次の記述のうち、誤っているものはどれか。", "choices": ["各共有者の共用部分の持分は、規約に別段の定めがない限り、共有者数で等分することと されている。", "規約及び集会の決議は、区分所有者の特定承継人に対しても、その効力を生ずる。", "管理者は、集会において、毎年１回一定の時期に、その事務に関する報告をしなければな らない。", "集会の招集の通知は、区分所有者が管理者に対して通知を受けるべき場所を通知しなかっ たときは区分所有者の所有する専有部分が所在する場所にあててすれば足りる。この場合 には、集会の招集の通知は、通常それが到達すべき時に到達したものとみなされる。"], "answer": 0, "exp": "各共有者の共用部分の持分は、規約に別段の定めがなければ専有部分の床面積の割合によります（14条）。よって「共有者数で等分」とする1が誤りで正解です。特定承継人への効力、毎年1回の事務報告、通知場所と到達みなし、という2・3・4は正しい内容です。", "year": "R6-13", "diff": "B"}, {"id": "kako-ken-H27-3", "subject": "権利関係", "topic": "賃貸借", "type": "select", "q": "ＡＢ間で、Ａを貸主、Ｂを借主として、Ａ所有の甲建物につき、①賃貸借契約を締結した場合と、②使用貸借契約を締結した場合に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。（改題）", "choices": ["Ｂが死亡した場合、①では契約は終了しないが、②では契約が終了する。", "Ｂは、①では、甲建物のＡの負担に属する必要費を支出したときは、Ａに対しその償還を 請求することができるが、②では、甲建物の通常の必要費を負担しなければならない。", "ＡＢ間の契約は、①では諾成契約であり、②も諾成契約である。", "ＡはＢに対して、甲建物の契約不適合について、①では担保責任を負う場合があるが、② では担保責任を負わない。"], "answer": 3, "exp": "使用貸借でも、貸主は目的物の契約不適合について担保責任を負う場合があります（贈与の規定を準用）。よって「②では担保責任を負わない」と言い切る4が誤りで正解です。使用貸借は借主の死亡で終了する点、賃貸借の必要費は賃貸人負担で使用貸借の通常必要費は借主負担である点、どちらも諾成契約である点、という1・2・3は正しい内容です。", "year": "H27-3", "diff": "C"}, {"id": "kako-ken-H27-9", "subject": "権利関係", "topic": "賃貸借", "type": "select", "q": "土地の転貸借に関する次の 1 から 4 までの記述のうち、民法の規定、判例及び下記判決文によれば、誤っているものはどれか。（判決文）土地の賃借人が賃貸人の承諾を得ることなく右土地を他に転貸しても、転貸について賃貸人に対する背信行為と認めるに足りない特段の事情があるため賃貸人が民法第 612 条第 2 項により賃貸借を解除することができない場合において、賃貸人が賃借人（転貸人）と賃貸借を合意解除しても、これが賃借人の賃料不払等の債務不履行があるため賃貸人において法定解除権の行使ができるときにされたものである等の事情のない限り、賃貸人は、転借人に対して右合意解除の効果を対抗することができず、したがって、転借人に対して賃貸土地の明渡を請求することはできないものと解するのが相当である。", "choices": ["土地の賃借人が無断転貸した場合において賃貸人に対する背信行為と認めるに足りない特 段の事情があるため賃貸人が無断転貸を理由に賃貸借契約を解除できないときであって も、賃貸借契約を合意解除したときは、賃貸人は転借人に対して賃貸土地の明渡しを請求 することができる。", "土地の賃貸人が転貸借について承諾を与えた場合には、賃貸人は、無断転貸を理由として は賃貸借契約を解除することはできないが、賃借人と賃貸借契約を合意解除することは可 能である。", "土地の賃借人が無断転貸した場合、賃貸人は、賃貸借契約を民法第 612 条第 2 項により解 除できる場合とできない場合があり、土地の賃借人が賃料を支払わない場合にも、賃貸人 において法定解除権を行使できる場合とできない場合がある。", "土地の賃借人が無断転貸した場合、転借人は、賃貸人と賃借人との間で賃貸借契約が合意 解除されたとしても、賃貸人からの賃貸土地の明渡し請求を拒絶することができる場合が ある。"], "answer": 0, "exp": "判決文によれば、無断転貸でも背信行為と認めるに足りない特段の事情があり解除できない場合、賃貸借を合意解除しても賃貸人はその効果を転借人に対抗できず、明渡しを請求できません。よって「明渡しを請求できる」とする1が誤りで正解です。合意解除自体は可能だが転借人には対抗できないという枠組みが判決文の核心です。", "year": "H27-9", "diff": "C"}, {"id": "kako-ken-H28-8", "subject": "権利関係", "topic": "賃貸借", "type": "select", "q": "ＡがＢに甲建物を月額 10 万円で賃貸し、ＢがＡの承諾を得て甲建物をＣに適法に月額 15 万円で転貸している場合における次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Ａは、Ｂの賃料の不払いを理由に甲建物の賃貸借契約を解除するには、Ｃに対して、賃料 支払の催告をして甲建物の賃料を支払う機会を与えなければならない。", "ＢがＡに対して甲建物の賃料を支払期日になっても支払わない場合、ＡはＣに対して、賃 料 10 万円をＡに直接支払うよう請求することができる。", "ＡがＢの債務不履行を理由に甲建物の賃貸借契約を解除した場合、ＣのＢに対する賃料の 不払いがなくても、ＡはＣに対して、甲建物の明渡しを求めることができる。", "ＡがＢとの間で甲建物の賃貸借契約を合意解除した場合、ＡはＣに対して、Ｂとの合意解 除に基づいて、当然には甲建物の明渡しを求めることができない。"], "answer": 0, "exp": "賃料不払いを理由に賃貸借を解除するには、賃貸人は賃借人Ｂに催告すれば足り、転借人Ｃに支払いの機会を与える必要はありません（判例）。よって「Ｃに催告して機会を与えなければならない」とする1が誤りで正解です。転借人への直接請求は賃借料の範囲（10万円）まで、債務不履行解除は転借人に対抗でき、合意解除は転借人に対抗できない、という2・3・4は正しい内容です。", "year": "H28-8", "diff": "A"}, {"id": "kako-ken-H30-8", "subject": "権利関係", "topic": "賃貸借", "type": "select", "q": "次の 1 から 4 までの記述のうち、民法の規定及び下記判決文によれば、誤っているものはどれか。（判決文）賃借人は、賃貸借契約が終了した場合には、賃借物件を原状に回復して賃貸人に返還する義務があるところ、賃貸借契約は、賃借人による賃借物件の使用とその対価としての賃料の支払を内容とするものであり、賃借物件の損耗の発生は、賃貸借という契約の本質上当然に予定されているものである。それゆえ、建物の賃貸借においては、賃借人が社会通念上通常の使用をした場合に生ずる賃借物件の劣化又は価値の減少を意味する通常損耗に係る投下資本の減価の回収は、通常、減価償却費や修繕費等の必要経費分を賃料の中に含ませてその支払を受けることにより行われている。そうすると、建物の賃借人にその賃貸借において生ずる通常損耗についての原状回復義務を負わせるのは、賃借人に予期しない特別の負担を課すことになるから、賃借人に同義務が認められるためには、（中略）その旨の特約（以下「通常損耗補修特約」という。）が明確に合意されていることが必要であると解するのが相当である。", "choices": ["賃借物件を賃借人がどのように使用しても、賃借物件に発生する損耗による減価の回収 は、賃貸人が全て賃料に含ませてその支払を受けることにより行っている。", "通常損耗とは、賃借人が社会通念上通常の使用をした場合に生ずる賃借物件の劣化又は価 値の減少を意味する。", "賃借人が負担する通常損耗の範囲が賃貸借契約書に明記されておらず口頭での説明等もな い場合に賃借人に通常損耗についての原状回復義務を負わせるのは、賃借人に予期しない 特別の負担を課すことになる。", "賃貸借契約に賃借人が原状回復義務を負う旨が定められていても、それをもって、賃借人 が賃料とは別に通常損耗の補修費を支払う義務があるとはいえない。"], "answer": 0, "exp": "判決文は、社会通念上通常の使用で生じる通常損耗の減価回収を賃料に含めているとしており、「賃借人がどのように使用しても」とはしていません。過度に広げた1が判決文と食い違い、誤りで正解です。通常損耗の定義、明確な特約がなければ通常損耗の原状回復義務を負わせられない点、という2・3・4は判決文どおりで正しい内容です。", "year": "H30-8", "diff": "A"}, {"id": "kako-ken-R2-10月-4", "subject": "権利関係", "topic": "賃貸借", "type": "select", "q": "建物の賃貸借契約が期間満了により終了した場合における次の記述のうち、民法の規定によれば、正しいものはどれか。なお、賃貸借契約は、令和 2 年 7 月 1 日付けで締結され、原状回復義務について特段の合意はないものとする。", "choices": ["賃借人は、賃借物を受け取った後にこれに生じた損傷がある場合、通常の使用及び収益に よって生じた損耗も含めてその損傷を原状に復する義務を負う。", "賃借人は、賃借物を受け取った後にこれに生じた損傷がある場合、賃借人の帰責事由の有 無にかかわらず、その損傷を原状に復する義務を負う。", "賃借人から敷金の返還請求を受けた賃貸人は、賃貸物の返還を受けるまでは、これを拒む ことができる。", "賃借人は、未払賃料債務がある場合、賃貸人に対し、敷金をその債務の弁済に充てるよう 請求することができる。"], "answer": 2, "exp": "敷金返還債務は明渡し後に発生する後履行の関係にあるため、賃貸人は賃貸物の返還を受けるまで敷金の返還を拒めます。よって3が正しく正解です。原状回復義務には通常損耗・経年劣化は含まれず（1が誤り）、賃借人に帰責事由のない損傷も対象外（2が誤り）、敷金を未払賃料に充てるよう請求できるのは賃貸人の側だけ（4が誤り）です。", "year": "R2-10月-4", "diff": "A"}, {"id": "kako-ken-R2-12月-6", "subject": "権利関係", "topic": "賃貸借", "type": "select", "q": "ＡはＢにＡ所有の甲建物を令和 2 年 7 月 1 日に賃貸し、ＢはＡの承諾を得てＣに適法に甲建物を転貸し、Ｃが甲建物に居住している場合における次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["Ａは、Ｂとの間の賃貸借契約を合意解除した場合、解除の当時Ｂの債務不履行による解除 権を有していたとしても、合意解除したことをもってＣに対抗することはできない。", "Ｃの用法違反によって甲建物に損害が生じた場合、ＡはＢに対して、甲建物の返還を受け た時から 1 年以内に損害賠償を請求しなければならない。", "ＡがＤに甲建物を売却した場合、ＡＤ間で特段の合意をしない限り、賃貸人の地位はＤに 移転する。", "ＢがＡに約定の賃料を支払わない場合、Ｃは、Ｂの債務の範囲を限度として、Ａに対して 転貸借に基づく債務を直接履行する義務を負い、Ｂに賃料を前払いしたことをもってＡに 対抗することはできない。"], "answer": 0, "exp": "賃貸借の合意解除は原則として転借人に対抗できませんが、解除の当時に賃貸人が賃借人の債務不履行による解除権を持っていたときは対抗できます（613条3項但書）。よって「解除権を有していたとしても対抗できない」とする1が誤りで正解です。用法違反の損害賠償は返還から1年以内、対抗要件を備えた賃借人がいれば譲受人に賃貸人の地位が移転、転借人は前払いを賃貸人に対抗できない、という2・3・4は正しい内容です。", "year": "R2-12月-6", "diff": "B"}, {"id": "kako-ken-R3-10月-1", "subject": "権利関係", "topic": "賃貸借", "type": "select", "q": "次の 1 から 4 までの記述のうち、民法の規定、判例及び下記判決文によれば、正しいものはどれか。（判決文）賃貸人は、特別の約定のないかぎり、賃借人から家屋明渡を受けた後に前記の敷金残額を返還すれば足りるものと解すべく、したがつて、家屋明渡債務と敷金返還債務とは同時履行の関係にたつものではないと解するのが相当であり、このことは、賃貸借の終了原因が解除（解約）による場合であつても異なるところはないと解すべきである。", "choices": ["賃借人の家屋明渡債務が賃貸人の敷金返還債務に対し先履行の関係に立つと解すべき場 合、賃借人は賃貸人に対し敷金返還請求権をもって家屋につき留置権を取得する余地はな い。", "賃貸借の終了に伴う賃借人の家屋明渡債務と賃貸人の敷金返還債務とは、 1 個の双務契約 によって生じた対価的債務の関係にあるものといえる。", "賃貸借における敷金は、賃貸借の終了時点までに生じた債権を担保するものであって、賃 貸人は、賃貸借終了後賃借人の家屋の明渡しまでに生じた債権を敷金から控除することは できない。", "賃貸借の終了に伴う賃借人の家屋明渡債務と賃貸人の敷金返還債務の間に同時履行の関係 を肯定することは、家屋の明渡しまでに賃貸人が取得する一切の債権を担保することを目 的とする敷金の性質にも適合する。"], "answer": 0, "exp": "判決文は、家屋の明渡しが敷金返還より先履行の関係にあるとし、明渡し前には敷金返還債務がまだ発生しないとしています。したがって賃借人は敷金返還請求権を被担保債権として建物に留置権を取得する余地はなく、1が正しく正解です。両債務を同時履行の関係とし、あるいは明渡しまでの債権を控除できないとする2・3・4は判決文に反し誤りです。", "year": "R3-10月-1", "diff": "A"}, {"id": "kako-ken-R3-12月-9", "subject": "権利関係", "topic": "賃貸借", "type": "select", "q": "ＡがＢに対してＡ所有の甲建物を令和 3 年 7 月 1 日に①売却した場合と②賃貸した場合についての次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。", "choices": ["①と②の契約が解除された場合、①ではＢは甲建物を使用収益した利益をＡに償還する必 要があるのに対し、②では将来に向かって解除の効力が生じるのでＡは解除までの期間の 賃料をＢに返還する必要はない。", "①ではＢはＡの承諾を得ずにＣに甲建物を賃貸することができ、②ではＢはＡの承諾を得 なければ甲建物をＣに転貸することはできない。", "甲建物をＤが不法占拠している場合、①ではＢは甲建物の所有権移転登記を備えていなけ れば所有権をＤに対抗できず、②ではＢは甲建物につき賃借権の登記を備えていれば賃借 権をＤに対抗することができる。", "①と②の契約締結後、甲建物の引渡し前に、甲建物がＥの放火で全焼した場合、①ではＢ はＡに対する売買代金の支払を拒むことができ、②ではＢとＡとの間の賃貸借契約は終了 する。"], "answer": 2, "exp": "不法占拠者は登記の欠缺を主張できる正当な利益を持つ第三者にあたらないため、①売買の買主Ｂは所有権移転登記がなくても不法占拠者Ｄに所有権を対抗できます。よって「登記を備えていなければ対抗できない」とする3が誤りで正解です。解除時の使用利益償還と賃料不返還、承諾なしの賃貸の可否、危険負担・賃貸借の終了、という1・2・4は正しい内容です。", "year": "R3-12月-9", "diff": "C"}, {"id": "kako-ken-R4-6", "subject": "権利関係", "topic": "賃貸借", "type": "select", "q": "Ａを貸主、Ｂを借主として、Ａ所有の甲土地につき、資材置場とする目的で期間を 2 年として、ＡＢ間で、①賃貸借契約を締結した場合と、②使用貸借契約を締結した場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。", "choices": ["Ａは、甲土地をＢに引き渡す前であれば、①では口頭での契約の場合に限り自由に解除で きるのに対し、②では書面で契約を締結している場合も自由に解除できる。", "Ｂは、①ではＡの承諾がなければ甲土地を適法に転貸することはできないが、②ではＡの 承諾がなくても甲土地を適法に転貸することができる。", "Ｂは、①では期間内に解約する権利を留保しているときには期間内に解約の申入れをし解 約することができ、②では期間内に解除する権利を留保していなくてもいつでも解除する ことができる。", "甲土地について契約の本旨に反するＢの使用によって生じた損害がある場合に、Ａが損害 賠償を請求するときは、①では甲土地の返還を受けた時から 5 年以内に請求しなければな らないのに対し、②では甲土地の返還を受けた時から 1 年以内に請求しなければならない。"], "answer": 2, "exp": "賃貸借では、期間の定めがある契約を中途解約できるのは解約権を留保した特約があるときに限られ(民法618条)、記述のとおり。一方、使用貸借の借主はいつでも契約を解除できる(598条3項)。ひっかけの選択肢1は逆で、賃貸借は口頭でも解除できず、使用貸借は書面で締結すると引渡し前でも貸主は自由に解除できなくなる(593条の2)。", "year": "R4-6", "diff": "C"}, {"id": "kako-ken-R4-8", "subject": "権利関係", "topic": "賃貸借", "type": "select", "q": "ＡがＢ所有の甲土地を建物所有目的でなく利用するための権原が、①地上権である場合と②賃借権である場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。なお、ＡもＢも対抗要件を備えているものとする。", "choices": ["①でも②でも、特約がなくても、ＢはＡに対して、甲土地の使用及び収益に必要な修繕を する義務を負う。", "ＣがＢに無断でＡから当該権原を譲り受け、甲土地を使用しているときは、①でも②で も、ＢはＣに対して、甲土地の明渡しを請求することができる。", "①では、Ａは当該権原を目的とする抵当権を設定することができるが、②では、Ａは当該 権原を目的とする抵当権を設定することはできない。", "Ｄが甲土地を不法占拠してＡの土地利用を妨害している場合、①では、Ａは当該権原に基 づく妨害排除請求権を行使してＤの妨害の排除を求めることができるが、②では、ＡはＤ の妨害の排除を求めることはできない。"], "answer": 2, "exp": "地上権は所有権と同じ物権なので、これを目的として抵当権を設定できるが、賃借権は債権にすぎず抵当権の目的にできない。ゆえに記述3が正しい。選択肢4は誤りで、賃借権でも対抗要件を備えていれば不法占拠者に妨害排除請求ができる(605条の4)。地上権は貸主の承諾なく自由に譲渡できる点も押さえたい。", "year": "R4-8", "diff": "B"}, {"id": "kako-ken-R5-9", "subject": "権利関係", "topic": "賃貸借", "type": "select", "q": "Ａを貸主、Ｂを借主として甲建物の賃貸借契約が令和 5 年 7 月 1 日に締結された場合の甲建物の修繕に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。", "choices": ["甲建物の修繕が必要であることを、Ａが知ったにもかかわらず、Ａが相当の期間内に必要 な修繕をしないときは、Ｂは甲建物の修繕をすることができる。", "甲建物の修繕が必要である場合において、ＢがＡに修繕が必要である旨を通知したにもか かわらず、Ａが必要な修繕を直ちにしないときは、Ｂは甲建物の修繕をすることができる。", "Ｂの責めに帰すべき事由によって甲建物の修繕が必要となった場合は、Ａは甲建物を修繕 する義務を負わない。", "甲建物の修繕が必要である場合において、急迫の事情があるときは、Ｂは甲建物の修繕を することができる。"], "answer": 1, "exp": "賃借人が自ら修繕できるのは、賃貸人が通知を受けまたは修繕の必要を知りながら相当の期間内に修繕しないとき、または急迫の事情があるときに限られる(民法607条の2)。記述2は「直ちにしないとき」としており、相当の期間の経過を要する原則に反するため誤り。これが正解(誤っている記述)。賃借人の責めで修繕が必要になった場合は賃貸人に修繕義務がない点(記述3)も正しい。", "year": "R5-9", "diff": "C"}, {"id": "kako-ken-H28-11", "subject": "権利関係", "topic": "借地借家法（借地）", "type": "select", "q": "Ａが居住用の甲建物を所有する目的で、期間 30 年と定めてＢから乙土地を賃借した場合に関する次の記述のうち、借地借家法の規定及び判例によれば、正しいものはどれか。なお、Ａは借地権登記を備えていないものとする。", "choices": ["Ａが甲建物を所有していても、建物保存登記をＡの子Ｃ名義で備えている場合には、Ｂか ら乙土地を購入して所有権移転登記を備えたＤに対して、Ａは借地権を対抗することがで きない。", "Ａが甲建物を所有していても、登記上の建物の所在地番、床面積等が少しでも実際のもの と相違している場合には、建物の同一性が否定されるようなものでなくても、Ｂから乙 土地を購入して所有権移転登記を備えたＥに対して、Ａは借地権を対抗することができな い。", "ＡＢ間の賃貸借契約を公正証書で行えば、当該契約の更新がなく期間満了により終了し、 終了時にはＡが甲建物を収去すべき旨を有効に規定することができる。", "Ａが地代を支払わなかったことを理由としてＢが乙土地の賃貸借契約を解除した場合、契 約に特段の定めがないときは、Ｂは甲建物を時価で買い取らなければならない。"], "answer": 0, "exp": "借地権は借地上の建物の登記があれば借地権登記がなくても第三者に対抗できるが、その建物登記は借地権者本人名義でなければならず、子など家族名義では対抗できない(借地借家法10条1項、判例)。よって記述1が正しい。記述2は逆で、地番等の軽微な相違でも建物の同一性が認識できる程度なら対抗力は認められる。", "year": "H28-11", "diff": "A"}, {"id": "kako-ken-H29-11", "subject": "権利関係", "topic": "借地借家法（借地）", "type": "select", "q": "Ａ所有の甲土地につき、令和 4 年 10 月 1 日にＢとの間で賃貸借契約（以下「本件契約」という。）が締結された場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。なお、電磁的記録は考慮しないものとする。（改題）", "choices": ["Ａが甲土地につき、本件契約とは別に、令和 4 年 9 月 1 日にＣとの間で建物所有を目的と して賃貸借契約を締結していた場合、本件契約が資材置場として更地で利用することを目 的とするものであるときは、本件契約よりもＣとの契約が優先する。", "賃借権の存続期間を 10 年と定めた場合、本件契約が居住の用に供する建物を所有するこ とを目的とするものであるときは存続期間が 30 年となるのに対し、本件契約が資材置場 として更地で利用することを目的とするものであるときは存続期間は 10 年である。", "本件契約が建物所有を目的として存続期間 60 年とし、賃料につき 3 年ごとに 1 ％ずつ増 額する旨を公正証書で定めたものである場合、社会情勢の変化により賃料が不相当となっ たときであっても、ＡもＢも期間満了まで賃料の増減額請求をすることができない。", "本件契約が建物所有を目的としている場合、契約の更新がなく、建物の買取りの請求をし ないこととする旨を定めるには、ＡはあらかじめＢに対してその旨を記載した書面を交付 して説明しなければならない。"], "answer": 1, "exp": "建物所有目的なら借地借家法が適用され存続期間は最短30年なので、10年と定めても30年になる(3条・9条)。資材置場など建物所有目的でない場合は民法が適用され、定めた10年がそのまま期間となる。よって記述2が正しい。記述4はひっかけで、定期借地権には書面は必要だが、定期借家と違い事前の説明義務はない。", "year": "H29-11", "diff": "C"}, {"id": "kako-ken-H30-11", "subject": "権利関係", "topic": "借地借家法（借地）", "type": "select", "q": "ＡとＢとの間で、Ａ所有の甲土地につき建物所有目的で賃貸借契約（以下この問において「本件契約」という。）を締結する場合に関する次の記述のうち、民法及び借地借家法の規定並びに判例によれば、正しいものはどれか。なお、電磁的記録は考慮しないものとする。（改題）", "choices": ["本件契約が専ら事業の用に供する建物の所有を目的とする場合には、公正証書によらなけ れば無効となる。", "本件契約が居住用の建物の所有を目的とする場合には、借地権の存続期間を 20 年とし、 かつ、契約の更新請求をしない旨を定
