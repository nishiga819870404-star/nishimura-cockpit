", "choices": ["土地付中古住宅（代金 500 万円。消費税等相当額を含まない。）の売買について、Ａが売主Ｂから媒介を依頼され、媒介契約の締結に際し、あらかじめ、報酬額についてＢに対して説明していれば、ＡがＢから受け取ることができる報酬の上限額は 330 ,000 円である。", "土地付中古住宅（代金 300 万円。消費税等相当額を含まない。）の売買について、Ａが売主Ｃ及び買主Ｄから媒介を依頼され契約を成立させた場合において、低廉な空家等の売買における特例が適用されるとき、ＡはＣから 330 ,000 円、Ｄから 154 ,000 円を上限として報酬を受領することができる。", "土地（代金 350 万円。消費税等相当額を含まない。）の売買について、Ａが売主Ｅの代理として契約を成立させた場合、Ａは、代理契約の締結に際しあらかじめＥに説明し、合意を得ていた場合、Ｅから受領できる報酬の上限は 660 ,000 円となる。", "中古住宅（ 1 か月分の借賃 20 万円。消費税等相当額を含まない。）の貸借について、Ａが貸主Ｆから媒介を依頼され、借主Ｇとの契約を成立させた場合、ＡはＦから 330 ,000 円を上限として報酬を受領することができる。"], "answer": 2, "exp": "正しいのは肢3。土地350万円は低廉な空家等の特例で33万円が上限、代理なので2倍の66万円まで受領でき正しい。肢1は特例は合意まで得ていないと使えず23万1000円が上限、肢2は買主からも特例上限は33万円まで、肢4は貸借に空家特例は適用されず22万円が上限のため誤り。", "year": "H30-31", "diff": "A"}, {"id": "kako-gyoA-R1-30", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、宅地建物取引業法の規定に違反するものはいくつあるか。ア 建築基準法第 6 条第 1 項に基づき必要とされる確認を受ける前において、建築工事着手前の賃貸住宅の貸主から当該住宅の貸借の媒介を依頼され、取引態様を媒介と明示して募集広告を行った。イ 一団の宅地の売買について、数回に分けて広告する際に、最初に行った広告以外には取引態様の別を明示しなかった。ウ 建物の貸借の媒介において、依頼者の依頼によらない通常の広告を行い、国土交通大臣の定める報酬限度額の媒介報酬のほか、当該広告の料金に相当する額を受領した。エ 建築工事着手前の分譲住宅の販売において、建築基準法第 6 条第 1 項に基づき必要とされる確認を受ける前に、取引態様を売主と明示して当該住宅の広告を行った。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "exp": "違反するのは四つ（全部）。ア・エは未完成物件で建築確認前は取引態様を明示しても広告自体が不可で違反、イは数回に分けて広告する際は都度取引態様の明示が必要で違反、ウは依頼によらない広告費は報酬と別に受領できず違反。よって四つ全部が違反。", "year": "R1-30", "diff": "A"}, {"id": "kako-gyoA-R1-32", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者Ａ（消費税課税事業者）が受け取ることのできる報酬額に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。（改題）", "choices": ["宅地（代金 200 万円）。消費税等相当額を含まない。）の売買について、Ａが売主Ｂの代理として契約を成立させた場合、Ａは、代理契約の締結に際しあらかじめＢに説明し、合意を得ていた場合、Ｂから受領できる報酬の上限は 660 ,000 円である。", "事務所（ 1 か月の借賃 110 万円。消費税等相当額を含む。長期の空家等には該当しない。）の貸借の媒介について、Ａは依頼者の双方から合計で 110 万円を上限として報酬を受領することができる。", "既存住宅の売買の媒介について、Ａが売主Ｃに対して建物状況調査を実施する者をあっせんした場合、ＡはＣから報酬とは別にあっせんに係る料金を受領することはできない。", "3 年間使用していない宅地の貸借の媒介について、Ａが貸主と借主の双方から依頼を受けていたときの報酬は、依頼者に対して説明し合意を得ていたとしても、借主から借賃の 1か月分を受領した場合、貸主から 1 か月分を受領することはできない。"], "answer": 3, "exp": "誤りを選ぶ問題。3年間使用していない宅地は長期の空家等の貸借の特例に該当し、貸主・借主それぞれから借賃1か月分（合計2か月分＋消費税）まで受領できる。よって貸主から1か月分を受領できないとする肢4が誤り。他は正しい記述。", "year": "R1-32", "diff": "B"}, {"id": "kako-gyoA-R2-10月-30", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者Ａ及び宅地建物取引業者Ｂ（ともに消費税課税事業者）が受領する報酬に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、借賃には消費税等相当額を含まないものとし、長期の空家等の貸借における特例は考慮しないものとする。（改題）", "choices": ["Ａは売主から代理の依頼を、Ｂは買主から媒介の依頼を、それぞれ受けて、代金 5 ,000 万円の宅地の売買契約を成立させた場合、Ａは売主から 343 万 2 ,000 円、Ｂは買主から 171万 6 ,000 円、合計で 514 万 8 ,000 円の報酬を受けることができる。", "Ａが単独で行う居住用建物の貸借の媒介に関して、Ａが依頼者の一方から受けることができる報酬の上限額は、当該媒介の依頼者から報酬請求時までに承諾を得ている場合には、借賃の 1 .1 か月分である。", "Ａが単独で貸主と借主の双方から店舗用建物の貸借の媒介の依頼を受け、 1 か月の借賃 25万円、権利金 330 万円（権利設定の対価として支払われるもので、返還されないものをいい、消費税等相当額を含む。）の賃貸借契約を成立させた場合、Ａが依頼者の一方から受けることができる報酬の上限額は、30 万 8 ,000 円である。", "Ａが単独で行う事務所用建物の貸借の媒介に関し、Ａが受ける報酬の合計額が借賃の 1 .1か月分以内であれば、Ａは依頼者の双方からどのような割合で報酬を受けてもよく、また、依頼者の一方のみから報酬を受けることもできる。"], "answer": 3, "exp": "正しいのは肢4。事務所用など居住用以外の貸借の媒介では、合計が借賃1.1か月分以内なら双方の負担割合は自由で一方のみから受領してもよく正しい。肢1は代理と媒介の合計は媒介の2倍343万2000円が限度で超過、肢2は居住用の承諾は依頼を受ける時点で必要、肢3は権利金ベースでも15万4000円が限度のため誤り。", "year": "R2-10月-30", "diff": "B"}, {"id": "kako-gyoA-R2-12月-34", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者（消費税課税事業者）が受けることができる報酬に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。（改題）", "choices": ["宅地建物取引業者が受けることのできる報酬は、依頼者が承諾していたとしても、国土交通大臣の定める報酬額の上限を超えてはならない。", "宅地建物取引業者は、その業務に関し、相手方に不当に高額の報酬を要求した場合、たとえ受領していなくても宅地建物取引業法違反となる。", "宅地建物取引業者が、事業用建物の貸借（権利金の授受はないものとし、長期の空家等ではない。）の媒介に関する報酬について、依頼者の双方から受けることのできる報酬の合計額は、借賃（消費税等相当額を含まない。） 1 か月分の 1 .1 倍に相当する金額が上限であり、貸主と借主の負担の割合については特段の規制はない。", "宅地建物取引業者は、依頼者の依頼によらない広告の料金に相当する額を報酬額に合算する場合は、代理又は媒介に係る報酬の限度額を超える額の報酬を依頼者から受けることができる。"], "answer": 3, "exp": "誤りを選ぶ問題。報酬とは別に受領できるのは依頼者の依頼による広告料金等に限られ、依頼者の依頼によらない広告料金は受領できない。よって「依頼によらない広告料金を合算して受領できる」とする肢4が誤り。他は正しい記述。", "year": "R2-12月-34", "diff": "A"}, {"id": "kako-gyoA-R3-10月-30", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。ア 宅地の販売広告において、宅地に対する将来の利用の制限について、著しく事実に相違する表示をしてはならない。イ 建物の貸借の媒介において広告を行った場合には、依頼者の依頼の有無にかかわらず、報酬の限度額を超えて、当該広告の料金に相当する額を受領することができる。ウ 複数の区画がある宅地の売買について、数回に分けて広告するときは、最初に行う広告に取引態様の別を明示すれば足り、それ以降は明示する必要はない。エ 賃貸マンションの貸借に係る媒介の依頼を受け、媒介契約を締結した場合であっても、当該賃貸マンションが建築確認申請中であるときは広告をすることができない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "正しいものは二つ（アとエ）。アは将来の利用制限について著しく事実に相違する広告表示は禁止で正しい、エは工事完了前は建築確認前に広告できず申請中も不可で正しい。イは依頼者の依頼がなければ広告費を別途受領できず誤り、ウは数回広告は都度取引態様の明示が必要で誤り。よって正しいのは二つ。", "year": "R3-10月-30", "diff": "B"}, {"id": "kako-gyoA-R3-10月-44", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者Ａ（消費税課税事業者）が受け取ることができる報酬額についての次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、長期の空家等の貸借における特例には該当しないものとする。（改題）", "choices": ["居住の用に供する建物（ 1 か月の借賃 20 万円。消費税等相当額を含まない。）の貸借であって 100 万円の権利金の授受があるものの媒介をする場合、依頼者双方から受領する報酬の合計額は 11 万円を超えてはならない。", "宅地（代金 1 ,000 万円。消費税等相当額を含まない。）の売買について、売主から代理の依頼を受け、買主から媒介の依頼を受け、売買契約を成立させて買主から 303 ,000 円の報酬を受領する場合、売主からは 489 ,000 円を上限として報酬を受領することができる。", "宅地（代金 300 万円。消費税等相当額を含まない。）の売買について、売主及び買主から媒介の依頼を受け、媒介契約の締結に際しあらかじめ説明し、合意を得ていれば、Ａは、売主から 330 ,000 円、買主からは 154 ,000 円を上限として報酬を受領することができる。", "店舗兼住宅（ 1 か月の借賃 20 万円。消費税等相当額を含まない。）の貸借の媒介をする場合、依頼者の一方から受領する報酬は 11 万円を超えてはならない。"], "answer": 1, "exp": "正しいのは肢2。代理の売主分は上限79万2000円、媒介の買主分は上限39万6000円だが、1取引の合計上限は媒介額の2倍79万2000円。買主から30万3000円受領時、売主からは残り48万9000円まで受領でき正しい。肢1は22万円が限度、肢3は空家特例で売主も買主も33万円が上限、肢4は店舗兼住宅は非居住用扱いで一方の額に制限なしのため誤り。", "year": "R3-10月-44", "diff": "B"}, {"id": "kako-gyoA-R3-12月-31", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者Ａ（消費税課税事業者）が貸主Ｂから建物の貸借の代理の依頼を受け、宅地建物取引業者Ｃ（消費税課税事業者）が借主Ｄから媒介の依頼を受け、ＢとＤとの間で賃貸借契約を成立させた場合における次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはいくつあるか。なお、 1 か月分の借賃は 8 万円とし、借賃及び権利金（権利設定の対価として支払われる金銭であって返還されないものをいう。）には、消費税等相当額を含まないものとし、長期の空家等の貸借における特例は考慮しないものとする。ア 建物を住居として貸借する場合、Ｃは、媒介の依頼を受けるに当たってＤから承諾を得ているときを除き、44 ,000 円を超える報酬をＤから受領することはできない。イ 建物を店舗として貸借する場合、ＡがＢから受領する報酬とＣがＤから受領する報酬の合計額は 88 ,000 円を超えてはならない。ウ 建物を店舗として貸借する場合、200 万円の権利金の授受があるときは、Ａ及びＣが受領できる報酬の額の合計は、110 ,000 円を超えてはならない。エ Ａは、Ｂから媒介報酬の限度額まで受領する他に、Ｂの依頼によらない通常の広告の料金に相当する額を別途受領することができる。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "誤っているものは二つ（ウとエ）。ウは店舗で権利金200万円を売買代金とみなすとA・C合計で22万円まで受領でき11万円超えは誤りの記述。エは依頼者の依頼によらない通常の広告費は別途受領できず誤りの記述。ア（居住用で承諾なしは4万4000円まで）とイ（双方合計8万8000円まで）は正しい。よって誤りは二つ。", "year": "R3-12月-31", "diff": "C"}, {"id": "kako-gyoA-R4-27", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者Ａ（消費税課税事業者）が受け取ることができる報酬についての次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。（改題）", "choices": ["Ａが、Ｂから売買の媒介を依頼され、Ｂからの特別の依頼に基づき、遠隔地への現地調査を実施した。その際、当該調査に要する特別の費用について、Ｂが負担することを事前に承諾していたので、Ａは媒介報酬とは別に、当該調査に要した特別の費用相当額を受領することができる。", "Ａが、居住用建物について、貸主Ｂから貸借の媒介を依頼され、この媒介が使用貸借に係るものである場合は、当該建物の通常の借賃をもとに報酬の限度額が定まるが、その算定に当たっては、不動産鑑定業者の鑑定評価を求めなければならない。", "Ａが居住用建物（長期の空家等の貸借における特例には該当しない。）の貸主Ｂ及び借主Ｃの双方から媒介の依頼を受けるに当たって、依頼者の一方から受けることのできる報酬の額は、借賃の 1 か月分の 0 .55 倍に相当する金額以内である。ただし、媒介の依頼を受けるに当たって、依頼者から承諾を得ている場合はこの限りではなく、双方から受けることのできる報酬の合計額は借賃の 1 か月分の 1 .1 倍に相当する金額を超えてもよい。", "Ａは、土地付建物について、売主Ｂから媒介を依頼され、代金 300 万円（消費税等相当額を含み、土地代金は 80 万円である。）で契約を成立させた。Ａが、媒介に要する費用を勘案して報酬を請求する旨をＢに対して説明し、合意の上、媒介契約を締結していた場合には、ＡはＢから報酬として 36 万 3 ,000 円を受領することができる。"], "answer": 0, "exp": "正しいのは肢1。依頼者の特別の依頼に基づく遠隔地の現地調査で、費用負担を事前承諾していれば媒介報酬と別に実費相当額を受領でき正しい。肢2は鑑定評価は必要に応じてで義務ではなく誤り、肢3は承諾があれば合計1か月分まで受領でき誤り、肢4は低廉な空家等の特例で33万円が上限のため誤り。", "year": "R4-27", "diff": "A"}, {"id": "kako-gyoA-R5-34", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者Ａ（消費税課税事業者）は貸主Ｂから建物の貸借の媒介の依頼を受け、宅地建物取引業者Ｃ（消費税課税事業者）は借主Ｄから建物の貸借の媒介の依頼を受け、ＢとＤとの間で、1 か月分の借賃を 12 万円（消費税等相当額を含まない。）とする賃貸借契約（以下この問において「本件契約」という。）を成立させた場合における次の記述のうち、宅地建物取引業法の規定に違反するものはいくつあるか。なお、長期の空家等の貸借における特例には該当しないものとする。（改題）ア 本件契約が建物を住居として貸借する契約である場合に、Ｃは、媒介の依頼を受けるに当たってＤから承諾を得ないまま、132 ,000 円の報酬を受領した。イ ＡはＢから事前に特別な広告の依頼があったので、依頼に基づく大手新聞掲載広告料金に相当する額をＢに請求し、受領した。ウ ＣはＤに対し、賃貸借契約書の作成費を、Ｄから限度額まで受領した媒介報酬の他に請求して受領した。エ本件契約が建物を事務所として貸借する契約である場合に、報酬として、ＡはＢから132 ,000 円を、ＣはＤから 132 ,000 円をそれぞれ受領した。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "exp": "違反するのは三つ（ア・ウ・エ）。アは居住用で承諾なしなら一方から6万6000円が限度で13万2000円は違反、ウは契約書作成費を報酬と別に受領するのは違反、エは複数業者関与でも合計は借賃1か月分13万2000円が限度で合計26万4000円は違反。イは事前の特別な広告依頼に基づく広告費なので違反しない。よって三つ。", "year": "R5-34", "diff": "B"}, {"id": "kako-gyoA-R6-28", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者Ａ（消費税課税事業者）及び宅地建物取引業者Ｂ（消費税免税事業者）が受領した報酬に関するアからウの記述のうち、宅地建物取引業法の規定に違反しないものの組合せは 1 から 4 のうちどれか。なお、代理、媒介に当たり、広告の依頼は行われていないものとし、長期の空家等の貸借に関する特例には該当しないものとする。（改題）ア 居住用建物（ 1 か月の借賃 12 万円。消費税等相当額を含まない。）について、Ａは貸主から代理を依頼され、Ｂは借主から媒介を依頼され、Ａは貸主から 6.7 万円、Ｂは借主から 6.5万円を報酬として受領した。なお、Ｂは、媒介の依頼を受けるに当たって、報酬について借主から特段の承諾を得ていない。イ Ｂは、事業用建物について、貸主と借主双方から媒介を依頼され、借賃 1 か月分 10 万円（消費税等相当額を含まない。）、権利金 90 万円（権利設定の対価として支払われる金銭であって返還されないもので、消費税等相当額を含まない。）の賃貸借契約を成立させ、貸主と借主からそれぞれ 5 万円を報酬として受領した。ウ Ａは、土地付建物について、売主と買主双方から媒介を依頼され、代金 3 ,500 万円（消費税等相当額を含み、土地代金は 2 ,400 万円である。）の売買契約を成立させ、売主と買主からそれぞれ 110 万円を報酬として受領したほか、売主の特別の依頼に基づき行った遠隔地への現地調査に要した実費の費用について、売主が事前に負担を承諾していたので、売主から 9 万円を受領した。", "choices": ["ア、イ", "イ、ウ", "ア、ウ", "ア、イ、ウ"], "answer": 1, "exp": "違反しないのはイとウ。イは事業用で権利金90万円ベースより借賃ベース（免税業者は1.04倍で10万4000円）が高く、双方から合計10万円は範囲内で違反しない。ウは建物代金の税抜き換算で計算基礎3400万円、上限118万8000円で110万円ずつは範囲内、承諾済みの現地調査実費も別途受領でき違反しない。アはＢが借主から承諾なしで6万5000円受領し限度6万2400円を超え違反。", "year": "R6-28", "diff": "B"}, {"id": "kako-gyoB-H27-27", "subject": "宅建業法", "topic": "免許の基準", "type": "select", "q": "宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["Ａ社が不正の手段による免許取消処分の聴聞公示日から処分までの間に相当の理由なく合併で消滅した場合、公示日の50日前にＡ社の取締役を退任したＢは、消滅の日から5年を経過しなければ免許を受けられない。", "Ｃ社の政令で定める使用人Ｄが威力業務妨害罪で拘禁刑1年執行猶予2年に処せられた後、Ｅ社の政令で定める使用人に就任した場合、猶予期間が満了していなければＥ社は免許を受けられない。", "成年者と同一の行為能力を有しない未成年者Ｆの法定代理人Ｇが背任罪で罰金刑に処せられた場合、その刑の執行が終わった日から5年を経過しなければＦは免許を受けられない。", "Ｈ社の取締役Ｉが暴力団員に該当することが判明しＨ社の免許が取り消された後、Ｉは退任したが、取消しの日から5年を経過しなければＨ社は免許を受けられない。"], "answer": 3, "exp": "選択肢4が誤り。役員が暴力団員に該当して免許取消しになっても、その役員が退任すれば5年の経過を待たずに免許を受けられる。「5年を経過しなければ」がひっかけ。", "year": "H27-27", "diff": "A"}, {"id": "kako-gyoB-H28-37", "subject": "宅建業法", "topic": "免許の基準", "type": "select", "q": "宅地建物取引業法の規定に関する次の記述のうち、正しいものはいくつあるか。ア 甲県知事免許のＡが乙県に支店を設置し免許換えの申請を怠っていた場合、Ａは甲県知事から業務停止処分を受けることがある。イ 業者Ｂが自ら売主として売買契約を成立させた後、引渡し前に免許の有効期間が満了したときは、Ｂは取引を結了する目的の範囲内で業務を行うことができる。ウ Ｃが免許申請前5年以内に宅建業に関し不正又は著しく不当な行為をした場合、刑に処せられていなくてもＣは免許を受けられない。エ 甲県知事免許のＤが国土交通大臣に免許換えの申請中は、Ｄは甲県知事免許業者として35条書面及び37条書面を交付できない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "正しいのはイとウの二つ。イは免許失効後も取引結了の範囲で業務可能(76条)、ウは申請前5年以内の不正・不当行為は刑罰がなくても欠格。アは免許換えを怠ると業務停止でなく免許取消し、エは免許換え申請中も従前免許が有効で書面交付できる。", "year": "H28-37", "diff": "C"}, {"id": "kako-gyoB-R1-43", "subject": "宅建業法", "topic": "免許の基準", "type": "select", "q": "宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["免許を受けようとする法人の非常勤役員が詐欺罪で拘禁刑1年に処せられ、刑の執行が終わった日から5年を経過していなくても、当該法人は免許を受けられる。", "免許を受けようとする法人の政令で定める使用人が横領罪で拘禁刑1年執行猶予2年に処せられ、執行猶予期間を満了している場合、満了の日から5年を経過していなくても当該法人は免許を受けられる。", "免許を受けようとする法人の専任の宅地建物取引士が器物損壊等の罪で罰金刑に処せられ、刑の執行が終わった日から5年を経過していない場合、当該法人は免許を受けられない。", "免許を受けようとする法人の代表取締役が侮辱罪で拘留の刑に処せられ、刑の執行が終わった日から5年を経過していない場合、当該法人は免許を受けられない。"], "answer": 1, "exp": "選択肢2が正しい。執行猶予期間が満了すれば刑の言渡し自体が効力を失うので、5年を待たず免許を受けられる。1の詐欺の拘禁刑は5年経過が必要で欠格、3の専任宅建士の罰金や4の侮辱の拘留は欠格要件に当たらない。", "year": "R1-43", "diff": "A"}, {"id": "kako-gyoB-R2-10月-43", "subject": "宅建業法", "topic": "免許の基準", "type": "select", "q": "宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["Ａ社の取締役が傷害罪で拘禁刑1年執行猶予2年に処せられた場合、猶予を取り消されず猶予期間を満了しその日から5年を経過しなければ、Ａ社は免許を受けられない。", "業者である個人Ｂが死亡した場合、相続人Ｃは、Ｂが締結した契約に基づく取引を結了する目的の範囲内で業者とみなされ、Ｂが売主として締結した売買契約の目的物を買主に引き渡すことができる。", "業者Ｄ社について破産手続開始の決定があった場合、Ｄ社を代表する役員が廃業を届け出なければならず、届出日にかかわらず破産手続開始決定の日をもって免許の効力が失われる。", "免許を受けようとするＥ社の取締役について破産手続開始の決定があった場合、復権を得た日から5年を経過しなければＥ社は免許を受けられない。"], "answer": 1, "exp": "選択肢2が正しい。業者が死亡しても一般承継人は取引結了の範囲で業者とみなされ引渡しができる(76条)。1は執行猶予満了で言渡しが失効し5年不要、3は破産管財人が届出し失効は届出日、4は復権を得れば5年を待たず免許可。", "year": "R2-10月-43", "diff": "A"}, {"id": "kako-gyoB-R3-10月-27", "subject": "宅建業法", "topic": "免許の基準", "type": "select", "q": "宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["個人Ａが不正の手段で免許を受け取り消され、取消しの日から5年を経過した場合でも、その間に欠格事由に該当しなかったとしてもＡは再び免許を受けられない。", "免許を受けようとする個人Ｂが破産手続開始の決定を受けた後に復権を得た場合でも、Ｂは免許を受けられない。", "Ｃ社の役員Ｄが業務上過失致死傷等の罪で地方裁判所で拘禁刑1年の判決を言い渡され、高等裁判所に控訴し裁判係属中であっても、Ｃ社は免許を受けられない。", "Ｅ社の役員に宅地建物取引業法違反で罰金刑に処せられた者がいる場合、刑の執行が終わって5年を経過しなければＥ社は免許を受けられない。"], "answer": 3, "exp": "選択肢4が正しい。役員が宅建業法違反で罰金刑に処せられると、刑の執行終了から5年間は法人が免許欠格。1は取消しから5年経過すれば再免許可、2は復権で免許可、3は控訴中で刑が未確定のため欠格しない。", "year": "R3-10月-27", "diff": "A"}, {"id": "kako-gyoB-R5-29", "subject": "宅建業法", "topic": "免許の基準", "type": "select", "q": "宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["業者Ａ社の支店の代表者が道路交通法違反で拘禁の刑に処せられても、Ａ社の免許は取り消されない。", "業者Ｂ社の取締役が所得税法違反で罰金刑に処せられても、Ｂ社の免許は取り消されない。", "業者である個人Ｃが宅地建物取引業法違反で罰金刑に処せられても、Ｃの免許は取り消されない。", "業者Ｄ社の非常勤の取締役が脅迫罪で罰金刑に処せられても、Ｄ社の免許は取り消されない。"], "answer": 1, "exp": "選択肢2が正しい。役員が所得税法違反で罰金に処せられても免許は取り消されない。罰金で取消しになるのは宅建業法違反や傷害・脅迫など一定の罪の場合。1の政令使用人の拘禁刑、3の宅建業法違反罰金、4の非常勤役員の脅迫罪罰金は、いずれも免許取消しの対象。", "year": "R5-29", "diff": "A"}, {"id": "kako-gyoB-H28-35", "subject": "宅建業法", "topic": "免許の効果・届出", "type": "select", "q": "宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["個人業者Ａ(甲県知事免許)が免許の更新申請を怠り有効期間が満了した場合、Ａは遅滞なく甲県知事に免許証を返納しなければならない。", "法人業者Ｂ(乙県知事免許)が業務停止を命じられた場合、Ｂは更新申請を行っても業務停止期間中は更新を受けられない。", "法人業者Ｃ(国土交通大臣免許)について破産手続開始の決定があった場合、その日から30日以内にＣを代表する役員Ｄが主たる事務所所在地の知事を経由して国土交通大臣に届け出なければならない。", "個人業者Ｅ(丙県知事免許)が死亡した場合、一般承継人Ｆが丙県知事に届け出た後でも、Ｆは、Ｅが生前締結した売買契約に基づく取引を結了する目的の範囲内でなお業者とみなされる。"], "answer": 3, "exp": "選択肢4が正しい。業者が死亡しても、一般承継人は届出後でも取引結了の範囲でなお業者とみなされる(76条)。1は更新を怠り満了しても免許証返納は不要、2は業務停止中でも更新は受けられる、3は破産管財人が届け出る。", "year": "H28-35", "diff": "C"}, {"id": "kako-gyoB-H29-36", "subject": "宅建業法", "topic": "免許の効果・届出", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["業者Ａが免許の更新を申請したが処分がなされないまま有効期間が満了した場合、Ａは処分がなされるまで宅建業を営むことができない。", "Ｂが新たに宅建業を営むため免許を申請した場合、免許を受けるまでの間に宅建業を営む旨の広告を行い物件及び顧客を募ることができる。", "業者Ｃが兼業として新たに不動産管理業を営む場合、Ｃは兼業を営む旨を免許権者に届け出なければならない。", "業者である法人Ｄが業者でない法人Ｅに吸収合併され消滅した場合、一般承継人Ｅは、Ｄが締結した契約に基づく取引を結了する目的の範囲内で業者とみなされる。"], "answer": 3, "exp": "選択肢4が正しい。法人が合併で消滅しても一般承継人は取引結了の範囲で業者とみなされる(76条)。1は更新申請中で処分未了なら従前免許が有効で営業可、2は免許を受けるまで広告不可、3は兼業は変更届出の対象外。", "year": "H29-36", "diff": "C"}, {"id": "kako-gyoB-H29-44", "subject": "宅建業法", "topic": "免許の効果・届出", "type": "select", "q": "宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["業者Ａ社が免許を受けていないＢ社との合併により消滅する場合、存続会社Ｂ社はＡ社の免許を承継できる。", "個人業者Ｃが事業を法人化するため株式会社Ｄを設立しその代表取締役に就任する場合、Ｄ社はＣの免許を承継できる。", "個人業者Ｅ(甲県知事免許)が死亡した場合、相続人はＥの死亡を知った日から30日以内に甲県知事に届け出なければならず、免許はその届出があった日に失効する。", "業者Ｆ社(乙県知事免許)が株主総会の決議により解散する場合、その清算人は解散の日から30日以内に乙県知事に届け出なければならない。"], "answer": 3, "exp": "選択肢4が正しい。合併・破産以外の理由で解散する場合は清算人が30日以内に届け出る。1・2は免許が一身専属で合併や新設法人に承継されない、3は死亡による失効時期は死亡の時であり届出日ではない。", "year": "H29-44", "diff": "B"}, {"id": "kako-gyoB-H30-36", "subject": "宅建業法", "topic": "免許の効果・届出", "type": "select", "q": "宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["業者Ａが免許の更新申請を行った場合において、有効期間満了の日までに処分がなされないときは、Ａの従前の免許は有効期間の満了により効力を失う。", "甲県に事務所を設置する業者Ｂ(甲県知事免許)が乙県所在の宅地の売買の媒介をする場合、Ｂは国土交通大臣に免許換えの申請をしなければならない。", "宅建業を営もうとする個人Ｃが拘禁の刑に処せられ、その刑の執行を終えた日から5年を経過しない場合、Ｃは免許を受けられない。", "宅建士でないＤとＥが業者Ｆ社の取締役に就任し、Ｄが常勤・Ｅが非常勤である場合、Ｆ社はＤについてのみ役員の変更を届け出る必要がある。"], "answer": 2, "exp": "選択肢3が正しい。拘禁刑以上に処せられ執行終了から5年を経過しない者は免許欠格。1は更新申請中で処分未了なら従前免許が有効、2は他県物件の媒介だけなら免許換え不要、4は役員変更は常勤・非常勤を問わず両方届出が必要。", "year": "H30-36", "diff": "A"}, {"id": "kako-gyoB-R2-10月-26", "subject": "宅建業法", "topic": "免許の効果・届出", "type": "select", "q": "宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["業者Ａ社(甲県知事免許)が業者でないＢ社との合併により消滅した場合、Ｂ社はＡ社消滅の日から30日以内に甲県知事に届け出れば、Ａ社が受けていた免許を承継できる。", "信託業法第3条の免許を受けた信託会社が宅建業を営もうとする場合、国土交通大臣の免許を受けなければならない。", "個人Ｃが転売目的で競売により取得した宅地を多数の区画に分割し、業者Ｄに販売代理を依頼して不特定多数の者に分譲する事業を行う場合、免許を受けなければならない。", "業者Ｅ(乙県知事免許)が乙県内に2以上の事務所を設置して事業を営もうとする場合、国土交通大臣に免許換えの申請をしなければならない。"], "answer": 2, "exp": "選択肢3が正しい。宅地を多数区画に分割し不特定多数に分譲する事業は宅建業に当たり、販売を代理に依頼しても本人に免許が必要。1は合併で免許は承継できない、2は信託会社は届出のみで免許不要、4は同一県内に事務所を増設しても免許換えは不要。", "year": "R2-10月-26", "diff": "A"}, {"id": "kako-gyoB-R2-12月-31", "subject": "宅建業法", "topic": "免許の効果・届出", "type": "select", "q": "宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["業者が免許を受けてから1年以内に事業を開始せず免許が取り消され、その後5年を経過していない場合は免許を受けられない。", "免許を受けようとする法人の政令で定める使用人が破産手続開始の決定を受け、復権を得てから5年を経過していない場合、当該法人は免許を受けられない。", "免許権者は免許に条件を付することができ、免許の更新に当たっても条件を付することができる。", "業者の役員の住所に変更があったときは、30日以内に免許権者に変更を届け出なければならない。"], "answer": 2, "exp": "選択肢3が正しい。免許権者は新規免許にも更新にも条件を付せる。1は1年以内の未開始で取消しでも5年を待たず免許可、2は復権を得れば5年を待たず免許可、4は役員の住所は名簿記載事項でなく変更の届出は不要。", "year": "R2-12月-31", "diff": "B"}, {"id": "kako-gyoB-R3-12月-29", "subject": "宅建業法", "topic": "免許の効果・届出", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["宅建業の免許の有効期間は5年であり、更新の申請は有効期間満了の日の90日前から30日前までの間に行わなければならない。", "業者から更新の申請があった場合において、有効期間満了の日までに処分がなされないときは、従前の免許は満了後も処分がなされるまでの間はなお効力を有する。", "個人業者Ａ(甲県知事免許)が死亡した場合、Ａの相続人はＡの死亡の日から30日以内に甲県知事に届け出なければならない。", "法人業者Ｂ(乙県知事免許)が合併により消滅した場合、Ｂを代表する役員であった者は、その日から30日以内に乙県知事に届け出なければならない。"], "answer": 2, "exp": "選択肢3が誤り。死亡の届出は「死亡の日から」でなく相続人が「死亡を知った日から」30日以内。1の有効期間5年・更新申請90～30日前、2の更新申請中の従前免許有効、4の合併消滅の30日以内届出はいずれも正しい。", "year": "R3-12月-29", "diff": "A"}, {"id": "kako-gyoB-R3-12月-30", "subject": "宅建業法", "topic": "免許の効果・届出", "type": "select", "q": "業者Ａが行う広告に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["Ａが中古建物の売買で所有者から媒介依頼を受け、取引態様の別を明示せずに広告を掲載したが問合せがなく契約成立に至らなかった場合、当該広告は法第34条に違反しない。", "Ａが自ら売主として建築確認申請中の新築分譲マンションについて「建築確認申請済」と明示して広告した場合、確認を終えたと誤認させないため法第33条に違反しない。", "Ａが顧客を集めるため売る意思のない条件の良い物件を広告し実際は他の物件を販売しようとしたが売買が成立しなかった場合でも、監督処分の対象となる。", "Ａが免許の取消しを受けたが取消し前に建物売買の広告をしていた場合、当該売買契約を締結する目的の範囲内でなお業者とみなされる。"], "answer": 2, "exp": "選択肢3が正しい。おとり広告は誇大広告に当たり、それ自体が禁止されるので契約が成立しなくても監督処分の対象。1は取引態様の明示義務は問合せの有無を問わず違反、2は工事完了前は確認前の広告不可で申請中の明示でも違反、4は取消し前に広告しただけでは業者とみなされない。", "year": "R3-12月-30", "diff": "A"}, {"id": "kako-gyoB-R5-32", "subject": "宅建業法", "topic": "免許の効果・届出", "type": "select", "q": "業者が行う届出に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["業者Ａ(甲県知事免許)が新たに宅建業を営む支店を甲県内に設置した場合、Ａはその日から30日以内に甲県知事に届け出なければならない。", "業者Ｂ(乙県知事免許)が業者でないＣとの合併により消滅した場合、Ｂを代表する役員であった者はその日から30日以内に乙県知事に届け出なければならない。", "業者Ｄ(丙県知事免許)が本店の専任宅建士Ｅの退職に伴い新たに専任宅建士Ｆを本店に置いた場合、Ｄはその日から30日以内に丙県知事に届け出なければならない。", "業者Ｇ(丁県知事免許)が展示会を丁県内で実施し、そこで売買契約の締結又は申込みの受付を行う場合、Ｇは業務開始日の5日前までに丁県知事に届け出なければならない。"], "answer": 3, "exp": "選択肢4が誤り。案内所等で契約・申込みを行う場合の届出は業務開始日の「10日前まで」であり5日前ではない。1の支店設置の30日以内の変更届出、2の合併消滅の届出、3の専任宅建士変更の届出はいずれも正しい。", "year": "R5-32", "diff": "A"}, {"id": "kako-gyoB-H27-42", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "営業保証金を供託している業者Ａと保証協会の社員である業者Ｂに関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["新たに事務所を設置する場合、Ａは営業保証金に、Ｂは弁済業務保証金分担金に、それぞれ金銭又は有価証券をもって充てることができる。", "一部の事務所を廃止し営業保証金又は弁済業務保証金を取り戻すときは、Ａ・Ｂはそれぞれ還付請求権者に対し6か月以内に申し出るべき旨を官報に公告しなければならない。", "ＡとＢがそれぞれ主たる事務所の他に3か所の従たる事務所を有する場合、Ａは営業保証金2,500万円の供託を、Ｂは弁済業務保証金分担金150万円の納付をしなければならない。", "取引により生じた債権を有する者(業者を除く)は、Ｂに関する債権についてはＢが納付した弁済業務保証金分担金の額を上限として弁済を受ける権利を有する。"], "answer": 2, "exp": "選択肢3が正しい。Ａは本店1,000万+従たる事務所500万×3=2,500万を供託、Ｂは本店60万+30万×3=150万を納付する。1は分担金は金銭のみ(有価証券不可)、2は弁済業務保証金の取戻しは公告不要、4はＢの弁済限度は分担金でなく営業保証金換算額。", "year": "H27-42", "diff": "A"}, {"id": "kako-gyoB-H28-31", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "保証協会の社員である業者に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["保証協会への加入は任意であり、一の保証協会の社員となった後に、重ねて他の保証協会の社員となることができる。", "保証協会に加入している業者(甲県知事免許)が甲県内に新たに支店を設置した場合、設置日から1月以内に追加の分担金を納付しないときは社員の地位を失う。", "還付充当金の納付通知を受けた社員は、通知を受けた日から2週間以内に、その額を主たる事務所の最寄りの供託所に供託しなければならない。", "150万円の分担金を納付して社員となった者と取引をした者(業者を除く)は、その債権に関し2,500万円を限度として弁済業務保証金から弁済を受ける権利を有する。"], "answer": 3, "exp": "選択肢4が正しい。分担金150万は本店+支店3を意味し、営業保証金に換算した2,500万を限度に弁済を受けられる。1は他の保証協会に重ねて加入できない、2は新事務所は2週間以内に納付し期間内未納で地位喪失(1月でない)、3は還付充当金は供託所でなく保証協会へ納付する。", "year": "H28-31", "diff": "A"}, {"id": "kako-gyoB-H28-40", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "業者Ａ(甲県知事免許)は甲県に本店と支店を設け、営業保証金として1,000万円の金銭と額面500万円の国債証券を供託して営業している。この場合に関する次の記述のうち、正しいものはどれか。", "choices": ["Ａは本店を移転し最寄りの供託所が変更した場合、遅滞なく移転後の本店の最寄りの供託所に新たに営業保証金を供託しなければならない。", "Ａは営業保証金が還付され不足額を供託したときは、供託書の写しを添付して30日以内に甲県知事に届け出なければならない。", "本店でＡと取引をした者(業者を除く)は、その債権に関し1,000万円を限度としてＡから弁済を受ける権利を有する。", "Ａは本店移転で最寄りの供託所が変更した場合、従前の営業保証金を取り戻すときは還付請求権者に対し一定期間内に申し出るべき旨の公告をしなければならない。"], "answer": 0, "exp": "選択肢1が正しい。有価証券を含めて供託しているため本店移転で最寄りの供託所が変わると、保管替えでなく移転後の供託所に新たに供託する。2の不足供託の届出は2週間以内、3は合計1,500万円まで弁済可、4の二重供託による取戻しは公告不要で直ちにできる。", "year": "H28-40", "diff": "A"}, {"id": "kako-gyoB-H29-32", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "宅地建物取引業法に規定する営業保証金に関する次の記述のうち、誤っているものはどれか。", "choices": ["業者は主たる事務所を移転し最寄りの供託所が変更となった場合、金銭のみで供託しているときは、従前の供託所から取り戻した後、移転後の最寄りの供託所に供託しなければならない。", "業者は事業開始後新たに事務所を設置するため営業保証金を供託したときは、供託書の写しを添付してその旨を免許権者に届け出なければならない。", "業者は一部の事務所を廃止し営業保証金を取り戻そうとする場合、還付請求権者に対し6月以上の期間を定めて申し出るべき旨の公告をしなければならない。", "業者は営業保証金の還付があり不足が生じたときは、免許権者から通知書の送付を受けた日から2週間以内に不足額を供託しなければならない。"], "answer": 0, "exp": "選択肢1が誤り。金銭のみで供託している場合の本店移転は、取り戻して供託し直すのではなく、供託所に対し保管替えを請求する。2の供託の届出、3の一部廃止時の6月以上の公告、4の不足額の2週間以内供託はいずれも正しい。", "year": "H29-32", "diff": "A"}, {"id": "kako-gyoB-H29-39", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "営業保証金を供託している業者Ａと保証協会の社員である業者Ｂに関する次の記述のうち、正しいものはいくつあるか。ア Ａ(国土交通大臣免許)は乙県内に新たに従たる事務所を設置したときは、営業保証金をその従たる事務所の最寄りの供託所に供託しなければならない。イ Ａが手付金500万円を支払い売買契約を締結後、引渡し前にＢが失踪し引渡しを受けられなくなったとき、Ａは手付金について弁済業務保証金から弁済を受けられる。ウ Ｂは社員の地位を失ったときは、失った日から1週間以内に営業保証金を供託しなければならない。エ Ｂの取引に関して弁済業務保証金の還付があったときは、Ｂは還付充当金の納付通知を受けた日から2週間以内に還付充当金を保証協会に納付しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "正しいのはウとエの二つ。ウは社員の地位喪失から1週間以内に営業保証金を供託、エは還付充当金は通知を受けた日から2週間以内に保証協会へ納付。アは従たる事務所分も主たる事務所の最寄りの供託所に供託、イは業者Ａは弁済業務保証金から還付を受けられない。", "year": "H29-39", "diff": "A"}, {"id": "kako-gyoB-H30-43", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "宅地建物取引業法に規定する営業保証金に関する次の記述のうち、正しいものはどれか。", "choices": ["業者は免許を受けた日から3月以内に営業保証金供託の届出を行わず催告を受けた場合、催告が到達した日から1月以内に届出をしないときは免許を取り消されることがある。", "業者に委託している家賃収納代行業務により生じた債権を有する者は、業者が供託した営業保証金から弁済を受けることができる。", "業者は宅建業の開始後1週間以内に、供託書の写しを添付して営業保証金を供託した旨を免許権者に届け出なければならない。", "業者が事務所を2か所増設するための供託に国債証券と地方債証券を充てる場合、地方債証券の額面が800万円であるときは、額面200万円の国債証券が必要となる。"], "answer": 0, "exp": "選択肢1が正しい。3か月以内に供託の届出をせず催告を受け、催告到達から1月以内に届出がないと免許を取り消されることがある。2の家賃収納代行は宅建業でなく弁済対象外、3は届出後でなければ事業開始できず、4は地方債800万は90%評価の720万となり不足280万円分の国債が必要。", "year": "H30-43", "diff": "A"}, {"id": "kako-gyoB-H30-44", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "保証協会の社員である業者Ａに関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["Ａは社員の地位を失った場合、Ａとの取引により生じた債権を有する者に対し、6月以内に申し出るべき旨の公告をしなければならない。", "保証協会は、Ａの取引の相手方から取引に関する苦情を受けた場合、Ａに対し文書又は口頭による説明を求めることができる。", "Ａは社員の地位を失った場合において分担金150万円を納付していたときは、全事務所で営業を継続するため1週間以内に営業保証金として1,500万円を供託しなければならない。", "Ａは一部の事務所を廃止したときは、保証協会が還付請求権者に対し一定期間内に申し出るべき旨の公告をした後でなければ、分担金の返還を受けられない。"], "answer": 1, "exp": "選択肢2が正しい。保証協会は苦情解決のため社員に文書・口頭の説明や資料提出を求められる。1の地位喪失時の公告は業者でなく保証協会が行う、3は分担金150万は営業保証金2,500万に相当する、4は一部事務所廃止の場合は公告不要。", "year": "H30-44", "diff": "A"}, {"id": "kako-gyoB-R1-33", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "保証協会に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["業者で保証協会に加入した者は、加入の日から2週間以内に分担金を保証協会に納付しなければならない。", "社員となった業者が加入前に供託していた営業保証金を取り戻すときは、還付請求権者に対する公告をしなければならない。", "社員は新たに事務所を設置したにもかかわらずその日から2週間以内に分担金を納付しなかったときは、社員の地位を失う。", "還付充当金の未納により社員の地位を失った業者は、地位を失った日から2週間以内に弁済業務保証金を供託すれば地位を回復する。"], "answer": 2, "exp": "選択肢3が正しい。社員は新事務所設置日から2週間以内に分担金を納付しないと社員の地位を失う。1は加入しようとする日までに納付、2は加入前の営業保証金の取戻しは公告不要、4は地位喪失時は1週間以内に営業保証金を供託する義務があり、供託で地位が回復する規定はない。", "year": "R1-33", "diff": "B"}, {"id": "kako-gyoB-R2-10月-35", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "業者Ａ(甲県知事免許)の営業保証金に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["Ａから建設工事を請け負った建設業者は、その請負代金債権について、営業継続中のＡが供託している営業保証金から弁済を受ける権利を有する。", "Ａが甲県内に新たに支店を設置したときは、本店の最寄りの供託所に営業保証金を供託すれば、その支店での事業を開始できる。", "Ａは還付により営業保証金が不足したときは、甲県知事から通知書の送付を受けた日から2週間以内にその不足額を供託しなければならない。", "Ａが甲県内に本店及び2つの支店を設置する場合、供託すべき営業保証金の合計額は1,200万円である。"], "answer": 2, "exp": "選択肢3が正しい。還付で不足が生じたときは通知書の送付を受けた日から2週間以内に不足額を供託する。1の建設請負代金は宅建取引の債権でなく還付対象外、2は供託しただけでなく届出後でなければ事業開始できず、4は本店1,000万+支店500万×2=2,000万円となる。", "year": "R2-10月-35", "diff": "A"}, {"id": "kako-gyoB-R2-10月-36", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "保証協会に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["社員との取引により生じた債権を有する者は、当該社員が納付した分担金の額に相当する額の範囲内で弁済を受ける権利を有する。", "社員と取引をした者が弁済業務保証金について弁済を受ける権利を実行するときは、保証協会の認証を受けるとともに保証協会に対し還付請求をしなければならない。", "保証協会は還付があったときは、還付に係る社員等に対し還付充当金を主たる事務所の最寄りの供託所に供託すべきことを通知しなければならない。", "保証協会は還付があったときは、その還付額に相当する額の弁済業務保証金を供託しなければならない。"], "answer": 3, "exp": "選択肢4が正しい。保証協会は還付があると還付額相当の弁済業務保証金を供託しなければならない。1の弁済限度は分担金でなく営業保証金換算額、2の還付請求は保証協会でなく供託所に対して行い、3の還付充当金は供託所でなく保証協会へ納付するもの。", "year": "R2-10月-36", "diff": "A"}, {"id": "kako-gyoB-R2-12月-30", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "保証協会に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["本店と3つの支店を有する業者が保証協会に加入しようとする場合、110万円の分担金を納付しなければならない。", "社員又は社員であった者が還付充当金を保証協会に納付すべき旨の通知を受けたときは、通知を受けた日から2週間以内にその額の還付充当金を保証協会に納付しなければならない。", "保証協会に加入している業者は、保証を手厚くするため更に別の保証協会に加入することができる。", "社員(甲県知事免許)と取引をした者が弁済業務保証金について弁済を受ける権利を実行するときは、弁済を受けられる額について甲県知事の認証を受ける必要がある。"], "answer": 1, "exp": "選択肢2が正しい。還付充当金は通知を受けた日から2週間以内に保証協会へ納付する。1は本店60万+支店30万×3=150万円(110万でない)、3は他の保証協会に重ねて加入できない、4の弁済実行は知事でなく保証協会の認証を受ける。", "year": "R2-12月-30", "diff": "A"}, {"id": "kako-gyoB-R2-12月-33", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "宅地建物取引業法に規定する営業保証金に関する次の記述のうち、正しいものはどれか。", "choices": ["業者は事業開始後新たに従たる事務所を設置したときは、その従たる事務所の最寄りの供託所に営業保証金を供託し免許権者に届け出なければならない。", "業者は主たる事務所を移転し最寄りの供託所が変更した場合、国債証券で供託しているときは遅滞なく従前の供託所に営業保証金の保管替えを請求しなければならない。", "業者は免許の有効期間満了に伴い営業保証金を取り戻す場合、還付請求権者に対する公告をすることなく取り戻すことができる。", "免許権者は業者が免許を受けた日から3月以内に供託の届出をしないときは催告をしなければならず、催告が到達した日から1月以内に届出がないときは免許を取り消すことができる。"], "answer": 3, "exp": "選択肢4が正しい。3か月以内の供託届出がないと催告し、催告到達から1月以内に届出がなければ免許を取り消せる。1は従たる事務所分も主たる事務所の最寄りの供託所に供託、2は有価証券を含む場合は保管替えでなく新たに供託、3は満了に伴う取戻しは6月以上の公告が必要。", "year": "R2-12月-33", "diff": "A"}, {"id": "kako-gyoB-R3-10月-34", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "宅地建物取引業法の規定に基づく営業保証金に関する次の記述のうち、正しいものはどれか。", "choices": ["国土交通大臣免許の業者が営業保証金を主たる事務所の最寄りの供託所に供託した場合、供託所から国土交通大臣に通知されるため、業者は届出をする必要はない。", "業者と取引をした者は、その債権に関し業者が供託した営業保証金から弁済を受ける権利を有するが、取引をした者が業者に該当する場合はその権利を有しない。", "営業保証金は金銭のほか有価証券をもって供託できるが、金銭と有価証券を併用して供託することはできない。", "有価証券を営業保証金に充てる場合の価額は、国債証券は額面の100分の90、地方債証券は額面の100分の80である。"], "answer": 1, "exp": "選択肢2が正しい。取引の相手方が業者に該当する場合は営業保証金からの弁済を受けられない。1は供託後に業者自身が免許権者へ届け出る必要があり、3は金銭と有価証券の併用も可能、4は国債は額面の100%、地方債は100分の90で評価される。", "year": "R3-10月-34", "diff": "A"}, {"id": "kako-gyoB-R5-30", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "業者Ａ(甲県知事免許)の営業保証金に関する次の記述のうち、正しいものはいくつあるか。なおＡは保証協会の社員ではない。ア Ａが免許を受けた日から6か月以内に供託の届出を行わないとき、甲県知事は催告をしなければならず、催告が到達した日から1か月以内に届出を行わないときは免許を取り消すことができる。イ Ａは営業保証金を供託したときは供託書の写しを添付して甲県知事に届け出なければならず、届出をした後でなければ事業を開始できない。ウ Ａは還付され甲県知事から不足の通知を受けその不足額を供託したときは、30日以内に甲県知事に届け出なければならない。エ Ａが免許失効に伴い営業保証金を取り戻す際、還付を受ける権利を有する者に対し3か月を下らない一定期間内に申し出るべき旨を公告し、期間内に申出がなかった場合でなければ取り戻せない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 0, "exp": "正しいのはイのみで一つ。イは供託の届出をした後でなければ事業を開始できない。アは届出期間が「6か月」でなく3か月以内に催告、ウは不足額供託の届出は「30日」でなく2週間以内、エは取戻しの公告期間は「3か月」でなく6か月を下らない期間。", "year": "R5-30", "diff": "A"}, {"id": "kako-gyoB-R6-27", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "業者Ａに関する次の記述のうち、正しいものはどれか。なおＡは保証協会の社員ではない。", "choices": ["Ａが主たる事務所を移転し最寄りの供託所が変更した場合、金銭のみで供託しているときは、遅滞なく移転後の主たる事務所の最寄りの供託所に新たに供託しなければならない。", "Ａの従業員が運転する車両で現地案内を受けた者が、従業員の過失による交通事故でケガをした場合に取得する損害賠償請求権は、Ａが供託した営業保証金の還付の対象となる。", "Ａは金銭と有価証券を併用して供託でき、有価証券のみで供託する場合の価額は国債証券が額面の100分の90、地方債証券が額面の100分の80である。", "Ａが甲県内の主たる事務所とは別に乙県内に新たに従たる事務所を設置したときは、営業保証金を主たる事務所の最寄りの供託所に供託しなければならない。"], "answer": 3, "exp": "選択肢4が正しい。従たる事務所を設置しても営業保証金は主たる事務所の最寄りの供託所に供託する。1は金銭のみの場合は新規供託でなく保管替えを請求、2の従業員の交通事故の賠償は宅建取引の債権でなく還付対象外、3は国債は額面の100%、地方債は100分の90で評価される。", "year": "R6-27", "diff": "A"}, {"id": "kako-gyoB-R6-36", "subject": "宅建業法", "topic": "営業保証金・弁済業務保証金", "type": "select", "q": "営業保証金及び保証協会に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["業者で保証協会に加入しようとする者は、加入しようとする日までに政令で定める額の分担金を保証協会に納付しなければならない。", "社員と取引をした者(業者を除く)は、その債権に関し、当該社員が社員でないとしたならば供託すべき営業保証金の額に相当する額の範囲内で弁済を受ける権利を有する。", "業者は社員の地位を失ったときは、保証協会が還付請求権者に対し一定期間内に認証を受けるため申し出るべき旨の公告をした後でなければ、分担金の返還を受けられない。", "業者は一部の事務所を廃止し営業保証金を取り戻そうとする場合、還付請求権者に対し公告をすることなく営業保証金を取り戻すことができる。"], "answer": 3, "exp": "選択肢4が誤り。一部の事務所を廃止して営業保証金を取り戻すには、還付請求権者への6か月以上の公告が必要で、公告なしには取り戻せない。1の加入日までの分担金納付、2の営業保証金換算額を限度とする弁済、3の社員地位喪失時の公告後の返還はいずれも正しい。", "year": "R6-36", "diff": "B"}, {"id": "kako-gyoB-R3-10月-31", "subject": "宅建業法", "topic": "宅地建物取引業保証協会", "type": "select", "q": "保証協会に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["保証協会は、社員が社員となる前に取引をした者の債権に関し還付により弁済業務の運営に支障が生ずるおそれがあると認めるときは、当該社員に担保の提供を求めることができる。", "社員である業者は、相手方から苦情の解決の申出が保証協会になされ資料の提出を求められたときは、正当な理由がある場合でなければこれを拒んではならない。", "社員である業者は、取引をした者の債権に関し還付がなされたときは、その日から2週間以内に還付充当金を保証協会に納付しなければならない。", "還付充当金の未納により社員がその地位を失ったときは、保証協会は直ちにその旨を当該業者の免許権者に報告しなければならない。"], "answer": 2, "exp": "選択肢3が誤り。還付充当金の納付期限は「還付がなされた日」からでなく、保証協会の通知を受けた日から2週間以内。1の担保提供の請求、2の資料提出拒否の禁止、4の地位喪失時の免許権者への報告はいずれも正しい。", "year": "R3-10月-31", "diff": "C"}, {"id": "kako-gyoB-R3-12月-39", "subject": "宅建業法", "topic": "宅地建物取引業保証協会", "type": "select", "q": "保証協会に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["保証協会は、その名称・住所又は事務所の所在地を変更しようとするときは、あらかじめその旨を国土交通大臣に届け出なければならない。", "保証協会は、新たに社員が加入したときは、直ちにその旨を当該社員である業者の免許権者に報告しなければならない。", "業者で保証協会に加入しようとする者は、加入した日から1週間以内に政令で定める額の分担金を保証協会に納付しなければならない。", "社員は、取引の相手方から苦情の解決の申出が保証協会にあり説明を求められたときは、正当な理由がある場合でなければこれを拒んではならない。"], "answer": 2, "exp": "選択肢3が誤り。分担金は「加入した日から1週間以内」でなく、加入しようとする日までに納付しなければならない。1の名称等変更のあらかじめの届出、2の社員加入時の報告、4の苦情解決の説明拒否の禁止はいずれも正しい。", "year": "R3-12月-39", "diff": "A"}, {"id": "kako-gyoB-R4-39", "subject": "宅建業法", "topic": "宅地建物取引業保証協会", "type": "select", "q": "保証協会に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["保証協会は、認証申出書の提出があり認証に係る事務を処理する場合には、各月ごとに、認証申出書に記載された取引が成立した時期の順序に従ってしなければならない。", "保証協会は、社員から分担金の納付を受けたときは、その額に相当する額の弁済業務保証金を当該社員の主たる事務所の最寄りの供託所に供託しなければならない。", "社員が分担金を納付した後に新たに事務所を設置したときは、その日から2週間以内に保証協会に納付すべき分担金について、国債証券をもって充てることができる。", "業者と宅地の売買契約を締結した買主(業者でない)は、当該業者が保証協会の社員となる前に生じた債権に関し、保証協会が供託した弁済業務保証金から弁済を受ける権利を有する。"], "answer": 3, "exp": "選択肢4が正しい。社員となる前の取引で生じた債権も弁済業務保証金から弁済を受けられる。1の認証は取引成立順でなく申出書受理の順序、2の供託先は最寄りでなく東京法務局、3の追加分担金は国債でなく金銭でのみ納付する。", "year": "R4-39", "diff": "A"}, {"id": "kako-gyoB-R4-41", "subject": "宅建業法", "topic": "宅地建物取引業保証協会", "type": "select", "q": "営業保証金及び保証協会に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはいくつあるか。ア 業者の代表者が脅迫罪で拘禁の刑に処せられ免許を取り消された場合、当該業者であった者は刑の執行を終わった日から5年間は供託した営業保証金を取り戻せない。イ 還付により営業保証金が不足し免許権者から通知書の送付を受けた業者は、送付を受けた日から2週間以内に不足額を供託しなければならない。ウ 社員は、取引の相手方から苦情の解決の申出が保証協会にあり資料の提出を求められたときは、正当な理由がある場合でなければこれを拒んではならない。エ 社員と取引をした者は、その債権に関し、当該社員が納付した弁済業務保証金の額に相当する額の範囲内で弁済を受ける権利を有する。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "誤りはアとエの二つ。アは免許を取り消されても営業保証金は取り戻せ、刑の執行終了から5年という制限はない。エの弁済限度は「納付した分担金の額」でなく営業保証金換算額。イの不足額2週間以内の供託、ウの資料提出拒否の禁止は正しい。", "year": "R4-41", "diff": "B"}, {"id": "kako-gyoB-R5-44", "subject": "宅建業法", "topic": "宅地建物取引業保証協会", "type": "select", "q": "保証協会に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["社員は、取引の相手方から苦情の解決の申出が保証協会にあり資料の提出を求められたときは、正当な理由がある場合でなければこれを拒んではならない。", "保証協会は、社員が一部の事務所を廃止したことに伴い分担金を返還しようとするときは、還付請求権者に対し一定期間内に認証を受けるため申し出るべき旨の公告を行わなければならない。", "保証協会は、相手方から社員の取引に関する損害の還付請求を受けたときは、直ちに弁済業務保証金から返還しなければならない。", "保証協会は手付金等保管事業について国土交通大臣の承認を受けた場合、社員が自ら売主となる宅地の造成又は建築の工事完了前の売買における買主からの手付金等の受領を当該事業の対象とできる。"], "answer": 0, "exp": "選択肢1が正しい。社員は苦情解決のための資料提出を正当な理由なく拒めない。2の一部事務所廃止に伴う分担金返還は公告不要、3は還付は認証を受け供託所に請求するもので保証協会が直接返還するのではなく、4の手付金等保管事業は未完成物件は対象外。", "year": "R5-44", "diff": "A"}, {"id": "kako-gyoB-H27-35", "subject": "宅建業法", "topic": "宅建士の登録", "type": "select", "q": "宅地建物取引業法の規定に関する次の記述のうち、正しいものはどれか。", "choices": ["業者の業務処理の原則の規定はあるが、宅建士については規定はないものの、公正かつ誠実に事務を行い関連業務従事者との連携に努めるべきと解されている。", "「宅建士は、宅建業の業務に従事するときは、宅建士の信用又は品位を害するような行為をしてはならない」との規定がある。", "「宅建士は、宅建業を営む事務所において、専ら宅建業に従事し、これに専念しなければならない」との規定がある。", "業者の従業者教育の努力義務の規定があり、「宅建士は、取引に係る事務に必要な知識及び能力の維持向上に努めなければならない」との規定がある。"], "answer": 3, "exp": "選択肢4が正しい。業者の従業者教育の努力義務(31条の2)も宅建士の知識・能力の維持向上の努力義務(15条の3)も規定がある。1は宅建士の業務処理原則も明文がある、2の信用・品位保持は業務従事時に限定されない、3の専念義務の規定はない。", "year": "H27-35", "diff": "B"}, {"id": "kako-gyoB-R2-10月-34", "subject": "宅建業法", "topic": "宅建士の登録", "type": "select", "q": "宅建士の登録及び宅建士証に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["甲県で試験に合格した後1年以上登録の申請をしていなかった者が業者(乙県知事免許)に勤務することとなったときは、乙県知事あてに登録の申請をしなければならない。", "登録を受けている者は、住所に変更があっても、登録先の都道府県知事に変更の登録を申請する必要はない。", "宅建士は、従事先として登録している業者の事務所の所在地に変更があったときは、登録先の都道府県知事に変更の登録を申請しなければならない。", "丙県知事の登録を受けている宅建士が丁県知事への登録移転の申請とともに宅建士証の交付を申請した場合、丁県知事から、移転前の宅建士証の有効期間が経過するまでの期間を有効期間とする新たな宅建士証が交付される。"], "answer": 3, "exp": "選択肢4が正しい。登録移転と同時に宅建士証の交付を申請すると、従前の証の残存期間を有効期間とする証が交付される。1は登録は合格地の甲県知事へ申請、2は住所変更も変更の登録が必要、3は業者の事務所の所在地は登録簿の記載事項でなく変更の登録は不要。", "year": "R2-10月-34", "diff": "A"}, {"id": "kako-gyoB-R2-12月-26", "subject": "宅建業法", "topic": "登録の基準", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["業者は、建物の売買に際し買主に売買代金の貸借のあっせんをすることにより契約の締結を誘引してはならない。", "宅建士は、自ら役員を務める業者が不正な行為をし情状が特に重いことにより免許を取り消された場合、宅建士の登録を消除されることとなる。", "業者は、建築工事完了前の賃貸住宅について、借主として貸借の契約を締結してはならない。", "業者は、10区画以上の一団の宅地の分譲を行う案内所で売買契約の締結や申込みを受ける場合、当該案内所に業務に関する帳簿を備え付けなければならない。"], "answer": 1, "exp": "選択肢2が正しい。業務停止事由に該当し情状が特に重く免許を取り消された業者の役員であった者は、宅建士の登録も消除される。1の代金の貸借あっせんは誘引が禁止されない(禁止は手付の信用供与)、3は業者が自ら借主となる未完成賃貸の契約は可能、4の帳簿は事務所ごとで案内所には備付け不要。", "year": "R2-12月-26", "diff": "B"}, {"id": "kako-gyoB-R3-12月-37", "subject": "宅建業法", "topic": "登録の基準", "type": "select", "q": "宅建士に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["甲県知事の登録を受けている宅建士は、乙県に主たる事務所を置く業者の専任宅建士となる場合、乙県知事に登録の移転を申請しなければならない。", "宅地建物取引業者名簿には事務所の名称及び所在地は登載されているが、専任宅建士の氏名は登載されていない。", "宅建士が傷害罪で罰金刑に処せられ登録が消除された場合、登録が消除された日から5年を経過するまでは新たな登録を受けられない。", "未成年者は、宅建業に係る営業に関し成年者と同一の行為能力を有していたとしても、成年に達するまでは登録を受けられない。"], "answer": 1, "exp": "選択肢2が正しい。業者名簿に事務所の名称・所在地は登載されるが、専任宅建士の氏名は登載されない。1は他県での専任就任でも登録移転は任意、3の欠格期間は「刑の執行終了から5年」で消除日からでない、4は成年者と同一の行為能力を有する未成年者は登録を受けられる。", "year": "R3-12月-37", "diff": "A"}, {"id": "kako-gyoB-R4-33", "subject": "宅建業法", "topic": "登録の基準", "type": "select", "q": "宅建士に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。ア 宅建士資格試験は未成年者でも受験できるが、宅建士の登録は成年に達するまでいかなる場合にも受けられない。イ 甲県知事登録の宅建士が業者(乙県知事免許)の専任宅建士に就任するためには、登録を乙県に移転しなければならない。ウ 丙県知事登録の宅建士が事務の禁止の処分を受けた場合、丁県の業者の事務所の業務に従事しようとするときでも、禁止期間が満了するまで登録の移転を丁県知事に申請できない。エ 戊県知事登録の宅建士が己県へ登録移転の申請とともに宅建士証の交付を申請した場合、己県知事は、戊県で交付された宅建士証の有効期間が経過するまでの期間を有効期間とする宅建士証を交付しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "正しいのはウとエの二つ。ウは事務禁止期間中は登録の移転を申請できない、エは移転と同時交付は従前の証の残存期間を有効期間とする証を交付する。アは成年者と同一の行為能力を有する未成年者は登録可、イは専任就任に登録移転は不要で任意。", "year": "R4-33", "diff": "B"}, {"id": "kako-gyoB-H28-38", "subject": "宅建業法", "topic": "宅建士証", "type": "select", "q": "宅建士資格登録又は宅建士に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。ア 宅建士(甲県知事登録)が乙県で宅建業に従事することとなり乙県知事に登録移転を申請したときは、移転後新たに5年を有効期間とする宅建士証の交付を受けられる。イ 宅建士は、宅建士証の提示を求められたときは提示しなければならないが、従業者証明書の提示を求められたときは、代表取締役である宅建士は当該証明書がないので提示をしなくてよい。ウ 宅建士が心身の故障により事務を適正に営めない者となったときは、本人又はその法定代理人若しくは同居の親族は、その日から3月以内に登録先の都道府県知事に届け出なければならない。エ 宅建士資格登録簿は一般の閲覧に供されないが、宅地建物取引業者名簿は一般の閲覧に供される。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "exp": "正しいのはエのみで一つ。エは登録簿は非公開だが業者名簿は公開される。アは移転時は新5年でなく従前の証の残存期間、イは代表取締役も従業者証明書の携帯・提示義務がある、ウの心身故障の届出期限は「3月」でなく30日以内。", "year": "H28-38", "diff": "B"}, {"id": "kako-gyoB-H29-30", "subject": "宅建業法", "topic": "宅建士証", "type": "select", "q": "宅地建物取引業法の規定に関する次の記述のうち、誤っているものはどれか。", "choices": ["宅建士Ａ(甲県知事登録)が甲県から乙県に住所を変更したときは、乙県知事に対し登録の移転の申請をすることができる。", "業者Ｂ(甲県知事免許)が乙県所在の1棟のマンション(150戸)を分譲するため現地に案内所を設置し申込みを受けるときは、甲県知事及び乙県知事に業務開始日の10日前までに届出をしなければならない。", "試験合格後18月を経過したＣ(甲県知事登録)が甲県知事から宅建士証の交付を受けようとする場合は、甲県知事が指定する講習を交付の申請前6月以内に受講しなければならない。", "業者Ｄ社(甲県知事免許)が合併により消滅したときは、その日から30日以内にＤ社を代表する役員であった者が甲県知事に届け出なければならない。"], "answer": 0, "exp": "選択肢1が誤り。登録の移転は他県の業者事務所に従事する場合に申請でき、単なる住所変更では移転できない。2の案内所届出10日前、3の交付前6月以内の指定講習、4の合併消滅の30日以内届出はいずれも正しい。", "year": "H29-30", "diff": "A"}, {"id": "kako-gyoB-H29-37", "subject": "宅建業法", "topic": "宅建士証", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅建士は取引の関係者から請求があれば買受けの申込み前でも宅建士証を提示しなければならないが、このとき提示した場合、後日35条の重要事項説明の際は宅建士証を提示しなくてよい。", "甲県知事の登録を受けている宅建士Ａは、乙県に主たる事務所を置く業者Ｂの専任宅建士となる場合、乙県知事に登録を移転しなければならない。", "宅建士の登録を受けるには、試験合格者で2年以上の実務経験を有するもの又は国土交通大臣が同等以上と認めたものであり、法定事由に該当しないことが必要である。", "宅建士は、請求があれば従業者証明書を提示しなければならないが、35条の重要事項説明の際は宅建士証の提示が義務付けられているため、宅建士証の提示をもって従業者証明書の提示に代えられる。"], "answer": 2, "exp": "選択肢3が正しい。登録には試験合格・2年以上の実務経験(又は同等の認定)・欠格事由非該当が必要。1は重説の際は以前提示済みでも改めて宅建士証を提示、2は専任就任でも登録移転は任意、4は宅建士証の提示は従業者証明書の提示の代わりにならない。", "year": "H29-37", "diff": "A"}, {"id": "kako-gyoB-H30-42", "subject": "宅建業法", "topic": "宅建士証", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅建士が死亡した場合、その相続人は死亡した日から30日以内に登録先の都道府県知事に届け出なければならない。", "甲県知事の登録を受けている宅建士は、乙県所在の業者の事務所の業務に従事しようとするときは、乙県知事に登録移転を申請し乙県知事の登録を受けなければならない。", "宅建士は事務禁止の処分を受けたときは宅建士証を提出しなくてよいが、登録消除の処分を受けたときは返納しなければならない。", "宅建士は37条書面を交付する際、請求があったときは、専任宅建士であるか否かにかかわらず宅建士証を提示しなければならない。"], "answer": 3, "exp": "選択肢4が正しい。宅建士は37条書面の交付時、請求があれば専任か否かを問わず宅建士証を提示する義務がある。1の死亡届出は「死亡を知った日から」30日以内、2の登録移転は任意、3は事務禁止処分でも宅建士証の提出義務がある。", "year": "H30-42", "diff": "A"}, {"id": "kako-gyoB-R1-44", "subject": "宅建業法", "topic": "宅建士証", "type": "select", "q": "宅地建物取引業法に規定する宅建士資格登録に関する次の記述のうち、正しいものはどれか。", "choices": ["業務停止処分に違反したとして免許取消しを受けた法人の政令で定める使用人であった者は、免許取消しの日から5年を経過しなければ登録を受けられない。", "業者Ａ(甲県知事免許)に勤務する宅建士(甲県知事登録)が業者Ｂ(乙県知事免許)に勤務先を変更した場合は、乙県知事に対して遅滞なく勤務先の変更の登録を申請しなければならない。", "甲県知事登録を受けている者が甲県から乙県に住所を変更した場合は、宅建士証の交付を受けていなくても、甲県知事に対して遅滞なく住所の変更の登録を申請しなければならない。", "試験に合格した者は、実務の経験を有しない場合でも、合格した日から1年以内に登録を受けようとするときは、登録実務講習を受講する必要はない。"], "answer": 2, "exp": "選択肢3が正しい。住所は登録簿の登載事項なので、宅建士証の交付を受けていなくても住所変更は変更の登録が必要。1は免許取消法人でも政令使用人は登録可(役員のみ5年欠格)、2の勤務先変更は登録先の甲県知事へ申請、4は合格1年以内でも実務経験がなければ登録実務講習が必要。", "year": "R1-44", "diff": "C"}, {"id": "kako-gyoB-R2-10月-28", "subject": "宅建業法", "topic": "宅建士証", "type": "select", "q": "宅建士に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["試験に合格した者は、合格した日から10年以内に登録の申請をしなければ、その合格は無効となる。", "宅建士証の有効期間の更新の申請は、有効期間満了の90日前から30日前までにする必要がある。", "宅建士は、重要事項の説明をするときは相手方からの請求の有無にかかわらず宅建士証を提示しなければならず、また取引の関係者から請求があったときにも提示しなければならない。", "甲県知事の登録を受けている宅建士が乙県知事に登録の移転を申請するときは、乙県知事が指定する講習を受講しなければならない。"], "answer": 2, "exp": "選択肢3が正しい。重要事項説明時は請求の有無を問わず提示し、取引の関係者から請求があったときも宅建士証を提示する。1は試験合格は一生有効、2は宅建士証の更新に90～30日前の申請期間の規定はない(それは業者免許)、4は登録移転時に指定講習の受講は不要。", "year": "R2-10月-28", "diff": "A"}, {"id": "kako-gyoB-R2-12月-29", "subject": "宅建業法", "topic": "宅建士証", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["業者(甲県知事免許)が乙県内に新たに事務所を設置するため国土交通大臣に免許換えを申請しその免許を受けたときは、免許換え前の甲県知事免許の有効期間が経過するまでを有効期間とする免許証の交付を受ける。", "宅建士(甲県知事登録)が乙県所在の業者の事務所の業務に従事することとなり乙県知事に登録移転の申請とともに宅建士証の交付を申請したときは、乙県知事から有効期間を5年とする宅建士証の交付を受ける。", "宅建士(甲県知事登録)が乙県所在の建物売買の取引で不正な行為をし乙県知事により事務禁止処分を受けたときは、宅建士証を甲県知事に提出しなければならない。", "業者(甲県知事免許)が乙県内で一団の建物の分譲を行う案内所を設置し売買契約を締結し又は申込みを受ける場合、国土交通大臣に免許換えの申請をしなければならない。"], "answer": 2, "exp": "選択肢3が正しい。乙県知事から事務禁止処分を受けても、宅建士証は交付を受けた甲県知事に提出する。1の免許換え後の有効期間は新たに5年、2の移転と同時交付は従前の証の残存期間を有効期間とする証、4は案内所の設置だけでは免許換えは不要。", "year": "R2-12月-29", "diff": "A"}, {"id": "kako-gyoB-R4-29", "subject": "宅建業法", "topic": "宅建士証", "type": "select", "q": "宅建士に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["宅建士は拘禁以上の刑に処せられた場合、刑に処せられた日から30日以内に登録先の都道府県知事に届け出なければならない。", "宅建士は事務禁止の処分を受けた場合、速やかに宅建士証を交付を受けた都道府県知事に提出しなければならず、これを怠った場合には罰則の適用を受けることがある。", "宅建士は宅建士証を更新する場合、国土交通大臣が指定する講習を受講しなければならず、当該宅建士証の有効期間は5年である。", "宅建士は宅建士の信用を害するような行為をしてはならず、信用を害する行為には職務に必ずしも直接関係しない行為や私的な行為も含まれる。"], "answer": 2, "exp": "選択肢3が誤り。宅建士証更新の際の講習を指定するのは国土交通大臣でなく、登録先の都道府県知事。1の拘禁刑以上の30日以内の届出、2の事務禁止時の提出義務と過料、4の信用を害する行為に私的行為も含む点はいずれも正しい。", "year": "R4-29", "diff": "B"}, {"id": "kako-gyoB-R6-43", "subject": "宅建業法", "topic": "宅建士証", "type": "select", "q": "宅建士の登録及び宅建士証に関する次の記述のうち、誤っているものはどれか。", "choices": ["宅建士の登録を受けている者は、宅建士証の交付を受けていない場合でも、住所に変更があれば登録先の都道府県知事に変更の登録を申請しなければならない。", "宅建士は宅建士の信用又は品位を害するような行為をしてはならず、この行為には宅建士としての職務に必ずしも直接関係しない行為や私的な行為も含まれる。", "宅建士は取引の関係者から請求があったときは宅建士証を提示しなければならないが、その際、個人情報保護の観点から住所欄にシールを貼った上で提示することが認められている。", "宅建士証に記載される宅建士の氏名については現姓を用いなければならず、旧姓を併記することは認められていない。"], "answer": 3, "exp": "選択肢4が誤り。宅建士証の氏名は、希望すれば旧姓を併記することが認められている。1の証未交付でも住所変更の登録が必要、2の信用・品位に私的行為も含む、3の住所欄シールを貼った提示が認められる点はいずれも正しい。", "year": "R6-43", "diff": "A"}, {"id": "kako-gyoB-R1-35", "subject": "宅建業法", "topic": "宅建士の設置・業務", "type": "select", "q": "業者Ａが行う業務に関する次の記述のうち、宅地建物取引業法の規定に違反しないものはどれか。", "choices": ["Ａは、業者でないＢが所有する宅地について確定測量図の交付を停止条件とする売買契約を締結し、その条件が成就する前に自ら売主として業者でないＣとの間で当該宅地の売買契約を締結した。", "Ａは、唯一の専任宅建士Ｄが令和元年5月15日に退職したため、同年6月10日に新たな専任宅建士Ｅを置いた。", "Ａは、業者Ｆから宅地の売買の注文を受けた際、Ｆに対して取引態様の別を明示しなかった。", "Ａは、宅地の貸借の媒介に際し、当該宅地が都市計画法第29条の許可の申請中であることを知りつつ賃貸借契約を成立させた。"], "answer": 3, "exp": "選択肢4が違反しない。未完成宅地でも貸借の媒介は開発許可前でも行うことができる。1は停止条件付きで取得予定の他人物の売買契約で違反、2は専任不足は2週間以内に補充すべきで6月10日は超過し違反、3は相手が業者でも取引態様の明示が必要で違反。", "year": "R1-35", "diff": "B"}, {"id": "kako-gyoB-R2-12月-38", "subject": "宅建業法", "topic": "宅建士の設置・業務", "type": "select", "q": "宅建士に関する次の記述のうち、宅地建物取引業法及び民法の規定によれば、正しいものはいくつあるか。ア 業者は唯一の専任宅建士が退任した場合、その日から30日以内に新たな専任宅建士を設置し、その設置の日から2週間以内に変更を免許権者に届け出なければならない。イ 未成年者も、法定代理人の同意があれば業者の事務所に置かれる専任宅建士となることができる。ウ 宅建士は、重要事項説明書を交付するに当たり、相手方が業者である場合、相手方から宅建士証の提示を求められない限り宅建士証を提示する必要はない。エ 成年被後見人又は被保佐人は、宅建士として都道府県知事の登録を受けられない。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "exp": "正しいのはウのみで一つ。ウは相手方が業者なら重説は不要で、請求されない限り宅建士証の提示も不要。アは専任不足は2週間以内に措置し届出は30日以内、イは法定代理人の同意だけでは未成年者は専任になれず、エは成年被後見人・被保佐人でも直ちに登録不可とはならない。", "year": "R2-12月-38", "diff": "B"}, {"id": "kako-gyoB-R3-12月-41", "subject": "宅建業法", "topic": "宅建士の設置・業務", "type": "select", "q": "宅建士に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["業者Ａは、一団の宅地建物の分譲のため設置した案内所には、契約を締結せず申込みも受けないときでも、1名以上の専任宅建士を置かなければならない。", "業者Ｂは、主たる事務所の唯一の専任宅建士が退職したときは、2週間以内に法第31条の3第1項に適合させるため必要な措置を執らなければならない。", "業者Ｃが20戸の一団の分譲建物の売買契約の申込みのみを受ける案内所甲を設置した場合、締結は事務所乙で行うとしても甲にも専任宅建士を置かなければならない。", "法人業者Ｄ社の従業者であり成年者と同一の行為能力を有する18歳未満の宅建士Ｅは、Ｄ社の役員であるときを除き、Ｄ社の専任宅建士となれない。"], "answer": 0, "exp": "選択肢1が誤り。契約の締結も申込みの受付もしない案内所には専任宅建士の設置は不要。2の専任不足の2週間以内の措置、3の申込みを受ける案内所への専任設置、4の未成年宅建士は役員でなければ専任になれない点はいずれも正しい。", "year": "R3-12月-41", "diff": "A"}, {"id": "kako-gyoB-R4-26", "subject": "宅建業法", "topic": "宅建士の設置・業務", "type": "select", "q": "宅地建物取引業法第3条第1項に規定する事務所に関する次の記述のうち、正しいものはどれか。", "choices": ["事務所とは契約締結権限を有する者を置き継続的に業務を行う施設を有する場所を指すが、商業登記簿に登載されていない営業所又は支店は事務所に該当しない。", "宅建業を営まず他の兼業業務のみを営んでいる支店は、事務所に該当しない。", "業者は主たる事務所については、免許証、標識及び国土交通大臣が定めた報酬の額を掲げ、従業者名簿及び帳簿を備え付ける義務を負う。", "業者はその事務所ごとに一定数の成年者である専任宅建士を置かなければならないが、既存の事務所が満たさなくなった場合は30日以内に必要な措置を執らなければならない。"], "answer": 1, "exp": "選択肢2が正しい。宅建業を営まない支店は宅建業法上の事務所に該当しない(本店は営まなくても該当)。1は商業登記簿未登載でも事務所に該当し、3は事務所に免許証の掲示義務はなく、4の専任宅建士の補充措置は30日でなく2週間以内。", "year": "R4-26", "diff": "A"}, {"id": "kako-gyoB-R5-38", "subject": "宅建業法", "topic": "宅建士の設置・業務", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。ア 業者Ａが自ら所有する複数の建物について複数人に反復継続して賃貸する行為は、宅建業に該当しない。イ 宅建士とは、宅建士資格試験に合格し都道府県知事の登録を受けた者をいう。ウ 建設業者Ｂが建築請負工事の受注を目的として業として宅地の売買の媒介を行う行為は、宅建業に該当しない。エ 宅建士は、取引に係る事務に必要な知識及び能力の維持向上に努めなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "正しいのはアとエの二つ。アは自ら貸主となる賃貸は宅建業に当たらない、エは宅建士の知識・能力の維持向上の努力義務がある。イは宅建士は登録に加え宅建士証の交付まで受けた者をいうので誤り、ウは請負目的でも売買の媒介業は宅建業に該当する。", "year": "R5-38", "diff": "B"}, {"id": "kako-gyoB-R6-29", "subject": "宅建業法", "topic": "宅建士の設置・業務", "type": "select", "q": "宅建士に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["試験に合格した者は、取引の実務経験期間が2年に満たない場合でも、合格した日から1年以内に登録を受けようとするときには、都道府県知事が指定する講習を受講することにより登録を受けられる。", "宅建士証は、更新を受けることなく有効期間が経過した場合はその効力を失うが、都道府県知事に返納する必要はない。", "宅建士が他人に自己の名義の使用を許し当該他人がその名義で宅建士である旨の表示をしたときは法第68条の処分の対象となるが、当該他人が宅建士の登録を受けた者であるときはこの限りでない。", "業者は、事務所唯一の専任宅建士が宅建士証の有効期間の経過により効力を失い宅建士でなくなったときは、2週間以内に法第31条の3第1項に適合させるため必要な措置を執らなければならない。"], "answer": 3, "exp": "選択肢4が正しい。唯一の専任宅建士が宅建士証の失効で宅建士でなくなったときは、2週間以内に必要な措置を執る。1は実務2年未満は都道府県知事の講習でなく登録実務講習で登録し1年以内に限らない、2は証が有効期間経過で失効した場合も返納が必要、3の名義貸しは相手が登録者でも処分対象。", "year": "R6-29", "diff": "A"}, {"id": "kako-gyoB-H27-43", "subject": "宅建業法", "topic": "監督処分(業者)", "type": "select", "q": "宅地建物取引業法の規定に基づく監督処分等に関する次の記述のうち、誤っているものはどれか。", "choices": ["業者Ａ(甲県知事免許)が乙県内の中古住宅の売買で担保責任を負わない旨の特約を付した場合、Ａは乙県知事から指示処分を受けることがある。", "甲県に本店・乙県に支店を設置する業者Ｂ(国土交通大臣免許)が乙県のマンション売買で代金の30%の手付金を受領した場合、Ｂは甲県知事から著しく不当な行為をしたとして業務停止処分を受けることがある。", "業者Ｃ(甲県知事免許)が乙県の土地売買の媒介で相手を威迫し契約締結を強要していたことが判明した場合、甲県知事は情状が特に重いと判断したときはＣの免許を取り消さなければならない。", "業者Ｄ(国土交通大臣免許)が甲県内の事務所について帳簿を備えていないことが判明した場合、Ｄは甲県知事から必要な報告を求められ指導を受けることがある。"], "answer": 1, "exp": "選択肢2が誤り。国土交通大臣免許のＢが乙県内で違反した場合、業務停止をできるのは国土交通大臣か乙県知事であり、甲県知事は処分できない。1の甲・乙県知事の指示処分、3の免許権者(甲県知事)による免許取消し、4の甲県知事の報告・指導はいずれも正しい。", "year": "H27-43", "diff": "B"}, {"id": "kako-gyoB-H28-26", "subject": "宅建業法", "topic": "監督処分(業者)", "type": "select", "q": "業者Ａ(甲県知事免許)に対する監督処分に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["Ａが自ら売主となった分譲マンション売買で業者でない買主に35条の重要事項説明を行わなかった場合、Ａは甲県知事から業務停止を命じられることがある。", "Ａが乙県内で著しく不当な行為を行った場合、乙県知事はＡに対し業務停止を命ずることはできない。", "Ａが甲県知事から指示処分を受けたがそれに従わなかった場合、甲県知事はＡに対し1年を超える期間を定めて業務停止を命ずることができる。", "Ａが自ら所有する物件について直接賃借人Ｂと賃貸借契約を締結するに当たり35条の重要事項説明を行わなかった場合、Ａは甲県知事から業務停止を命じられることがある。"], "answer": 0, "exp": "選択肢1が正しい。重要事項説明を行わないと35条違反となり、免許権者の甲県知事から業務停止を命じられることがある。2は業務地の乙県知事も業務停止を命じられる、3の指示違反による業務停止は1年以内、4の自ら貸借は宅建業に当たらず重説は不要。", "year": "H28-26", "diff": "A"}, {"id": "kako-gyoB-R3-12月-36", "subject": "宅建業法", "topic": "監督処分(業者)", "type": "select", "q": "宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["法人業者Ａ(甲県知事免許)について破産手続開始の決定があった場合、その日から30日以内にＡを代表する役員Ｂが甲県知事に届け出なければならない。", "業者Ｃ(乙県知事免許)が国土交通大臣に免許換えの申請を行っているときは、Ｃは取引の相手方に重要事項説明書及び37条書面を交付できない。", "業者Ｄ(丙県知事免許)が免許の更新申請を怠りその有効期間が満了した場合、Ｄは遅滞なく丙県知事に免許証を返納しなければならない。", "業者Ｅ(丁県知事免許)が引き続いて1年以上事業を休止したときは、丁県知事は免許を取り消さなければならない。"], "answer": 3, "exp": "選択肢4が正しい。引き続き1年以上事業を休止したときは、免許権者は免許を取り消さなければならない。1は破産管財人が届け出る、2は免許換え申請中も従前免許が有効で書面交付でき、3は更新を怠り満了しても免許証の返納義務はない。", "year": "R3-12月-36", "diff": "A"}, {"id": "kako-gyoB-R6-31", "subject": "宅建業法", "topic": "監督処分(業者)", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["国土交通大臣又は都道府県知事は、免許を受けた業者が指示に従わない場合、業務の全部又は一部の停止を命ずることができ、業務停止処分に違反した場合は免許を取り消さなければならない。", "国土交通大臣又は都道府県知事は、業者の事務所の所在地を確知できないときはその事実を公告し、公告の日から2週間を経過しても申出がないときは免許を取り消すことができる。", "国土交通大臣又は都道府県知事は、免許取消しの処分をしようとするときは聴聞を行わなければならないが、当該聴聞は公開が相当と認められる場合を除き公開されない。", "国土交通大臣又は都道府県知事は、免許取消しの処分をしたときは公告しなければならないが、業務の停止の処分をしたときは公告しなくともよい。"], "answer": 0, "exp": "選択肢1が正しい。指示に従わない場合は業務停止を命じることができ、業務停止処分に違反すると免許を取り消さなければならない。2の所在確知不能の公告は30日経過で取消し(2週間でない)、3の聴聞は原則公開、4は業務停止処分も公告が必要。", "year": "R6-31", "diff": "B"}, {"id": "kako-gyoB-H30-32", "subject": "宅建業法", "topic": "監督処分(宅建士)", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅建士が都道府県知事から指示処分を受けた場合において業者(国土交通大臣免許)の責めに帰すべき理由があるときは、国土交通大臣は当該業者に対して指示処分をすることができる。", "宅建士が不正の手段により宅建士の登録を受けた場合、登録をした都道府県知事は宅建士資格試験の合格の決定を取り消さなければならない。", "国土交通大臣は、すべての宅建士に対して購入者等の利益の保護を図るため必要な指導、助言及び勧告をすることができる。", "甲県知事の登録を受けている宅建士が乙県知事から事務の禁止の処分を受けた場合は、速やかに宅建士証を乙県知事に提出しなければならない。"], "answer": 0, "exp": "選択肢1が正しい。宅建士の指示処分について業者に責めがあるときは、免許権者の国土交通大臣が業者に指示処分をできる。2は不正登録でも試験合格の決定は取り消されない、3は国土交通大臣の指導・助言・勧告の対象は業者で宅建士ではない、4は事務禁止でも宅建士証は交付を受けた甲県知事に提出する。", "year": "H30-32", "diff": "C"}, {"id": "kako-gyoB-R3-10月-28", "subject": "宅建業法", "topic": "監督処分(宅建士)", "type": "select", "q": "宅建士の登録に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅建士Ａ(甲県知事登録)が乙県所在の業者の事務所の業務に従事することとなったときは、Ａは甲県知事を経由せず直接乙県知事に対して登録の移転を申請しなければならない。", "甲県知事の登録を受けているが宅建士証の交付を受けていないＢが宅建士としてすべき事務を行った場合、情状のいかんを問わず甲県知事はＢの登録を消除しなければならない。", "宅建士Ｃ(甲県知事登録)がＤ社を退職しＥ社に再就職したが、いずれでも専任宅建士でないので勤務先の変更の登録を申請しなくてもよい。", "甲県で試験を受け合格したＦは、乙県に転勤することとなったとしても、登録は甲県知事に申請しなければならない。"], "answer": 3, "exp": "選択肢4が正しい。登録できるのは受験地(甲県)の知事で、転勤しても甲県知事に申請する。1の登録移転は登録先の知事を経由し直接申請ではない、2は証未交付者の事務は情状が特に重いときに消除、3は勤務先の業者名は登録簿の登載事項で専任でなくても変更の登録が必要。", "year": "R3-10月-28", "diff": "A"}, {"id": "kako-gyoB-R5-41", "subject": "宅建業法", "topic": "監督処分(宅建士)", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["甲県知事は宅建士に対して必要な報告を求めることができるが、その対象は甲県知事登録の宅建士であって適正な事務の遂行を確保するために必要な場合に限られる。", "業者Ａ(甲県知事免許)で専任宅建士として従事しているＢ(甲県知事登録)が、勤務実態のない業者Ｃ(乙県知事免許)において自らが専任宅建士である旨の表示がされていることを許した場合、乙県知事はＢに対し必要な指示をすることができる。", "宅建士が不正の手段により宅建士証の交付を受けた場合、登録先の都道府県知事は情状が特に重いときは当該宅建士の登録を消除することができる。", "都道府県知事は宅建士に対して登録消除処分を行ったときは、適切な方法で公告しなければならない。"], "answer": 1, "exp": "選択肢2が正しい。専任宅建士である旨の虚偽表示を許す行為の指示処分は、登録地の甲県知事だけでなく業務地の乙県知事も行える。1は甲県知事登録に限らず区域内で事務する宅建士も対象、3は不正交付は「消除しなければならない」(できるでない)、4は宅建士への監督処分は公告不要。", "year": "R5-41", "diff": "C"}, {"id": "kako-gyoB-H29-29", "subject": "宅建業法", "topic": "罰則", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["業者Ａ(甲県知事免許)がマンション管理業に関し不正又は著しく不当な行為をしたとしてマンション管理適正化法に基づき業務停止を命じられた場合、Ａは甲県知事から法に基づく指示処分を受けることがある。", "国土交通大臣は業者Ｂ(乙県知事免許)の事務所の所在地を確知できない場合、官報及び乙県の公報で公告し、公告の日から30日を経過してもＢから申出がないときはＢの免許を取り消すことができる。", "国土交通大臣は業者Ｃ(国土交通大臣免許)に35条の重要事項説明を行わなかったことを理由に業務停止を命じた場合は、遅滞なくその旨を内閣総理大臣に通知しなければならない。", "業者Ｄ(丙県知事免許)が丙県職員による事務所への立入検査を拒んだ場合、Ｄは50万円以下の罰金に処せられることがある。"], "answer": 3, "exp": "選択肢4が正しい。72条に基づく立入検査を拒むと50万円以下の罰金に処せられることがある。1のマンション管理業の不当行為で宅建業法の指示処分は受けない、2の所在確知不能による取消しは免許権者の乙県知事が行う、3は重説違反の処分は内閣総理大臣への協議が必要で通知ではない。", "year": "H29-29", "diff": "C"}, {"id": "kako-gyoB-R1-29", "subject": "宅建業法", "topic": "罰則", "type": "select", "q": "宅地建物取引業法の規定に基づく監督処分及び罰則に関する次の記述のうち、正しいものはいくつあるか。ア 業者Ａ(国土交通大臣免許)が甲県内で37条書面を交付していなかったことを理由に甲県知事がＡに業務停止処分をしようとするときは、あらかじめ内閣総理大臣に協議しなければならない。イ 乙県知事は業者Ｂ(乙県知事免許)に指示処分をしようとするときは聴聞を行わなければならず、聴聞の期日の審理は公開により行わなければならない。ウ 丙県知事は業者Ｃ(丙県知事免許)が免許を受けてから1年以内に事業を開始しないときは免許を取り消さなければならない。エ 業者Ｄ(丁県知事免許)が丁県知事から業務について必要な報告を求められたがこれを怠った場合、Ｄは50万円以下の罰金に処せられることがある。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "exp": "正しいのはイ・ウ・エの三つ。イは監督処分の聴聞の審理は公開、ウは1年以内に事業を開始しないと免許取消し、エは報告の懈怠は50万円以下の罰金。アは内閣総理大臣への協議は国土交通大臣が処分する場合であり、県知事の処分には不要。", "year": "R1-29", "diff": "C"}, {"id": "kako-gyoB-R2-12月-43", "subject": "宅建業法", "topic": "罰則", "type": "select", "q": "宅地建物取引業法に規定する宅建士及びその登録に関する次の記述のうち、正しいものはどれか。", "choices": ["登録を受けている者が精神の機能の障害により宅建士の事務を適正に行うに当たって必要な認知・判断・意思疎通を適切に行えない者となった場合、本人がその旨を登録先の都道府県知事に届け出ることはできない。", "甲県知事の登録を受けている宅建士が乙県知事に登録移転の申請とともに宅建士証の交付の申請を行う場合、交付の申請前6月以内に乙県知事が指定した講習を受講しなければならない。", "宅建士が事務禁止処分を受け宅建士証を交付を受けた都道府県知事に速やかに提出しなかったときは、50万円以下の罰金に処せられることがある。", "宅建士が脅迫罪により罰金刑に処せられ登録が消除された場合、刑の執行を終わり又は執行を受けることがなくなった日から5年を経過するまでは新たな登録を受けられない。"], "answer": 3, "exp": "選択肢4が正しい。脅迫罪で罰金に処せられ登録が消除されると、刑の執行終了等から5年間は新たな登録を受けられない。1は本人も届け出ることができる、2は登録移転に伴う交付では講習は不要、3は提出の懈怠は50万円の罰金でなく10万円以下の過料。", "year": "R2-12月-43", "diff": "B"}, {"id": "kako-gyoB-R3-10月-35", "subject": "宅建業法", "topic": "罰則", "type": "select", "q": "宅建士の登録及び宅建士証に関する次の記述のうち、正しいものはいくつあるか。ア 宅建士(甲県知事登録)が事務禁止処分を受けた場合、宅建士証を甲県知事に速やかに提出しなければならず、提出しなかったときは10万円以下の過料に処せられることがある。イ 宅建士(甲県知事登録)が事務禁止処分を受けその禁止期間中に本人の申請により登録が消除された場合は、乙県で試験に合格したとしても当該期間が満了していないときは乙県知事の登録を受けられない。ウ 宅建士(甲県知事登録)が甲県から乙県に住所を変更したときは、乙県知事に対し登録の移転の申請をすることができる。エ 宅建士(甲県知事登録)が本籍を変更した場合、遅滞なく甲県知事に変更の登録を申請しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "exp": "正しいのはア・イ・エの三つ。アは事務禁止時の提出懈怠は10万円以下の過料、イは事務禁止期間中に自ら申請して消除されても期間満了まで他県でも登録できない、エは本籍変更は遅滞なく変更の登録が必要。ウは住所変更を理由に登録の移転はできない。", "year": "R3-10月-35", "diff": "C"}, {"id": "kako-gyoB-R3-12月-28", "subject": "宅建業法", "topic": "罰則", "type": "select", "q": "業者Ａ(甲県知事免許)に関する監督処分及び罰則に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。ア Ａが不正の手段により甲県知事から免許を受けたとき、甲県知事はＡに対して当該免許を取り消さなければならない。イ Ａが法第3条の2第1項の規定により付された条件に違反したときは、甲県知事はＡの免許を取り消さなければならない。ウ Ａが事務所に報酬の額を掲示しなかった場合、Ａは甲県知事から指示処分を受けることはあるが、罰則の適用を受けることはない。エ Ａの従業者名簿の作成に当たり法第48条第3項の記載事項について従業者Ｂが虚偽の記載をした場合、Ｂは罰則の適用を受けることはあるが、Ａは罰則の適用を受けることはない。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "exp": "正しいのはアのみで一つ。アは不正の手段による免許取得は免許を取り消さなければならない。イは条件違反は取消しが「できる」で義務ではなく、ウは報酬額の掲示義務違反は50万円以下の罰金があり、エは名簿の虚偽記載は従業者Ｂだけでなく業者Ａも罰則の対象。", "year": "R3-12月-28", "diff": "C"}, {"id": "kako-gyoB-R6-38", "subject": "宅建業法", "topic": "罰則", "type": "select", "q": "宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["業者Ａが免許の更新申請をした場合において、従前の免許の有効期間満了の日までに処分がなされないときは、従前の免許は有効期間の満了後その効力を失う。", "業者Ｂが業者Ｃに自己の名義をもって宅建業を営ませる行為は、Ｂが名義の使用を書面で指示している場合であれば宅地建物取引業法に違反しない。", "業者Ｄ(甲県知事免許)は、国土交通大臣に免許換えの申請をしその免許を受けなければ、乙県所在の宅地の売買の媒介をすることはできない。", "業者Ｅ(丙県知事免許)の免許の更新に当たって丙県知事は法第3条の2に基づき条件を付すことができ、Ｅが更新に当たって付された条件に違反したときは、丙県知事はＥの免許を取り消すことができる。"], "answer": 3, "exp": "選択肢4が正しい。免許の更新にも条件を付すことができ、条件違反のときは免許を取り消すことができる。1は更新申請中で処分未了なら従前免許は有効、2の名義貸しは書面で指示していても違反、3は知事免許でも全国で営業でき他県物件の媒介に免許換えは不要。", "year": "R6-38", "diff": "A"}, {"id": "kako-gyoB-H27-45", "subject": "宅建業法", "topic": "住宅瑕疵担保履行法", "type": "select", "q": "特定住宅瑕疵担保責任の履行の確保等に関する法律に基づく住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結に関する次の記述のうち、正しいものはどれか。", "choices": ["業者は、自ら売主として業者である買主との間で新築住宅の売買契約を締結しその住宅を引き渡す場合、保証金の供託又は保険契約の締結を行う義務を負う。", "自ら売主として新築住宅を販売する業者は、保証金の供託をする場合、業者でない買主への引渡しまでに、供託所の所在地等を記載した書面を交付して説明しなければならない。", "自ら売主として新築住宅を業者でない買主に引き渡した業者は、基準日に係る供託及び保険契約の締結の状況について届出をしなければ、当該基準日以後、新たに自ら売主となる新築住宅の売買契約を締結できない。", "保険契約を締結している業者は、構造耐力上主要な部分及び雨水の浸入を防止する部分の隠れた瑕疵(影響のないものを除く)がある場合に、特定住宅販売瑕疵担保責任の履行によって生じた損害について保険金を請求できる。"], "answer": 3, "exp": "選択肢4が正しい。保険契約を締結した業者は、構造耐力上主要な部分・雨水浸入防止部分の隠れた瑕疵について保険金を請求できる。1は買主が業者なら資力確保義務なし、2の供託所の書面説明は引渡しまででなく契約締結まで、3は契約できなくなるのは基準日の翌日から50日を経過した日以後。", "year": "H27-45", "diff": "B"}, {"id": "kako-gyoB-H28-45", "subject": "宅建業法", "topic": "住宅瑕疵担保履行法", "type": "select", "q": "業者Ａが自ら売主として業者でないＢに新築住宅を販売する場合における次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。", "choices": ["Ａは保証金を供託する場合、住宅の床面積が100㎡以下であるときは、合計戸数の算定に当たって2戸をもって1戸と数えることになる。", "Ａは住宅をＢに引き渡した日から3週間以内に、供託又は保険契約の締結の状況について免許権者に届け出なければならない。", "Ａは保証金の供託をする場合、Ｂに対し、当該住宅の売買契約を締結するまでに供託所の所在地等を記載した書面を交付して説明しなければならない。", "Ａは保険契約を締結した場合、Ｂが引渡しを受けた時から10年以内に当該住宅を転売したときは、保険法人に申し出て当該保険契約の解除をしなければならない。"], "answer": 2, "exp": "選択肢3が正しい。供託の場合は契約を締結するまでに供託所の所在地等を書面で交付し説明する。1の戸数算定は床面積55㎡以下で2戸を1戸(100㎡でない)、2の届出は引渡し日でなく基準日から3週間以内、4は転売しても保険契約は解除できない(10年以上有効)。", "year": "H28-45", "diff": "C"}, {"id": "kako-gyoB-H29-45", "subject": "宅建業法", "topic": "住宅瑕疵担保履行法", "type": "select", "q": "業者Ａが自ら売主として業者でない買主Ｂに新築住宅を販売する場合における次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。", "choices": ["Ａは保証金の供託をする場合、Ｂに対し、当該住宅を引き渡すまでに供託所の所在地等を記載した書面を交付して説明しなければならない。", "自ら売主として新築住宅をＢに引き渡したＡが保証金を供託する場合、床面積55㎡以下であるときは、合計戸数の算定に当たって床面積55㎡以下の住宅2戸をもって1戸と数えることになる。", "Ａは基準日に係る供託及び保険契約の締結の状況についての届出をしなければ、当該基準日から1月を経過した日以後は、新たに自ら売主となる新築住宅の売買契約を締結してはならない。", "Ａは保険契約を締結した場合、当該住宅を引き渡した時から10年間、当該住宅の給水設備又はガス設備の瑕疵によって生じた損害について保険金の支払を受けられる。"], "answer": 1, "exp": "選択肢2が正しい。戸数の算定では床面積55㎡以下の住宅は2戸をもって1戸と数える。1の供託所の書面説明は引渡しまででなく契約締結まで、3は契約できなくなるのは1月でなく基準日の翌日から50日を経過した日以後、4は給水・ガス設備の瑕疵は保険の対象外。", "year": "H29-45", "diff": "C"}, {"id": "kako-gyoB-H30-45", "subject": "宅建業法", "topic": "住宅瑕疵担保履行法", "type": "select", "q": "特定住宅瑕疵担保責任の履行の確保等に関する法律に基づく住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結に関する次の記述のうち、正しいものはどれか。", "choices": ["業者は、自ら売主として新築住宅を販売する場合及び新築住宅の売買の媒介をする場合において、保証金の供託又は保険契約の締結を行う義務を負う。", "自ら売主として新築住宅を業者でない買主に引き渡した業者は、その住宅を引き渡した日から3週間以内に、供託又は保険契約の締結の状況について免許権者に届け出なければならない。", "自ら売主として新築住宅を業者でない買主に引き渡した業者は、基準日に係る供託及び保険契約の締結の状況について届出をしなければ、当該基準日の翌日から起算して50日を経過した日以後は、新たに自ら売主となる新築住宅の売買契約を締結できない。", "保険契約を締結している業者は、当該住宅を引き渡した時から10年間、住宅の構造耐力上主要な部分の瑕疵によって生じた損害についてのみ保険金を請求できる。"], "answer": 2, "exp": "選択肢3が正しい。届出をしないと基準日の翌日から起算して50日を経過した日以後は新築住宅の売買契約を締結できない。1は媒介には資力確保義務なし、2の届出は引渡し日でなく基準日から3週間以内、4は構造耐力上主要な部分だけでなく雨水浸入防止部分も対象。", "year": "H30-45", "diff": "A"}, {"id": "kako-gyoB-R1-45", "subject": "宅建業法", "topic": "住宅瑕疵担保履行法", "type": "select", "q": "特定住宅瑕疵担保責任の履行の確保等に関する法律に基づく住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結に関する次の記述のうち、誤っているものはどれか。", "choices": ["業者は、自ら売主として新築住宅を販売する場合だけでなく、新築住宅の売買の媒介をする場合においても、保証金の供託又は保険契約の締結を行う義務を負う。", "自ら売主として新築住宅を販売する業者は、保証金の供託をしている場合、当該住宅の売買契約を締結するまでに、業者でない買主に対し供託所の所在地等を記載した書面を交付して説明しなければならない。", "自ら売主として新築住宅を業者でない買主に引き渡した業者は、基準日ごとに基準日から3週間以内に、供託及び保険契約の締結の状況について免許権者に届け出なければならない。", "保険契約を締結している業者は、構造耐力上主要な部分又は雨水の浸入を防止する部分の隠れた瑕疵(影響のないものを除く)がある場合に、特定住宅販売瑕疵担保責任の履行によって生じた損害について保険金を請求できる。"], "answer": 0, "exp": "選択肢1が誤り。資力確保義務は自ら売主となる場合のみで、売買の媒介には義務がない。2の契約締結までの書面説明、3の基準日から3週間以内の届出、4の構造・雨水部分の瑕疵での保険金請求はいずれも正しい。", "year": "R1-45", "diff": "A"}, {"id": "kako-gyoB-R2-10月-45", "subject": "宅建業法", "topic": "住宅瑕疵担保履行法", "type": "select", "q": "業者Ａ(甲県知事免許)が自ら売主として業者でない買主Ｂに新築住宅を販売する場合における次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。", "choices": ["Ａが媒介を依頼した業者又はＢが保険契約を締結していれば、Ａは保証金の供託又は保険契約の締結を行う必要はない。", "Ａが保証金の供託をしその額が基準日において基準額を超えることとなった場合、免許権者の承認を受けた上でその超過額を取り戻すことができる。", "新築住宅をＢに引き渡したＡは、基準日ごとに基準日から50日以内に、供託及び保険契約の締結の状況について甲県知事に届け出なければならない。", "Ｂが業者である場合であっても、Ａは、Ｂに引き渡した新築住宅について保証金の供託又は保険契約の締結を行う義務を負う。"], "answer": 1, "exp": "選択肢2が正しい。供託額が基準額を超えたときは免許権者の承認を受けて超過額を取り戻せる。1は媒介業者や買主が保険加入でも売主業者が資力確保義務を負う、3の届出は50日以内でなく基準日から3週間以内、4は買主が業者なら資力確保義務はない。", "year": "R2-10月-45", "diff": "A"}, {"id": "kako-gyoB-R2-12月-45", "subject": "宅建業法", "topic": "住宅瑕疵担保履行法", "type": "select", "q": "業者Ａが自ら売主として業者でない買主Ｂに新築住宅を販売する場合における次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律によれば、正しいものはどれか。", "choices": ["Ａが保証金を供託する場合、当該住宅の床面積が100㎡以下であるときは、合計戸数の算定に当たって2戸をもって1戸と数えることになる。", "Ａは保険契約を締結した場合、Ｂが引渡しを受けた時から10年以内に当該住宅を転売したときは、保険法人に申し出て当該保険契約の解除をしなければならない。", "Ａは保険契約を締結した場合、当該住宅を引き渡した時から10年間、当該住宅の構造耐力上主要な部分、雨水の浸入を防止する部分、給水設備又はガス設備の隠れた瑕疵によって生じた損害について保険金の支払を受けられる。", "保険契約は、新築住宅を引き渡したＡが保険法人と締結する必要があり、Ｂが保険料を支払うものではない。"], "answer": 3, "exp": "選択肢4が正しい。保険契約は売主業者が保険法人と締結し保険料も業者が支払うもので、買主が支払うものではない。1の戸数算定は床面積55㎡以下で2戸を1戸(100㎡でない)、2は転売しても保険契約は解除できない、3の給水・ガス設備の瑕疵は保険の対象外。", "year": "R2-12月-45", "diff": "A"}, {"id": "kako-gyoB-R3-10月-45", "subject": "宅建業法", "topic": "住宅瑕疵担保履行法", "type": "select", "q": "業者Ａが自ら売主として業者でない買主Ｂに新築住宅を販売する場合における次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。", "choices": ["Ｂが建設業者である場合、Ａは、Ｂに引き渡した新築住宅について保証金の供託又は保険契約の締結を行う義務を負わない。", "Ａが保険契約を締結する場合、当該契約はＢがＡから引渡しを受けた時から2年以上の期間にわたって有効なものでなければならない。", "Ａが保険契約を締結した場合、Ａ及びＢは指定住宅紛争処理機関に申請することにより、当該新築住宅の瑕疵に関する紛争についてあっせん、調停又は仲裁を受けることができる。", "ＡＢ間の売買契約において、構造耐力上主要な部分に瑕疵があってもＡが瑕疵担保責任を負わない旨の特約があった場合、保証金の供託又は保険契約の締結を行う義務はない。"], "answer": 2, "exp": "選択肢3が正しい。保険契約を締結すると、指定住宅紛争処理機関にあっせん・調停・仲裁を申請できる。1は買主が建設業者でも業者でなければ資力確保義務あり、2は保険は引渡しから10年以上有効でなければならず2年ではなく、4の担保責任免責特約は無効で資力確保義務がある。", "year": "R3-10月-45", "diff": "A"}, {"id": "kako-gyoB-R3-12月-45", "subject": "宅建業法", "topic": "住宅瑕疵担保履行法", "type": "select", "q": "業者Ａが自ら売主として業者でない買主Ｂに新築住宅を販売する場合における次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。", "choices": ["Ａは、Ｂの承諾を得た場合には、Ｂに引き渡した新築住宅について保証金の供託又は保険契約の締結を行わなくてもよい。", "Ａは基準日に係る供託及び保険契約の締結の状況について届出をしなければ、当該基準日の翌日から起算して1月を経過した日以後は、新たに自ら売主となる新築住宅の売買契約を締結できない。", "Ａが保険契約を締結する場合、保険金額は2,000万円以上でなければならないが、Ｂの承諾を得た場合には保険金額を500万円以上の任意の額とすることができる。", "Ａが保険契約を締結した場合、構造耐力上主要な部分又は雨水の浸入を防止する部分の瑕疵があり、Ａが相当の期間を経過してもなお特定住宅販売瑕疵担保責任を履行しないときは、Ｂは保険契約の有効期間内であればその瑕疵によって生じた損害について保険金を請求できる。"], "answer": 3, "exp": "選択肢4が正しい。売主が相当期間を経過しても履行しないときは、買主は保険契約の有効期間内であれば保険金を請求できる。1は買主の承諾があっても資力確保は省略できず、2は契約できなくなるのは1月でなく50日を経過した日以後、3は保険金額は2,000万円以上で承諾があっても減額できない。", "year": "R3-12月-45", "diff": "A"}, {"id": "kako-gyoB-R4-45", "subject": "宅建業法", "topic": "住宅瑕疵担保履行法", "type": "select", "q": "特定住宅瑕疵担保責任の履行の確保等に関する法律に基づく住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結に関する次の記述のうち、正しいものはどれか。", "choices": ["業者は、自ら売主として業者である買主との間で新築住宅の売買契約を締結しその住宅を引き渡す場合、保証金の供託又は保険契約の締結を行う義務を負う。", "保険契約は新築住宅の引渡し時から10年以上有効でなければならないが、買主の承諾があれば保険期間を5年間に短縮できる。", "自ら売主として新築住宅を販売する業者は、基準日から3週間を経過する日までの間において、当該基準日前10年間に自ら売主として業者でない買主に引き渡した新築住宅(保険契約に係るものを除く)について、保証金の供託をしていなければならない。", "業者が保証金の供託をしその額が基準日において基準額を超えることとなった場合、免許権者の承認がなくてもその超過額を取り戻すことができる。"], "answer": 2, "exp": "選択肢3が正しい。基準日前10年間に引き渡した新築住宅(保険加入分を除く)について、基準日から3週間を経過する日までに供託していなければならない。1は買主が業者なら義務なし、2は買主の承諾があっても保険期間は5年に短縮できず、4の超過額の取戻しには免許権者の承認が必要。", "year": "R4-45", "diff": "B"}, {"id": "kako-gyoB-R5-45", "subject": "宅建業法", "topic": "住宅瑕疵担保履行法", "type": "select", "q": "業者Ａが自ら売主として業者でない買主Ｂに新築住宅を販売する場合に関する次の記述のうち、特定住宅瑕疵担保責任の履行の確保等に関する法律の規定によれば、正しいものはどれか。", "choices": ["Ａが信託会社又は信託業務を兼営する金融機関であって宅建業を営むものである場合、保証金の供託又は保険契約の締結を行う義務を負わない。", "Ａは保証金の供託をする場合、契約を締結するまでにＢに対し供託所の所在地等について必ず書面を交付して説明しなければならず、買主の承諾を得ても電磁的方法により提供することはできない。", "Ａは保証金の供託をする場合、当該住宅の最寄りの供託所へ供託しなければならない。", "ＡＢ間の売買契約において構造耐力上主要な部分に瑕疵があってもＡが瑕疵担保責任を負わない旨の特約があった場合においても、Ａは保証金の供託又は保険契約の締結を行う義務を負う。"], "answer": 3, "exp": "選択肢4が正しい。担保責任を負わない旨の特約は無効であり、業者は資力確保措置の義務を負う。1は信託会社等で宅建業を営むものも義務を負い、2は買主の承諾を得て電磁的方法で提供でき、3の供託先は住宅の最寄りでなく主たる事務所の最寄りの供託所。", "year": "R5-45", "diff": "A"}, {"id": "kako-gyoB-R6-45", "subject": "宅建業法", "topic": "住宅瑕疵担保履行法", "type": "select", "q": "特定住宅瑕疵担保責任の履行の確保等に関する法律に基づく住宅販売瑕疵担保保証金の供託又は住宅販売瑕疵担保責任保険契約の締結に関する次の記述のうち、正しいものはどれか。", "choices": ["自ら売主として業者でない買主に引き渡した新築住宅の戸数が基準日前10年間に10戸あるが基準日前1年間は0戸である場合、当該売主である業者は、当該基準日に係る供託又は保険契約の締結の状況について届出を行う必要はない。", "自ら売主として新築住宅を業者でない買主に引き渡した業者は、基準日に係る供託及び保険契約の締結の状況について届出をしなければ、当該基準日の翌日から起算して50日を経過した日以後は、新たに自ら売主となる新築住宅の売買契約を締結してはならない。", "保険契約は新築住宅の引渡し時から有効でなければならないが、買主が引渡し時から10年以内に当該住宅を転売した場合、当該保険契約は解除される。", "自ら売主として業者でない買主に新築住宅を引き渡した業者が保証金を供託する場合、当該住宅の床面積が25㎡以下であるときは、合計戸数の算定に当たって3戸をもって1戸と数えることになる。"], "answer": 1, "exp": "選択肢2が正しい。届出をしないと基準日の翌日から起算して50日を経過した日以後は新築住宅の売買契約を締結できない。1は基準日前1年が0戸でも10年間に引渡しがあれば届出が必要、3は転売しても保険契約は解除されず、4の戸数算定は床面積55㎡以下で2戸を1戸(25㎡3戸でない)。", "year": "R6-45", "diff": "A"}, {"id": "kako-hou-H29-16", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものの組合せはどれか。 ア 都市計画施設の区域又は市街地開発事業の施行区域内において建築物の建築をしようとする者は、一定の場合を除き、都道府県知事（市の区域内にあっては、当該市の長）の許可を受けなければならない。 イ 地区整備計画が定められている地区計画の区域内において、建築物の建築を行おうとする者は、都道府県知事（市の区域内にあっては、当該市の長）の許可を受けなければならない。 ウ 都市計画事業の認可の告示があった後、当該認可に係る事業地内において、当該都市計画事業の施行の障害となるおそれがある土地の形質の変更を行おうとする者は、都道府県知事（市の区域内にあっては、当該市の長）の許可を受けなければならない。 エ 都市計画事業の認可の告示があった後、当該認可に係る事業地内の土地建物等を有償で譲り渡そうとする者は、当該事業の施行者の許可を受けなければならない。", "choices": ["ア、ウ", "ア、エ", "イ、ウ", "イ、エ"], "answer": 0, "exp": "正しいのはアとウ。アは都市計画施設等の区域内の建築で知事等の許可が必要、ウは事業地内の土地の形質変更で知事等の許可が必要。イは地区計画区域内の建築は許可でなく着手30日前までに市町村長へ届出。エは事業地内の土地建物等の有償譲渡は施行者へ届出であり許可ではない。", "year": "H29-16", "diff": "C"}, {"id": "kako-hou-R1-15", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。", "choices": ["高度地区は、用途地域内において市街地の環境を維持し、又は土地利用の増進を図るため、建築物の高さの最高限度又は最低限度を定める地区とされている。", "特定街区については、都市計画に、建築物の容積率並びに建築物の高さの最高限度及び壁面の位置の制限を定めるものとされている。", "準住居地域は、道路の沿道としての地域の特性にふさわしい業務の利便の増進を図りつつ、これと調和した住居の環境を保護するため定める地域とされている。", "特別用途地区は、用途地域が定められていない土地の区域（市街化調整区域を除く。）内において、その良好な環境の形成又は保持のため当該地域の特性に応じて合理的な土地利用が行われるよう、制限すべき特定の建築物等の用途の概要を定める地区とされている。"], "answer": 3, "exp": "誤りは4。特別用途地区は用途地域内の一定の地区で、用途地域の指定を補完して定める地区。肢4の内容は用途地域が定められていない区域に定める特定用途制限地域の説明である。1から3は正しい。", "year": "R1-15", "diff": "B"}, {"id": "kako-hou-R2-10月-15", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。", "choices": ["地区計画については、都市計画に、地区施設及び地区整備計画を定めるよう努めるものとされている。", "都市計画事業の認可の告示があった後に当該認可に係る事業地内の土地建物等を有償で譲り渡そうとする者は、施行者の許可を受けなければならない。", "第二種住居地域は、中高層住宅に係る良好な住居の環境を保護するため定める地域とされている。", "市街化調整区域における地区計画は、市街化区域における市街化の状況等を勘案して、地区計画の区域の周辺における市街化を促進することがない等当該都市計画区域における計画的な市街化を図る上で支障がないように定めることとされている。"], "answer": 3, "exp": "正しいのは4。1は地区施設・地区整備計画は必ず定めるもので努力義務ではない。2は事業地内の有償譲渡は施行者へ届出であり許可ではない。3は第二種住居地域ではなく第一種中高層住居専用地域の定義。", "year": "R2-10月-15", "diff": "C"}, {"id": "kako-hou-R3-12月-15", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。", "choices": ["近隣商業地域は、主として商業その他の業務の利便の増進を図りつつ、これと調和した住居の環境を保護するため定める地域とする。", "準工業地域は、主として環境の悪化をもたらすおそれのない工業の利便の増進を図りつつ、これと調和した住居の環境を保護するため定める地域とする。", "第一種低層住居専用地域については、都市計画に特定用途制限地域を定めることができる場合がある。", "第一種住居地域については、都市計画に高層住居誘導地区を定めることができる場合がある。"], "answer": 3, "exp": "正しいのは4。第一種住居地域等で容積率が10分の40または50の地域には高層住居誘導地区を定められる。1の近隣商業地域は近隣住宅地への日用品供給が主目的。2の準工業地域は住居環境保護を目的としない。3の特定用途制限地域は用途地域が定められていない区域に定めるので、用途地域である第一種低層住居専用地域には定められない。", "year": "R3-12月-15", "diff": "C"}, {"id": "kako-hou-R5-15", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。", "choices": ["市街化調整区域は、土地利用を整序し、又は環境を保全するための措置を講ずることなく放置すれば、将来における一体の都市としての整備に支障が生じるおそれがある区域とされている。", "高度利用地区は、土地の合理的かつ健全な高度利用と都市機能の更新とを図るため、都市計画に、建築物の高さの最低限度を定める地区とされている。", "特定用途制限地域は、用途地域が定められている土地の区域内において、都市計画に、制限すべき特定の建築物等の用途の概要を定める地域とされている。", "地区計画は、用途地域が定められている土地の区域のほか、一定の場合には、用途地域が定められていない土地の区域にも定めることができる。"], "answer": 3, "exp": "正しいのは4。1は準都市計画区域の説明で、市街化調整区域は市街化を抑制すべき区域。2の高度利用地区は容積率・建蔽率・建築面積・壁面位置を定める地区で、高さの限度を定めるのは高度地区。3の特定用途制限地域は用途地域が定められていない区域に定める。", "year": "R5-15", "diff": "A"}, {"id": "kako-hou-H28-16", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。（改題）", "choices": ["市街地開発事業等予定区域に係る市街地開発事業又は都市施設に関する都市計画には、施行予定者をも定めなければならない。", "準都市計画区域については、都市計画に準防火地域を定めることができる。", "高度利用地区は、用途地域内において市街地の環境を維持し、又は土地利用の増進を図るため、建築物の高さの最高限度又は最低限度を定める地区である。", "地区計画については、都市計画に、地区計画の種類、名称、位置、区域及び面積並びに建築物の建蔽率及び容積率の最高限度を定めなければならない。"], "answer": 0, "exp": "正しいのは1。予定区域に係る市街地開発事業・都市施設の都市計画には施行予定者も定める。2は準都市計画区域に準防火地域は定められない。3は高度利用地区でなく高度地区の説明。4は面積は定めるよう努める事項であり、建蔽率・容積率の最高限度は必須事項ではない。", "year": "H28-16", "diff": "C"}, {"id": "kako-hou-H30-16", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。", "choices": ["田園住居地域内の農地の区域内において、土地の形質の変更を行おうとする者は、一定の場合を除き、市町村長の許可を受けなければならない。", "風致地区内における建築物の建築については、一定の基準に従い、地方公共団体の条例で、都市の風致を維持するため必要な規制をすることができる。", "市街化区域については、少なくとも用途地域を定めるものとし、市街化調整区域については、原則として用途地域を定めないものとする。", "準都市計画区域については、無秩序な市街化を防止し、計画的な市街化を図るため、都市計画に市街化区域と市街化調整区域との区分を定めなければならない。"], "answer": 3, "exp": "誤りは4。準都市計画区域には市街化区域と市街化調整区域の区分（区域区分）を定めることはできない。1から3はいずれも正しい記述。", "year": "H30-16", "diff": "A"}, {"id": "kako-hou-R2-12月-15", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。", "choices": ["市街化区域及び区域区分が定められていない都市計画区域については、少なくとも道路、病院及び下水道を定めるものとされている。", "市街化調整区域内においては、都市計画に、市街地開発事業を定めることができないこととされている。", "都市計画区域は、市町村が、市町村都市計画審議会の意見を聴くとともに、都道府県知事に協議し、その同意を得て指定する。", "準都市計画区域については、都市計画に、高度地区を定めることができないこととされている。"], "answer": 1, "exp": "正しいのは2。市街地開発事業は市街化区域か区域区分の定めのない都市計画区域に定めるもので、市街化調整区域には定められない。1は病院ではなく公園。3は都道府県が指定する。4は準都市計画区域に高度地区を定められる。", "year": "R2-12月-15", "diff": "A"}, {"id": "kako-hou-R3-10月-15", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。", "choices": ["地区計画については、都市計画に、当該地区計画の目標を定めるよう努めるものとされている。", "地区計画については、都市計画に、区域の面積を定めるよう努めるものとされている。", "地区整備計画においては、市街化区域と市街化調整区域との区分の決定の有無を定めることができる。", "地区整備計画においては、建築物の建蔽率の最高限度を定めることができる。"], "answer": 2, "exp": "誤りは3。市街化区域と市街化調整区域の区分（区域区分）は都市計画区域について定めるもので、地区整備計画に定めることはできない。1・2・4は正しい。", "year": "R3-10月-15", "diff": "C"}, {"id": "kako-hou-R4-15", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。", "choices": ["市街化区域については、都市計画に、少なくとも用途地域を定めるものとされている。", "準都市計画区域については、都市計画に、特別用途地区を定めることができる。", "高度地区については、都市計画に、建築物の容積率の最高限度又は最低限度を定めるものとされている。", "工業地域は、主として工業の利便を増進するため定める地域とされている。"], "answer": 2, "exp": "誤りは3。高度地区は建築物の高さの最高・最低限度を定める地区であり、容積率の限度を定めるのは高度利用地区。1・2・4は正しい記述。", "year": "R4-15", "diff": "B"}, {"id": "kako-hou-R6-15", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。", "choices": ["都市計画区域外においても、特に必要があるときは、都市施設に関する都市計画を定めることができる。", "準都市計画区域については、用途地域が定められている土地の区域であっても、市街地開発事業に関する都市計画を定めることができない。", "用途地域の一つである準住居地域は、道路の沿道としての地域の特性にふさわしい業務の利便の増進を図りつつ、これと調和した住居の環境を保護するために定める地域である。", "地区計画は、用途地域が定められている土地の区域についてのみ都市計画に定められるものであり、また、地区計画に関する都市計画を定めるに当たっては、地区整備計画を都市計画に定めなければならない。"], "answer": 3, "exp": "誤りは4。地区計画は用途地域が定められた区域に限らず、一定の条件を満たせば用途地域のない区域にも定められる。1から3は正しい記述。", "year": "R6-15", "diff": "B"}, {"id": "kako-hou-H27-16", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。", "choices": ["第二種住居地域における地区計画については、一定の条件に該当する場合、開発整備促進区を都市計画に定めることができる。", "準都市計画区域について無秩序な市街化を防止し、計画的な市街化を図るため必要があるときは、都市計画に、区域区分を定めることができる。", "工業専用地域は、工業の利便を増進するため定める地域であり、風致地区に隣接してはならない。", "市町村が定めた都市計画が、都道府県が定めた都市計画と抵触するときは、その限りにおいて、市町村が定めた都市計画が優先する。"], "answer": 0, "exp": "正しいのは1。第二種住居地域等では一定の条件に該当すれば開発整備促進区を定められる。2は準都市計画区域に区域区分は定められない。3に風致地区への隣接を禁じる規定はない。4は抵触するときは都道府県が定めた都市計画が優先する。", "year": "H27-16", "diff": "C"}, {"id": "kako-hou-H28-17", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["開発許可を受けた者は、開発行為に関する工事を廃止するときは、都道府県知事の許可を受けなければならない。", "二以上の都府県にまたがる開発行為は、国土交通大臣の許可を受けなければならない。", "開発許可を受けた者から当該開発区域内の土地の所有権を取得した者は、都道府県知事の承認を受けることなく、当該開発許可を受けた者が有していた当該開発許可に基づく地位を承継することができる。", "都道府県知事は、用途地域の定められていない土地の区域における開発行為について開発許可をする場合において必要があると認めるときは、当該開発区域内の土地について、建築物の敷地、構造及び設備に関する制限を定めることができる。"], "answer": 3, "exp": "正しいのは4。用途地域のない区域の開発許可では、知事は建蔽率・高さ・壁面位置など敷地・構造・設備の制限を定められる。1は工事の廃止は許可でなく届出。2にそのような規定はなく許可権者は知事。3は地位の承継には知事の承認が必要。", "year": "H28-17", "diff": "B"}, {"id": "kako-hou-H29-17", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。ただし、許可を要する開発行為の面積について、条例による定めはないものとし、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["準都市計画区域内において、工場の建築の用に供する目的で1,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "市街化区域内において、農業を営む者の居住の用に供する建築物の建築の用に供する目的で1,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "都市計画区域及び準都市計画区域外の区域内において、変電所の建築の用に供する目的で1,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "区域区分の定めのない都市計画区域内において、遊園地の建設の用に供する目的で3,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。"], "answer": 1, "exp": "正しいのは2。市街化区域では1,000㎡以上の開発は農業者の住宅目的でも許可が必要。1は準都市計画区域は3,000㎡以上で許可、1,000㎡なら不要。3の変電所は公益上必要な建築物で区域・規模を問わず不要。4は面積3,000㎡の遊園地は第二種特定工作物に当たらず開発行為でない。", "year": "H29-17", "diff": "A"}, {"id": "kako-hou-R1-16", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。ただし、許可を要する開発行為の面積については、条例による定めはないものとし、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["準都市計画区域において、店舗の建築を目的とした4,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "市街化区域において、農業を営む者の居住の用に供する建築物の建築を目的とした1,500㎡の土地の区画形質の変更を行おうとする者は、都道府県知事の許可を受けなくてよい。", "市街化調整区域において、野球場の建設を目的とした8,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "市街化調整区域において、医療法に規定する病院の建築を目的とした1,000㎡の土地の区画形質の変更を行おうとする者は、都道府県知事の許可を受けなくてよい。"], "answer": 0, "exp": "正しいのは1。準都市計画区域は3,000㎡以上で許可が必要なので4,000㎡は許可が要る。2は市街化区域では1,000㎡以上なら農業者の住宅でも許可が必要。3の野球場は1ha以上でないと開発行為に当たらず8,000㎡は不要。4の病院は公益上必要な建築物でなく、市街化調整区域では許可が必要。", "year": "R1-16", "diff": "B"}, {"id": "kako-hou-R2-12月-16", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。ただし、許可を要する開発行為の面積については、条例による定めはないものとし、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["市街化調整区域において、非常災害のため必要な応急措置として8,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "市街化区域において、社会教育法に規定する公民館の建築の用に供する目的で行われる1,500㎡の土地の区画形質の変更を行おうとする者は、都道府県知事の許可を受けなくてよい。", "区域区分が定められていない都市計画区域において、店舗の建築の用に供する目的で行われる2,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "市街化調整区域において、自己の居住の用に供する住宅の建築の用に供する目的で行われる100㎡の土地の区画形質の変更を行おうとする者は、都道府県知事の許可を受けなくてよい。"], "answer": 1, "exp": "正しいのは2。公民館は公益上必要な建築物で区域・面積を問わず許可不要。1は非常災害の応急措置は区域・面積を問わず許可不要。3は区域区分のない都市計画区域では3,000㎡未満は不要。4は市街化調整区域は面積を問わず許可が必要で、自己居住用の住宅でも例外に当たらない。", "year": "R2-12月-16", "diff": "A"}, {"id": "kako-hou-R3-10月-16", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。ただし、許可を要する開発行為の面積については、条例による定めはないものとし、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["市街化区域において、都市公園法に規定する公園施設である建築物の建築を目的とした5,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "首都圏整備法に規定する既成市街地内にある市街化区域において、住宅の建築を目的とした800㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "準都市計画区域において、商業施設の建築を目的とした2,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "区域区分が定められていない都市計画区域において、土地区画整理事業の施行として行う8,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。"], "answer": 1, "exp": "正しいのは2。首都圏の既成市街地内の市街化区域では500㎡以上で許可が必要なので800㎡は要る。1の公園施設は公益上必要な建築物で許可不要。3の準都市計画区域は3,000㎡未満なら不要。4は土地区画整理事業の施行として行う開発は面積を問わず不要。", "year": "R3-10月-16", "diff": "C"}, {"id": "kako-hou-R4-16", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。ただし、この問において条例による特別の定めはないものとし、「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["市街化区域内において、市街地再開発事業の施行として行う1haの開発行為を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。", "区域区分が定められていない都市計画区域内において、博物館法に規定する博物館の建築を目的とした8,000㎡の開発行為を行おうとする者は、都道府県知事の許可を受けなくてよい。", "自己の業務の用に供する施設の建築の用に供する目的で行う開発行為にあっては、開発区域内に土砂災害警戒区域等における土砂災害防止対策の推進に関する法律に規定する土砂災害警戒区域内の土地を含んではならない。", "市街化調整区域内における開発行為について、当該開発行為が開発区域の周辺における市街化を促進するおそれがあるかどうかにかかわらず、都道府県知事は、開発審査会の議を経て開発許可をすることができる。"], "answer": 1, "exp": "正しいのは2。博物館は公益上必要な建築物で区域・面積を問わず許可不要。1の市街地再開発事業の施行として行う開発は許可不要。3は開発区域に含めてはならないのは災害危険区域等であり土砂災害警戒区域は該当しない。4は市街化を促進するおそれがある場合は開発審査会の議を経ても許可できない。", "year": "R4-16", "diff": "C"}, {"id": "kako-hou-R6-16", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法（以下この問において「法」という。）に関する次の記述のうち、正しいものはどれか。ただし、この問において条例による特別の定めはないものとし、「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["市街化区域内において行う、医療法に規定する病院を建築するための1,000㎡の開発行為については、法第29条に基づく都道府県知事の許可を得る必要がある。", "市街化区域内において行う、開発行為を伴わない建築物の建築で、当該建築物の床面積が1,000㎡以上のものについては、法第29条に基づく都道府県知事の許可を得る必要がある。", "市街化調整区域内において行う、都市計画事業の施行のための開発行為については、法第29条に基づく都道府県知事の許可を得る必要がある。", "法第29条に基づく許可を受けた者は、当該許可に係る土地についての一定の事項を開発登録簿に登録しなければならない。"], "answer": 0, "exp": "正しいのは1。市街化区域では1,000㎡以上の開発は許可が必要で、病院は公益上必要な建築物に当たらないため許可が要る。2は開発行為を伴わない建築に開発許可の規定はない。3の都市計画事業の施行として行う開発は許可不要。4は開発登録簿に登録するのは知事であり、許可を受けた者ではない。", "year": "R6-16", "diff": "A"}, {"id": "kako-hou-H27-15", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["市街化区域内において開発許可を受けた者が、開発区域の規模を100㎡に縮小しようとする場合においては、都道府県知事の許可を受けなければならない。", "開発許可を受けた開発区域内の土地において、当該開発許可に係る予定建築物を建築しようとする者は、当該建築行為に着手する日の30日前までに、一定の事項を都道府県知事に届け出なければならない。", "開発許可を受けた開発区域内において、開発行為に関する工事の完了の公告があるまでの間に、当該開発区域内に土地所有権を有する者のうち、当該開発行為に関して同意をしていない者がその権利の行使として建築物を建築する場合については、都道府県知事が支障がないと認めたときでなければ、当該建築物を建築することはできない。", "何人も、市街化調整区域のうち開発許可を受けた開発区域以外の区域内において、都道府県知事の許可を受けることなく、仮設建築物を新築することができる。"], "answer": 3, "exp": "正しいのは4。市街化調整区域の開発区域以外でも、仮設建築物であれば知事の許可なく新築できる。1は許可が必要な規模未満に縮小するときは許可不要。2は予定建築物を建築する場合に届出は不要。3は同意していない権利者は建築でき、知事が支障がないと認めたときという要件は不要。", "year": "H27-15", "diff": "B"}, {"id": "kako-hou-H30-17", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。ただし、許可を要する開発行為の面積については、条例による定めはないものとし、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["非常災害のため必要な応急措置として開発行為をしようとする者は、当該開発行為が市街化調整区域内において行われるものであっても都道府県知事の許可を受けなくてよい。", "用途地域等の定めがない土地のうち開発許可を受けた開発区域内においては、開発行為に関する工事完了の公告があった後は、都道府県知事の許可を受けなければ、当該開発許可に係る予定建築物以外の建築物を新築することができない。", "都市計画区域及び準都市計画区域外の区域内において、8,000㎡の開発行為をしようとする者は、都道府県知事の許可を受けなくてよい。", "準都市計画区域内において、農業を営む者の居住の用に供する建築物の建築を目的とした1,000㎡の土地の区画形質の変更を行おうとする者は、あらかじめ、都道府県知事の許可を受けなければならない。"], "answer": 3, "exp": "誤りは4。準都市計画区域で農業者の住宅等を目的とする開発は面積を問わず許可不要。1の非常災害の応急措置は許可不要で正しい。2は用途地域がなければ予定建築物以外は許可なく新築できず正しい。3は都市計画区域外は10,000㎡以上で許可が必要なので8,000㎡は不要で正しい。", "year": "H30-17", "diff": "A"}, {"id": "kako-hou-R2-10月-16", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。なお、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["開発許可を申請しようとする者は、あらかじめ、開発行為又は開発行為に関する工事により設置される公共施設を管理することとなる者と協議しなければならない。", "都市計画事業の施行として行う建築物の新築であっても、市街化調整区域のうち開発許可を受けた開発区域以外の区域内においては、都道府県知事の許可を受けなければ、建築物の新築をすることができない。", "開発許可を受けた開発行為により公共施設が設置されたときは、その公共施設は、工事完了の公告の日の翌日において、原則としてその公共施設の存する市町村の管理に属するものとされている。", "開発許可を受けた者から当該開発区域内の土地の所有権を取得した者は、都道府県知事の承認を受けて、当該開発許可を受けた者が有していた当該開発許可に基づく地位を承継することができる。"], "answer": 1, "exp": "誤りは2。都市計画事業の施行として行う建築物の新築は、市街化調整区域の開発区域以外でも知事の許可を受ける必要がない。1・3・4は正しい記述。", "year": "R2-10月-16", "diff": "A"}, {"id": "kako-hou-R3-12月-16", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、誤っているものはどれか。ただし、この問において「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["開発許可を受けようとする者は、開発行為に関する工事の請負人又は請負契約によらないで自らその工事を施行する者を記載した申請書を都道府県知事に提出しなければならない。", "開発許可を受けた者は、開発行為に関する国土交通省令で定める軽微な変更をしたときは、遅滞なく、その旨を都道府県知事に届け出なければならない。", "開発許可を受けた者は、開発行為に関する工事の廃止をしようとするときは、都道府県知事の許可を受けなければならない。", "開発行為に同意していない土地の所有者は、当該開発行為に関する工事完了の公告前に、当該開発許可を受けた開発区域内において、その権利の行使として自己の土地に建築物を建築することができる。"], "answer": 2, "exp": "誤りは3。工事を廃止しようとするときは知事の許可ではなく、廃止したときに遅滞なく知事へ届け出れば足りる。1・2・4は正しい記述。", "year": "R3-12月-16", "diff": "B"}, {"id": "kako-hou-R5-16", "subject": "法令上の制限", "topic": "都市計画法", "type": "select", "q": "都市計画法に関する次の記述のうち、正しいものはどれか。ただし、この問において条例による特別の定めはないものとし、「都道府県知事」とは、地方自治法に基づく指定都市、中核市及び施行時特例市にあってはその長をいうものとする。", "choices": ["開発許可を申請しようとする者は、あらかじめ、開発行為に関係がある公共施設の管理者と協議し、その同意を得なければならない。", "開発許可を受けた者は、当該許可を受ける際に申請書に記載した事項を変更しようとする場合においては、都道府県知事に届け出なければならないが、当該変更が国土交通省令で定める軽微な変更に当たるときは、届け出なくてよい。", "開発許可を受けた者は、当該開発行為に関する工事が完了し、都道府県知事から検査済証を交付されたときは、遅滞なく、当該工事が完了した旨を公告しなければならない。", "市街化調整区域のうち開発許可を受けた開発区域以外の区域内において、自己の居住用の住宅を新築しようとする全ての者は、当該建築が開発行為を伴わない場合であれば、都道府県知事の許可を受けなくてよい。"], "answer": 0, "exp": "正しいのは1。開発許可の申請前に、開発行為に関係がある公共施設の管理者と協議し、その同意を得なければならない。2は変更は原則として知事の許可が必要で、軽微な変更のときに届出。3は工事完了の公告をするのは知事であり許可を受けた者ではない。4は市街化調整区域の開発区域以外では開発を伴わなくても住宅の新築に知事の許可が必要。", "year": "R5-16", "diff": "A"}, {"id": "kako-hou-R3-10月-18", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "次の記述のうち、建築基準法の規定によれば、誤っているものはどれか。", "choices": ["都市計画により建蔽率の限度が10分の6と定められている近隣商業地域において、準防火地域内にある耐火建築物で、街区の角にある敷地又はこれに準ずる敷地で特定行政庁が指定するものの内にある建築物については、建蔽率の限度が10分の8となる。", "市町村は、集落地区計画の区域において、用途地域における用途の制限を補完し、当該区域の特性にふさわしい土地利用の増進等の目的を達成するため必要と認める場合においては、国土交通大臣の承認を得て、当該区域における用途制限を緩和することができる。", "居住環境向上用途誘導地区内においては、公益上必要な一定の建築物を除き、建築物の建蔽率は、居住環境向上用途誘導地区に関する都市計画において建築物の建蔽率の最高限度が定められたときは、当該最高限度以下でなければならない。", "都市計画区域内のごみ焼却場の用途に供する建築物について、特定行政庁が建築基準法第51条に規定する都市計画審議会の議を経てその敷地の位置が都市計画上支障がないと認めて許可した場合においては、都市計画においてその敷地の位置が決定しているものでなくても、新築することができる。"], "answer": 1, "exp": "誤りは2。集落地区計画の区域は用途制限を緩和できる地区計画等から除かれており、集落地区計画では用途制限の緩和はできない。他の肢は正しい。", "year": "R3-10月-18", "diff": "C"}, {"id": "kako-hou-R6-18", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "次の記述のうち、建築基準法の規定によれば、正しいものはどれか。", "choices": ["客席部分の床面積の合計が300m2の映画館については、第二種住居地域内において建築することはできないが、準住居地域内においては建築することができる。", "特定用途誘導地区内において、都市計画で建築物の高さの最高限度が定められていたとしても、特定行政庁が用途上又は構造上やむを得ないと認めて許可したものについては、当該最高限度を超えてよい。", "計画しようとする建築物の天空率が、道路斜線制限、隣地斜線制限又は北側斜線制限に適合する建築物の天空率未満であれば、これらの制限は適用されない。", "都市計画で建蔽率の限度が80％に指定されている区域かつ防火地域内にある耐火建築物について、建蔽率の限度を超えるためには、特定行政庁による許可を得る必要がある。"], "answer": 1, "exp": "正しいのは2。特定用途誘導地区の高さの最高限度は、特定行政庁が用途上・構造上やむを得ないと認めて許可すれば超えられる。1は準住居地域でも建築できず、3は天空率が以上なら適用除外、4は許可不要で建蔽率は制限なしとなる。", "year": "R6-18", "diff": "C"}, {"id": "kako-hou-H29-19", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法（以下この問において「法」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["都市計画区域又は準都市計画区域内における用途地域の指定のない区域内の建築物の建蔽率の上限値は、原則として、法で定めた数値のうち、特定行政庁が土地利用の状況等を考慮し当該区域を区分して都道府県都市計画審議会の議を経て定めるものとなる。", "第二種中高層住居専用地域内では、原則として、ホテル又は旅館を建築することができる。", "幅員4m以上であり、法が施行された時点又は都市計画区域若しくは準都市計画区域に入った時点で現に存在する道は、特定行政庁の指定がない限り、法上の道路とはならない。", "建築物の前面道路の幅員により制限される容積率について、前面道路が2つ以上ある場合には、これらの前面道路の幅員の最小の数値（12m未満の場合に限る。）を用いて算定する。"], "answer": 0, "exp": "正しいのは1。用途地域の指定のない区域の建蔽率は、法定の数値から特定行政庁が都道府県都市計画審議会の議を経て定める。2はホテル等は原則不可、3は指定がなくても道路となり、4は最大の幅員を用いて算定する。", "year": "H29-19", "diff": "C"}, {"id": "kako-hou-H28-19", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、誤っているものはどれか。", "choices": ["特定行政庁が許可した場合、第一種低層住居専用地域内においても飲食店を建築することができる。", "前面道路の幅員による容積率制限は、前面道路の幅員が12m以上ある場合は適用されない。", "公園内にある建築物で特定行政庁が安全上、防火上及び衛生上支障がないと認めて許可したものについては、建蔽率の制限は適用されない。", "第一種住居地域内における建築物の外壁又はこれに代わる柱の面から敷地境界線までの距離は、当該地域に関する都市計画においてその限度が定められた場合には、当該限度以上でなければならない。"], "answer": 3, "exp": "誤りは4。外壁の後退距離の制限は第一種・第二種低層住居専用地域と田園住居地域のみで、第一種住居地域には定められない。1から3は正しい。", "year": "H28-19", "diff": "A"}, {"id": "kako-hou-H30-19", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法（以下この問において「法」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["田園住居地域内においては、建築物の高さは、一定の場合を除き、10m又は12mのうち当該地域に関する都市計画において定められた建築物の高さの限度を超えてはならない。", "一の敷地で、その敷地面積の40％が第二種低層住居専用地域に、60％が第一種中高層住居専用地域にある場合は、原則として、当該敷地内には大学を建築することができない。", "都市計画区域の変更等によって法第3章の規定が適用されるに至った際現に建築物が立ち並んでいる幅員2mの道で、特定行政庁の指定したものは、同章の規定における道路とみなされる。", "容積率規制を適用するに当たっては、前面道路の境界線又はその反対側の境界線からそれぞれ後退して壁面線の指定がある場合において、特定行政庁が一定の基準に適合すると認めて許可した建築物については、当該前面道路の境界線又はその反対側の境界線は、それぞれ当該壁面線にあるものとみなす。"], "answer": 1, "exp": "誤りは2。用途制限は敷地の過半が属する地域の制限が適用され、過半を占める第一種中高層住居専用地域では大学を建築できる。他の肢は正しい。", "year": "H30-19", "diff": "B"}, {"id": "kako-hou-R2-10月-18", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "建築基準法に関する次の記述のうち、正しいものはどれか。", "choices": ["公衆便所及び巡査派出所については、特定行政庁の許可を得ないで、道路に突き出して建築することができる。", "近隣商業地域内において、客席の部分の床面積の合計が200m2以上の映画館は建築することができない。", "建築物の容積率の算定の基礎となる延べ面積には、老人ホームの共用の廊下又は階段の用に供する部分の床面積は、算入しないものとされている。", "日影による中高層の建築物の高さの制限に係る日影時間の測定は、夏至日の真太陽時の午前8時から午後4時までの間について行われる。"], "answer": 2, "exp": "正しいのは3。容積率算定の延べ面積には、老人ホーム等の共用の廊下・階段の床面積は算入しない。1は特定行政庁の許可が必要、2は建築でき、4は冬至日を基準に測定する。", "year": "R2-10月-18", "diff": "A"}, {"id": "kako-hou-R2-12月-18", "subject": "法令上の制限", "topic": "建築基準法", "type": "select", "q": "次の記述のうち、建築基準法（以下この問において「法」という。）の規定によれば、誤っているものはどれか。", "choices": ["建築物の壁又はこれに代わる柱は、地盤面下の部分又は特定行政庁が建築審査会の同意
