<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#eef2fb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>宅建合格</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="宅建合格">
<style>
:root{
  --bg:#eef2fb; --bg2:#e7edf9; --card:#ffffff; --card2:#f3f6fd;
  --line:#e3e9f6; --ink:#141b33; --sub:#5b6892; --mut:#8b97bf;
  --pri:#3d5afe; --pri2:#2f49d0; --ok:#12b76a; --ng:#ef4a5a; --warn:#ff8a1a;
  --gyo:#3d5afe; --ken:#8b5cf6; --hou:#12b76a; --zei:#ff8a1a;
  --sh:0 2px 14px rgba(40,60,130,.06); --sh2:0 6px 22px rgba(40,60,130,.10);
  --r:18px; --safe: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.6;
  padding-bottom:calc(74px + var(--safe));
  -webkit-text-size-adjust:100%;
}
.wrap{max-width:520px;margin:0 auto;padding:12px 14px 0}
h1,h2,h3{margin:0;font-weight:800;letter-spacing:.01em}
button{font-family:inherit;cursor:pointer;border:none;color:inherit}
.mut{color:var(--mut)} .sub{color:var(--sub)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.row{display:flex;align-items:center;gap:10px}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;background:var(--card2);color:var(--sub);border:1px solid var(--line)}
.btn{background:var(--pri);color:#fff;font-weight:800;padding:14px;border-radius:14px;width:100%;font-size:16px;box-shadow:0 4px 14px rgba(61,90,254,.28);transition:transform .08s,filter .15s}
.btn:active{transform:scale(.98)}
.btn.sec{background:var(--card);color:var(--ink);border:1px solid var(--line);box-shadow:var(--sh)}
.btn.sm{padding:9px 12px;font-size:14px;width:auto;border-radius:11px}
.chip{padding:8px 13px;border-radius:11px;background:var(--card);border:1px solid var(--line);font-weight:700;font-size:14px;color:var(--sub);box-shadow:var(--sh)}
.chip.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.hi{font-variant-numeric:tabular-nums;font-weight:900}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:800;padding:4px 10px;border-radius:999px;background:#fff1e3;color:var(--warn)}
.badge.g{background:#e4f7ee;color:var(--ok)} .badge.b{background:#e9edff;color:var(--pri)}
/* header */
.top{padding:8px 2px 4px}
.top .app{font-size:14px;font-weight:900;color:var(--ink);letter-spacing:.02em}
.top .app b{color:var(--pri)}
/* countdown hero */
.count{background:linear-gradient(135deg,#4a63ff 0%,#3346d6 60%,#2a3bc0 100%);color:#fff;border:none;position:relative;overflow:hidden;box-shadow:0 10px 30px rgba(47,73,208,.32)}
.count::after{content:"";position:absolute;right:-40px;top:-40px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.10)}
.count .big{font-size:46px;font-weight:900;line-height:1;letter-spacing:-.02em}
.count .u{font-size:15px;font-weight:700;margin-left:4px;opacity:.9}
.count .sub{color:rgba(255,255,255,.9)} .count .mut{color:rgba(255,255,255,.72)}
/* ring */
.ring{--p:0;width:96px;height:96px;border-radius:50%;
  background:conic-gradient(var(--ok) calc(var(--p)*1%), rgba(0,0,0,.10) 0);
  display:grid;place-items:center;flex:0 0 auto}
.ring i{width:76px;height:76px;border-radius:50%;background:#fff;display:grid;place-items:center;font-style:normal}
.ring b{font-size:22px;font-weight:900;color:var(--ink)}.ring s{font-size:11px;color:var(--mut);text-decoration:none}
/* bars */
.bar{height:9px;border-radius:6px;background:var(--bg2);overflow:hidden}
.bar>i{display:block;height:100%;border-radius:6px}
/* subject dot */
.dot{width:11px;height:11px;border-radius:4px;flex:0 0 auto}
.s-gyo{background:var(--gyo)}.s-ken{background:var(--ken)}.s-hou{background:var(--hou)}.s-zei{background:var(--zei)}
/* nav */
.nav{position:fixed;left:0;right:0;bottom:0;z-index:40;background:rgba(255,255,255,.9);
  backdrop-filter:blur(16px);border-top:1px solid var(--line);box-shadow:0 -4px 20px rgba(40,60,130,.06);
  padding:8px 6px calc(8px + var(--safe));display:flex}
.nav button{flex:1;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10.5px;font-weight:800;color:var(--mut);padding:2px}
.nav button.on{color:var(--pri)}
.nav svg{width:23px;height:23px}
/* quiz */
.q-stmt{font-size:19px;font-weight:700;line-height:1.7;margin:6px 0 4px;color:var(--ink)}
.opt{width:100%;text-align:left;background:var(--card2);border:1.5px solid var(--line);border-radius:13px;
  padding:14px;margin-bottom:9px;font-size:15px;font-weight:600;display:flex;gap:10px;transition:.12s;color:var(--ink)}
.opt:active{transform:scale(.99)}
.opt .n{flex:0 0 25px;height:25px;border-radius:8px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;font-weight:800;font-size:13px;color:var(--sub)}
.opt.ok{border-color:var(--ok);background:#e4f7ee} .opt.ok .n{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt.ng{border-color:var(--ng);background:#fdeaec} .opt.ng .n{background:var(--ng);color:#fff;border-color:var(--ng)}
.ox{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.ox button{padding:22px 0;border-radius:15px;font-size:26px;font-weight:900;background:var(--card2);border:1.5px solid var(--line);color:var(--sub);box-shadow:var(--sh)}
.ox button.o{color:var(--ok)}.ox button.x{color:var(--ng)}
.ox button.ok{border-color:var(--ok);background:#e4f7ee;color:var(--ok)}
.ox button.ng{border-color:var(--ng);background:#fdeaec;color:var(--ng)}
.expl{background:var(--card2);border:1px solid var(--line);border-left:4px solid var(--pri);border-radius:12px;padding:14px;margin-top:12px;font-size:14px;color:var(--sub);animation:fade .25s}
.judge{font-weight:900;font-size:16px;margin-bottom:6px}
.judge.ok{color:var(--ok)}.judge.ng{color:var(--ng)}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.prog{height:6px;border-radius:4px;background:var(--bg2);margin:2px 0 14px;overflow:hidden}
.prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--pri),#6f86ff);transition:width .3s}
/* calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal .d{aspect-ratio:1;border-radius:8px;background:var(--bg2);display:grid;place-items:center;font-size:11px;color:var(--mut);font-weight:700}
.cal .h1{background:#c9d5ff;color:var(--pri)}.cal .h2{background:#7d97ff;color:#fff}.cal .h3{background:var(--pri);color:#fff}
.cal .today{outline:2px solid var(--warn);outline-offset:-2px}
.wd{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px}
.wd span{text-align:center;font-size:10px;color:var(--mut);font-weight:700}
/* misc */
.seg{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.seg::-webkit-scrollbar{display:none}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;text-align:center;box-shadow:var(--sh)}
.stat b{font-size:23px;font-weight:900;display:block}
.stat s{font-size:11px;color:var(--mut);text-decoration:none;font-weight:600}
.list-q{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:8px;box-shadow:var(--sh)}
.star{background:none;font-size:20px;padding:4px;line-height:1}
.hide{display:none!important}
video{width:100%;border-radius:12px;background:#000;margin-top:6px}
.empty{text-align:center;color:var(--mut);padding:30px 10px;font-size:14px}
input,textarea,select{font-family:inherit;background:#fff;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px;font-size:15px;width:100%}
label{font-size:13px;font-weight:700;color:var(--sub);display:block;margin:10px 0 4px}
.toast{position:fixed;left:50%;bottom:calc(86px + var(--safe));transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;
  font-size:14px;font-weight:700;z-index:60;box-shadow:var(--sh2);opacity:0;transition:.2s;pointer-events:none}
.toast.show{opacity:1}
.hero-btn{background:linear-gradient(135deg,var(--pri),var(--pri2));box-shadow:0 8px 22px rgba(61,90,254,.38)}
.msg{background:linear-gradient(135deg,#fff6ec,#fff);border:1px solid #ffe3c4;border-radius:14px;padding:12px 14px;margin-bottom:12px;font-size:14px;font-weight:700;color:#b5641a;display:flex;gap:9px;align-items:center;box-shadow:var(--sh)}
.vmodal{position:fixed;inset:0;background:rgba(10,14,30,.85);z-index:80;display:flex;align-items:center;justify-content:center;padding:10px}
.vbox{background:#000;border-radius:14px;overflow:hidden;width:100%;max-width:720px}
.vhead{display:flex;align-items:center;gap:10px;background:var(--card);padding:10px 14px}
.vhead b{flex:1;font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vhead a{font-size:12px;font-weight:700;white-space:nowrap}
.vhead button{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-weight:800}
.vbox iframe{display:block;width:100%;aspect-ratio:16/9;border:0;background:#000}
.vrow{width:100%;text-align:left;background:var(--card2);border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;font-size:14px;font-weight:700;display:flex;gap:10px;align-items:center;color:var(--ink)}
.vrow .p{color:var(--pri);flex:0 0 auto}
a{color:var(--pri)}
</style>

<div id="screen"></div>

<nav class="nav" id="nav"></nav>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   宅建合格アプリ — サンプル問題データ（オリジナル）
   ------------------------------------------------------------
   ※ Claude が法令ベースで作成したオリジナル問題です。
      市販問題集の複製ではありません。自由に差し替え・追加できます。
   ※ あなたの手持ち問題データは、アプリの[取込]画面から
      この形式のJSONで読み込めます（端末内に保存されます）。

   フォーマット:
   {
     id, subject, topic, type("ox"|"select"), q,
     choices(selectのみ 4件), answer(ox:true/false, select:0-3), exp
   }
   subject は 宅建業法 / 法令上の制限 / 税その他 / 権利関係 の4つ。
   ============================================================ */

window.SAMPLE_QUESTIONS = [
/* ---------------- 宅建業法（配点20） ---------------- */
{id:"gyo-001",subject:"宅建業法",topic:"取引の意味",type:"ox",
 q:"自ら所有するアパートを、他人に反復継続して賃貸する行為は、宅地建物取引業に当たる。",
 answer:false,
 exp:"自ら貸主となる賃貸（サブリース含む）は「取引」に当たらず免許不要。宅建業の取引は①自ら売買・交換 ②売買・交換・貸借の代理 ③売買・交換・貸借の媒介。自ら貸借だけが除外、と覚える。"},
{id:"gyo-002",subject:"宅建業法",topic:"免許",type:"ox",
 q:"宅地建物取引業の免許の有効期間は5年であり、更新申請は有効期間満了の日の90日前から30日前までの間に行う。",
 answer:true,
 exp:"免許は5年ごと更新。更新申請期間は満了日の90日前〜30日前。宅建士証（5年）や登録（生涯）と混同しないこと。"},
{id:"gyo-003",subject:"宅建業法",topic:"免許の基準",type:"ox",
 q:"破産手続開始の決定を受けて復権を得ない者は、宅地建物取引業の免許を受けることができない。",
 answer:true,
 exp:"破産者で復権を得ない者は欠格。ただし復権を得れば直ちに免許可（5年待つ必要なし）。破産→復権すれば即OK、がポイント。"},
{id:"gyo-004",subject:"宅建業法",topic:"宅建士",type:"select",
 q:"宅地建物取引士に関する次の記述のうち、正しいものはどれか。",
 choices:[
   "宅建士の登録を受けた者は、宅建士証の交付を受けなくても重要事項の説明ができる。",
   "宅建士証の有効期間は5年で、更新には原則として交付申請前6か月以内の法定講習の受講が必要である。",
   "宅建士の登録は、登録を受けた都道府県内でのみ有効で、他県では業務ができない。",
   "事務所には、業務に従事する者3人に1人以上の割合で専任の宅建士を置けばよい。"],
 answer:1,
 exp:"①重説は宅建士証の提示が必要で証がなければ不可。②正しい（講習は交付申請前6か月以内）。③登録は全国で有効。④専任宅建士は5人に1人。宅建士証は5年更新・法定講習6か月以内を押さえる。"},
{id:"gyo-005",subject:"宅建業法",topic:"営業保証金",type:"ox",
 q:"宅地建物取引業者は、本店1,000万円・支店ごと500万円の営業保証金を、事業開始後に供託すればよい。",
 answer:false,
 exp:"金額（本店1,000万・支店500万/店）は正しいが、供託は事業開始の前。供託→免許権者へ届出→事業開始、の順。順序が誤り。"},
{id:"gyo-006",subject:"宅建業法",topic:"保証協会",type:"ox",
 q:"保証協会の社員となろうとする者は、加入しようとする日までに弁済業務保証金分担金を協会に納付しなければならない。",
 answer:true,
 exp:"分担金（本店60万・支店30万/店）は加入日までに金銭のみで協会へ納付。営業保証金（有価証券可）との違いに注意。"},
{id:"gyo-007",subject:"宅建業法",topic:"媒介契約",type:"select",
 q:"専任媒介契約に関する次の記述のうち、誤っているものはどれか。",
 choices:[
   "契約の有効期間は3か月を超えることができず、超える定めをしたときは3か月に短縮される。",
   "業者は、依頼者に対し2週間に1回以上、業務の処理状況を報告しなければならない。",
   "業者は、契約締結の日から5日以内（休業日を除く）に指定流通機構へ登録しなければならない。",
   "依頼者は、他の業者に重ねて媒介を依頼することはできない。"],
 answer:2,
 exp:"③が誤り。専任媒介の指定流通機構への登録は7日以内（休業日を除く）。5日以内は専属専任媒介の数字。専任=報告2週に1回以上・登録7日以内・期間3か月。専属専任=報告1週に1回以上・登録5日以内。"},
{id:"gyo-008",subject:"宅建業法",topic:"重要事項説明",type:"ox",
 q:"重要事項の説明は、宅地建物取引士が宅建士証を提示した上で、契約が成立するまでの間に行わなければならない。",
 answer:true,
 exp:"35条書面（重説）は契約成立の前に、宅建士が宅建士証を提示して説明。相手が業者の場合は書面交付のみで説明を省略できる（2020改正）。"},
{id:"gyo-009",subject:"宅建業法",topic:"37条書面",type:"ox",
 q:"37条書面（契約書面）には宅地建物取引士が記名しなければならないが、その交付は宅建士以外の従業者が行ってもよい。",
 answer:true,
 exp:"35条・37条とも宅建士の記名は必要（押印は2022年廃止）。37条書面の交付や説明は宅建士でなくてよい（37条に説明義務なし）。35条は説明も宅建士が行う。"},
{id:"gyo-010",subject:"宅建業法",topic:"クーリングオフ",type:"select",
 q:"業者が自ら売主となる宅地の売買で、買主（業者でない個人）によるクーリング・オフができる場合はどれか。",
 choices:[
   "買主が自ら指定した自宅で買受けの申込みをした場合",
   "業者の事務所で買受けの申込みをした場合",
   "クーリング・オフができる旨を書面で告げられた日から起算して8日を経過した場合",
   "買主が宅地の引渡しを受け、かつ代金全額を支払った場合"],
 answer:0,
 exp:"不可となるのは事務所等での申込み・告知から8日経過・引渡し＋代金全額支払いのいずれか。買主が自ら指定した自宅は事務所等に当たらずクーリング・オフ可（業者から申し出た場合）。"},
{id:"gyo-011",subject:"宅建業法",topic:"手付",type:"ox",
 q:"業者が自ら売主となる場合、代金の額の2割を超える手付を受領することはできない。",
 answer:true,
 exp:"自ら売主制限の一つ。手付は代金の20％（2割）が上限で超過分は無効。手付はすべて解約手付とみなされる点もセット。"},
{id:"gyo-012",subject:"宅建業法",topic:"担保責任の特約",type:"ox",
 q:"業者が自ら売主となる売買で、契約不適合責任の通知期間を引渡しの日から2年以上とする特約は有効である。",
 answer:true,
 exp:"民法は不適合を知った時から1年が原則。8種制限で買主に不利な特約は無効だが、通知期間を引渡しから2年以上とする特約は例外的に有効（買主に不利でないとみなす）。"},
{id:"gyo-013",subject:"宅建業法",topic:"報酬",type:"select",
 q:"代金2,000万円（税抜）の宅地の売買を業者が媒介した場合、依頼者の一方から受領できる報酬の上限（消費税10％込）はいくらか。",
 choices:["66万円","72万6,000円","62万7,000円","79万2,000円"],
 answer:1,
 exp:"400万円超は代金×3％＋6万円。2,000万×3％＋6万＝66万円（税抜）。消費税10％を加え66万×1.1＝72万6,000円。媒介では依頼者の一方からこの額が上限。"},
{id:"gyo-014",subject:"宅建業法",topic:"広告",type:"ox",
 q:"未完成の建物については、建築確認を受ける前であっても、広告の内容が正確であれば広告を開始してよい。",
 answer:false,
 exp:"広告開始時期の制限。開発許可・建築確認等の処分があった後でなければ広告できない。内容の正確さは無関係。契約締結時期の制限（貸借は除く）とセットで覚える。"},
{id:"gyo-015",subject:"宅建業法",topic:"監督処分",type:"ox",
 q:"宅地建物取引業者が不正の手段で免許を受けた場合、免許権者は必ず免許を取り消さなければならない。",
 answer:true,
 exp:"必要的取消（必ず取消）事由。欠格事由該当・不正手段での免許取得・業務停止処分違反・1年以上の事業不開始などが該当。任意的取消と区別する。"},
{id:"gyo-016",subject:"宅建業法",topic:"標識・案内所",type:"ox",
 q:"業者は、契約行為等を行わない案内所であっても、専任の宅地建物取引士を1名以上置かなければならない。",
 answer:false,
 exp:"専任宅建士が必要なのは契約（申込み含む）を行う案内所。契約を行わない案内所は標識の掲示は必要だが専任宅建士は不要。"},
{id:"gyo-017",subject:"宅建業法",topic:"業務上の規制",type:"ox",

で代金の2割まで"]}, {"no": "2-7", "title": "契約の実行をします", "page": 84, "points": ["報酬は税抜き本体価格を基礎に計算。売買媒介は200万以下5%、200万超400万以下4%+2万、400万超3%+6万", "媒介は依頼者双方から各限度額まで、代理は媒介額の2倍まで(相手方からも取る場合は合計が2倍以内)", "貸借の媒介は合計で賃料1カ月分以内。居住用は原則各0.5カ月で、承諾があれば割合を変えられる", "課税業者は計算額に1.1、免税業者は1.04を掛ける。800万円以下の低廉な空家等は媒介30万円+税を上限にできる", "権利金授受のある宅地や非居住用建物の貸借は、権利金を売買代金とみなして計算でき、高い方が限度", "不当に高額な報酬要求は要求だけで違反。登記・引渡・対価の不当な履行遅延も禁止"]}, {"no": "3-1", "title": "免許制度のかたち", "page": 96, "points": ["免許申請から基準審査・免許証交付・営業保証金供託(または保証協会加入)・届出を経て営業を開始する", "免許を拒否する場合は理由を付して申請者へ通知するが、聴聞は不要"]}, {"no": "3-2", "title": "免許の手続・免許換え", "page": 98, "points": ["1つの都道府県だけに事務所を置くなら知事免許、2以上の都道府県に置くなら国土交通大臣免許", "免許は事務所の数でなく所在地で決まり、営業区域の制限もなく他県で営業できる", "他県に新たに事務所を設置するなどで免許権者が変わると免許換えが必要", "免許換えの免許は新規扱いで有効期間は取得日から5年。新免許交付までは従前免許で営業できる"]}, {"no": "3-3", "title": "免許の基準", "page": 102, "points": ["心身の故障で適正に営めない者・復権を得ない破産者・暴力団員等(離脱後5年未満含む)は免許を受けられない", "禁錮以上の刑、または宅建業法違反・暴力団関連法違反・傷害等の罪で罰金以上に処されると、執行終了から5年間免許不可", "執行猶予は期間中は不可だが満了すれば即可。控訴上告中の者は免許を受けられる", "不正免許取得・情状が特に重い業務停止該当・業務停止違反で免許取消されると、取消から5年間不可", "法人が上記で取消された場合、聴聞公示日前60日以内の役員も5年間免許を受けられない", "未成年者本人は欠格要件でないが、法定代理人や法人役員・政令使用人に欠格者がいると免許不可"]}, {"no": "3-4", "title": "免許の効果・更新・失効", "page": 108, "points": ["免許取得後、営業保証金を供託し供託書の写しを付けて届出してから営業を開始でき、全国で営業できる", "免許を受けて1年以内に事業を開始しないと免許取消。有効期間は5年", "更新申請は満了日の90日前から30日前までに行い、満了までに処分がなければ処分まで従前免許が有効", "廃業破産解散・免許換え・取消・死亡・合併消滅などで免許は失効し、原則として免許証を返納する"]}, {"no": "3-5", "title": "宅地建物取引業者名簿", "page": 110, "points": ["商号・役員や政令使用人の氏名・事務所の名称所在地・専任宅建士の氏名などは、変更を30日以内に免許権者へ届出", "免許証番号や処分歴、兼業の種類は変更届出が不要", "廃業等の届出は、事由発生日(死亡は相続人が知った日)から30日以内に免許権者へ行う", "届出義務者は、死亡が相続人、合併消滅が元代表役員、破産が破産管財人、解散が清算人、廃業が業者本人・代表役員"]}, {"no": "3-6", "title": "営業保証金と弁済業務保証金", "page": 112, "points": ["営業保証金は主たる事務所の最寄り供託所へ供託し、主たる事務所1000万円+その他各500万円", "供託は金銭・有価証券(国債は額面、地方債等90%、その他80%評価)可で、届出後に営業を開始できる", "保証協会は業者のみを社員とする社団法人。分担金は主たる事務所60万円+その他各30万円で現金納付", "協会は納付日から1週間以内に弁済業務保証金を供託。還付は営業保証金相当額が限度で、認証を受け供託所へ請求", "還付で不足が生じたら業者は通知から2週間以内に補充供託、社員は還付充当金を2週間以内に納付(遅れると社員資格喪失)", "取戻しは原則6カ月以上の公告後。保証協会加入や社員資格喪失時など公告不要の場合もある"]}, {"no": "4-1", "title": "宅建士制度のかたち", "page": 124, "points": ["試験合格・登録・宅建士証の交付という3段階を経て宅建士になる", "登録は合格した試験地の知事に申請し、宅建士証は登録した知事が交付する", "宅建士は取引の専門家として公正誠実に事務を行い、信用失墜行為をせず、知識能力の維持向上に努める"]}, {"no": "4-2", "title": "登録の手続等", "page": 126, "points": ["登録は合格した試験地の知事に、実務経験2年以上か登録実務講習修了で申請。登録は一生有効で全国に効力が及ぶ", "氏名・住所・本籍・勤務先業者などに変更があれば遅滞なく変更の登録(宅建士証未交付や事務禁止中も必要)", "登録の移転は勤務先が他県になる場合に任意で、現登録知事を経由して移転先知事へ申請。単なる住所移転では不可", "移転先の宅建士証は講習不要で交付され有効期間は従前の残存分。事務禁止処分中は移転申請できない", "死亡・破産・欠格事由該当などは30日以内(死亡は相続人が知った日から)に登録先知事へ届出"]}, {"no": "4-3", "title": "登録の基準", "page": 132, "points": ["登録の欠格要件は免許基準とほぼ同じ(破産・暴力団員・一定の刑罰から5年など)", "成年者と同一の行為能力を有しない未成年者は、業者にはなれても宅建士登録はできない", "登録消除処分を受けると処分日から5年間登録不可。事務禁止期間中に自ら消除した者は期間中は再登録できない"]}, {"no": "4-4", "title": "宅建士証", "page": 134, "points": ["宅建士証は登録した知事が交付。申請前6カ月以内の法定講習が必要だが、合格後1年以内や登録移転時は不要", "有効期間は5年で5年ごとに更新。登録移転時の交付は従前証の残存分", "氏名や住所の変更時は変更の登録とともに書換え交付を申請する", "返納は登録消除や失効時、提出は事務禁止処分時で、いずれも交付を受けた知事へ。禁止満了後は請求で返還", "重要事項説明時は請求がなくても提示し、取引関係者の請求時も提示。旧姓の併記も可能"]}, {"no": "4-5", "title": "宅建士の設置・業務", "page": 138, "points": ["事務所は業務従事者5名に1名以上、案内所等は1名以上の成年専任宅建士を設置する", "専任とは事務所に常勤すること(IT活用の体制確保で事務所外勤務も含む)。成年者は18歳以上", "宅建士が不足したら2週間以内に補充し30日以内に変更届出。怠ると業務停止等の処分", "宅建士の独占業務は、重要事項の説明・35条書面への記名・37条書面への記名(専任でなくてもよい)"]}, {"no": "5-1", "title": "監督・罰則のかたち", "page": 142, "points": ["業者への監督処分は指示・業務停止・免許取消の3種、宅建士へは指示・事務禁止・登録消除の3種", "ほかに指導助言勧告、報告徴収や立入検査、懲役罰金過料の罰則がある"]}, {"no": "5-2", "title": "監督", "page": 144, "points": ["業者への指示と業務停止は免許権者と行為地の知事ができるが、免許取消は免許権者のみ", "業務停止は1年以内の期間で業務の全部か一部を停止。指示違反や業法上の処分違反等が対象", "必要的免許取消は、欠格要件該当・免許換えの懈怠・1年以内の事業未開始や1年以上の休止など", "宅建士への事務禁止は1年以内、登録消除は登録した知事のみ。名義貸しや不正・著しく不当な行為等が対象", "監督処分には公開の聴聞が必要。業務停止と免許取消は公告され、宅建士への処分は公告されない"]}, {"no": "5-3", "title": "罰則", "page": 148, "points": ["最も重いのは不正免許取得・名義貸し営業・業務停止違反で、3年以下の懲役か300万以下の罰金(法人は1億円以下)", "無免許営業は2年以下の懲役か300万以下の罰金。重要事実の不告知等は1年以下か100万以下", "不当に高額な報酬要求は6カ月以下か100万以下。誇大広告・履行遅延・手付貸与誘引等は100万以下の罰金", "37条書面の不交付・標識や報酬額の不掲示・従業者証明書の不携帯等は50万以下の罰金", "宅建士証の返納・提出・提示の義務違反は10万以下の過料"]}, {"no": "6-1", "title": "住宅瑕疵担保履行法の趣旨", "page": 152, "points": ["品確法は新築住宅の基本構造部分に引渡から10年の瑕疵担保責任を義務化(短縮不可、特約で20年まで伸長可)", "品確法は相手が業者でも適用されるが、売主に資力がないと救済できないため住宅瑕疵担保履行法が制定された"]}, {"no": "6-2", "title": "住宅瑕疵担保履行法の全体像", "page": 154, "points": ["資力確保の方法は保証金の供託と責任保険への加入の2つで、いずれか、または併用でよい", "保険に加入した住宅は、供託すべき保証金の算定戸数から除かれる", "保険法人は国土交通大臣が指定し、住宅検査と一体で保険を実施。紛争処理体制も整備されている"]}, {"no": "6-3", "title": "住宅瑕疵担保履行法の対象と瑕疵担保責任の内容", "page": 156, "points": ["対象は自ら売主として新築住宅を引き渡す宅建業者や建設業者で、中古住宅や宅地は対象外", "品確法と異なり、買主が宅建業者の場合は資力確保措置は不要", "新築住宅とは建設完了から1年未満かつ未入居のもので、新築か否かは売買契約締結時点で判断する", "責任は引渡から10年間で短縮不可。買主は追完請求・代金減額・損害賠償・契約解除ができる"]}, {"no": "6-4", "title": "告知義務", "page": 158, "points": ["供託の場合は契約締結までに、供託所の所在地等を書面交付して説明(承諾で電磁的記録も可)", "保険加入の場合は、保険証券またはこれに代わる書面を買主へ交付する", "これらは宅建業法上も重要事項として説明し、37条書面にも記載する必要がある"]}, {"no": "6-5", "title": "住宅販売瑕疵担保保証金", "page": 160, "points": ["基準日(3月31日)から3週間以内に、過去10年間の新築住宅供給戸数に応じた保証金を供託する", "供託額は1戸2000万円、10戸3800万円、100戸1億円等。床面積55㎡以下は2戸を1戸と数える", "供託先は主たる事務所の最寄り供託所で、現金のほか国債等の有価証券でも可", "還付は引渡から10年内の買主が対象(転得者は不可)で確定判決等が必要。不足額は通知から2週間以内に供託"]}, {"no": "6-6", "title": "住宅販売瑕疵担保責任保険契約", "page": 164, "points": ["保険料は10年分一括払いの掛け捨てで、加入には着工前の申込が必要", "保険に加入し買主へ書面交付等をすれば、保証金の供託は不要になる", "塡補は売主に対し80%以上、買主に対し免責額を除き100%。業者の悪意や重過失による損害は塡補されない", "保険期間は引渡から10年以上、保険金額は2000万円以上"]}, {"no": "6-7", "title": "届出義務と宅建業法関連", "page": 166, "points": ["供託や保険の状況を、基準日から3週間以内に免許権者へ届け出る", "資力確保措置を講じず届出もしないと、基準日の翌日から50日を経過した日以降、新たな新築住宅の売買契約ができない", "帳簿は閉鎖後5年保存だが、自ら売主の新築住宅分は10年保存", "履行確保法に業者への監督処分規定はなく、違反時は宅建業法で指示や業務停止(重い場合は免許取消)を受ける"]}], "法令上の制限": [{"no": "1-1", "title": "法令上の制限の内容と重要性", "page": 12, "points": ["土地・建物の利用や取引にかかる各種法律の実用知識を扱う分野", "主要6法（都市計画法・建築基準法・国土利用計画法・農地法・土地区画整理法・盛土規制法）から毎年8問前後出る", "範囲は広く難解なので、まず全体像をつかんでから個別論点に入ると効率的"]}, {"no": "1-2", "title": "法令上の制限のかたち", "page": 14, "points": ["全体の目的は土地・建物の有効利用の実現にある", "国土全体→都市→建物の順に、国土利用計画法・都市計画法・建築基準法が規制する", "農地は農地法、造成の災害防止は盛土規制法、区画の整理は土地区画整理法が担当", "体系上は国土利用計画法が先だが、学習は都市計画法から始める"]}, {"no": "2-1", "title": "都市計画法のかたち", "page": 18, "points": ["目的は都市の健全な発展と秩序ある整備の実現", "まず都市計画を行う区域を指定し、その内容・決定基準・決定手続を定める流れ", "計画の実現を妨げないよう開発行為や建築を規制する"]}, {"no": "2-2", "title": "都市計画区域・準都市計画区域の指定の手続", "page": 22, "points": ["都市計画区域は都市計画を実施する場所で、行政区画と無関係に指定できる", "1つの都道府県内なら都道府県が指定（大臣に協議し同意）、2以上の都府県にまたがると国土交通大臣が指定", "すべての都市計画区域にマスタープラン（整備・開発・保全の方針）を定める", "準都市計画区域は区域外の乱開発防止のため都道府県が指定する", "準都市計画区域に都市計画区域が指定されると重複部分は廃止または変更の扱い"]}, {"no": "2-3-1", "title": "都市計画の内容（区域区分）", "page": 24, "points": ["市街化区域はすでに市街地、または10年以内に優先的・計画的に市街化を図る区域", "市街化調整区域は市街化を抑制すべき区域", "非線引区域は市街化区域・調整区域の区分がない区域", "区域区分（線引き）の決定権者は都道府県", "試験では非線引を「区分が定められていない都市計画区域」と長く表現してくる"]}, {"no": "2-3-2", "title": "地域地区・用途地域", "page": 26, "points": ["用途地域は住居系・商業系・工業系の全13種類", "第一種は静か、第二種はやや騒がしいなど、店舗規模で区別される", "田園住居地域は農地と調和した低層住居地域で、農地の形質変更に市町村長の許可が必要", "特別用途地区は用途地域内のみ、特定用途制限地域は用途地域外のみに定める", "高度地区は高さ、高度利用地区は容積率等を規制する（混同注意）"]}, {"no": "2-3-3", "title": "都市施設等", "page": 35, "points": ["都市施設は都市に不可欠な施設（道路・公園・下水道・学校等）", "都市施設は必要があれば都市計画区域外でも定められる", "市街地開発事業は市街化区域または非線引区域で定める（調整区域は不可）", "市街地開発事業等予定区域内で建築物の建築や土地の形質変更をするには知事等の許可が必要"]}, {"no": "2-3-4", "title": "地区計画等", "page": 36, "points": ["地区計画は小さな地区単位で特性に合った街づくりをする都市計画", "用途地域の定めの有無を問わず都市計画区域内に定められる", "区域内で建築等を行う者は着手の30日前までに市町村長へ届出", "計画に適合しない場合は市町村長が変更を勧告できる"]}, {"no": "2-4", "title": "都市計画の決定基準", "page": 38, "points": ["各地域地区について必ず定める・定めうる・定められないの区分けが問われる", "市街化区域は用途地域を必ず定め、調整区域は原則定めない", "道路・公園・下水道は市街化区域で必ず定める", "市街地開発事業は市街化区域・非線引区域のみ（調整区域・区域外は不可）"]}, {"no": "2-5", "title": "都市計画の決定手続", "page": 40, "points": ["決定権者は原則、1都道府県内なら都道府県、広域なら国土交通大臣と市町村", "市町村決定の都市計画が都道府県のものと抵触すると都道府県が優先", "原案の公告・縦覧は2週間で、住民は意見書を提出できる", "都市計画は告示の日から効力を生じる", "土地所有者やNPO法人も計画の決定・変更を提案できる"]}, {"no": "2-6", "title": "開発行為の規制", "page": 44, "points": ["開発行為は建築物の建築や特定工作物の建設のために行う土地の区画形質の変更", "第一種特定工作物（コンクリプラント等）は規模を問わず、第二種はゴルフ場のみ面積不問で他は1ha以上が対象", "許可不要：市街化区域1000平米未満、非線引・準都市3000平米未満、その他1ha未満（調整区域は例外なし）", "農林漁業用建築物や公益的建築物（駅舎・図書館等）は許可不要", "申請は知事へ書面で行い、内容変更は原則許可、工事廃止や軽微な変更は届出", "開発登録簿は誰でも閲覧でき、写しの交付請求もできる"]}, {"no": "2-7", "title": "開発許可に関連した建築規制", "page": 52, "points": ["開発区域内は工事完了公告前は原則建築不可（仮設建築・知事許可・不同意者は例外）", "公告後は予定建築物等以外の建築は原則できない", "開発区域外の市街化調整区域は知事の許可がないと建築等ができない", "農林漁業用・公益的建築物・非常災害の応急措置などは許可不要"]}, {"no": "3-1", "title": "建築基準法のかたち", "page": 58, "points": ["単体規定は建物自体の構造・防火・衛生の安全を守る規定で全国に適用", "集団規定は都市計画に合った建築のための規定で原則都市計画区域・準都市計画区域内に適用", "建築確認は規制が守られるか事前にチェックする手続"]}, {"no": "3-2", "title": "単体規定", "page": 60, "points": ["全国で適用され、個々の建物の構造・防火・衛生の安全を確保する", "高さ20m超は避雷設備、高さ31m超は非常用昇降機が必要", "延べ面積1000平米超は原則防火壁等で区画（耐火・準耐火建築物等は不要）", "居室の天井高は2.1m以上、住宅の居室の採光窓は原則床面積の1/7以上", "地方公共団体は条例で単体規定より厳しい制限を付加できる"]}, {"no": "3-3", "title": "接道義務", "page": 64, "points": ["都市計画区域・準都市計画区域内で、建物の敷地は幅員4m以上の道路に2m以上接する必要", "自動車専用道路は接道義務でいう道路に含まれない", "4m未満でも特定行政庁指定の既存道（2項道路）は道路とみなし、中心線から2mまでセットバック", "原則として道路内には建築物を建築できない", "特定行政庁は壁面線を指定でき、原則それを越えて壁や柱を建てられない"]}, {"no": "3-4", "title": "用途規制", "page": 68, "points": ["用途地域ごとに建てられる建物が決まる（自由に建築可か要許可か）", "敷地が複数の用途地域にまたがると過半を占める地域の規制を適用", "住宅・図書館は工業専用地域以外なら建築できる", "ソープランドは商業地域のみ、料理店は商業・準工業のみなど位置に注意", "建てられる地域はゴロ合わせを活用して暗記する"]}, {"no": "3-5", "title": "建蔽率", "page": 72, "points": ["建蔽率は建築面積を敷地面積で割った割合", "防火地域内の耐火建築物等、準防火地域内の耐火・準耐火建築物等は原則プラス1/10", "特定行政庁指定の角地はプラス1/10（両方に該当すればプラス2/10）", "建蔽率8/10の地域かつ防火地域内の耐火建築物等は制限なし（10/10）", "敷地が異なる地域にまたがる場合は加重平均で計算する"]}, {"no": "3-6", "title": "容積率", "page": 76, "points": ["容積率は延べ面積を敷地面積で割った割合", "前面道路が12m未満なら幅員(m)に住居系4/10・その他6/10を乗じた値と都市計画の値の小さい方", "前面道路が複数あるときは最大幅員で判断する", "住宅の地階は延べ面積の1/3まで、共用の廊下・階段は全部不算入", "敷地が異なる地域にまたがる場合は加重平均で計算する"]}, {"no": "3-7-1", "title": "絶対的高さ制限", "page": 80, "points": ["第一種・第二種低層住居専用地域と田園住居地域は高さ10mまたは12m以下に制限", "特定行政庁の許可で例外的に高さ制限を超えられる場合がある", "これらの地域では外壁の後退距離1mまたは1.5mを都市計画で定められる"]}, {"no": "3-7-2", "title": "斜線制限", "page": 81, "points": ["道路斜線制限は前面道路との関係で高さを規制し、全用途地域と無指定区域に適用", "隣地斜線制限は隣地環境の確保が目的で、低層住専・田園住居には適用されない", "北側斜線制限は日照確保のため低層住専・田園住居・中高層住専のみに適用"]}, {"no": "3-7-3", "title": "敷地面積の最低限度", "page": 83, "points": ["全用途地域で都市計画により200平米を超えない範囲で最低限度を定められる", "最低限度を下回るような敷地の分割は原則禁止", "8/10地域かつ防火地域内の耐火建築物等などは適用除外"]}, {"no": "3-7-4", "title": "日影規制", "page": 84, "points": ["中高層建築物の日影を周辺に一定時間落とさないよう日照環境を保護", "対象は住居系・近隣商業・準工業・無指定地域（商業・工業・工業専用は原則対象外）", "対象区域外でも高さ10m超で対象区域に冬至日の日影を落とすと規制対象になる", "1つの敷地に2以上の建物があれば全体を1つの建物とみなす"]}, {"no": "3-8", "title": "防火・準防火地域内での規制", "page": 86, "points": ["防火地域は3階以上または延べ面積100平米超で耐火建築物等が必要", "準防火地域は4階以上または延べ面積1500平米超で耐火建築物等が必要", "屋根や防火戸の規制は両地域共通", "複数地域にまたがる場合は最も厳しい地域の規定を適用", "防火地域では屋上の看板等や高さ3m超の看板等は主要部を不燃材料にする"]}, {"no": "3-9", "title": "建築確認", "page": 90, "points": ["特殊建築物（用途部分の床面積200平米超）と大規模建築物（2階以上または200平米超）は全国で確認必要", "都市計画区域等では一般の建築物の新築も確認必要", "防火・準防火地域内では10平米以下の増改築等でも確認必要", "申請者は建築主で、申請先は建築主事等または指定確認検査機関", "完了検査は工事完了日から4日以内に申請、違反建築物には特定行政庁が是正命令を出す"]}, {"no": "3-10", "title": "建築協定", "page": 98, "points": ["住民が自主的に定める建築ルールで良好な環境を確保・維持する制度", "借地の場合は借地権者の合意のみでよく、土地所有者の合意は不要", "成立と変更は全員の合意、廃止は過半数の合意で足りる", "認可の公告後は新たな土地所有者や借主にも効力が及ぶ", "一人協定も可能で、認可日から3年以内に2人以上になれば効力発生"]}, {"no": "4-1", "title": "国土利用計画法のかたち", "page": 102, "points": ["目的は地価の高騰を抑えて土地・建物の有効利用を実現すること", "投機的取引を抑制するため許可制と届出制を設けた"]}, {"no": "4-2", "title": "届出制と監視区域", "page": 104, "points": ["区域は無指定・注視・監視・規制の4種で、事後届出は無指定区域のみ", "事後届出の面積要件は市街化区域2000平米以上、他の都計区域5000平米以上、区域外1万平米以上", "事後届出は買主が契約後2週間以内に知事へ（取引価格と利用目的を記載）", "注視区域・監視区域は両当事者が契約前に事前届出", "事後届出は利用目的のみ審査し、勧告に従わなくても契約は有効"]}, {"no": "4-3", "title": "許可制", "page": 112, "points": ["規制区域内はすべての土地売買等の契約が面積を問わず許可制", "規制区域はこれまで一度も指定されたことがない", "許可を受けずに結んだ契約は無効で罰則もある", "不許可なら知事に土地の買取りを請求できる"]}, {"no": "5-1", "title": "農地法のかたち", "page": 116, "points": ["目的は食料の大切な供給源である農地を確保すること", "権利移動・転用・転用目的権利移動を規制する", "まず前提として農地・採草放牧地の意義を押さえる"]}, {"no": "5-2", "title": "農地・採草放牧地の意義", "page": 118, "points": ["農地は耕作目的の土地で、登記の地目ではなく現況で判断する", "休耕地や植林用の苗圃・果樹園も農地に含まれる", "家庭菜園や一時的に野菜を栽培している土地は農地に含まれない", "採草放牧地は農地以外で採草や家畜の放牧に供される土地"]}, {"no": "5-3", "title": "権利移動・転用・転用目的権利移動に対する規制", "page": 120, "points": ["3条許可（権利移動）の許可権者は農業委員会", "4条許可（転用）・5条許可（転用目的権利移動）は都道府県知事等", "市街化区域内の特則で、4条・5条は農業委員会への事前届出で足り許可不要", "抵当権の設定は権利移動に含まれず、競売は含まれる", "相続等は3条許可不要だが農業委員会へ届出、許可なしの契約は無効で罰則もある"]}, {"no": "6", "title": "土地区画整理法", "page": 125, "points": ["施行者は個人・組合・会社（民間）や地方公共団体・機構等（公的）", "組合設立には所有者・借地権者7人以上と都道府県知事の認可が必要", "施行地区内では公告後、建築等をするのに知事等の許可が必要", "仮換地の指定で使用収益権は仮換地に移るが、所有権は従前地に残る", "換地処分の公告の翌日に換地を従前地とみなし、保留地は施行者のものになる"]}, {"no": "7", "title": "宅地造成及び特定盛土等規制法", "page": 133, "points": ["区域は宅地造成等工事規制区域・特定盛土等規制区域・造成宅地防災区域の3種で、指定は知事等", "規制区域内の許可基準は盛土1m超・切土2m超の崖、盛土2m超、面積500平米超などで知事の許可", "土石の堆積は高さ2m超かつ300平米超、または面積500平米超で許可が必要", "許可申請は工事主が行い、土地所有者等全員の同意と周辺住民への周知が必要", "都市計画法の開発許可を受ければ盛土規制法の許可は不要", "指定時すでに工事中なら21日以内、擁壁等の除却は着手14日前までに届出"]}, {"no": "8", "title": "その他の法令による制限", "page": 143, "points": ["許可権者は誰かに絞って整理するのがポイント", "原則は都道府県知事の許可", "河川法は河川管理者、海岸法は海岸管理者、道路法は道路管理者の許可", "自然公園法は国立公園が環境大臣、国定公園が都道府県知事の許可", "文化財保護法は文化庁長官、生産緑地法は市町村長の許可"]}], "税その他": [{"no": "1-1", "title": "その他の法令の内容と重要性", "page": 12, "points": ["宅建業法・法令上の制限・権利関係以外から出る科目の総称で、全部で8問出る", "内訳は「土地建物」2問、「需給・実務」3問、「価格の評定」1問、「税」2問", "登録講習の修了者は「土地建物」と「需給・実務」の5点が免除される", "苦手にされがちな分野だが、8問中6点を目標に得点源にしたい"]}, {"no": "1-2", "title": "その他の法令のかたち・登録講習", "page": 14, "points": ["重要事項説明に必要な物件・価格・取引の知識がそのまま出題範囲になっている", "登録講習は宅建業法16条に基づく国交大臣指定の法定講習制度", "対象は宅建業に従事している人で、通信講座とスクーリング(2日間)を受ける", "修了すると、修了日から3年以内の試験で5点分の科目が免除される"]}, {"no": "2-1", "title": "土地", "page": 20, "points": ["丘陵地・台地・段丘は水はけ・地耐力がよく宅地に適する(縁辺部や盛土は危険)", "低地部・干拓地・埋立地・後背低地は洪水や地震に弱く一般に宅地に不向き", "山麓の古い土石流・地すべり跡・谷の出口や傾斜25度超は崩壊の危険が大", "扇状地・自然堤防・砂丘・砂州・旧天井川の廃川敷は比較的宅地向き", "等高線は密なら急傾斜、疎ならゆるやか。埋立池沼や地下水位の高い所は液状化しやすい"]}, {"no": "2-2", "title": "建物", "page": 24, "points": ["居室の天井高は2.1m以上。柱の小径や通し柱など木造の基本規定を押さえる", "木材は含水率が高いほど強度が下がり、心材は辺材より強い", "耐震には壁を釣り合いよく配置し、真壁造より大壁造が有利、重い屋根より軽い屋根", "鉄骨造は不燃だが高温で耐力が急落するため耐火被覆が必要、高層・大空間向き", "鉄筋コンクリート造はかぶり厚さの確保が必要。組積造は高さ13m以下等に制限", "構造はラーメン・トラス・アーチと、耐震(剛性)・免震(積層ゴム)・制震(ダンパー)を区別"]}, {"no": "3-1", "title": "住宅金融支援機構", "page": 38, "points": ["機構は自ら融資せず、金融機関の住宅ローン債権を買い取り証券化(MBS発行)する主要業務を行う", "証券化支援(買取型)がフラット35を支え、機構は信用・流動性リスクを負担する", "団体信用生命保険業務を行い、借入者死亡時に保険金を残債の返済に充てる", "直接融資は災害復興・都市居住再生・高齢者住宅など民間困難な分野に限られる", "経済事情の変動で返済困難なら条件変更はできるが、元利金の免除はできない", "業務(住情報提供を除く)の一部を金融機関・地方公共団体等に委託できる"]}, {"no": "3-2", "title": "不当景品類及び不当表示防止法(景表法)", "page": 48, "points": ["景品類は懸賞なら取引価額の20倍か10万円の低い方、非懸賞なら10分の1か100万円の低い方が上限", "実際に取引できない・する気がない物件を載せる「おとり広告」は禁止", "徒歩所要時間は道路距離80mを1分で換算し、端数は1分に切り上げる", "市街化調整区域は「宅地造成・建物建築不可」等の明示が必要", "「新築」は完成後1年未満かつ未入居のもの。「完全」「絶対」等の断定表現は原則禁止", "違反には消費者庁長官等が措置命令でき、違反がやんでいても命令可能"]}, {"no": "3-3", "title": "統計", "page": 56, "points": ["地価公示(R7)は全国の全用途・住宅地・商業地が4年連続で上昇し上昇幅が拡大", "新設住宅着工戸数(令和6年)は約79万戸で2年連続減少、戸数は貸家が最多", "貸家系より持家系(持家+分譲)の戸数が多い点も問われる", "宅建業者数(令和5年度)は約13万で、知事免許が約98%と大半を占める", "業者の特性は自己資本比率が低い・中小零細・参入退出が多い・1人当たり付加価値が高い", "国土面積約3780万haのうち森林が最多(約66%)で、宅地は約197万ha", "不動産業の売上高経常利益率は約13%と全産業平均(約6.5%)を上回る"]}, {"no": "4-1", "title": "不動産鑑定評価基準", "page": 76, "points": ["求める価格は正常価格が基本で、ほかに限定価格・特定価格・特殊価格がある", "最有効使用の原則を前提に価格が形成される", "原価法は再調達原価から減価修正して積算価格を出し、既成市街地の土地には不向き", "取引事例比較法は多数の事例に事情補正・時点修正を加えて比準価格を求める", "収益還元法は将来の純収益から逆算し収益価格を出し、自用不動産も賃貸を想定して適用", "複数の手法を併用すべきで、地価高騰時は収益還元法を積極活用する"]}, {"no": "4-2", "title": "地価公示法", "page": 80, "points": ["一般の土地取引の指標と公共用地取得価格の算定規準とすることが目的", "標準地を選ぶのは国交大臣ではなく土地鑑定委員会で、公示区域内から選定", "2人以上の不動産鑑定士が評価し、土地鑑定委員会が審査調整して公示価格を決定", "定着物や権利が付着していても、それらがないものとして正常な価格を算定", "毎年1月1日時点の価格を3月中旬に官報で公示し、関係市町村長が閲覧に供する", "問題文に「取引」なら指標、それ以外は「規準」と覚える"]}, {"no": "5-1", "title": "宅地及び建物についての税のかたち", "page": 86, "points": ["税は課税団体・課税物件・納税義務者・課税標準・税率・納付方法などの枠で捉える", "取得時は不動産取得税、保有時は固定資産税・都市計画税、譲渡時は所得税など", "不動産取得税は道府県税、固定資産税は市町村税、登録免許税・印紙税は国税", "免税点未満は非課税だが、免税点以上になると全額に課税される", "宅建試験はその年の4月1日時点で施行されている法令で出題される"]}, {"no": "5-2", "title": "不動産取得税", "page": 90, "points": ["不動産を取得した都道府県が課す道府県税で、標準税率は原則4%(土地・住宅は3%)", "有償無償を問わず課税されるが、相続や法人合併など形式的移転は非課税", "課税標準は固定資産課税台帳の登録価格で、宅地は価格の2分の1", "一定要件(床面積50~240㎡等)の新築住宅は課税標準から1200万円控除", "土地10万円・新築等家屋23万円・その他家屋12万円未満は免税点で課税なし", "徴収は納税通知書による普通徴収で、申告納付ではない"]}, {"no": "5-3", "title": "固定資産税", "page": 96, "points": ["固定資産が所在する市町村が課す税で、標準税率は1.4%", "1月1日時点で課税台帳に所有者登録されている者に課税する", "課税標準は登録価格で、原則3年ごとに評価替えして据え置く", "住宅用地は200㎡以下部分が6分の1、超える部分が3分の1に軽減", "新築住宅は要件を満たせば一定期間、税額を2分の1に軽減", "土地30万円・家屋20万円未満は免税点で課税されない、納付は普通徴収"]}, {"no": "5-4", "title": "所得税(譲渡所得)", "page": 100, "points": ["国税で、不動産の譲渡所得(譲渡価格-取得費-譲渡費用)に課税される", "居住用財産の譲渡は3000万円特別控除、収用等は5000万円特別控除", "3000万円控除は配偶者や直系血族への譲渡には使えず、前年前々年の利用があれば不可", "所有期間5年超が長期(15%)、5年以下が短期(30%)で1月1日基準で判定", "所有期間10年超の居住用は6000万円以下部分10%等の軽減税率を重ねて使える", "特定居住用財産の買換え特例と3000万円控除・住宅ローン控除は併用不可"]}, {"no": "5-5", "title": "登録免許税", "page": 112, "points": ["登記を受けるのに課される国税で、登記を受ける者が納税義務者", "課税標準は原則、固定資産課税台帳の登録価格(抵当権設定は債権金額)", "所有権移転(売買)は原則1000分の20、相続は1000分の4", "一定の住宅用家屋(自己居住用・床面積50㎡以上・取得後1年内登記)は税率が軽減", "軽減特例は住宅家屋に適用され土地には及ばず、所得要件はない", "納付は原則現金だが、3万円以下なら印紙納付も可能(義務ではない)"]}, {"no": "5-6", "title": "印紙税", "page": 116, "points": ["契約書等の課税文書に課される国税で、作成者が納税義務者", "土地の賃貸借契約書は課税だが、建物の賃貸借契約書は非課税", "課税標準は文書の記載金額で、贈与や減額変更は記載金額なしとして200円", "契約金額を増額する変更契約書は増加額が記載金額になる", "国等と私人の契約では、私人保存分は非課税、国等保存分は課税", "印紙不貼付は本税とその2倍(計3倍)の過怠税、貼付や消印は文書の効力に無関係"]}], "権利関係": [{"no": "1-1", "title": "権利関係の内容と重要性", "page": 12, "points": ["権利関係は民法・借地借家法・不動産登記法・区分所有法の4法から計14問出る", "中心は民法で、合否を分ける最重要分野", "満点でなく合格点を狙い、出やすい論点に的を絞るのが得策", "抵当権・不動産登記法・解除は難問化しやすく深追いは非効率"]}, {"no": "1-2", "title": "民法のかたち", "page": 14, "points": ["民法は私人間の権利義務を定める一般法で、特別法があればそちらが優先", "契約自由の原則が基本で、当事者は内容を自由に決められる", "権利の主体は自然人と法人、対象は不動産と動産", "契約により債権・債務が生じ、履行されると消滅するのが基本の流れ"]}, {"no": "1-3", "title": "本テキストの構成", "page": 20, "points": ["売買契約を成立→債権債務の発生→履行→終了の時間軸で追って学ぶ", "各段階に対応する論点を体系的に配置している", "先に全体像をつかんでから個別論点に入ると理解しやすい"]}, {"no": "2-1", "title": "時間の流れに沿って見た売買契約", "page": 24, "points": ["売買は申込みと承諾の合意だけで成立する諾成契約", "成立で売主に引渡義務、買主に代金支払義務が生じる", "契約は成立→効力発生→履行→終了の順にたどる"]}, {"no": "2-2", "title": "制限行為能力", "page": 26, "points": ["単独で完全な契約ができない者を保護する制度", "類型は未成年者・成年被後見人・被保佐人・被補助人の4つ", "保護者の同意なしの行為は原則取り消せ、取消しは善意の第三者にも対抗できる", "未成年者でも単に利益を得る行為や小遣いの範囲の処分は取消し不可", "成年被後見人は日用品購入など日常行為以外を取り消せる（同意があっても取消し可）", "相手方は期間を定めて催告でき、詐術を使った者は取り消せない"]}, {"no": "2-3", "title": "意思表示", "page": 35, "points": ["意思表示に欠陥があると無効または取消しになる", "詐欺・錯誤による取消しは善意無過失の第三者に対抗できない", "強迫・制限行為能力による取消しは善意の第三者にも対抗できる", "虚偽表示・心裡留保は善意の第三者に対抗できない（心裡留保は原則有効）", "錯誤取消しは重要な錯誤かつ表意者に重過失がない場合に主張できる", "だまされた落ち度のある詐欺は保護が弱く、落ち度のない強迫は保護が厚い"]}, {"no": "2-4", "title": "無効と取消", "page": 42, "points": ["無効ははじめから効力がなく、誰でもいつでも主張できる", "取消しは一応有効で、取り消すと初めに遡って無効になる", "取り消せるのは制限行為能力者や瑕疵ある表意者、その代理人・承継人", "取消権は追認できる時から5年、行為時から20年で消滅する", "追認すると以後取り消せなくなる（法定追認もある）"]}, {"no": "2-5", "title": "代理", "page": 44, "points": ["代理人がした意思表示の効果が直接本人に帰属する制度", "要件は代理権の存在・顕名・代理権の範囲内の行為", "顕名がないと代理人自身の行為とみなされる（相手方が知り得た時は本人に帰属）", "代理行為の瑕疵は原則として代理人を基準に判断する", "代理人は行為能力者でなくてよく、制限行為能力を理由に取り消せないのが原則", "無権代理は本人の追認で有効。相手方には催告権・取消権・履行/賠償の選択権がある", "自己契約・双方代理は原則禁止"]}, {"no": "2-6", "title": "手付", "page": 60, "points": ["手付は原則として解約手付と推定される", "買主は手付を放棄、売主は倍額を現実に提供して契約解除できる", "相手方が履行に着手した後は手付解除できない", "手付解除の場合は別途の損害賠償は発生しない"]}, {"no": "2-7", "title": "抵当権", "page": 66, "points": ["目的物を債務者に使わせたまま担保にとる約定担保物権", "競売されても優先弁済を受けられ、順位は登記の先後で決まる", "効力は付加一体物や、債務不履行後の果実にも及ぶ", "第三取得者は代価弁済・抵当権消滅請求で抵当権を消せる", "土地建物が同一所有者で一方に抵当権が付き競売で別々になると法定地上権が成立", "賃料などへ物上代位できる（払渡し前の差押えが必要）"]}, {"no": "2-8", "title": "保証・連帯保証", "page": 76, "points": ["保証契約は書面（電磁的記録）でしないと無効", "保証は主債務に付従し、主債務が消えれば保証債務も消える", "普通保証人には催告の抗弁権・検索の抗弁権・分別の利益がある", "連帯保証人にはこれらの抗弁権も分別の利益もなく責任が重い", "保証人が弁済すれば主債務者に求償できる"]}, {"no": "2-9", "title": "連帯債務", "page": 80, "points": ["複数の債務者が全部を弁済する義務を負い、1人の弁済で全員が免れる", "債権者は連帯債務者の誰にでも全額を請求できる", "弁済・相殺・更改・混同は他の債務者にも効力が及ぶ（絶対効）", "請求・免除・時効の完成などは原則として他に影響しない（相対効）", "弁済した者は他の債務者に負担部分に応じて求償できる"]}, {"no": "2-10", "title": "債務不履行", "page": 84, "points": ["履行遅滞・履行不能・不完全履行の3類型がある", "債権者は損害賠償を請求でき、債務者に帰責事由がなければ請求できない", "履行不能なら催告不要で解除でき、遅滞なら相当期間を定めて催告後に解除", "金銭債務の不履行は不可抗力でも免責されず、損害額は法定利率で算定", "賠償範囲は通常損害と、予見可能だった特別損害"]}, {"no": "2-11", "title": "危険負担", "page": 87, "points": ["双務契約成立後、双方の責めなく一方の債務が履行不能になった場合の問題", "債務者主義が原則で、買主は代金支払を拒める", "債権者に帰責事由がある場合は買主は代金支払を拒めない", "目的物の引渡し後の滅失は買主が危険を負担する"]}, {"no": "2-12", "title": "債権譲渡", "page": 89, "points": ["債権は原則自由に譲渡でき、譲渡制限特約があっても譲渡自体は有効", "債務者への対抗要件は債務者への通知または債務者の承諾", "第三者への対抗要件は確定日付のある証書による通知・承諾", "通知前に生じた事由を債務者は譲受人に主張できる"]}, {"no": "2-13", "title": "弁済・代物弁済", "page": 92, "points": ["弁済により債務は消滅する", "第三者も原則弁済できるが、正当な利益のない者は債務者の意思に反して弁済できない", "受領権者らしい外観の者への善意無過失の弁済は有効", "代物弁済は本来の給付に代えて別の給付をして債務を消す（当事者の合意が必要）"]}, {"no": "2-14", "title": "相殺", "page": 94, "points": ["対立する同種の債権を対当額で消し合う一方的意思表示", "両債権が弁済期にあること（自働債権の弁済期到来）が要件", "悪意の不法行為による損害賠償債権などは受働債権として相殺できない", "効力は相殺適状の時に遡って生じる"]}, {"no": "2-15", "title": "対抗要件制度", "page": 97, "points": ["不動産の物権変動は登記がないと第三者に対抗できない", "二重譲渡では先に登記を備えた者が優先する", "背信的悪意者や不法占拠者・無権利者には登記なしでも対抗できる", "取消し後・解除後に現れた第三者とは登記の先後で優劣を決める"]}, {"no": "2-16", "title": "不動産登記法", "page": 102, "points": ["登記記録は表題部と権利部（甲区=所有権、乙区=それ以外）からなる", "表示の登記は所有者に申請義務があり、権利の登記は原則任意", "登記は登記権利者と登記義務者の共同申請が原則", "仮登記は順位を保全するだけで、それ自体に対抗力はない", "区分建物は表題部に敷地権が登記される特色がある"]}, {"no": "2-17", "title": "解除", "page": 116, "points": ["債務不履行があると相手方は契約を解除できる", "相当期間を定めた催告解除と、履行不能等の無催告解除がある", "解除で契約は遡って消滅し、各当事者は原状回復義務を負う", "解除前の第三者は登記があれば保護され、解除後の第三者とは登記の先後で決める", "当事者が複数なら解除は全員から全員に対してする（不可分）"]}, {"no": "2-18", "title": "売主の担保責任（契約不適合責任）", "page": 120, "points": ["目的物が種類・品質・数量・権利で契約内容に適合しないと売主が責任を負う", "買主は追完請求・代金減額請求・損害賠償請求・契約解除ができる", "損害賠償は売主に帰責事由がある場合に限られる", "種類・品質の不適合は知った時から1年以内に通知しないと追及できない（売主が悪意・重過失なら不要）", "全部他人物売買も契約は有効で、権利移転できないと債務不履行責任を負う", "担保責任を負わない特約も有効だが、知りながら告げなかった事実は免れない"]}, {"no": "2-19", "title": "時効", "page": 122, "points": ["取得時効と消滅時効は別個の制度", "所有権の取得時効は善意無過失なら10年、それ以外は20年の占有で成立", "債権の消滅時効は行使できると知った時から5年、または行使できる時から10年", "時効は当事者の援用がないと効力が生じ、利益の事前放棄はできない", "裁判上の請求や承認で時効は更新され、催告等で完成が猶予される"]}, {"no": "2-20", "title": "相続", "page": 128, "points": ["相続人は配偶者と血族（子→直系尊属→兄弟姉妹の順位）", "配偶者は常に相続人で、法定相続分は配偶者と子なら各2分の1", "子が先に死亡すると孫が代襲相続する（兄弟姉妹の代襲は一代限り）", "承認・放棄は自分のために相続開始を知った時から3ヶ月以内に選択", "遺言は満15歳以上でき、遺留分は兄弟姉妹以外の相続人に認められる"]}, {"no": "2-21", "title": "共有", "page": 135, "points": ["各共有者は持分に応じて共有物全部を使用できる", "保存行為は単独、管理行為は持分価格の過半数、変更・処分は全員の同意が必要", "各共有者はいつでも分割を請求できる（5年内の不分割特約は可能）", "共有者が持分を放棄したり相続人なく死亡すると持分は他の共有者に帰属"]}, {"no": "2-22", "title": "区分所有法", "page": 140, "points": ["各戸の専有部分と共用部分からなり、共用部分は原則共有", "敷地利用権は原則として専有部分と分離して処分できない", "議決権や共用部分の持分は原則として専有部分の床面積割合による", "規約の設定・変更や共用部分の重大変更は区分所有者・議決権の各4分の3以上", "建替え決議は区分所有者・議決権の各5分の4以上が必要", "集会は管理者が少なくとも毎年1回招集する"]}, {"no": "3-1", "title": "民法上の賃貸借契約", "page": 164, "points": ["賃貸借は目的物を使わせ賃料を払う諾成・双務契約", "民法上の存続期間は最長50年", "賃借人は善管注意義務を負い、賃貸人の承諾なく譲渡・転貸できない（無断なら解除可）", "賃貸人に修繕義務、賃借人に必要費・有益費の償還請求権がある", "不動産賃借権は登記すれば第三者に対抗できる"]}, {"no": "3-2", "title": "借地借家法（借地）", "page": 172, "points": ["借地借家法は借地人・借家人を保護する特別法で民法に優先する", "普通借地権の存続期間は最短30年、更新後は最初20年・以降10年以上", "借地上に登記した建物があれば借地権を第三者に対抗できる", "更新拒絶には地主側の正当事由が必要で、借地人に建物買取請求権がある", "定期借地権は一般定期（50年以上）・事業用（10〜50年）・建物譲渡特約付（30年以上）の3種"]}, {"no": "3-3", "title": "借地借家法（借家）", "page": 182, "points": ["建物賃貸借に適用され、期間1年未満の契約は期間の定めなしとみなす", "賃貸人の更新拒絶・解約には正当事由が必要", "期間満了の1年前から6ヶ月前までに更新拒絶の通知が要る", "建物の引渡しを受けていれば登記なしでも借家権を第三者に対抗できる", "定期借家契約は書面で更新なしと定める必要がある", "借家人に造作買取請求権が認められる"]}, {"no": "4-1", "title": "委任", "page": 190, "points": ["委任は法律行為などの事務処理を委託する契約", "受任者は無償でも善管注意義務を負う", "各当事者はいつでも委任を解除できる", "委任者・受任者の死亡・破産、受任者の後見開始で終了する", "特約がなければ報酬を請求できない（原則無償）"]}, {"no": "4-2", "title": "請負", "page": 194, "points": ["請負は仕事の完成を約し、完成に対して報酬を払う契約", "報酬は原則として仕事の完成・目的物の引渡しと同時に支払う", "仕事に契約不適合があれば注文者は追完・報酬減額・損害賠償・解除を求められる", "注文者は仕事完成前ならいつでも損害を賠償して解除できる"]}, {"no": "5-1", "title": "不法行為", "page": 198, "points": ["故意・過失で他人の権利を侵害し損害を与えると賠償責任を負う", "被用者が事業執行中に与えた損害は使用者も賠償する（使用者責任）", "土地工作物の瑕疵は占有者が、占有者が免責されれば所有者が無過失責任を負う", "損害賠償請求権は損害と加害者を知った時から3年（人身は5年）、行為時から20年で時効", "共同不法行為者は連帯して全額の賠償責任を負う"]}, {"no": "5-2", "title": "相隣関係", "page": 202, "points": ["隣接する土地所有者相互の利用を調整するルール", "公道に接しない袋地の所有者は囲繞地を通行できる", "境界線付近の建築や、竹木の枝・根に関する規律がある", "境界標の設置費用は相隣者が等しく負担する"]}]}, "questions": [{"id": "kako-gyoA-H27-26", "subject": "宅建業法", "topic": "宅地・建物の定義と免許", "type": "select", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはいくつあるか。ア 都市計画法に規定する工業専用地域内の土地で、建築資材置き場の用に供されているものは、法第 2 条第 1 号に規定する宅地に該当する。イ 社会福祉法人が、高齢者の居住の安定確保に関する法律に規定するサービス付き高齢者向け住宅の貸借の媒介を反復継続して営む場合は、宅地建物取引業の免許を必要としない。ウ 都市計画法に規定する用途地域外の土地で、倉庫の用に供されているものは、法第 2 条第1 号に規定する宅地に該当しない。エ 賃貸住宅の管理業者が、貸主から管理業務とあわせて入居者募集の依頼を受けて、貸借の媒介を反復継続して営む場合は、宅地建物取引業の免許を必要としない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 0, "exp": "正しいのはアだけなので答えは「一つ」。アは用途地域内の土地は建物がなくても宅地に当たり正しい。イは社会福祉法人でも住宅貸借の媒介を業とすれば免許が必要、ウは用途地域外でも建物の敷地なら宅地に当たる、エは管理業者でも貸借の媒介を業とすれば免許が必要で、いずれも誤り。", "year": "H27-26", "diff": "A"}, {"id": "kako-gyoA-H30-41", "subject": "宅建業法", "topic": "宅地・建物の定義と免許", "type": "select", "q": "次の記述のうち、宅地建物取引業の免許を要する業務が含まれるものはどれか。", "choices": ["Ａ社は、所有する土地を 10 区画にほぼ均等に区分けしたうえで、それぞれの区画に戸建住宅を建築し、複数の者に貸し付けた。", "Ｂ社は、所有するビルの一部にコンビニエンスストアや食堂など複数のテナントの出店を募集し、その募集広告を自社のホームページに掲載したほか、多数の事業者に案内を行った結果、出店事業者が決まった。", "Ｃ社は賃貸マンションの管理業者であるが、複数の貸主から管理を委託されている物件について、入居者の募集、貸主を代理して行う賃貸借契約の締結、入居者からの苦情・要望の受付、入居者が退去した後の清掃などを行っている。", "Ｄ社は、多数の顧客から、顧客が所有している土地に住宅や商業用ビルなどの建物を建設することを請け負って、その対価を得ている。"], "answer": 2, "exp": "免許が必要なのは、Ｃ社が貸主を代理して賃貸借契約を締結する行為（貸借の代理は宅建業）だからＣが正解。Ａ社とＢ社は自ら貸す行為、Ｄ社は建物の建設請負で、いずれも宅建業に当たらず免許は不要。「自ら貸借」は宅建業に含まれない点がポイント。", "year": "H30-41", "diff": "A"}, {"id": "kako-gyoA-R1-42", "subject": "宅建業法", "topic": "宅地・建物の定義と免許", "type": "select", "q": "宅地建物取引業法第 2 条第 1 号に規定する宅地に関する次の記述のうち、誤っているものはどれか。", "choices": ["建物の敷地に供せられる土地は、都市計画法に規定する用途地域の内外を問わず宅地であるが、道路、公園、河川等の公共施設の用に供せられている土地は、用途地域内であれば宅地とされる。", "宅地とは、現に建物の敷地に供せられている土地に限らず、広く建物の敷地に供する目的で取引の対象とされた土地をいうものであり、その地目、現況の如何を問わない。", "都市計画法に規定する市街化調整区域内において、建物の敷地に供せられる土地は宅地である。", "都市計画法に規定する準工業地域内において、建築資材置場の用に供せられている土地は宅地である。"], "answer": 0, "exp": "誤りを選ぶ問題。肢1は説明が逆で、道路・公園・河川等は用途地域内であればむしろ宅地から除かれる。用途地域内は原則宅地だが、これら公共施設の用地は例外的に宅地とされないため、肢1が誤りで正解。他の肢は正しい記述。", "year": "R1-42", "diff": "A"}, {"id": "kako-gyoA-R2-12月-44", "subject": "宅建業法", "topic": "宅地・建物の定義と免許", "type": "select", "q": "宅地建物取引業法に関する次の記述のうち、正しいものはいくつあるか。ア 宅地には、現に建物の敷地に供されている土地に限らず、将来的に建物の敷地に供する目的で取引の対象とされる土地も含まれる。イ 農地は、都市計画法に規定する用途地域内に存するものであっても、宅地には該当しない。ウ 建物の敷地に供せられる土地であれば、都市計画法に規定する用途地域外に存するものであっても、宅地に該当する。エ 道路、公園、河川等の公共施設の用に供せられている土地は、都市計画法に規定する用途地域内に存するものであれば宅地に該当する。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "正しいのはアとウの二つなので「二つ」。アは将来建物の敷地にする目的の取引対象地も宅地で正しい、ウは用途地域外でも建物の敷地なら宅地で正しい。イは用途地域内の農地は宅地に当たるので誤り、エは公共施設の用地は用途地域内でも宅地に当たらないので誤り。", "year": "R2-12月-44", "diff": "A"}, {"id": "kako-gyoA-R3-10月-32", "subject": "宅建業法", "topic": "宅地・建物の定義と免許", "type": "select", "q": "宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、いずれの場合も、その行為を業として営むものとする。", "choices": ["Ａ社が、都市計画法に規定する用途地域外の土地であって、ソーラーパネルを設置するための土地の売買を媒介しようとする場合、免許は必要ない。", "Ｂ社が、土地区画整理事業の換地処分により取得した換地を住宅用地として分譲しようとする場合、免許は必要ない。", "農業協同組合Ｃが、組合員が所有する宅地の売却の代理をする場合、免許は必要ない。", "Ｄ社が、地方公共団体が定住促進策としてその所有する土地について住宅を建築しようとする個人に売却する取引の媒介をしようとする場合、免許は必要ない。"], "answer": 0, "exp": "正しいのは肢1。用途地域外では建物の敷地となる土地だけが宅地となるが、ソーラーパネルは建物ではないため設置用地は宅地に当たらず、その媒介に免許は不要。肢2は自ら分譲、肢3は農協でも代理、肢4は国等からの依頼を受ける者で、いずれも免許が必要。", "year": "R3-10月-32", "diff": "C"}, {"id": "kako-gyoA-R3-12月-34", "subject": "宅建業法", "topic": "宅地・建物の定義と免許", "type": "select", "q": "宅地、建物に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地とは、建物の敷地に供せられる土地をいい、道路、公園、河川、広場及び水路に供せられているものは宅地には当たらない。", "建物の一部の売買の代理を業として行う行為は、宅地建物取引業に当たらない。", "建物とは、土地に定着する工作物のうち、屋根及び柱若しくは壁を有するものをいうが、学校、病院、官公庁施設等の公共的な施設は建物には当たらない。", "宅地とは、現に建物の敷地に供せられている土地をいい、その地目、現況によって宅地に当たるか否かを判断する。"], "answer": 0, "exp": "正しいのは肢1で、道路・公園・河川・広場・水路の用地は宅地に当たらないという定義どおり。肢2は建物の一部の売買代理も宅建業に含まれるので誤り、肢3は学校・病院等の公共施設も建物に当たるので誤り、肢4は宅地は現況や地目で判断せず取引目的で判断するので誤り。", "year": "R3-12月-34", "diff": "A"}, {"id": "kako-gyoA-H27-41", "subject": "宅建業法", "topic": "業務に関する規制全般", "type": "select", "q": "宅地建物取引業者が売主である新築分譲マンションを訪れた買主Ａに対して、当該宅地建物取引業者の従業者Ｂが行った次の発言内容のうち、宅地建物取引業法の規定に違反しないものはいくつあるか。ア Ａ：眺望の良さが気に入った。隣接地は空地だが、将来の眺望は大丈夫なのか。Ｂ：\u0007 隣接地は、市有地で、現在、建築計画や売却の予定がないことを市に確認しました。将来、建つとしても公共施設なので、市が眺望を遮るような建物を建てることは絶対ありません。ご安心ください。イ Ａ：先日来たとき、 5 年後の転売で利益が生じるのが確実だと言われたが本当か。Ｂ：\u0007 弊社が数年前に分譲したマンションが、先日高値で売れました。このマンションはそれより立地条件が良く、また、近隣のマンション価格の動向から見ても、 5 年後値上がりするのは間違いありません。ウ Ａ：購入を検討している。貯金が少なく、手付金の負担が重いのだが。Ｂ：\u0007 弊社と提携している銀行の担当者から、手付金も融資の対象になっていると聞いております。ご検討ください。エ Ａ：Ｂ：\u0007 昨日、申込証拠金 10 万円を支払ったが、都合により撤回したいので申込証拠金を返してほしい。\u0007 お預かりした 10 万円のうち、社内規程上、お客様の個人情報保護のため、申込書の処分手数料として、5 ,000 円はお返しできませんが、残金につきましては法令に従いお返しします。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "exp": "違反しないのはウだけなので「一つ」。ウは提携銀行のローンあっせんにすぎず、手付の貸付けではないので違反しない。アは環境について断定的判断の提供、イは利益が確実との断定的判断の提供、エは申込撤回時の預り金返還拒否にあたり、いずれも違反する。", "year": "H27-41", "diff": "B"}, {"id": "kako-gyoA-H29-34", "subject": "宅建業法", "topic": "業務に関する規制全般", "type": "select", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、誤っているものはどれか。", "choices": ["宅地建物取引業者が、自ら売主として、宅地及び建物の売買の契約を締結するに際し、手付金について、当初提示した金額を減額することにより、買主に対し売買契約の締結を誘引し、その契約を締結させることは、法に違反しない。", "宅地建物取引業者が、アンケート調査をすることを装って電話をし、その目的がマンションの売買の勧誘であることを告げずに勧誘をする行為は、法に違反する。", "宅地建物取引業者が、宅地及び建物の売買の媒介を行うに際し、媒介報酬について、買主の要望を受けて分割受領に応じることにより、契約の締結を誘引する行為は、法に違反する。", "宅地建物取引業者が、手付金について信用の供与をすることにより、宅地及び建物の売買契約の締結を誘引する行為を行った場合、監督処分の対象となるほか、罰則の適用を受けることがある。"], "answer": 2, "exp": "誤りを選ぶ問題。肢3の媒介報酬の分割受領に応じる行為は禁止されておらず違反しないので、これが誤り（＝正解）。肢1の手付減額、肢4の手付信用供与の罰則、肢2の目的を告げない勧誘の記述はいずれも正しい。手付の貸付け等は禁止だが、代金や報酬の減額・分割は禁止されない点がポイント。", "year": "H29-34", "diff": "B"}, {"id": "kako-gyoA-R1-26", "subject": "宅建業法", "topic": "業務に関する規制全般", "type": "select", "q": "宅地建物取引業法に関する次の記述のうち、正しいものはどれか。", "choices": ["宅地建物取引業者は、自己の名義をもって、他人に、宅地建物取引業を営む旨の表示をさせてはならないが、宅地建物取引業を営む目的をもってする広告をさせることはできる。", "宅地建物取引業とは、宅地又は建物の売買等をする行為で業として行うものをいうが、建物の一部の売買の代理を業として行う行為は、宅地建物取引業に当たらない。", "宅地建物取引業の免許を受けていない者が営む宅地建物取引業の取引に、宅地建物取引業者が代理又は媒介として関与していれば、当該取引は無免許事業に当たらない。", "宅地建物取引業者の従業者が、当該宅地建物取引業者とは別に自己のために免許なく宅地建物取引業を営むことは、無免許事業に当たる。"], "answer": 3, "exp": "正しいのは肢4。従業者が会社とは別に自分のために無免許で宅建業を営めば無免許事業に当たる。肢1は広告をさせることも禁止、肢2は建物の一部の売買代理も宅建業に含まれる、肢3は業者が代理・媒介で関与しても無免許事業に当たり、いずれも誤り。", "year": "R1-26", "diff": "A"}, {"id": "kako-gyoA-R2-12月-36", "subject": "宅建業法", "topic": "業務に関する規制全般", "type": "select", "q": "宅地建物取引業者の守秘義務に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者は、依頼者本人の承諾があった場合でも、秘密を他に漏らしてはならない。", "宅地建物取引業者が、宅地建物取引業を営まなくなった後は、その業務上取り扱ったことについて知り得た秘密を他に漏らしても、法に違反しない。", "宅地建物取引業者は、裁判の証人として、その取り扱った宅地建物取引に関して証言を求められた場合、秘密に係る事項を証言することができる。", "宅地建物取引業者は、調査の結果判明した法第 35 条第 1 項各号に掲げる事項であっても、売主が秘密にすることを希望した場合は、買主に対して説明しなくてもよい。"], "answer": 2, "exp": "正しいのは肢3。裁判の証人として証言を求められた場合は守秘義務の例外（正当な理由）に当たり証言できる。肢1は本人の承諾があれば漏らしてよい、肢2は廃業後も守秘義務は続く、肢4は重要事項は売主が望んでも買主に説明が必要で、いずれも誤り。", "year": "R2-12月-36", "diff": "A"}, {"id": "kako-gyoA-R2-12月-40", "subject": "宅建業法", "topic": "業務に関する規制全般", "type": "select", "q": "宅地建物取引業法（以下この問において「法」という。）に規定する業務に関する禁止事項についての次の記述のうち、正しいものはどれか。", "choices": ["宅地建物取引業者が、マンション販売の勧誘をするに際し、相手方から購入を希望しない旨の返事があった後に、当該勧誘を継続することは法に違反しない。", "宅地建物取引業者は、契約の相手方に対して資金不足を理由に手付の貸付けを行ったが、契約締結後償還された場合は法に違反しない。", "宅地建物取引業者は、契約の締結の勧誘をするに際し、理由の如何を問わず、相手方に対して当該契約を締結するかどうかを判断するために必要な時間を与えることを拒んではならない。", "宅地建物取引業者は、勧誘の相手方が金銭的に不安であることを述べたため、売買代金の額を引き下げて、契約の締結を勧誘したとしても、法に違反しない。"], "answer": 3, "exp": "正しいのは肢4。売買代金の額を引き下げて勧誘することは禁止されていないので違反しない。肢1は購入を断った相手への勧誘継続は違反、肢2は手付貸付けは後で返済されても違反、肢3は正当な理由があれば時間を与えるのを拒めるので「理由の如何を問わず」が誤り。", "year": "R2-12月-40", "diff": "A"}, {"id": "kako-gyoA-R5-28", "subject": "宅建業法", "topic": "業務に関する規制全般", "type": "select", "q": "宅地建物取引業者Ａの業務に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定に違反するものはいくつあるか。ア Ａの従業員Ｂが、Ｃが所有する戸建住宅の買取りを目的とした訪問勧誘をＣに対して行ったところ、Ｃから「契約の意思がないので今後勧誘に来ないでほしい」と言われたことから、後日、Ａは、別の従業員Ｄに同じ目的で訪問勧誘を行わせて、当該勧誘を継続した。イ Ａの従業員Ｅは、Ｆが所有する戸建住宅の買取りを目的とした電話勧誘をＦに対して行った際に、不実のことと認識しながら「今後 5 年以内にこの一帯は再開発されるので、急いで売却した方がよい。」と説明した。ウ Ａの従業員Ｇは、Ｈが所有する戸建住宅の買取りを目的とした電話勧誘をＨに対して行おうと考え、23 時頃にＨの自宅に電話をかけ、勧誘を行い、Ｈの私生活の平穏を害し、Ｈを困惑させた。エＡは、Ｊとの間でＪが所有する戸建住宅を買い取る売買契約を締結し、法第 37 条の規定に基づく書面をＪに交付したが、Ａの宅地建物取引士に、当該書面に記名のみさせ、押印させることを省略した。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "exp": "違反するのはア・イ・ウの三つなので「三つ」。アは断りを受けた後に別の従業員で勧誘継続、イは不実のことを故意に告げる、ウは深夜23時の勧誘で困惑させる行為で、いずれも違反。エは37条書面は宅建士の記名のみでよく押印は不要なため違反しない。", "year": "R5-28", "diff": "A"}, {"id": "kako-gyoA-H27-44", "subject": "宅建業法", "topic": "事務所・案内所の規制", "type": "select", "q": "宅地建物取引業者Ａ（甲県知事免許）が乙県内に所在するマンション（100 戸）を分譲する場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["Ａが宅地建物取引業者Ｂに販売の代理を依頼し、Ｂが乙県内に案内所を設置する場合、Ａは、その案内所に、法第 50 条第 1 項の規定に基づく標識を掲げなければならない。", "Ａが案内所を設置して分譲を行う場合において、契約の締結又は契約の申込みの受付を行うか否かにかかわらず、その案内所に法第 50 条第 1 項の規定に基づく標識を掲げなければならない。", "Ａが宅地建物取引業者Ｃに販売の代理を依頼し、Ｃが乙県内に案内所を設置して契約の締結業務を行う場合、Ａ又はＣが専任の宅地建物取引士を置けばよいが、法第 50 条第 2 項の規定に基づく届出はＣがしなければならない。", "Ａが甲県内に案内所を設置して分譲を行う場合において、Ａは甲県知事及び乙県知事に、業務を開始する日の10日前までに法第 50 条第 2 項の規定に基づく届出をしなければならない。"], "answer": 1, "exp": "正しいのは肢2。業者Ａ自身が案内所を設置すれば、契約や申込みを受けるか否かに関係なく標識の掲示が必要。肢1・肢3は案内所を設置したＢ・Ｃが標識掲示や届出をする、肢4はＡが自県内に設置するので甲県知事だけに届出すればよく、いずれも誤り。", "year": "H27-44", "diff": "A"}, {"id": "kako-gyoA-H29-35", "subject": "宅建業法", "topic": "事務所・案内所の規制", "type": "select", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者は、自ら貸主として締結した建物の賃貸借契約について、法第 49 条に規定されている業務に関する帳簿に、法及び国土交通省令で定められた事項を記載しなければならない。", "宅地建物取引業者は、その業務に関する帳簿を、一括して主たる事務所に備えれば、従たる事務所に備えておく必要はない。", "宅地建物取引業者は、その業務に関する帳簿に報酬の額を記載することが義務付けられており、違反した場合は指示処分の対象となる。", "宅地建物取引業者は、その業務に従事する者であっても、一時的に事務の補助のために雇用した者については、従業者名簿に記載する必要がない。"], "answer": 2, "exp": "正しいのは肢3で、報酬の額は帳簿の記載事項であり、違反すると指示処分の対象になる。肢1は自ら貸主の行為は宅建業でなく帳簿記載不要、肢2は帳簿は事務所ごとに備える、肢4は一時的な補助者も従業者名簿に記載が必要で、いずれも誤り。", "year": "H29-35", "diff": "A"}, {"id": "kako-gyoA-R2-12月-41", "subject": "宅建業法", "topic": "事務所・案内所の規制", "type": "select", "q": "宅地建物取引業法第 49 条に規定する帳簿に関する次の記述のうち、正しいものはどれか。", "choices": ["宅地建物取引業者は、本店と複数の支店がある場合、支店には帳簿を備え付けず、本店に支店の分もまとめて備え付けておけばよい。", "宅地建物取引業者は、宅地建物取引業に関し取引のあったつど、その年月日、その取引に係る宅地又は建物の所在及び面積その他国土交通省令で定める事項を帳簿に記載しなければならない。", "宅地建物取引業者は、帳簿を各事業年度の末日をもって閉鎖するものとし、閉鎖後 5 年間当該帳簿を保存しなければならないが、自ら売主となり、又は売買の媒介をする新築住宅に係るものにあっては 10 年間保存しなければならない。", "宅地建物取引業者は、帳簿の記載事項を、事務所のパソコンのハードディスクに記録し、必要に応じ当該事務所においてパソコンやプリンターを用いて明確に紙面に表示する場合でも、当該記録をもって帳簿への記載に代えることができない。"], "answer": 1, "exp": "正しいのは肢2で、取引のつど年月日・所在・面積等を帳簿に記載する義務がある。肢1は帳簿は事務所ごとに備える、肢3は保存は閉鎖後5年で自ら売主の新築住宅のみ10年（媒介は5年）、肢4はパソコン記録でも紙面表示できれば帳簿に代えられるので、いずれも誤り。", "year": "R2-12月-41", "diff": "A"}, {"id": "kako-gyoA-R3-10月-29", "subject": "宅建業法", "topic": "事務所・案内所の規制", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者は、その事務所ごとに従業者の氏名、従業者証明書番号その他国土交通省令で定める事項を記載した従業者名簿を備えなければならず、当該名簿を最終の記載をした日から 5 年間保存しなければならない。", "宅地建物取引業者は、一団の宅地の分譲を行う案内所において宅地の売買の契約の締結を行わない場合、その案内所には国土交通省令で定める標識を掲示しなくてもよい。", "宅地建物取引業者が、一団の宅地の分譲を行う案内所において宅地の売買の契約の締結を行う場合、その案内所には国土交通大臣が定めた報酬の額を掲示しなければならない。", "宅地建物取引業者は、事務所以外の継続的に業務を行うことができる施設を有する場所であっても、契約（予約を含む。）を締結せず、かつ、その申込みを受けない場合、当該場所に専任の宅地建物取引士を置く必要はない。"], "answer": 3, "exp": "正しいのは肢4。事務所以外の施設でも契約締結も申込受付もしない場所には専任の宅建士を置く必要はない。肢1は従業者名簿の保存は10年、肢2は契約締結しない案内所でも標識は必要、肢3は報酬額の掲示は事務所のみで案内所は不要のため、いずれも誤り。", "year": "R3-10月-29", "diff": "B"}, {"id": "kako-gyoA-R3-10月-40", "subject": "宅建業法", "topic": "事務所・案内所の規制", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者は、その業務に関する帳簿を備え、取引のあったつど、その年月日、その取引に係る宅地又は建物の所在及び面積その他国土交通省令で定める事項を記載しなければならないが、支店及び案内所には備え付ける必要はない。", "成年である宅地建物取引業者は、宅地建物取引業の業務に関し行った行為について、行為能力の制限を理由に取り消すことができる。", "宅地建物取引業者は、一団の宅地建物の分譲をする場合における当該宅地又は建物の所在する場所に国土交通省令で定める標識を掲示しなければならない。", "宅地建物取引業者は、業務上取り扱ったことについて知り得た秘密に関し、税務署の職員から質問検査権の規定に基づき質問を受けたときであっても、回答してはならない。"], "answer": 2, "exp": "正しいのは肢3で、一団の宅地建物を分譲する物件の所在地には標識の掲示が必要。肢1は支店にも帳簿が必要、肢2は業者（未成年者除く）の業務行為は行為能力の制限で取り消せない、肢4は税務署の質問検査は正当な事由に当たり回答できるため、いずれも誤り。", "year": "R3-10月-40", "diff": "A"}, {"id": "kako-gyoA-R6-39", "subject": "宅建業法", "topic": "事務所・案内所の規制", "type": "select", "q": "宅地建物取引業法第 50 条第２項の届出をすべき場所に関する次の記述のうち、誤っているものはどれか。なお、これらの場所では、宅地若しくは建物の売買若しくは交換の契約（予約を含む。）若しくは宅地若しくは建物の売買、交換若しくは貸借の代理若しくは媒介の契約を締結し、又はこれらの契約の申込みを受けるものとする。", "choices": ["届出をすべき場所として、継続的に業務を行うことができる施設を有する場合で事務所以外のものが定められているが、当該場所には 1 名以上の成年者である専任の宅地建物取引士を置かなければならない。", "届出をすべき場所として、宅地建物取引業者が 10 区画以上の一団の宅地又は 10 戸以上の一団の建物の分譲（以下この問において「一団の宅地建物の分譲」という。）をする場合に設置する案内所が定められているが、当該案内所が土地に定着する建物内に設けられる場合、クーリング・オフ制度の適用が除外される。", "届出をすべき場所として、他の宅地建物取引業者が行う一団の宅地建物の分譲の代理又は媒介をする場合に設置する案内所が定められており、この場合は、代理又は媒介を行う宅地建物取引業者が届出をするが、売主業者自身も当該案内所で売買契約の申込みを受ける場合は、売主業者も届出をする。", "届出をすべき場所として、宅地建物取引業者が業務に関し展示会その他これに類する催しを実施する場所が定められているが、その催しを開始する 10 日前までに、実施場所を管轄する都道府県知事に届け出なければならず、免許を受けた国土交通大臣又は都道府県知事に届け出る必要はない。"], "answer": 3, "exp": "誤りを選ぶ問題。肢4は展示会等の届出も、免許権者と所在地の知事の両方に届け出る必要があるため、実施場所の知事だけでよいとする点が誤りで正解。肢1の専任宅建士設置、肢2のクーリング・オフ除外、肢3の売主業者も届出という各記述は正しい。", "year": "R6-39", "diff": "B"}, {"id": "kako-gyoA-R2-10月-39", "subject": "宅建業法", "topic": "従業者証明書・従業者名簿", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者は、従業者名簿の閲覧の請求があったときは、取引の関係者か否かを問わず、請求した者の閲覧に供しなければならない。", "宅地建物取引業者は、その業務に従事させる者に従業者証明書を携帯させなければならず、その者が宅地建物取引士であり、宅地建物取引士証を携帯していても、従業者証明書を携帯させなければならない。", "宅地建物取引業者は、その事務所ごとに従業者名簿を備えなければならないが、退職した従業者に関する事項は、個人情報保護の観点から従業者名簿から消去しなければならない。", "宅地建物取引業者は、その業務に従事させる者に従業者証明書を携帯させなければならないが、その者が非常勤の役員や単に一時的に事務の補助をする者である場合には携帯させなくてもよい。"], "answer": 1, "exp": "正しいのは肢2。宅建士証を携帯していても従業者証明書は別に携帯させる必要がある。肢1は名簿の閲覧は取引の関係者からの請求時に限る、肢3は退職者の情報も10年保存で消去できない、肢4は非常勤役員や一時的補助者にも証明書携帯が必要で、いずれも誤り。", "year": "R2-10月-39", "diff": "A"}, {"id": "kako-gyoA-R5-37", "subject": "宅建業法", "topic": "従業者証明書・従業者名簿", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["宅地建物取引業者は、非常勤役員には従業者であることを証する証明書を携帯させる必要はない。", "宅地建物取引業者は、その事務所ごとに従業者名簿を備えなければならないが、取引の関係者から閲覧の請求があった場合であっても、宅地建物取引業法第 45 条に規定する秘密を守る義務を理由に、閲覧を拒むことができる。", "宅地建物取引業者の従業者は、宅地の買受けの申込みをした者から請求があった場合には、その者が宅地建物取引業者であっても、その者に従業者であることを証する証明書を提示する必要がある。", "宅地建物取引業者は、従業者名簿を最終の記載をした日から 5 年間保存しなければならない。"], "answer": 2, "exp": "正しいのは肢3。従業者は取引関係者の請求があれば、相手が業者であっても従業者証明書を提示する必要がある。肢1は非常勤役員にも証明書携帯が必要、肢2は守秘義務を理由に名簿閲覧は拒めない、肢4は名簿の保存は10年で、いずれも誤り。", "year": "R5-37", "diff": "A"}, {"id": "kako-gyoA-H27-28", "subject": "宅建業法", "topic": "媒介・代理契約の規制", "type": "select", "q": "宅地建物取引業者Ａが行う業務に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはいくつあるか。なお、電磁的方法は考慮しないものとする。（改題）ア Ａは、Ｂが所有する甲宅地の売却に係る媒介の依頼を受け、Ｂと専任媒介契約を締結した。このとき、Ａは、法第 34 条の 2 第 1 項に規定する書面に記名押印し、Ｂに交付のうえ、宅地建物取引士をしてその内容を説明させなければならない。イ Ａは、Ｃが所有する乙アパートの売却に係る媒介の依頼を受け、Ｃと専任媒介契約を締結した。このとき、Ａは、乙アパートの所在、規模、形質、売買すべき価額、依頼者の氏名、都市計画法その他の法令に基づく制限で主要なものを指定流通機構に登録しなければならない。ウ Ａは、Ｄが所有する丙宅地の貸借に係る媒介の依頼を受け、Ｄと専任媒介契約を締結した。このとき、Ａは、Ｄに法第 34 条の 2 第 1 項に規定する書面を交付しなければならない。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 3, "exp": "正しいものはなく答えは「なし」。アは媒介契約書の内容を宅建士に説明させる義務はない、イは指定流通機構への登録事項に依頼者の氏名は含まれない、ウは貸借の媒介では34条の2の書面交付は不要で、いずれも誤り。媒介契約の規制は売買・交換のみで貸借は対象外。", "year": "H27-28", "diff": "A"}, {"id": "kako-gyoA-H27-30", "subject": "宅建業法", "topic": "媒介・代理契約の規制", "type": "select", "q": "宅地建物取引業者Ａは、Ｂが所有する宅地の売却を依頼され、専任媒介契約を締結した。この場合における次の記述のうち、宅地建物取引業法の規定に違反するものはいくつあるか。なお、電磁的方法は考慮しないものとする。（改題）ア Ａは、Ｂが宅地建物取引業者であったので、宅地建物取引業法第 34 条の 2 第 1 項に規定する書面を作成しなかった。イ Ａは、Ｂの要望により、指定流通機構に当該宅地を登録しない旨の特約をし、指定流通機構に登録しなかった。ウ Ａは、短期間で売買契約を成立させることができると判断したので指定流通機構に登録せず、専任媒介契約締結の日の 9 日後に当該売買契約を成立させた。エ Ａは、当該契約に係る業務の処理状況の報告日を毎週金曜日とする旨の特約をした。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "exp": "違反するのはア・イ・ウの三つなので「三つ」。アは業者間でも媒介契約書の作成が必要、イは専任なら依頼者の要望でも登録義務があり不登録の特約は無効、ウは専任は7日以内に登録が必要（9日後成立でも登録義務違反）で、いずれも違反。エは報告日を毎週金曜は2週に1回以上を満たし違反しない。", "year": "H27-30", "diff": "A"}, {"id": "kako-gyoA-H28-27", "subject": "宅建業法", "topic": "媒介・代理契約の規制", "type": "select", "q": "宅地建物取引業者Ａが、ＢからＢ所有の宅地の売却に係る媒介を依頼された場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。なお、この問において一般媒介契約とは、専任媒介契約でない媒介契約をいい、電磁的方法は考慮しないものとする。（改題）", "choices": ["ＡがＢと一般媒介契約を締結した場合、当該一般媒介契約が国土交通大臣が定める標準媒介契約約款に基づくものであるか否かの別を、法第 34 条の 2 第 1 項に規定する書面に記載する必要はない。", "ＡがＢと専任媒介契約を締結した場合、当該宅地の売買契約が成立しても、当該宅地の引渡しが完了していなければ、売買契約が成立した旨を指定流通機構に通知する必要はない。", "ＡがＢと一般媒介契約を締結した場合、当該宅地の売買の媒介を担当するＡの宅地建物取引士は、法第 34 条の 2 第 1 項に規定する書面に記名押印する必要はない。", "Ａは、Ｂとの間で締結した媒介契約が一般媒介契約であるか、専任媒介契約であるかを問わず、法第 34 条の 2 第 1 項に規定する書面に売買すべき価額を記載する必要はない。"], "answer": 2, "exp": "正しいのは肢3。媒介契約書に記名押印するのは業者であり、担当の宅建士が記名押印する必要はない。肢1は標準約款に基づくか否かは記載事項、肢2は契約成立時は引渡し前でも指定流通機構への通知が必要、肢4は一般・専任問わず売買価額の記載が必要で、いずれも誤り。", "year": "H28-27", "diff": "A"}, {"id": "kako-gyoA-H29-43", "subject": "宅建業法", "topic": "媒介・代理契約の規制", "type": "select", "q": "宅地建物取引業者Ａが、ＢからＢ所有の中古マンションの売却の依頼を受け、Ｂと専任媒介契約（専属専任媒介契約ではない媒介契約）を締結した場合に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはいくつあるか。なお、電磁的方法は考慮しないものとする。（改題）ア Ａは、 2 週間に 1 回以上当該専任媒介契約に係る業務の処理状況をＢに報告しなければならないが、これに加え、当該中古マンションについて購入の申込みがあったときは、遅滞なく、その旨をＢに報告しなければならない。イ 当該専任媒介契約の有効期間は、 3 月を超えることができず、また、依頼者の更新しない旨の申出がなければ自動更新とする旨の特約も認められない。ただし、Ｂが宅地建物取引業者である場合は、ＡとＢの合意により、自動更新とすることができる。ウ Ａは、当該専任媒介契約の締結の日から 7 日（ただし、Ａの休業日は含まな
