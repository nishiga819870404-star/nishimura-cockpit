き書面に記載しなければならない。エ ＡがＢとの間で一般媒介契約を締結した場合、ＡがＢに対し当該宅地の価額について意見を述べるときは、不動産鑑定士に評価を依頼して、その根拠を明らかにしなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 0, "exp": "正しいのはウだけなので「一つ」。ウは明示義務型の一般媒介で、明示していない他業者の媒介で成立したときの措置を書面に記載する必要があり正しい。アは登録しない特約は無効で登録義務がある、イは専任の報告は2週に1回以上、エは価額の根拠は鑑定士でなくてよく、いずれも誤り。", "year": "R2-12月-28", "diff": "A"}, {"id": "kako-gyoA-R3-10月-38", "subject": "宅建業法", "topic": "媒介・代理契約の規制", "type": "select", "q": "宅地建物取引業者Ａが、宅地建物取引業者ＢからＢ所有の建物の売却を依頼され、Ｂと一般媒介契約（以下この問において「本件契約」という。）を締結した場合に関する次の記述のうち、宅地建物取引業法の規定に違反しないものはいくつあるか。なお、電磁的方法は考慮しないものとする。（改題）ア 本件契約を締結する際に、Ｂから有効期間を 6 か月としたい旨の申出があったが、ＡとＢが協議して、有効期間を 3 か月とした。イ 当該物件に係る買受けの申込みはなかったが、ＡはＢに対し本件契約に係る業務の処理状況の報告を口頭により 14 日に 1 回以上の頻度で行った。ウ Ａは本件契約を締結した後、所定の事項を遅滞なく指定流通機構に登録したが、その登録を証する書面を、登録してから 14 日後にＢに交付した。エ 本件契約締結後、 1 年を経過しても当該物件を売却できなかったため、Ｂは売却をあきらめ、当該物件を賃貸することにした。そこでＢはＡと当該物件の貸借に係る一般媒介契約を締結したが、当該契約の有効期間を定めなかった。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "exp": "違反しないものは全部で「四つ」。一般媒介には、アの有効期間の制限、イの業務報告義務、ウの登録・書面引渡し義務がいずれもなく違反しない。エも貸借の媒介は媒介契約の規制の対象外で有効期間を定めなくても違反しない。すべて一般媒介や貸借ゆえ規制がかからない。", "year": "R3-10月-38", "diff": "B"}, {"id": "kako-gyoA-R3-12月-33", "subject": "宅建業法", "topic": "媒介・代理契約の規制", "type": "select", "q": "宅地建物取引業者Ａは、ＢからＢ所有の宅地の売却について媒介の依頼を受けた。この場合における次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、この問において「専任媒介契約」とは、専属専任媒介契約ではない専任媒介契約をいい、電磁的方法は考慮しないものとする。（改題）ア ＡがＢとの間で専任媒介契約を締結した場合、ＡはＢに対して、当該専任媒介契約に係る業務の処理状況を 1 週間に 1 回以上報告しなければならない。イ ＡがＢとの間で専任媒介契約を締結した場合、Ｂの要望により当該宅地を指定流通機構に登録しない旨の特約をしているときを除き、Ａは、当該専任媒介契約締結日から 7 日以内（休業日数を含まない。）に、指定流通機構に当該宅地の所在等を登録しなければならない。ウ ＡがＢとの間で一般媒介契約を締結した場合、ＡはＢに対して、遅滞なく、宅地建物取引業法第 34 条の 2 第 1 項の規定に基づく書面を交付しなければならない。エ ＡがＢとの間で一般媒介契約を締結した場合、ＡがＢに対し当該宅地の価額又は評価額について意見を述べるときは、その根拠を明らかにしなければならないが、根拠の明示は口頭でも書面を用いてもよい。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "正しいのはウとエの二つなので「二つ」。ウは一般媒介でも売買・交換なら媒介契約書の交付が必要で正しい、エは価額の根拠明示は口頭でも書面でもよく正しい。アは専任の報告は2週に1回以上（1週ではない）、イは特約の有無を問わず7日以内の登録義務があり、いずれも誤り。", "year": "R3-12月-33", "diff": "B"}, {"id": "kako-gyoA-R4-31", "subject": "宅建業法", "topic": "媒介・代理契約の規制", "type": "select", "q": "宅地建物取引業者Ａが、ＢからＢ所有の土地付建物の売却について媒介の依頼を受けた場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["Ａが、Ｂと一般媒介契約を締結した場合、ＡがＢに対し当該土地付建物の価額について意見を述べるために行った価額の査定に要した費用をＢに請求することはできない。", "Ａは、Ｂとの間で締結した媒介契約が一般媒介契約である場合には、専任媒介契約の場合とは異なり、法第 34 条の 2 第 1 項の規定に基づく書面に、売買すべき価額を記載する必要はない。", "Ａが、Ｂとの間で締結した専任媒介契約については、Ｂからの申出により更新することができ、その後の有効期間については、更新の時から 3 か月を超える内容に定めることができる。", "Ａが、当該土地付建物の購入の媒介をＣから依頼され、Ｃとの間で一般媒介契約を締結した場合、Ａは、買主であるＣに対しては、必ずしも法第 34 条の 2 第 1 項の規定に基づく書面を交付しなくともよい。"], "answer": 0, "exp": "正しいのは肢1。価額の意見を述べるための査定費用は、契約の種類を問わず依頼者に請求できない。肢2は一般でも売買価額の記載が必要、肢3は更新後も3か月を超える期間は定められない、肢4は買主に対しても媒介契約書の交付が必要で、いずれも誤り。", "year": "R4-31", "diff": "A"}, {"id": "kako-gyoA-R4-42", "subject": "宅建業法", "topic": "媒介・代理契約の規制", "type": "select", "q": "宅地建物取引業者Ａが、ＢからＢ所有の宅地の売却を依頼され、Ｂと専属専任媒介契約（以下この問において「本件媒介契約」という。）を締結した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、電磁的記録は考慮しないものとする。（改題）", "choices": ["ＡはＢに対して、契約の相手方を探索するために行った措置など本件媒介契約に係る業務の処理状況を 2 週間に 1 回以上報告しなければならない。", "ＡがＢに対し当該宅地の価額又は評価額について意見を述べるときは、その根拠を明らかにしなければならないが、根拠の明示は口頭でも書面を用いてもどちらでもよい。", "本件媒介契約の有効期間について、あらかじめＢからの書面による申出があるときは、 3か月を超える期間を定めることができる。", "Ａは所定の事項を指定流通機構に登録した場合、Ｂから引渡しの依頼がなければ、その登録を証する書面をＢに引き渡さなくてもよい。"], "answer": 1, "exp": "正しいのは肢2で、価額・評価額の根拠の明示は口頭でも書面でもよい。肢1は専属専任の報告は1週に1回以上（2週ではない）、肢3は書面の申出があっても有効期間は3か月を超えられない、肢4は依頼者の依頼がなくても登録を証する書面の引渡しが必要で、いずれも誤り。", "year": "R4-42", "diff": "A"}, {"id": "kako-gyoA-R5-27", "subject": "宅建業法", "topic": "媒介・代理契約の規制", "type": "select", "q": "宅地建物取引業法第 34 条の 2 第 1 項第 4 号に規定する建物状況調査（以下この問において「建物状況調査」という。）に関する次の記述のうち、誤っているものはどれか。", "choices": ["建物状況調査とは、建物の構造耐力上主要な部分又は雨水の浸入を防止する部分として国土交通省令で定めるものの状況の調査であって、経年変化その他の建物に生じる事象に関する知識及び能力を有する者として国土交通省令で定める者が実施するものをいう。", "宅地建物取引業者が建物状況調査を実施する者のあっせんを行う場合、建物状況調査を実施する者は建築士法第 2 条第 1 項に規定する建築士であって国土交通大臣が定める講習を修了した者でなければならない。", "既存住宅の売買の媒介を行う宅地建物取引業者が売主に対して建物状況調査を実施する者のあっせんを行った場合、宅地建物取引業者は売主から報酬とは別にあっせんに係る料金を受領することはできない。", "既存住宅の貸借の媒介を行う宅地建物取引業者は、宅地建物取引業法第 37 条の規定により交付すべき書面に建物の構造耐力上主要な部分等の状況について当事者の双方が確認した事項を記載しなければならない。"], "answer": 3, "exp": "誤りを選ぶ問題。肢4は貸借の媒介では、構造耐力上主要な部分等について双方が確認した事項を37条書面に記載する義務はないため、これが誤りで正解（記載が必要なのは売買・交換の場合）。肢1の定義、肢2のあっせん者の要件、肢3の料金受領不可という各記述は正しい。", "year": "R5-27", "diff": "A"}, {"id": "kako-gyoA-R5-40", "subject": "宅建業法", "topic": "媒介・代理契約の規制", "type": "select", "q": "宅地建物取引業者Ａが、ＢからＢ所有の中古住宅の売却の依頼を受け、専任媒介契約（専属専任媒介契約ではないものとする。）を締結した場合に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["Ａは、当該中古住宅について購入の申込みがあったときは、遅滞なく、その旨をＢに報告しなければならないが、Ｂの希望条件を満たさない申込みだとＡが判断した場合については報告する必要はない。", "Ａは、法第 34 条の 2 第 1 項の規定に基づく書面の交付後、速やかに、Ｂに対し、法第 34条の 2 第 1 項第 4 号に規定する建物状況調査を実施する者のあっせんの有無について確認しなければならない。", "Ａは、当該中古住宅について法で規定されている事項を、契約締結の日から休業日数を含め 7 日以内に指定流通機構へ登録する義務がある。", "Ａは、Ｂが他の宅地建物取引業者の媒介又は代理によって売買の契約を成立させたときの措置を法第 34 条の 2 第 1 項の規定に基づく書面に記載しなければならない。"], "answer": 3, "exp": "正しいのは肢4で、依頼者が他業者の媒介等で契約を成立させたときの措置を媒介契約書に記載する必要がある。肢1は業者の判断で申込みの報告を省略できない、肢2はあっせんの有無は書面交付後でなく契約時に記載、肢3は7日の計算に休業日は算入しないため、いずれも誤り。", "year": "R5-40", "diff": "B"}, {"id": "kako-gyoA-R6-32", "subject": "宅建業法", "topic": "媒介・代理契約の規制", "type": "select", "q": "宅地建物取引業者Ａが、ＢからＢ所有の中古住宅の売却の依頼を受け、Ｂと専任媒介契約（専属専任媒介契約ではないものとする。）を締結した。この場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["Ａは当該中古住宅の売買契約が成立しても、当該中古住宅の引渡しが完了していなければ、売買契約が成立した旨を指定流通機構に通知する必要はない。", "Ｂが宅地建物取引業者である場合は、当該契約が国土交通大臣が定める標準媒介契約約款に基づくものであるか否かの別を、法第 34 条の 2 第 1 項に規定する書面に記載する必要はない。", "Ａに対して当該中古住宅について買受けの申込みがなかった場合でも、ＡはＢに対して、当該契約に係る業務の処理状況を 2 週間に 1 回以上報告しなければならないが、その報告は必ずしも書面で行う必要はない。", "Ｂが当該中古住宅について、法第 34 条の 2 第 1 項第 4 号に規定する建物状況調査を実施する者のあっせんを希望しなかった場合は、Ａは同項に規定する書面に同調査を実施する者のあっせんに関する事項を記載する必要はない。"], "answer": 2, "exp": "正しいのは肢3で、専任媒介の2週に1回以上の業務処理状況の報告は、書面でなく口頭等でもよい。肢1は契約成立時は引渡し前でも指定流通機構への通知が必要、肢2は業者間でも標準約款の別の記載が必要、肢4はあっせんを希望しなくてもその旨の記載が必要で、いずれも誤り。", "year": "R6-32", "diff": "A"}, {"id": "kako-gyoA-H29-42", "subject": "宅建業法", "topic": "誇大広告等の禁止", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。ア 宅地の販売広告において、宅地の将来の環境について、著しく事実に相違する表示をしてはならない。イ 宅地又は建物に係る広告の表示項目の中に、取引物件に係る現在又は将来の利用の制限があるが、この制限には、都市計画法に基づく利用制限等の公法上の制限だけではなく、借地権の有無等の私法上の制限も含まれる。ウ 顧客を集めるために売る意思のない条件の良い物件を広告することにより他の物件を販売しようとした場合、取引の相手方が実際に誤認したか否か、あるいは損害を受けたか否かにかかわらず、監督処分の対象となる。エ 建物の売却について代理を依頼されて広告を行う場合、取引態様として、代理であることを明示しなければならないが、その後、当該物件の購入の注文を受けたとき、広告を行った時点と取引態様に変更がない場合でも、遅滞なく、その注文者に対し取引態様を明らかにしなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "exp": "正しいものは全部で「四つ」。アは将来の環境の著しい虚偽表示の禁止、イは利用制限に私法上の制限も含む、ウはおとり広告は誤認や損害の有無を問わず処分対象、エは態様に変更がなくても注文時に取引態様の明示が必要で、いずれも正しい。", "year": "H29-42", "diff": "A"}, {"id": "kako-gyoA-R6-33", "subject": "宅建業法", "topic": "誇大広告等の禁止", "type": "select", "q": "宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、誤っているものはどれか。", "choices": ["宅地の販売に関する広告をインターネットで行った場合において、当該宅地の売買契約が成立した後も継続して広告を掲載していた場合、当該広告を掲載し続けることは法第 32条の規定に違反する。", "建物の所有者と賃貸借契約を締結し、当該建物を自らが貸主となって貸借（転貸）するための広告をする場合においては、自らが契約の当事者となって貸借を成立させる旨を当該広告に明示しなくても、法第 34 条の規定に違反しない。", "造成工事に必要とされる法令に基づく許可等の処分があった宅地について、工事完了前に当該宅地の販売に関する広告をするときは、法令に基づく許可等の処分があったことを明示すれば、取引態様の別について明示する必要はない。", "複数の区画がある分譲地の売買について、数回に分けて広告をする場合は、最初に行う広告だけではなく、次回以降の広告の都度取引態様の別を明示しなければならない。"], "answer": 2, "exp": "誤りを選ぶ問題。肢3は、広告開始時期の制限と取引態様の明示は別の制度であり、許可を明示しても取引態様の別は明示しなければならないため誤りで正解。肢1の契約成立後のおとり広告、肢2の自ら転貸は明示不要、肢4の数回広告は都度明示という各記述は正しい。", "year": "R6-33", "diff": "A"}, {"id": "kako-gyoA-H28-32", "subject": "宅建業法", "topic": "広告開始時期の制限", "type": "select", "q": "宅地建物取引業者Ａ（甲県知事免許）がその業務に関して広告を行った場合における次の記述のうち、宅地建物取引業法の規定に違反しないものはどれか。", "choices": ["Ａは、宅地の造成に当たり、工事に必要とされる許可等の処分があった宅地について、当該処分があったことを明示して、工事完了前に、当該宅地の販売に関する広告を行った。", "Ａは、自ら売主として新築マンションを分譲するに当たり、建築基準法第 6 条第 1 項の確認の申請中であったため、「建築確認申請済」と明示して、当該建物の販売に関する広告を行い、建築確認を受けた後に売買契約を締結した。", "Ａは、中古の建物の売買において、当該建物の所有者Ｂから媒介の依頼を受け、取引態様の別を明示せずに自社ホームページに広告を掲載したが、広告を見た者からの問い合わせはなく、契約成立には至らなかった。", "Ａは、甲県知事から業務の全部の停止を命じられ、その停止の期間中に未完成の土地付建物の販売に関する広告を行ったが、当該土地付建物の売買の契約は当該期間の経過後に締結した。"], "answer": 0, "exp": "違反しないのは肢1。造成の許可等の処分後であれば、工事完了前でも広告できる。肢2は建築確認申請中の広告は不可、肢3は取引態様は契約に至らなくても明示が必要、肢4は業務停止期間中の広告は契約が期間経過後でも違反となり、いずれも違反する。", "year": "H28-32", "diff": "A"}, {"id": "kako-gyoA-H30-26", "subject": "宅建業法", "topic": "広告開始時期の制限", "type": "select", "q": "宅地建物取引業者が行う広告に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。（改題）", "choices": ["宅地の売買に関する広告をインターネットで行った場合において、当該宅地の売買契約成立後に継続して広告を掲載していたとしても、当該広告の掲載を始めた時点で当該宅地に関する売買契約が成立していなかったときは、法第 32 条に規定する誇大広告等の禁止に違反しない。", "販売する宅地又は建物の広告に著しく事実に相違する表示をした場合、監督処分の対象となるほか、 6 月以下の拘禁刑及び 100 万円以下の罰金を併科されることがある。", "建築基準法第 6 条第 1 項の確認を申請中の建物については、当該建物の売買の媒介に関する広告をしてはならないが、貸借の媒介に関する広告はすることができる。", "宅地建物取引業者がその業務に関して広告をするときは、実際のものより著しく優良又は有利であると人を誤認させるような表示をしてはならないが、宅地又は建物に係る現在又は将来の利用の制限の一部を表示しないことによりそのような誤認をさせる場合は、法第32 条に規定する誇大広告等の禁止に違反しない。"], "answer": 1, "exp": "広告に著しく事実に相違する表示をすると誇大広告等の禁止に違反し、指示・業務停止などの監督処分だけでなく、6月以下の拘禁刑や100万円以下の罰金が科され、両方併科されることもあります。よって選択肢2が正しい記述です。", "year": "H30-26", "diff": "A"}, {"id": "kako-gyoA-R2-10月-27", "subject": "宅建業法", "topic": "広告開始時期の制限", "type": "select", "q": "宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。ア 建物の売却について代理を依頼されて広告を行う場合、取引態様として、代理であることを明示しなければならないが、その後、当該物件の購入の注文を受けたときは、広告を行った時点と取引態様に変更がない場合を除き、遅滞なく、その注文者に対し取引態様を明らかにしなければならない。イ 広告をするに当たり、実際のものよりも著しく優良又は有利であると人を誤認させるような表示をしてはならないが、誤認させる方法には限定がなく、宅地又は建物に係る現在又は将来の利用の制限の一部を表示しないことにより誤認させることも禁止されている。ウ 複数の区画がある宅地の売買について、数回に分けて広告をする場合は、広告の都度取引態様の別を明示しなければならない。エ 宅地の造成又は建物の建築に関する工事の完了前においては、当該工事に必要な都市計画法に基づく開発許可、建築基準法に基づく建築確認その他法令に基づく許可等の申請をした後でなければ、当該工事に係る宅地又は建物の売買その他の業務に関する広告をしてはならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "アは注文を受けたときも取引態様の明示が必要で、変更がなくても省略できないため誤り。エは許可等を申請しただけでは足りず処分後でなければ広告できないため誤り。イ（不表示による誤認も禁止）とウ（数回に分ける都度の明示）が正しく、正しいのは二つです。", "year": "R2-10月-27", "diff": "A"}, {"id": "kako-gyoA-R2-12月-27", "subject": "宅建業法", "topic": "広告開始時期の制限", "type": "select", "q": "宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["広告の表示が実際のものよりも著しく優良又は有利であると人を誤認させるようなものであっても、誤認による損害が実際に発生していなければ、監督処分の対象とならない。", "宅地建物取引業者は、建築確認申請中の建物について、建築確認申請中である旨を表示すれば、自ら売主として当該建物を販売する旨の広告をすることができる。", "宅地建物取引業者は、宅地の造成工事の完了前においては、当該造成工事に必要とされる許可等の処分があった後であれば、当該宅地の販売に関する広告をすることができる。", "テレビやインターネットを利用して行う広告は、新聞の折込チラシや配布用のチラシと異なり、規制の対象とならない。"], "answer": 2, "exp": "未完成物件でも、必要な許可等の処分を受けた後であれば販売広告ができます。造成工事完了前でも許可後なら広告可とする選択肢3が正しい記述です。誇大広告は損害の有無を問わず処分対象、建築確認申請中は広告不可、テレビやネット広告も規制対象です。", "year": "R2-12月-27", "diff": "A"}, {"id": "kako-gyoA-R4-37", "subject": "宅建業法", "topic": "広告開始時期の制限", "type": "select", "q": "宅地建物取引業者Ａがその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはいくつあるか。ア Ａが未完成の建売住宅を販売する場合、建築基準法第 6 条第 1 項に基づく確認を受けた後、同項の変更の確認の申請書を提出している期間においては、変更の確認を受ける予定であることを表示し、かつ、当初の確認内容を合わせて表示すれば、変更の確認の内容を広告することができる。イ Ａが新築住宅の売買に関する広告をインターネットで行った場合、実際のものより著しく優良又は有利であると人を誤認させるような表示を行ったが、当該広告について問合せや申込みがなかったときは、法第 32 条に定める誇大広告等の禁止の規定に違反しない。ウ Ａが一団の宅地の販売について、数回に分けて広告をするときは、そのたびごとに広告へ取引態様の別を明示しなければならず、当該広告を見た者から売買に関する注文を受けたときも、改めて取引態様の別を明示しなければならない。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 1, "exp": "アは当初確認の後、変更確認の申請中に変更予定である旨と当初確認内容を併記すれば変更内容を広告できるので正しい。ウは広告の都度も注文時も取引態様の明示が必要で正しい。イは問合せや申込がなくても誇大広告違反となり誤り。正しいのは二つです。", "year": "R4-37", "diff": "B"}, {"id": "kako-gyoA-R5-31", "subject": "宅建業法", "topic": "広告開始時期の制限", "type": "select", "q": "宅地建物取引業者がその業務に関して行う広告に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。なお、この問において「建築確認」とは、建築基準法第 6 条第 1 項の確認をいうものとする。（改題）", "choices": ["宅地又は建物の売買に関する注文を受けたときは、遅滞なくその注文をした者に対して取引態様の別を明らかにしなければならないが、当該注文者が事前に取引態様の別を明示した広告を見てから注文してきた場合においては、取引態様の別を遅滞なく明らかにする必要はない。", "既存の住宅に関する広告を行うときは、法第 34 条の 2 第 1 項第 4 号に規定する建物状況調査を実施しているかどうかを明示しなければならない。", "これから建築工事を行う予定である建築確認申請中の建物については、当該建物の売買の媒介に関する広告をしてはならないが、貸借の媒介に関する広告はすることができる。", "販売する宅地又は建物の広告に関し、著しく事実に相違する表示をした場合、監督処分の対象となるだけでなく、拘禁刑若しくは罰金に処せられ、又はこれを併科されることもある。"], "answer": 3, "exp": "広告に著しく事実に相違する表示をすると誇大広告等の禁止に違反し、監督処分の対象になるだけでなく、拘禁刑や罰金に処され、併科されることもあります。よって選択肢4が正しい記述です。", "year": "R5-31", "diff": "A"}, {"id": "kako-gyoA-H27-29", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明及び書面の交付に関する次の記述のうち、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["宅地建物取引業者ではない売主に対しては、買主に対してと同様に、宅地建物取引士をして、契約締結時までに重要事項を記載した書面を交付して、その説明をさせなければならない。", "重要事項の説明及び書面の交付は、取引の相手方の自宅又は勤務する場所等、宅地建物取引業者の事務所以外の場所において行うことができる。", "宅地建物取引業者が代理人として売買契約を締結し、建物の購入を行う場合は、代理を依頼した者（宅地建物取引業者でない）に対して重要事項の説明をする必要はない。", "重要事項の説明を行う宅地建物取引士は専任の宅地建物取引士でなくてもよいが、書面に記名する宅地建物取引士は専任の宅地建物取引士でなければならない。"], "answer": 1, "exp": "重要事項の説明や書面交付を行う場所に法律上の制限はなく、相手方の自宅や勤務先など宅建業者の事務所以外でも行えます。よって選択肢2が正しい記述です。", "year": "H27-29", "diff": "A"}, {"id": "kako-gyoA-H27-32", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとし、電磁的方法は考慮しないものとする。（改題）", "choices": ["建物の売買の媒介に関し、受領しようとする預り金について保全措置を講ずる場合において、預り金の額が売買代金の額の 100 分の 10 以下であるときは、その措置の概要を説明する必要はない。", "宅地の貸借の媒介を行う場合、当該宅地について借地借家法第 22 条に規定する定期借地権を設定しようとするときは、その旨を説明しなければならない。", "建物の貸借の媒介を行う場合、消費生活用製品安全法に規定する特定保守製品の保守点検に関する事項を説明しなければならない。", "建物の貸借の媒介を行う場合、契約の期間については説明する必要があるが、契約の更新については、宅地建物取引業法第 37 条の規定により交付すべき書面への記載事項であり、説明する必要はない。"], "answer": 1, "exp": "宅地の貸借の媒介で借地借家法22条の定期借地権を設定しようとするときは、その旨を重要事項として説明しなければなりません。よって選択肢2が正しい記述です。", "year": "H27-32", "diff": "B"}, {"id": "kako-gyoA-H29-33", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとし、電磁的方法は考慮しないものとする。（改題）", "choices": ["宅地の売買の媒介を行う場合、売買の各当事者すなわち売主及び買主に対して、書面を交付して説明しなければならない。", "宅地の売買の媒介を行う場合、代金に関する金銭の貸借のあっせんの内容及び当該あっせんに係る金銭の貸借が成立しないときの措置について、説明しなければならない。", "建物の貸借の媒介を行う場合、私道に関する負担について、説明しなければならない。", "建物の売買の媒介を行う場合、天災その他不可抗力による損害の負担に関する定めがあるときは、その内容について、説明しなければならない。"], "answer": 1, "exp": "宅地の売買の媒介では、代金に関する金銭の貸借（ローン）のあっせんの内容と、あっせんが成立しないときの措置が重要事項として説明対象になります。よって選択肢2が正しい記述です。", "year": "H29-33", "diff": "A"}, {"id": "kako-gyoA-H29-41", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、誤っているものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["区分所有建物の売買の媒介を行う場合、当該 1 棟の建物及びその敷地の管理が委託されているときは、その委託を受けている者の氏名（法人にあっては、その商号又は名称）及び住所（法人にあっては、その主たる事務所の所在地）を説明しなければならない。", "土地の売買の媒介を行う場合、移転登記の申請の時期の定めがあるときは、その内容を説明しなければならない。", "住宅の売買の媒介を行う場合、宅地内のガス配管設備等に関して、当該住宅の売買後においても当該ガス配管設備等の所有権が家庭用プロパンガス販売業者にあるものとするときは、その旨を説明する必要がある。", "中古マンションの売買の媒介を行う場合、当該マンションの計画的な維持修繕のための費用の積立てを行う旨の規約の定めがあるときは、その内容及び既に積み立てられている額について説明しなければならない。"], "answer": 1, "exp": "移転登記の申請時期は37条書面の記載事項であり、重要事項の説明対象ではありません。そのため「説明しなければならない」とする選択肢2が誤りです。他の3つは重説対象として正しい記述です。", "year": "H29-41", "diff": "A"}, {"id": "kako-gyoA-H30-35", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者間の取引における宅地建物取引業法第 35 条に規定する重要事項の説明及び重要事項を記載した書面（以下この問において「重要事項説明書」という。）の交付に関する次の記述のうち、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["建物の売買においては、売主は取引の対象となる建物（昭和 56 年 6 月 1 日以降に新築の工事に着手したものを除く。）について耐震診断を受けなければならず、また、その診断の結果を重要事項説明書に記載しなければならない。", "建物の売買においては、その対象となる建物が未完成である場合は、重要事項説明書を交付した上で、宅地建物取引士をして説明させなければならない。", "建物の売買においては、その建物が契約内容に適合しない担保すべき責任の履行に関し保証保険契約の締結などの措置を講ずるかどうか、また、講ずる場合はその概要を重要事項説明書に記載しなければならない。", "宅地の交換において交換契約に先立って交換差金の一部として 30 万円の預り金の授受がある場合、その預り金を受領しようとする者は、保全措置を講ずるかどうか、及びその措置を講ずる場合はその概要を重要事項説明書に記載しなければならない。"], "answer": 2, "exp": "契約不適合を担保すべき責任の履行に関し保証保険契約の締結などの措置を講ずるかどうか、講ずる場合はその概要を、重要事項説明書に記載しなければなりません。よって選択肢3が正しい記述です。", "year": "H30-35", "diff": "B"}, {"id": "kako-gyoA-H30-39", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が建物の貸借の媒介を行う場合における宅地建物取引業法（以下この問において「法」という。）第 35 条に規定する重要事項の説明に関する次の記述のうち、誤っているものはどれか。なお、特に断りのない限り、当該建物を借りようとする者は宅地建物取引業者ではないものとし、電磁的方法は考慮しないものとする。（改題）", "choices": ["当該建物を借りようとする者が宅地建物取引業者であるときは、貸借の契約が成立するまでの間に重要事項を記載した書面を交付しなければならないが、その内容を宅地建物取引士に説明させる必要はない。", "当該建物が既存の住宅であるときは、法第 34 条の 2 第 1 項第 4 号に規定する建物状況調査を実施しているかどうか、及びこれを実施している場合におけるその結果の概要を説明しなければならない。", "台所、浴室、便所その他の当該建物の設備の整備の状況について説明しなければならない。", "宅地建物取引士は、テレビ会議等のＩＴを活用して重要事項の説明を行うときは、相手方の承諾があれば宅地建物取引士証の提示を省略することができる。"], "answer": 3, "exp": "IT（テレビ会議等）を活用した重要事項説明でも、相手方の承諾の有無にかかわらず宅建士証の提示は省略できません。そのため「承諾があれば省略できる」とする選択肢4が誤りです。", "year": "H30-39", "diff": "A"}, {"id": "kako-gyoA-R1-28", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が建物の貸借の媒介を行う場合における宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["当該建物が住宅の品質確保の促進等に関する法律第 5 条第 1 項に規定する住宅性能評価を受けた新築住宅であるときは、その旨を説明しなければならない。", "当該建物が既存の建物であるときは、既存住宅に係る住宅の品質確保の促進等に関する法律第 6 条第 3 項に規定する建設住宅性能評価書の保存の状況について説明しなければならない。", "当該建物が既存の建物である場合、石綿使用の有無の調査結果の記録がないときは、石綿使用の有無の調査を自ら実施し、その結果について説明しなければならない。", "当該建物が建物の区分所有等に関する法律第 2 条第 1 項に規定する区分所有権の目的であるものであって、同条第 3 項に規定する専有部分の用途その他の利用の制限に関する規約の定めがあるときは、その内容を説明しなければならない。"], "answer": 3, "exp": "区分所有建物の貸借の媒介では、専有部分の用途その他の利用の制限に関する規約の定めがあるときは、その内容を説明しなければなりません。よって選択肢4が正しい記述です。", "year": "R1-28", "diff": "A"}, {"id": "kako-gyoA-R1-39", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["既存住宅の貸借の媒介を行う場合、建物の建築及び維持保全の状況に関する書類の保存状況について説明しなければならない。", "宅地の売買の媒介を行う場合、登記された抵当権について、引渡しまでに抹消される場合は説明しなくてよい。", "宅地の貸借の媒介を行う場合、借地権の存続期間を 50 年とする賃貸借契約において、契約終了時における当該宅地の上の建物の取壊しに関する事項を定めようとするときは、その内容を説明しなければならない。", "建物の売買又は貸借の媒介を行う場合、当該建物が津波防災地域づくりに関する法律第53 条第 1 項により指定された津波災害警戒区域内にあるときは、その旨を、売買の場合は説明しなければならないが、貸借の場合は説明しなくてよい。"], "answer": 2, "exp": "宅地の貸借で、契約終了時における宅地上の建物の取壊しに関する事項を定めようとするときは、その内容を重要事項として説明しなければなりません。よって選択肢3が正しい記述です。", "year": "R1-39", "diff": "A"}, {"id": "kako-gyoA-R1-40", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。", "choices": ["宅地建物取引業者の従業者は、取引の関係者の請求があったときは、従業者証明書を提示しなければならないが、宅地建物取引士は、重要事項の説明をするときは、請求がなくても説明の相手方に対し、宅地建物取引士証を提示しなければならない。", "宅地建物取引業者は、その業務に関する帳簿を、各取引の終了後 5 年間、当該宅地建物取引業者が自ら売主となる新築住宅に係るものにあっては 10 年間、保存しなければならない。", "宅地建物取引業者が、一団の宅地建物の分譲を案内所を設置して行う場合、その案内所が一時的かつ移動が容易な施設であるときは、当該案内所には、クーリング・オフ制度の適用がある旨等所定の事項を表示した標識を掲げなければならない。", "宅地建物取引業者が、一団の宅地建物の分譲を案内所を設置して行う場合、その案内所が契約を締結し、又は契約の申込みを受ける場所であるときは、当該案内所には、専任の宅地建物取引士を置かなければならない。"], "answer": 1, "exp": "帳簿は各取引終了後ではなく、各事業年度の末日をもって閉鎖し、閉鎖後5年間（自ら売主の新築住宅は10年間）保存します。保存期間の起算点が誤っているため選択肢2が誤りです。", "year": "R1-40", "diff": "C"}, {"id": "kako-gyoA-R1-41", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明（以下この問において「重要事項説明」という。）に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["建物管理が管理会社に委託されている建物の貸借の媒介をする宅地建物取引業者は、当該建物が区分所有建物であるか否かにかかわらず、その管理会社の商号及びその主たる事務所の所在地について、借主に説明しなければならない。", "宅地建物取引業者である売主は、他の宅地建物取引業者に媒介を依頼して宅地の売買契約を締結する場合、重要事項説明の義務を負わない。", "建物の貸借の媒介において、建築基準法に規定する建蔽率及び容積率に関する制限があるときは、その概要を説明しなければならない。", "重要事項説明では、代金、交換差金又は借賃の額を説明しなければならないが、それ以外に授受される金銭の額については説明しなくてよい。"], "answer": 0, "exp": "管理が委託されている建物の貸借の媒介では、区分所有建物かどうかを問わず、管理会社の商号と主たる事務所の所在地を借主に説明しなければなりません。よって選択肢1が正しい記述です。", "year": "R1-41", "diff": "A"}, {"id": "kako-gyoA-R2-10月-31", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["建物の売買の媒介だけでなく建物の貸借の媒介を行う場合においても、損害賠償額の予定又は違約金に関する事項について、説明しなければならない。", "建物の売買の媒介を行う場合、当該建物について、石綿の使用の有無の調査の結果が記録されているか照会を行ったにもかかわらず、その存在の有無が分からないときは、宅地建物取引業者自らが石綿の使用の有無の調査を実施し、その結果を説明しなければならない。", "建物の売買の媒介を行う場合、当該建物が既存の住宅であるときは、建物状況調査を実施しているかどうかを説明しなければならないが、実施している場合その結果の概要を説明する必要はない。", "区分所有建物の売買の媒介を行う場合、建物の区分所有等に関する法律第 2 条第 3 項に規定する専有部分の用途その他の利用の制限に関する規約の定めがあるときは、その内容を説明しなければならないが、区分所有建物の貸借の媒介を行う場合は、説明しなくてよい。"], "answer": 0, "exp": "損害賠償額の予定や違約金に関する事項は、売買・交換・貸借のすべての取引で説明対象です。そのため建物の貸借の媒介でも説明が必要とする選択肢1が正しい記述です。", "year": "R2-10月-31", "diff": "A"}, {"id": "kako-gyoA-R2-10月-41", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["重要事項説明書には、代表者の記名があれば宅地建物取引士の記名は必要がない。", "重要事項説明書に記名する宅地建物取引士は専任の宅地建物取引士でなければならないが、実際に重要事項の説明を行う者は専任の宅地建物取引士でなくてもよい。", "宅地建物取引士証を亡失した宅地建物取引士は、その再交付を申請していても、宅地建物取引士証の再交付を受けるまでは重要事項の説明を行うことができない。", "重要事項の説明は、宅地建物取引業者の事務所において行わなければならない。"], "answer": 2, "exp": "宅建士証を亡失して再交付を申請していても、再交付を受けるまでは提示ができず、重要事項の説明を行うことはできません。よって選択肢3が正しい記述です。", "year": "R2-10月-41", "diff": "A"}, {"id": "kako-gyoA-R2-10月-44", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、誤っているものはどれか。なお、特に断りのない限り、説明の相手方は宅地建物取引業者ではないものとし、電磁的方法は考慮しないものとする。（改題）", "choices": ["昭和 55 年に新築の工事に着手し完成した建物の売買の媒介を行う場合、当該建物が地方公共団体による耐震診断を受けたものであるときは、その内容を説明しなければならない。", "貸借の媒介を行う場合、敷金その他いかなる名義をもって授受されるかを問わず、契約終了時において精算することとされている金銭の精算に関する事項を説明しなければならない。", "自らを委託者とする宅地又は建物に係る信託の受益権の売主となる場合、取引の相手方が宅地建物取引業者であっても、重要事項説明書を交付して説明をしなければならない。", "区分所有建物の売買の媒介を行う場合、一棟の建物の計画的な維持修繕のための費用の積立てを行う旨の規約の定めがあるときは、その内容を説明しなければならないが、既に積み立てられている額について説明する必要はない。"], "answer": 3, "exp": "区分所有建物の売買では、計画的な維持修繕費用の積立てを行う旨の規約の定めがあるとき、その内容だけでなく既に積み立てられている額も説明が必要です。「既積立額は説明不要」とする選択肢4が誤りです。", "year": "R2-10月-44", "diff": "B"}, {"id": "kako-gyoA-R2-12月-42", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、誤っているものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["地域における歴史的風致の維持及び向上に関する法律第 12 条第 1 項により指定された歴史的風致形成建造物である建物の売買の媒介を行う場合、その増築をするときは市町村長への届出が必要である旨を説明しなくてもよい。", "既存の建物の売買の媒介を行う場合、当該建物の建築確認済証がなくなっているときは、その旨を説明すればよい。", "区分所有建物の売買の媒介を行う場合、一棟の建物の維持修繕の実施状況が記録されているときは、その内容を説明しなければならない。", "建物の貸借の媒介を行う場合、台所、浴室、便所その他の当該建物の設備の整備の状況について、説明しなければならない。"], "answer": 0, "exp": "歴史的風致形成建造物である建物の増築等をするときは市町村長への届出が必要であり、これは重要事項として説明しなければなりません。そのため「説明しなくてもよい」とする選択肢1が誤りです。", "year": "R2-12月-42", "diff": "B"}, {"id": "kako-gyoA-R3-10月-33", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業法第 35 条に規定する重要事項の説明における水防法施行規則第 11 条第 1 号の規定により市町村（特別区を含む。以下この問において同じ。）の長が提供する図面（以下この問において「水害ハザードマップ」という。）に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとし、電磁的方法は考慮しないものとする。（改題）", "choices": ["宅地建物取引業者は、市町村が、取引の対象となる宅地又は建物の位置を含む水害ハザードマップを作成せず、又は印刷物の配布若しくはホームページ等への掲載等をしていないことを確認できた場合は、重要事項説明書にその旨記載し、重要事項説明の際に提示すべき水害ハザードマップが存在しない旨を説明すればよい。", "宅地建物取引業者は、市町村が取引の対象となる宅地又は建物の位置を含む「洪水」、「雨水出水（内水）」、「高潮」の水害ハザードマップを作成している場合、重要事項説明の際にいずれか 1 種類の水害ハザードマップを提示すればよい。", "宅地建物取引業者は、市町村が取引の対象となる宅地又は建物の位置を含む水害ハザードマップを作成している場合、売買又は交換の媒介のときは重要事項説明の際に水害ハザードマップを提示しなければならないが、貸借の媒介のときはその必要はない。", "宅地建物取引業者は、市町村が取引の対象となる宅地又は建物の位置を含む水害ハザードマップを作成している場合、重要事項説明書に水害ハザードマップを添付すれば足りる。"], "answer": 0, "exp": "市町村が対象物件を含む水害ハザードマップを作成・配布・掲載していないことを確認できた場合は、その照会で調査義務を果たしたことになり、提示すべきマップが存在しない旨を説明すれば足ります。よって選択肢1が正しい記述です。", "year": "R3-10月-33", "diff": "A"}, {"id": "kako-gyoA-R3-10月-36", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、同法の規定に少なくとも説明しなければならない事項として掲げられていないものはどれか。", "choices": ["建物の貸借の媒介を行う場合における、「都市計画法第 29 条第 1 項の規定に基づく制限」", "建物の貸借の媒介を行う場合における、「当該建物について、石綿の使用の有無の調査の結果が記録されているときは、その内容」", "建物の貸借の媒介を行う場合における、「台所、浴室、便所その他の当該建物の設備の整備の状況」", "宅地の貸借の媒介を行う場合における、「敷金その他いかなる名義をもって授受されるかを問わず、契約終了時において精算することとされている金銭の精算に関する事項」"], "answer": 0, "exp": "都市計画法29条1項（開発許可）に基づく制限は、売買や宅地の貸借では重説対象ですが、建物の貸借では説明対象とされていません。よって説明事項に掲げられていないものは選択肢1です。", "year": "R3-10月-36", "diff": "C"}, {"id": "kako-gyoA-R3-12月-35", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が宅地及び建物の売買の媒介を行う場合における宅地建物取引業法第 35 条に規定する重要事項の説明及び重要事項説明書の交付に関する次の記述のうち、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["宅地建物取引士は、テレビ会議等のＩＴを活用して重要事項の説明を行うときは、相手方の承諾があれば宅地建物取引士証の提示を省略することができる。", "宅地建物取引業者は、その媒介により売買契約が成立したときは、当該契約の各当事者に、遅滞なく、重要事項説明書を交付しなければならない。", "宅地建物取引業者は、重要事項説明書の交付に当たり、専任の宅地建物取引士をして当該書面に記名させるとともに、売買契約の各当事者にも当該書面に記名させなければならない。", "宅地建物取引業者は、買主が宅地建物取引業者であっても、重要事項説明書を交付しなければならない。"], "answer": 3, "exp": "買主が宅建業者の場合、重要事項の説明自体は省略できますが、重要事項説明書の交付までは省略できません。よって選択肢4が正しい記述です。", "year": "R3-12月-35", "diff": "A"}, {"id": "kako-gyoA-R3-12月-44", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明についての次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。（改題）ア 賃貸借契約において、取引対象となる宅地又は建物が、水防法施行規則第 11 条第 1 号の規定により市町村（特別区を含む。）の長が提供する図面に当該宅地又は建物の位置が表示されている場合には、当該図面における当該宅地又は建物の所在地を説明しなければならない。イ 賃貸借契約において、対象となる建物が既存の住宅であるときは、法第 34 条の 2 第 1 項第 4 号に規定する建物状況調査を実施しているかどうか、及びこれを実施している場合におけるその結果の概要を説明しなければならない。ウ 建物の売買において、その建物の種類又は品質に関して契約の内容に適合しない場合におけるその不適合を担保すべき責任の履行に関し保証保険契約の締結などの措置を講ずるかどうか、また、講ずる場合はその措置の概要を説明しなければならない。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 2, "exp": "アの水害ハザードマップ上の所在地説明、イの既存住宅の建物状況調査の実施の有無と結果概要、ウの契約不適合の担保責任の履行措置は、いずれも重説対象で正しい記述です。よって正しいのは三つです。", "year": "R3-12月-44", "diff": "C"}, {"id": "kako-gyoA-R4-28", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["宅地建物取引業者が、宅地建物取引業者ではない個人から媒介業者の仲介なしに土地付建物を購入する場合、買主である宅地建物取引業者は重要事項説明書を作成しなくても宅地建物取引業法違反とはならない。", "宅地建物取引業者が、重要事項説明書を作成する際、調査不足のため、重要事項説明書に記載された内容が事実と異なるものとなったが、意図的に事実と異なる内容を記載したものではないため、宅地建物取引業法違反とはならない。", "宅地建物取引業者は、土地売買の媒介を行う場合、宅地建物取引業者ではない売主に対して契約が成立する前までの間に、宅地建物取引士をして重要事項説明書を交付して説明をさせなければならない。", "宅地又は建物の取引は権利関係や法令上の制限など取引条件に関する事項が複雑で多岐にわたるため、重要事項説明書は、宅地又は建物の取引の専門的知識を有する宅地建物取引士が作成しなければならない。"], "answer": 0, "exp": "売主が宅建業者でない個人で、買主が宅建業者、かつ媒介業者もいない取引では、重要事項の説明は取得しようとする買主（業者）が対象のため不要で、買主業者は重説書面を作成しなくても違反になりません。よって選択肢1が正しい記述です。", "year": "R4-28", "diff": "B"}, {"id": "kako-gyoA-R4-34", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が建物の売買の媒介の際に行う宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、誤っているものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。（改題）", "choices": ["当該建物が既存の木造戸建て住宅であるときは、宅地建物取引業法第 34 条の 2 第 1 項第4 号に規定する建物状況調査を過去 1 年以内に実施しているかどうか、及びこれを実施している場合におけるその結果の概要を説明しなければならない。", "当該建物が宅地造成及び特定盛土等規制法の規定により指定された造成宅地防災区域内にあるときは、その旨を説明しなければならない。", "当該建物について、石綿の使用の有無の調査の結果が記録されているときは、その内容を説明しなければならない。", "当該建物（昭和 56 年 5 月 31 日以前に新築の工事に着手したもの）が指定確認検査機関、建築士、登録住宅性能評価機関又は地方公共団体による耐震診断を受けたものであるときは、その旨を説明しなければならない。"], "answer": 3, "exp": "旧耐震（昭和56年5月31日以前着工）の建物が耐震診断を受けているときは、単に受けた旨ではなく、その診断結果の内容を説明しなければなりません。「その旨を説明」で足りるとする選択肢4が誤りです。", "year": "R4-34", "diff": "B"}, {"id": "kako-gyoA-R4-40", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "建物の貸借の媒介を行う宅地建物取引業者が、その取引の相手方（宅地建物取引業者を除く。）に対して、次のアからエの発言に続けて宅地建物取引業法第 35 条の規定に基づく重要事項の説明を行った場合のうち、宅地建物取引業法の規定に違反しないものはいくつあるか。なお、電磁的方法は考慮しないものとする。（改題）ア 本日は重要事項の説明を行うためにお電話しました。お客様は IT 環境をお持ちでなく映像を見ることができないとのことですので、宅地建物取引士である私が記名した重要事項説明書は現在お住まいの住所に郵送いたしました。このお電話にて重要事項の説明をさせていただきますので、お手元でご覧いただきながらお聞き願います。イ 建物の貸主が宅地建物取引業者で、代表者が宅地建物取引士であり建物の事情に詳しいことから、その代表者が作成し、記名した重要事項説明書がこちらになります。当社の宅地建物取引士は同席しますが、説明は貸主の代表者が担当します。ウ この物件の担当である弊社の宅地建物取引士が本日急用のため対応できなくなりましたが、せっかくお越しいただきましたので、重要事項説明書にある宅地建物取引士欄を訂正の上、宅地建物取引士である私が記名をし、代わりに説明をいたします。私の宅地建物取引士証をお見せします。エ本日はお客様のご希望ですので、テレビ会議を用いて重要事項の説明を行います。当社の側の音声は聞こえていますでしょうか。十分に聞き取れたとのお返事、こちらにも聞こえました。では、説明を担当する私の宅地建物取引士証をお示ししますので、画面上でご確認をいただき、私の名前を読み上げていただけますでしょうか。そうです、読み方も間違いありません。それでは、双方音声・映像ともやりとりできる状況ですので、説明を始めます。事前にお送りした私が記名した重要事項説明書をお手元にご用意ください。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "アは相手にIT環境がなく電話のみのため違反、イは自ら貸主で宅建業法が適用されず媒介業者が説明義務を負うのに貸主代表者が説明するため違反。ウ（別の宅建士が説明・提示）とエ（IT重説の要件を満たす）は違反せず、違反しないのは二つです。", "year": "R4-40", "diff": "B"}, {"id": "kako-gyoA-R5-33", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。", "choices": ["甲宅地を所有する宅地建物取引業者Ａが、乙宅地を所有する宅地建物取引業者ではない個人Ｂと、甲宅地と乙宅地の交換契約を締結するに当たって、Ｂに対して、甲宅地に関する重要事項の説明を行う義務はあるが、乙宅地に関する重要事項の説明を行う義務はない。", "宅地の売買における当該宅地の引渡しの時期について、重要事項説明において説明しなければならない。", "宅地建物取引業者が売主となる宅地の売買に関し、売主が買主から受領しようとする金銭のうち、買主への所有権移転の登記以後に受領するものに対して、宅地建物取引業法施行規則第 16 条の 4 に定める保全措置を講ずるかどうかについて、重要事項説明書に記載する必要がある。", "重要事項説明書の電磁的方法による提供については、重要事項説明を受ける者から電磁的方法でよいと口頭で依頼があった場合、改めて電磁的方法で提供することについて承諾を得る必要はない。"], "answer": 0, "exp": "重要事項の説明は物件を取得しようとする者に対して行います。交換でBが取得する甲宅地についてはAに説明義務がありますが、B自身が所有する乙宅地には説明義務がありません。よって選択肢1が正しい記述です。", "year": "R5-33", "diff": "A"}, {"id": "kako-gyoA-R5-42", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、誤っているものはいくつあるか。ア 宅地建物取引士は、重要事項説明をする場合、取引の相手方から請求されなければ、宅地建物取引士証を相手方に提示する必要はない。イ 売主及び買主が宅地建物取引業者ではない場合、当該取引の媒介業者は、売主及び買主に重要事項説明書を交付し、説明を行わなければならない。ウ 宅地の売買について売主となる宅地建物取引業者は、買主が宅地建物取引業者である場合、重要事項説明書を交付しなければならないが、説明を省略することはできる。エ宅地建物取引業者である売主は、宅地建物取引業者ではない買主に対して、重要事項として代金並びにその支払時期及び方法を説明しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "exp": "アは請求がなくても宅建士証の提示が必要で誤り、イは買主のみ交付・説明すればよく売主は不要で誤り、エは代金や支払時期・方法は重説対象外で誤りです。ウ（業者間は交付要・説明省略可）のみ正しく、誤りは三つです。", "year": "R5-42", "diff": "B"}, {"id": "kako-gyoA-R6-26", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。ア ガス配管設備等に関して、住宅の売買後においても宅地内のガスの配管設備等の所有権が家庭用プロパンガス販売会社にあるものとする場合には、その旨を説明しなければならない。イ 重要事項の説明を行う宅地建物取引士は専任の宅地建物取引士でなくてもよいが、書面に記名する宅地建物取引士は専任の宅地建物取引士でなければならない。ウ 区分所有建物である事務所ビルの一室の売買の媒介を行う場合、当該 1 棟の建物及びその敷地の管理が委託されているときは、その委託を受けている者の氏名（法人にあっては、その商号又は名称）及び住所（法人にあっては、その主たる事務所の所在地）を説明しなければならない。エ区分所有建物である中古マンションの一室の売買の媒介を行う場合、当該 1 棟の建物の計画的な維持修繕のための費用の積立てを行う旨の規約の定めがあるときは、その内容及び既に積み立てられている額について説明しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "exp": "アのプロパンガス配管の所有権、ウの管理委託先の氏名・住所、エの修繕積立金の内容と既積立額はいずれも重説対象で正しい記述です。イは説明する宅建士も記名する宅建士も専任である必要はなく誤り。よって正しいのは三つです。", "year": "R6-26", "diff": "B"}, {"id": "kako-gyoA-R6-37", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項説明に関する次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。ア 建物の貸借の媒介を行う場合、水防法施行規則第 11 条第 1 号の規定により市町村の長が提供する水害ハザードマップに当該建物の位置が含まれているときは、その所在地を示して説明しなければならない。イ 既存住宅の売買を行う場合、宅地建物取引業法第 34 条の 2 第 1 項第 4 号に規定する建物状況調査の実施後、 1 年を経過していないものについては、建物状況調査の実施の有無、実施している場合の結果の概要について説明しなければならない。ウ 宅地の売買を行う場合、宅地の造成に関する工事の完了前のものであるときは、完了時における当該宅地に接する道路の構造及び幅員を説明しなければならない。エ建物の貸借の媒介を行う場合、私道に関する負担の有無や内容を事前に調査し、説明しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "exp": "アは貸借でも水害ハザードマップ上の所在地説明が必要で正しい、イは既存住宅の建物状況調査の説明で正しい、ウは造成工事完了前の宅地で完了時の道路構造・幅員説明が必要で正しい。エは建物貸借で私道負担の説明は不要のため誤り。正しいのは三つです。", "year": "R6-37", "diff": "A"}, {"id": "kako-gyoA-R6-41", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、正しいものはいくつあるか。なお、説明の相手方は宅地建物取引業者ではないものとする。ア 中古マンションの一室の売買の媒介を行う場合、抵当権が設定されていても、契約日までにその登記が抹消される予定であるときは、当該抵当権の内容について説明しなくてもよい。イ 宅地の貸借の媒介を行う場合、借地権の存続期間を 50 年とする賃貸借契約において、当該契約終了時における当該宅地の上の建物の取壊しに関する事項を定めようとするときは、その内容を説明しなければならない。ウ 建物の貸借の媒介を行う場合、当該建物が住宅の品質確保の促進等に関する法律第５条第1 項に規定する住宅性能評価を受けた新築住宅であるときは、その旨を説明しなければならない。エ宅地の売買の媒介を行う場合、当該宅地が急傾斜地の崩壊による災害の防止に関する法律第 3 条の規定に基づく急傾斜地崩壊危険区域内にあることは説明しなければならないが、当該区域内における行為の制限の概要については説明しなくてもよい。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "exp": "イの宅地貸借における契約終了時の建物取壊しに関する定めのみが重説対象で正しい記述です。アは抹消予定でも抵当権は説明必要、ウは貸借の住宅性能評価は説明不要、エは急傾斜地の行為制限概要も説明必要でいずれも誤り。よって正しいのは一つです。", "year": "R6-41", "diff": "A"}, {"id": "kako-gyoA-R6-42", "subject": "宅建業法", "topic": "重要事項の説明", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定及び「宅地建物取引業者による人の死の告知に関するガイドライン」によれば、誤っているものはどれか。", "choices": ["宅地建物取引業者は、宅地建物取引業に係る契約の締結の勧誘をするに際し、宅地建物取引業者の相手方等に対し、利益を生ずることが確実であると誤解させるべき断定的判断を提供する行為をしてはならない。", "宅地建物取引業者は、宅地又は建物の売買の契約の締結の勧誘をするに際し、宅地建物取引業者の相手方等に対し、宅地又は建物の引渡しの時期について故意に不実のことを告げた場合であっても、契約が成立したときに宅地建物取引業法第 37 条の規定により交付すべき書面に当該事項を正確に記載すればよい。", "「宅地建物取引業者による人の死の告知に関するガイドライン」によれば、売買取引の対象となる居住用不動産において、自然死や日常生活の中での不慮の死が発生した場合であっても、過去に人が死亡し、長期間にわたって人知れず放置されたこと等に伴ういわゆる特殊清掃や大規模リフォーム等が行われていなければ、宅地建物取引業者は、原則として、買主に対してこれを告げなくてもよい。", "「宅地建物取引業者による人の死の告知に関するガイドライン」によれば、賃貸借取引の対象となる居住用不動産において、自然死や日常生活の中での不慮の死以外の死が発生した場合であっても、特段の事情がない限り、当該死が発覚してから概ね 3 年間を経過した後は、宅地建物取引業者は、原則として、借主に対してこれを告げなくてもよい。"], "answer": 1, "exp": "引渡しの時期について故意に不実のことを告げる行為は禁止されており、37条書面に正確に記載すればよいというものではありません。そのため選択肢2が誤りです。", "year": "R6-42", "diff": "B"}, {"id": "kako-gyoA-R3-12月-32", "subject": "宅建業法", "topic": "供託所等に関する説明", "type": "select", "q": "宅地建物取引業法第 35 条の 2 に規定する供託所等に関する説明についての次の記述のうち、正しいものはどれか。なお、特に断りのない限り、宅地建物取引業者の相手方は宅地建物取引業者ではないものとする。", "choices": ["宅地建物取引業者は、宅地建物取引業者の相手方に対して供託所等の説明を行う際に書面を交付することは要求されていないが、重要事項説明書に記載して説明することが望ましい。", "宅地建物取引業者は、宅地建物取引業者が取引の相手方の場合においても、供託所等に係る説明をしなければならない。", "宅地建物取引業者は、売買、交換又は貸借の契約に際し、契約成立後、速やかに供託所等に係る説明をしなければならない。", "宅地建物取引業者は、自らが宅地建物取引業保証協会の社員である場合、営業保証金を供託した主たる事務所の最寄りの供託所及び所在地の説明をしなければならない。"], "answer": 0, "exp": "供託所等の説明では書面の交付までは要求されていませんが、重要事項説明書に記載して説明することが望ましいとされています。よって選択肢1が正しい記述です。", "year": "R3-12月-32", "diff": "C"}, {"id": "kako-gyoA-H28-34", "subject": "宅建業法", "topic": "手付貸与等による誘引の禁止", "type": "select", "q": "宅地建物取引業法（以下この問において「法」という。）第 47 条及び第 47 条の 2 に規定されている業務に関する禁止事項に関する次の記述のうち、誤っているものはどれか。なお、Ａは宅地建物取引業者である。", "choices": ["Ａが、賃貸アパートの媒介に当たり、入居申込者が無収入であることを知っており、入居申込書の収入欄に「年収 700 万円」とあるのは虚偽の記載であることを認識したまま、その事実を告げずに貸主に提出した行為は法に違反する。", "Ａが、分譲マンションの購入を勧誘するに際し、うわさをもとに「 3 年後には間違いなく徒歩 5 分の距離に新しく私鉄の駅ができる」と告げた場合、そのような計画はなかったとしても、故意にだましたわけではないので法には違反しない。", "Ａは、建売住宅の売買の相手方である買主から手付放棄による契約の解除の通知を受けたとしても、すでに所有権の移転登記を行い引渡しも済んでいる場合は、そのことを理由に当該契約の解除を拒むことができる。", "Ａが、宅地の売買契約締結の勧誘に当たり、相手方が手付金の手持ちがないため契約締結を迷っていることを知り、手付金の分割払いを持ちかけたことは、契約締結に至らなかったとしても法に違反する。"], "answer": 1, "exp": "将来の環境や交通の利便について誤解させる断定的判断の提供は禁止されており、うわさをもとに駅ができると断言すれば故意にだます意図がなくても違反します。「違反しない」とする選択肢2が誤りです。", "year": "H28-34", "diff": "A"}, {"id": "kako-gyoA-H30-40", "subject": "宅建業法", "topic": "手付貸与等による誘引の禁止", "type": "select", "q": "宅地建物取引業者Ａが行う業務に関する次の記述のうち、宅地建物取引業法の規定に違反するものはいくつあるか。ア Ａは、自ら売主として、建物の売買契約を締結するに際し、買主が手付金を持ち合わせていなかったため手付金の分割払いを提案し、買主はこれに応じた。イ Ａは、建物の販売に際し、勧誘の相手方から値引きの要求があったため、広告に表示した販売価格から 100 万円値引きすることを告げて勧誘し、売買契約を締結した。ウ Ａは、土地の売買の媒介に際し重要事項の説明の前に、宅地建物取引士ではないＡの従業者をして媒介の相手方に対し、当該土地の交通等の利便の状況について説明させた。エ Ａは、投資用マンションの販売に際し、電話で勧誘を行ったところ、勧誘の相手方から「購入の意思がないので二度と電話をかけないように」と言われたことから、電話での勧誘を諦め、当該相手方の自宅を訪問して勧誘した。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "アの手付金の分割払い提案は信用の供与にあたり違反、エは契約しない意思を示した相手への勧誘継続で手段を電話から訪問に変えても違反です。イの値引きやウの重説前の利便説明は違反せず、違反するのは二つです。", "year": "H30-40", "diff": "A"}, {"id": "kako-gyoA-R3-10月-43", "subject": "宅建業法", "topic": "手付貸与等による誘引の禁止", "type": "select", "q": "宅地建物取引業者の業務に関する次の記述のうち、宅地建物取引業法の規定に違反するものはいくつあるか。ア マンションの販売に際して、買主が手付として必要な額を持ち合わせていなかったため、手付を分割受領することにより、契約の締結を誘引した。イ 宅地の売買に際して、相手方が「契約の締結をするかどうか明日まで考えさせてほしい」ゆがと申し出たのに対し、事実を歪めて「明日では契約締結できなくなるので、今日しか待てない」と告げた。ウ マンション販売の勧誘を電話で行った際に、勧誘に先立って電話口で宅地建物取引業者の商号又は名称を名乗らずに勧誘を行った。エ 建物の貸借の媒介に際して、賃貸借契約の申込みをした者がその撤回を申し出たが、物件案内等に経費がかかったため、預り金を返還しなかった。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 3, "exp": "アの手付の分割受領、イの判断に必要な時間を与えることの拒否、ウの勧誘に先立つ商号等の不告知、エの預り金返還の拒否は、いずれも業務上の禁止事項に該当し違反します。よって違反は四つです。", "year": "R3-10月-43", "diff": "A"}, {"id": "kako-gyoA-R5-36", "subject": "宅建業法", "topic": "手付貸与等による誘引の禁止", "type": "select", "q": "次の記述のうち、宅地建物取引業者Ａが行う業務に関して宅地建物取引業法の規定に違反するものはいくつあるか。ア 建物の貸借の媒介に際して、賃借の申込みをした者がその撤回を申し出たので、Ａはかかった諸費用を差し引いて預り金を返還した。イ Ａは、売主としてマンションの売買契約を締結するに際して、買主が手付として必要な額を今すぐには用意できないと申し出たので、手付金の分割払いを買主に提案した。ウ Ａは取引のあったつど、その年月日やその取引に係る宅地又は建物の所在及び面積その他必要な記載事項を帳簿に漏らさず記載し、必要に応じて紙面にその内容を表示できる状態で、電子媒体により帳簿の保存を行っている。エＡはアンケート調査を装ってその目的がマンションの売買の勧誘であることを告げずに個人宅を訪問し、マンションの売買の勧誘をした。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "exp": "アは撤回時に諸費用を差し引く＝預り金の全額返還を拒むことになり違反、イは手付金の分割払い提案で違反、エは勧誘目的を告げずに訪問勧誘で違反です。ウの電子媒体による帳簿保存は要件を満たし違反せず、違反するのは三つです。", "year": "R5-36", "diff": "B"}, {"id": "kako-gyoA-H27-37", "subject": "宅建業法", "topic": "契約締結時期の制限", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、この問において「建築確認」とは、建築基準法第 6 条第 1 項の確認をいうものとする。", "choices": ["宅地建物取引業者は、建築確認が必要とされる建物の建築に関する工事の完了前においては、建築確認を受けた後でなければ、当該建物の貸借の媒介をしてはならない。", "宅地建物取引業者は、建築確認が必要とされる建物の建築に関する工事の完了前において、建築確認の申請中である場合は、その旨を表示すれば、自ら売主として当該建物を販売する旨の広告をすることができる。", "宅地建物取引業者は、建築確認が必要とされる建物の建築に関する工事の完了前においては、建築確認を受けた後でなければ、当該建物の貸借の代理を行う旨の広告をしてはならない。", "宅地建物取引業者は、建築確認が必要とされる建物の建築に関する工事の完了前において、建築確認の申請中である場合は、建築確認を受けることを停止条件とする特約を付ければ、自ら売主として当該建物の売買契約を締結することができる。"], "answer": 2, "exp": "未完成物件は建築確認を受けた後でなければ、貸借の代理を含むすべての取引の広告ができません。よって選択肢3が正しい記述です。貸借の媒介契約自体は締結制限の対象外で確認前でも可、申請中の広告は不可、停止条件付特約でも売買契約は締結できません。", "year": "H27-37", "diff": "A"}, {"id": "kako-gyoA-H27-38", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者Ａが宅地建物取引業法第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、電磁的方法は考慮しないものとする。（改題）ア Ａが売主を代理して中古マンションの売買契約を締結した場合において、契約内容に適合しない担保責任の履行に関して講ずべき保証保険契約の締結その他の措置についての定めがあるときは、Ａは、その内容を 37 条書面に記載しなければならず、当該書面を、売主及び買主に交付しなければならない。イ Ａが媒介により中古戸建住宅の売買契約を締結させた場合、Ａは、引渡しの時期又は移転登記の申請の時期のいずれかを 37 条書面に記載しなければならず、売主及び買主が宅地建物取引業者であっても、当該書面を交付しなければならない。ウ Ａが自ら貸主として宅地の定期賃貸借契約を締結した場合において、借賃の支払方法についての定めがあるときは、Ａは、その内容を 37 条書面に記載しなければならず、借主が宅地建物取引業者であっても、当該書面を交付しなければならない。エ Ａが自ら買主として宅地の売買契約を締結した場合において、当該宅地に係る租税その他の公課の負担に関する定めがあるときは、Ａは、その内容を 37 条書面に記載しなければならず、売主が宅地建物取引業者であっても、当該書面を交付しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "アは担保責任の履行措置の定めを37条書面に記載し代理でも売主・買主双方に交付が必要で正しい、エは自ら買主は取引に該当し租税公課の定めを記載・交付が必要で正しい。イは引渡時期と登記申請時期の両方が必要で誤り、ウは自ら貸借で宅建業法が適用されず誤り。正しいのは二つです。", "year": "H27-38", "diff": "B"}, {"id": "kako-gyoA-H28-30", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業法第 35 条に規定する重要事項の説明及び同法第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。（改題）", "choices": ["宅地建物取引業者は、建物の貸借の媒介における重要事項の説明において、借賃の額並びにその支払の時期及び方法について説明するとともに、37 条書面に記載しなければならない。", "宅地建物取引士は、重要事項の説明をする際に、相手方から求められない場合は、宅地建物取引士証を提示しなくてもよい。", "宅地建物取引業者は、37 条書面を交付する際に、相手方の承諾を得ても、書面に代えて、電磁的方法で提供することはできない。", "宅地建物取引業者は、宅地建物取引士をして 37 条書面に記名させなければならないが、当該書面の交付は宅地建物取引士でない従業者に行わせることができる。"], "answer": 3, "exp": "37条書面には宅建士の記名が必要ですが、書面を相手に手渡す交付行為そのものは宅建士でない従業者でも構いません。よって選択肢4が正しくなります。なお借賃額は35条の説明事項ではなく37条の記載事項、35条の説明時は請求がなくても宅建士証の提示が必要、承諾があれば電磁的提供も可能で、他の3つは誤りです。", "year": "H28-30", "diff": "A"}, {"id": "kako-gyoA-H28-39", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者が媒介により区分所有建物の貸借の契約を成立させた場合に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。なお、この問において「重要事項説明書」とは法第 35 条の規定により交付すべき書面をいい、「37条書面」とは法第 37 条の規定により交付すべき書面をいうものとし、電磁的方法は考慮しないものとし、また、借主は宅地建物取引業者ではないものとする。（改題）", "choices": ["専有部分の用途その他の利用の制限に関する規約において、ペットの飼育が禁止されている場合は、重要事項説明書にその旨記載し内容を説明したときも、37 条書面に記載しなければならない。", "契約の解除について定めがある場合は、重要事項説明書にその旨記載し内容を説明したときも、37 条書面に記載しなければならない。", "借賃の支払方法が定められていても、貸主及び借主の承諾を得たときは、37 条書面に記載しなくてよい。", "天災その他不可抗力による損害の負担に関して定めなかった場合には、その旨を 37 条書面に記載しなければならない。"], "answer": 1, "exp": "契約の解除に関する定めは37条書面の相対的記載事項で、定めがあれば必ず書かなければなりません。重要事項説明書に書いて説明済みでも37条書面への記載は省略できないため、選択肢2が正しくなります。", "year": "H28-39", "diff": "B"}, {"id": "kako-gyoA-H28-42", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業法（以下この問において「法」という。）第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、正しいものはどれか。なお、Ａは宅地建物取引業者（消費税課税事業者）であり、電磁的方法は考慮しないものとする。（改題）", "choices": ["Ａは、宅地建物取引業者Ｂと宅地建物取引業者Ｃの間で締結される宅地の売買契約の媒介においては、37 条書面に引渡しの時期を記載しなくてもよい。", "Ａは、自ら売主として土地付建物の売買契約を締結したときは、37 条書面に代金の額を記載しなければならないが、消費税等相当額については記載しなくてもよい。", "Ａは、自ら売主として、宅地建物取引業者Ｄの媒介により、宅地建物取引業者Ｅと宅地の売買契約を締結した。Ｄが宅地建物取引士をして 37 条書面に記名させている場合、Ａは宅地建物取引士をして当該書面に記名させる必要はない。", "Ａは、貸主Ｆと借主Ｇの間で締結される建物賃貸借契約について、Ｆの代理として契約を成立させたときは、ＦとＧに対して 37 条書面を交付しなければならない。"], "answer": 3, "exp": "貸借の契約を代理して成立させた場合、37条書面は相手方と代理を依頼した者の双方に交付します。よって貸主Fの代理人Aは、FとGの両方に交付しなければならず選択肢4が正しくなります。", "year": "H28-42", "diff": "B"}, {"id": "kako-gyoA-H29-38", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者Ａが、宅地建物取引業法（以下この問において「法」という。）第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、法の規定に違反しないものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["Ａは、売主を代理して宅地の売買契約を締結した際、買主にのみ 37 条書面を交付した。", "Ａは、自ら売主となる宅地の売買契約において、手付金等を受領するにもかかわらず、37条書面に手付金等の保全措置の内容を記載しなかった。", "Ａは、媒介により宅地の売買契約を成立させた場合において、契約の解除に関する定めがあるにもかかわらず、37 条書面にその内容を記載しなかった。", "Ａは、自ら売主となる宅地の売買契約において、契約内容に適合しない担保責任に関する特約を定めたが、買主が宅地建物取引業者であり、担保責任に関する特約を自由に定めることができるため、37 条書面にその内容を記載しなかった。"], "answer": 1, "exp": "手付金等の保全措置の内容は重要事項の説明対象であって37条書面の記載事項ではありません。したがって記載しなくても違反せず、選択肢2が正解となります。売主買主双方への交付漏れや解除の定めの記載漏れ、業者間での担保責任特約の記載漏れは違反です。", "year": "H29-38", "diff": "A"}, {"id": "kako-gyoA-H29-40", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業法（以下この問において「法」という。）第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、法の規定に違反しないものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["宅地建物取引業者Ａは、中古マンションの売買の媒介において、当該マンションの代金の支払の時期及び引渡しの時期について、重要事項説明書に記載して説明を行ったので、37条書面には記載しなかった。", "宅地建物取引業者である売主Ｂは、宅地建物取引業者Ｃの媒介により、宅地建物取引業者ではない買主Ｄと宅地の売買契約を締結した。Ｂは、Ｃと共同で作成した 37 条書面にＣの宅地建物取引士の記名がなされていたため、その書面に、Ｂの宅地建物取引士をして記名をさせなかった。", "売主である宅地建物取引業者Ｅの宅地建物取引士Ｆは、宅地建物取引業者ではない買主Ｇに 37 条書面を交付する際、Ｇから求められなかったので、宅地建物取引士証をＧに提示せずに当該書面を交付した。", "宅地建物取引業者Ｈは、宅地建物取引業者ではない売主Ｉから中古住宅を購入する契約を締結したが、Ｉが売主であるためＩに 37 条書面を交付しなかった。"], "answer": 2, "exp": "宅建士証の提示は取引の関係者から請求があったときに必要で、37条書面の交付時に請求がなければ提示しなくても違反しません。よって選択肢3が違反しない記述になります。", "year": "H29-40", "diff": "B"}, {"id": "kako-gyoA-H30-27", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者Ａは、Ｂが所有し、居住している一戸建ての甲住宅の売却の媒介を、また、宅地建物取引業者Ｃは、Ｄから既存住宅の購入の媒介を依頼され、それぞれ媒介契約を締結した。その後、Ｂ及びＤは、それぞれＡ及びＣの媒介により、甲住宅の売買契約（以下この問において「本件契約」という。）を締結した。この場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。なお、この問において「建物状況調査」とは、法第 34 条の 2 第 1 項第 4 号に規定する調査をいうものとし、電磁的方法は考慮しないものとする。（改題）", "choices": ["Ａは、甲住宅の売却の依頼を受けた媒介業者として、本件契約が成立するまでの間に、Ｄに対し、建物状況調査を実施する者のあっせんの有無について確認しなければならない。", "Ａ及びＣは、本件契約が成立するまでの間に、Ｄに対し、甲住宅について、設計図書、点検記録その他の建物の建築及び維持保全の状況に関する書類で国土交通省令で定めるものの保存の状況及びそれぞれの書類に記載されている内容について説明しなければならない。", "ＣがＤとの間で媒介契約を締結する 3 年前に、甲住宅は既に建物状況調査を受けていた。この場合において、Ａ及びＣは、本件契約が成立するまでの間に、Ｄに対し、建物状況調査を実施している旨及びその結果の概要について説明しなければならない。", "Ａ及びＣは、Ｄが宅地建物取引業者である場合であっても、法第 37 条に基づき交付すべき書面において、甲住宅の構造耐力上主要な部分等の状況について当事者の双方が確認した事項があるときにその記載を省略することはできない。"], "answer": 3, "exp": "既存建物の売買では、建物の構造耐力上主要な部分等について当事者双方が確認した事項は37条書面の記載事項で、買主が宅建業者であっても省略できません。したがって選択肢4が正しくなります。", "year": "H30-27", "diff": "B"}, {"id": "kako-gyoA-H30-28", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはいくつあるか。なお、電磁的方法は考慮しないものとする。（改題）ア 宅地建物取引業者が、買主として、造成工事完了前の宅地の売買契約を締結しようとする場合、売主が当該造成工事に関し必要な都市計画法第 29 条第 1 項の許可を申請中であっても、当該売買契約を締結することができる。イ 宅地建物取引業者が、買主として、宅地建物取引業者との間で宅地の売買契約を締結した場合、法第 37 条の規定により交付すべき書面を交付しなくてよい。ウ 営業保証金を供託している宅地建物取引業者が、売主として、宅地建物取引業者との間で宅地の売買契約を締結しようとする場合、営業保証金を供託した供託所及びその所在地について、買主に対し説明をしなければならない。エ 宅地建物取引業者が、宅地の売却の依頼者と媒介契約を締結した場合、当該宅地の購入の申込みがあったときは、売却の依頼者が宅地建物取引業者であっても、遅滞なく、その旨を当該依頼者に報告しなければならない。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "exp": "正しいのはエのみで一つです。エは申込みがあった旨の報告義務が依頼者の業者・非業者を問わず生じるため正しく、アは未完成物件は許可等の処分後でないと自ら契約できず、イは業者が買主でも相手方の売主に37条書面が必要、ウは相手方が業者なら供託所等の説明は不要で、いずれも誤りです。", "year": "H30-28", "diff": "B"}, {"id": "kako-gyoA-H30-34", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者が媒介により既存建物の貸借の契約を成立させた場合、宅地建物取引業法第 37条の規定により、当該貸借の契約当事者に対して交付すべき書面に必ず記載しなければならない事項の組合せはどれか。なお、電磁的方法は考慮しないものとする。（改題）ア 当該建物が種類又は品質に関して契約の内容に適合しない場合においてその不適合を担保すべき責任の内容イ 当事者の氏名（法人にあっては、その名称）及び住所ウ 建物の引渡しの時期エ 建物の構造耐力上主要な部分等の状況について当事者双方が確認した事項", "choices": ["ア、イ", "イ、ウ", "イ、エ", "ウ、エ"], "answer": 1, "exp": "貸借で必ず記載するのはイ（当事者の氏名・住所）とウ（引渡しの時期）で、どちらも絶対的記載事項です。アの担保責任やエの構造耐力上主要な部分の確認事項は売買・交換の記載事項で貸借では不要なため、組合せはイ・ウとなります。", "year": "H30-34", "diff": "A"}, {"id": "kako-gyoA-R1-34", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業法（以下この問において「法」という。）第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、法の規定によれば、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["宅地建物取引業者が自ら売主として建物の売買を行う場合、当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の額として売買代金の額の 10 分の 2 を超えない額を予定するときは、37 条書面にその内容を記載しなくてよい。", "宅地建物取引業者が既存住宅の売買の媒介を行う場合、37 条書面に当該建物の構造耐力上主要な部分等の状況について当事者の双方が確認した事項を記載しなければならない。", "宅地建物取引業者は、その媒介により売買契約を成立させた場合、当該宅地又は建物に係る租税その他の公課の負担に関する定めについて、37 条書面にその内容を記載する必要はない。", "宅地建物取引業者は、その媒介により契約を成立させ、37 条書面を作成したときは、法第 35 条に規定する書面に記名した宅地建物取引士をして、37 条書面に記名させなければならない。"], "answer": 1, "exp": "既存住宅の売買の媒介では、建物の構造耐力上主要な部分等について当事者双方が確認した事項を37条書面に記載しなければなりません。よって選択肢2が正しくなります。", "year": "R1-34", "diff": "B"}, {"id": "kako-gyoA-R1-36", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者Ａが宅地建物取引業法（以下この問において「法」という。）第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、法の規定によれば、正しいものはいくつあるか。なお、電磁的方法は考慮しないものとする。（改題）ア Ａは、その媒介により建築工事完了前の建物の売買契約を成立させ、当該建物を特定するために必要な表示について 37 条書面で交付する際、法第 35 条の規定に基づく重要事項の説明において使用した図書の交付により行った。イ Ａが自ら貸主として宅地の定期賃貸借契約を締結した場合において、借賃の支払方法についての定めがあるときは、Ａは、その内容を 37 条書面に記載しなければならず、借主が宅地建物取引業者であっても、当該書面を交付しなければならない。ウ 土地付建物の売主Ａは、買主が金融機関から住宅ローンの承認を得られなかったときは契約を無条件で解除できるという取決めをしたが、自ら住宅ローンのあっせんをする予定がなかったので、37 条書面にその取決めの内容を記載しなかった。エ Ａがその媒介により契約を成立させた場合において、契約の解除に関する定めがあるときは、当該契約が売買、貸借のいずれに係るものであるかを問わず、37 条書面にその内容を記載しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "正しいのはアとエの二つです。アは重要事項説明で使った図書を交付して物件の表示に代えられるため正しく、エは解除の定めは売買・貸借どちらでも相対的記載事項なので正しく、イは自ら貸主となる行為は宅建業に当たらず37条の規制を受けず、ウは解除の取決めは記載必須なので誤りです。", "year": "R1-36", "diff": "B"}, {"id": "kako-gyoA-R2-10月-33", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者Ａが宅地建物取引業法第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["Ａが媒介により建物の貸借の契約を成立させたときは、37 条書面に借賃の額並びにその支払の時期及び方法を記載しなければならず、また、当該書面を契約の各当事者に交付しなければならない。", "Ａが媒介により宅地の貸借の契約を成立させた場合において、当該宅地の引渡しの時期について重要事項説明書に記載して説明を行ったときは、その内容を 37 条書面に記載する必要はない。", "Ａが自ら売主として宅地建物取引業者である買主と建物の売買契約を締結した場合、37条書面に宅地建物取引士をして記名させる必要はない。", "Ａが自ら売主として宅地の売買契約を締結した場合、代金についての金銭の貸借のあっせんに関する定めがある場合における当該あっせんに係る金銭の貸借が成立しないときの措置については、37 条書面に記載する必要はない。"], "answer": 0, "exp": "借賃の額とその支払時期・方法は37条書面の絶対的記載事項で、37条書面は契約の各当事者に交付します。よって選択肢1が正しくなります。", "year": "R2-10月-33", "diff": "A"}, {"id": "kako-gyoA-R2-10月-37", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として宅地の売買契約を締結した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、この問において「37 条書面」とは、同法第 37 条の規定に基づき交付すべき書面をいうものとし、電磁的方法は考慮しないものとする。（改題）ア Ａは、専任の宅地建物取引士をして、37 条書面の内容を当該契約の買主に説明させなければならない。イ Ａは、供託所等に関する事項を 37 条書面に記載しなければならない。ウ Ａは、買主が宅地建物取引業者であっても、37 条書面を遅滞なく交付しなければならない。エ Ａは、買主が宅地建物取引業者であるときは、当該宅地の引渡しの時期及び移転登記の申請の時期を 37 条書面に記載しなくてもよい。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "exp": "正しいのはウのみで一つです。ウは37条書面の交付義務は業者間取引でも適用され買主業者にも交付が必要なため正しく、アは37条書面は内容説明が不要、イは供託所等は37条の記載事項でない、エは引渡し・移転登記の時期は業者間でも絶対的記載事項なので、いずれも誤りです。", "year": "R2-10月-37", "diff": "A"}, {"id": "kako-gyoA-R2-12月-35", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者Ａが行う媒介業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、この問において「37 条書面」とは、同法第 37 条の規定により交付すべき書面をいうものとし、電磁的方法は考慮しないものとする。（改題）ア Ａが建物の売買契約を成立させた場合においては、37 条書面を買主に交付するに当たり、37 条書面に記名した宅地建物取引士ではないＡの従業者が当該書面を交付することができる。イ Ａが建物の賃貸借契約を成立させた場合においては、契約の当事者が宅地建物取引業者であっても、37 条書面には、引渡しの時期及び賃借権設定登記の申請の時期を記載しなければならない。ウ Ａが建物の売買契約を成立させた場合において、天災その他不可抗力による損害の負担に関する定めがあるときは、重要事項説明書にその旨記載していたとしても、その内容を37 条書面に記載しなければならない。エ Ａが事業用宅地の定期賃貸借契約を公正証書によって成立させた場合においては、公正証書とは別に 37 条書面を作成し交付するに当たり、契約の当事者が宅地建物取引業者であっても、宅地建物取引士をして 37 条書面に記名させなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "exp": "正しいのはア・ウ・エの三つです。アは交付を宅建士以外の従業者が行えるため正しく、ウは天災等の損害負担の定めは重説で記載済みでも37条に記載が必要で正しく、エは当事者が業者でも宅建士の記名が必要で正しく、イは貸借で引渡し時期は記載必要ですが賃借権設定登記の申請時期は不要なので誤りです。", "year": "R2-12月-35", "diff": "B"}, {"id": "kako-gyoA-R2-12月-37", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業法第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、同法の規定によれば、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["既存の建物の構造耐力上主要な部分等の状況について当事者の双方が確認した事項がない場合、確認した事項がない旨を 37 条書面に記載しなければならない。", "代金又は交換差金についての金銭の貸借のあっせんに関する定めがない場合、定めがない旨を 37 条書面に記載しなければならない。", "損害賠償額の予定又は違約金に関する定めがない場合、定めがない旨を 37 条書面に記載しなければならない。", "宅地又は建物に係る租税その他の公課の負担に関する定めがない場合、定めがない旨を37 条書面に記載しなければならない。"], "answer": 0, "exp": "既存建物の構造耐力上主要な部分等について当事者双方が確認した事項は37条書面の絶対的記載事項なので、確認した事項がない場合でもその旨を記載しなければなりません。よって選択肢1が正しくなります。他の3つは相対的記載事項で、定めがなければ記載不要です。", "year": "R2-12月-37", "diff": "B"}, {"id": "kako-gyoA-R3-10月-26", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として宅地建物取引業者ではない買主Ｂに対し建物の売却を行う場合における宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。", "choices": ["Ａは、Ｂに対し、専任の宅地建物取引士をして説明をさせなければならない。", "Ａは、Ｂに対し、代金以外に授受される金銭の額だけでなく、当該金銭の授受の目的についても説明しなければならない。", "Ａは、Ｂに対し、建物の上に存する登記された権利の種類及び内容だけでなく、移転登記の申請の時期についても説明しなければならない。", "Ａは、Ｂに対し、売買の対象となる建物の引渡しの時期について説明しなければならない。"], "answer": 1, "exp": "建物の売買では、代金以外に授受される金銭の額だけでなく、その授受の目的も重要事項として説明しなければなりません。よって選択肢2が正しくなります。移転登記や引渡しの時期は37条書面の事項で、重説の対象ではありません。", "year": "R3-10月-26", "diff": "A"}, {"id": "kako-gyoA-R3-10月-37", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業法第 35 条の規定に基づく重要事項の説明及び同法第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["宅地建物取引業者は、媒介により区分所有建物の賃貸借契約を成立させた場合、専有部分の用途その他の利用の制限に関する規約においてペットの飼育が禁止されているときは、その旨を重要事項説明書に記載して説明し、37 条書面にも記載しなければならない。", "宅地建物取引業者は、自ら売主となる土地付建物の売買契約において、宅地建物取引業者ではない買主から保全措置を講ずる必要のない金額の手付金を受領する場合、手付金の保全措置を講じないことを、重要事項説明書に記載して説明し、37 条書面にも記載しなければならない。", "宅地建物取引業者は、媒介により建物の敷地に供せられる土地の売買契約を成立させた場合において、当該売買代金以外の金銭の授受に関する定めがあるときは、その額並びに当該金銭の授受の時期及び目的を 37 条書面に記載しなければならない。", "宅地建物取引業者は、自ら売主となる土地付建物の売買契約及び自ら貸主となる土地付建物の賃貸借契約のいずれにおいても、37 条書面を作成し、その取引の相手方に交付しなければならない。"], "answer": 2, "exp": "土地の売買を媒介した場合、代金・借賃以外の金銭の授受に定めがあれば、その額・授受の時期・目的を37条書面に記載します。よって選択肢3が正しくなります。区分所有の利用制限や手付金の保全措置は37条の記載事項ではなく、自ら貸主となる賃貸借は宅建業に当たりません。", "year": "R3-10月-37", "diff": "B"}, {"id": "kako-gyoA-R3-10月-41", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者Ａが行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはいくつあるか。なお、この問において「37 条書面」とは、同法第 37 条の規定により交付すべき書面をいい、電磁的方法は考慮しないものとする。（改題）ア Ａが自ら売主として建物を売却する場合、宅地建物取引業者Ｂに当該売却の媒介を依頼したときは、Ｂは宅地建物取引士をして 37 条書面に記名させなければならず、Ａも宅地建物取引士をして 37 条書面に記名させなければならない。イ Ａが自ら売主として建物を売却する場合、当該売買契約に際し、買主から支払われる手付金の額が売買代金の 5 ％未満であるときは、当該手付金の額の記載があれば、授受の時期については 37 条書面に記載しなくてもよい。ウ Ａが売主を代理して建物を売却する場合、買主が宅地建物取引業者であるときは、37 条書面を交付しなくてもよい。エ Ａが売主を代理して抵当権が設定されている建物を売却する場合、当該抵当権の内容について 37 条書面に記載しなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 0, "exp": "正しいのはアのみで一つです。アは一つの取引に関わる全ての宅建業者が宅建士に記名させる義務を負うため正しく、イは手付金等以外の金銭授受の定めは額・目的・時期の記載が必要、ウは相手が業者でも記名・交付が必要、エは登記された権利は35条の事項で37条の記載事項でないため、いずれも誤りです。", "year": "R3-10月-41", "diff": "B"}, {"id": "kako-gyoA-R3-12月-26", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者が宅地建物取引業法第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["宅地建物取引業者は、その媒介により建物の売買の契約を成立させた場合において、当該建物の引渡しの時期又は移転登記の申請の時期のいずれかを 37 条書面に記載し、当該契約の各当事者に交付しなければならない。", "宅地建物取引業者は、その媒介により建物の貸借の契約を成立させた場合において、当該建物が既存の建物であるときは、建物の構造耐力上主要な部分等の状況について当事者の双方が確認した事項を 37 条書面に記載し、当該契約の各当事者に交付しなければならない。", "宅地建物取引業者は、その媒介により建物の貸借の契約を成立させた場合において、借賃以外の金銭の授受に関する定めがあるときは、その額や当該金銭の授受の時期だけでなく、当該金銭の授受の目的についても 37 条書面に記載し、当該契約の各当事者に交付しなければならない。", "宅地建物取引業者は、37 条書面を交付するに当たり、宅地建物取引士をして、その書面に記名の上、その内容を説明させなければならない。"], "answer": 2, "exp": "建物の貸借で借賃以外の金銭の授受に定めがあるときは、その額や授受の時期だけでなく授受の目的も37条書面に記載し、各当事者に交付しなければなりません。よって選択肢3が正しくなります。", "year": "R3-12月-26", "diff": "B"}, {"id": "kako-gyoA-R3-12月-40", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業法第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）についての宅地建物取引業者Ａの義務に関する次の記述のうち、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["Ａは、自ら売主として、宅地建物取引業者Ｂの媒介により、Ｃと宅地の売買契約を締結した。Ｂが宅地建物取引士をして 37 条書面に記名させている場合、Ａは宅地建物取引士をして当該書面に記名させる必要はない。", "Ａは、Ｄを売主としＥを買主とする宅地の売買契約を媒介した。当該売買契約に、当該宅地が種類又は品質に関して契約の内容に適合しない場合においてその不適合を担保すべき責任に関する特約があるときは、Ａは、当該特約について記載した 37 条書面をＤ及びＥに交付しなければならない。", "Ａは、自ら買主として、Ｆと宅地の売買契約を締結した。この場合、Ｆに対して 37 条書面を交付する必要はない。", "Ａは、自ら貸主として、Ｇと事業用建物の定期賃貸借契約を締結した。この場合において、借賃の支払方法についての定めがあるときは、Ａはその内容を 37 条書面に記載しなければならず、Ｇに対して当該書面を交付しなければならない。"], "answer": 1, "exp": "契約不適合を担保すべき責任（担保責任）に関する特約があるときは、その内容を37条書面に記載し、売主と買主の双方に交付しなければなりません。よって選択肢2が正しくなります。複数業者は全員が記名、業者が買主でも売主に交付、自ら貸主は宅建業外という点も押さえましょう。", "year": "R3-12月-40", "diff": "B"}, {"id": "kako-gyoA-R3-12月-42", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者が媒介により既存建物の貸借の契約を成立させた場合に関する次の記述のうち、宅地建物取引業法第 37 条の規定により当該貸借の契約当事者に対して交付すべき書面に記載しなければならない事項はいくつあるか。なお、電磁的方法は考慮しないものとする。（改題）ア 借賃以外の金銭の授受に関する定めがあるときは、その額並びに当該金銭の授受の時期及び目的イ 設計図書、点検記録その他の建物の建築及び維持保全の状況に関する書面で、国土交通省令で定めるものの保存の状況ウ 契約の解除に関する定めがあるときは、その内容エ 天災その他不可抗力による損害の負担に関する定めがあるときは、その内容", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "exp": "記載が必要なのはア・ウ・エの三つです。アは借賃以外の金銭授受の定め、ウは契約の解除の定め、エは天災等の損害負担の定めで、いずれも貸借の37条書面の記載事項です。イの設計図書等の保存状況は重要事項の説明事項で、37条書面の記載事項ではありません。", "year": "R3-12月-42", "diff": "B"}, {"id": "kako-gyoA-R4-32", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業法第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、誤っているものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["宅地建物取引業者である売主Ａは、宅地建物取引業者であるＢの媒介により、宅地建物取引業者ではないＣと宅地の売買契約を令和 5 年 4 月 1 日に締結した。ＡとＢが共同で作成した 37 条書面にＢの宅地建物取引士の記名がなされていれば、Ａは 37 条書面にＡの宅地建物取引士をして記名をさせる必要はない。", "宅地建物取引士は、37 条書面を交付する際、買主から請求があったときは、宅地建物取引士証を提示しなければならない。", "宅地建物取引業者である売主Ｄと宅地建物取引業者ではないＥとの建物の売買契約において、手付金の保全措置を講ずる場合、Ｄはその保全措置の概要を、重要事項説明書に記載し説明する必要があるが、37 条書面には記載する必要はない。", "宅地建物取引業者である売主と宅地建物取引業者ではない個人との建物の売買において、建物の品質に関して契約の内容に適合しない場合におけるその不適合を担保すべき責任について特約を定めたときは、37 条書面にその内容を記載しなければならない。"], "answer": 0, "exp": "設問は誤りを問うものです。一つの取引に関わる全ての宅建業者は宅建士に記名させる義務を負うため、共同作成でもBだけでなくAの宅建士の記名も必要です。したがって省略できるとする選択肢1が誤りとなります。", "year": "R4-32", "diff": "A"}, {"id": "kako-gyoA-R4-35", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["宅地建物取引業者の従業者である宅地建物取引士は、取引の関係者から事務所で従業者証明書の提示を求められたときは、この証明書に代えて従業者名簿又は宅地建物取引士証を提示することで足りる。", "宅地建物取引業者Ａが所有する甲建物を法人Ｂに売却するに当たり、Ｂが宅地建物取引業者であるか否かにかかわらず、ＡはＢに対し、宅地建物取引士をして、法第 35 条の規定に基づく書面を交付し説明をさせなければならない。", "法人Ｃが所有する乙建物の個人Ｄへの賃貸を宅地建物取引業者Ｅが媒介し、当該賃貸借契約が成立したときは、ＥはＤに対し、宅地建物取引士をして、法第 35 条の規定に基づく書面を交付し説明をさせなければならない。", "宅地建物取引業者Ｆが所有する丙宅地を法人Ｇに売却する契約を締結したとき、Ｇが宅地建物取引業者であるか否かにかかわらず、ＦはＧに対し、法第 37 条の規定に基づく書面を交付しなければならない。"], "answer": 3, "exp": "宅建業者が自ら売主となって宅地を売却するときは、相手方が宅建業者かどうかにかかわらず37条書面を交付しなければなりません。よって選択肢4が正しくなります。従業者証明書は名簿や宅建士証で代替できず、業者間では重説の交付は要るが説明は不要、重説は契約成立前に行う点も確認しましょう。", "year": "R4-35", "diff": "A"}, {"id": "kako-gyoA-R4-36", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者が行う宅地建物取引業法第 35 条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。なお、説明の相手方は宅地建物取引業者ではないものとする。", "choices": ["建物の売買の媒介を行う場合、当該建物が既存の住宅であるときは当該建物の検査済証（宅地建物取引業法施行規則第 16 条の 2 の 3 第 2 号に定めるもの）の保存の状況について説明しなければならず、当該検査済証が存在しない場合はその旨を説明しなければならない。", "宅地の売買の媒介を行う場合、売買代金の額並びにその支払の時期及び方法について説明しなければならない。", "建物の貸借の媒介を行う場合、当該建物が、水防法施行規則第 11 条第 1 号の規定により市町村（特別区を含む。）の長が提供する図面にその位置が表示されている場合には、当該図面が存在していることを説明すれば足りる。", "自ら売主となって建物の売買契約を締結する場合、当該建物の引渡しの時期について説明しなければならない。"], "answer": 0, "exp": "既存住宅の売買の媒介では、検査済証など建築・維持保全の状況に関する書類の保存の状況を説明する必要があり、その書類が存在しない場合はその旨を説明しなければなりません。よって選択肢1が正しくなります。", "year": "R4-36", "diff": "B"}, {"id": "kako-gyoA-R4-44", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業法（以下この問において「法」という。）第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、宅地建物取引業者Ａが法の規定に違反するものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["Ａは、自ら売主として宅地建物取引業者ではないＢとの間で宅地の売買契約を締結した。この際、当該買主の代理として宅地建物取引業者Ｃが関与していたことから、37 条書面をＢに加え、Ｃにも交付した。", "Ａは、その媒介により建物の貸借の契約を成立させ、37 条書面を借主に交付するに当たり、37 条書面に記名した宅地建物取引士が不在であったことから、宅地建物取引士ではないＡの従業員に書面を交付させた。", "Ａは、その媒介により借主Ｄと建物の貸借の契約を成立させた。この際、借賃以外の金銭の授受に関する定めがあるので、その額や当該金銭の授受の時期だけでなく、当該金銭の授受の目的についても 37 条書面に記載し、Ｄに交付した。", "Ａは、自ら売主として宅地建物取引業者Ｅの媒介により、宅地建物取引業者Ｆと宅地の売買契約を締結した。37 条書面については、Ａ、Ｅ、Ｆの三者で内容を確認した上で各自作成し、交付せずにそれぞれ自ら作成した書類を保管した。"], "answer": 3, "exp": "設問は違反する記述を問うものです。売主A・買主F・媒介Eの三者が宅建業者でも、37条書面は各当事者への交付が必要です。三者が各自作成して交付せず保管しただけでは交付義務に反するため、選択肢4が違反となります。", "year": "R4-44", "diff": "A"}, {"id": "kako-gyoA-R5-26", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業法第 37 条の規定により交付すべき書面に記載すべき事項を電磁的方法により提供すること（以下この問において「37 条書面の電磁的方法による提供」という。）に関する次の記述のうち、正しいものはいくつあるか。ア 宅地建物取引業者が自ら売主として締結する売買契約において、当該契約の相手方から宅地建物取引業法施行令第 3 条の 4 第 1 項に規定する承諾を得なければ、37 条書面の電磁的方法による提供をすることができない。イ 宅地建物取引業者が媒介業者として関与する売買契約について、宅地建物取引業法施行令第 3 条の 4 第 1 項に規定する承諾を取得するための通知の中に宅地建物取引士を明示しておけば、37 条書面の電磁的方法による提供において提供に係る宅地建物取引士を明示する必要はない。ウ 宅地建物取引業者が自ら売主として締結する売買契約において、37 条書面の電磁的方法による提供を行う場合、当該提供されたファイルへの記録を取引の相手方が出力することにより書面を作成できるものでなければならない。エ宅地建物取引業者が媒介業者として関与する建物賃貸借契約について、37 条書面の電磁的方法による提供を行う場合、当該提供するファイルに記録された記載事項について、改変が行われていないかどうかを確認することができる措置を講じなければならない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 2, "exp": "正しいのはア・ウ・エの三つです。アは電磁的提供に相手方の承諾が必要で正しく、ウは相手方が出力して書面を作成できる方式が必要で正しく、エは改変の有無を確認できる措置が必要で正しく、イは電磁的提供でも提供に係る宅建士を明示する必要があるため誤りです。", "year": "R5-26", "diff": "C"}, {"id": "kako-gyoA-R5-43", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者Ａが媒介により宅地の売買契約を成立させた場合における宅地建物取引業法第37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["Ａは、買主が宅地建物取引業者であるときは、37 条書面に移転登記の申請時期を記載しなくてもよい。", "Ａは、37 条書面を売買契約成立前に、各当事者に交付しなければならない。", "Ａは、37 条書面を作成したときは、専任の宅地建物取引士をして 37 条書面に記名させる必要がある。", "Ａは、天災その他不可抗力による損害の負担に関する定めがあるときは、その内容を 37条書面に記載しなければならない。"], "answer": 3, "exp": "天災その他不可抗力による損害の負担に関する定めがあるときは、その内容を37条書面に記載しなければなりません。よって選択肢4が正しくなります。移転登記の時期は業者間でも省略不可、交付は契約成立後、記名する宅建士は専任でなくてよい点も確認しましょう。", "year": "R5-43", "diff": "A"}, {"id": "kako-gyoA-R6-35", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者Ａが宅地建物取引業法第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に記載すべき事項を電磁的方法により提供すること（以下この問において「37 条書面の電磁的方法による提供」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["Ａが自ら売主として締結する宅地の売買契約において、37 条書面の電磁的方法による提供を行う場合、当該契約の相手方に対し、あらかじめ、電磁的方法による提供に用いる電磁的方法の種類及び内容を宅地建物取引士に説明させなければならない。", "Ａが媒介業者として関与する建物賃貸借契約において、37 条書面の電磁的方法による提供を行う場合、その方法は 37 条書面の交付に係る宅地建物取引士が明示されるものでなければならない。", "Ａが自ら売主として締結する宅地の売買契約において、契約の相手方から 37 条書面の電磁的方法による提供を行うことについて書面により承諾を得た場合は、その後に当該契約の相手方から書面で電磁的方法による提供を受けない旨の申出があったときでも、37 条書面の電磁的方法による提供をすることができる。", "Ａが媒介業者として関与する宅地の売買契約において、37 条書面の電磁的方法による提供を行う場合であっても、提供後速やかに 37 条書面を交付しなければならない。"], "answer": 1, "exp": "37条書面を電磁的方法で提供する場合、その方法は交付に係る宅地建物取引士が明示されるものでなければなりません。よって選択肢2が正しくなります。種類・内容の説明は宅建士でなくてよく、受けない旨の申出があれば提供不可、電磁的提供をすれば別途書面交付は不要です。", "year": "R6-35", "diff": "B"}, {"id": "kako-gyoA-R6-40", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者が媒介により既存建物の貸借の契約を成立させた場合、宅地建物取引業法第 37条の規定により当該貸借の契約当事者に対して交付すべき書面に必ず記載しなければならない事項の組合せとして正しいものは次の１から４のうちどれか。ア 当該建物に係る租税その他の公課の負担イ 敷金や共益費など借賃以外の金銭の授受に関する定めがあるときは、その額並びに当該金銭の授受の時期及び目的ウ 損害賠償額の予定又は違約金に関する定めがあるときは、その内容エ建物の構造耐力上主要な部分又は雨水の浸入を防止する部分として国土交通省令で定めるものの状況", "choices": ["ア、イ", "イ、ウ", "ウ、エ", "ア、エ"], "answer": 1, "exp": "貸借で必ず記載するのはイ（借賃以外の金銭授受の定めの額・時期・目的）とウ（損害賠償額の予定・違約金の定め）です。アの租税公課の負担やエの構造耐力上主要な部分の状況は売買・交換の記載事項で貸借では不要なため、組合せはイ・ウとなります。", "year": "R6-40", "diff": "A"}, {"id": "kako-gyoA-R6-44", "subject": "宅建業法", "topic": "37条書面", "type": "select", "q": "宅地建物取引業者Ａが宅地建物取引業法第 37 条の規定により交付すべき書面（以下この問において「37 条書面」という。）に関する次の記述のうち、宅地建物取引業法の規定に違反しないものはどれか。", "choices": ["Ａは、建築工事完了前の建物の売買契約を媒介したときに、37 条書面に記載する当該建物を特定するために必要な表示について、宅地建物取引業法第 35 条の規定に基づく重要事項の説明において使用した図書を交付することによって行った。", "Ａは、貸主Ｂと借主Ｃとの間で締結された建物の賃貸借契約を媒介したときに、借賃の額、支払時期及び支払方法について定められていたが、ＢとＣの承諾を得たので、37 条書面に記載しなかった。", "Ａは、宅地建物取引業者Ｄと宅地建物取引業者Ｅとの間で締結された宅地の売買契約を媒介したときに、37 条書面に当該宅地の引渡しの時期を記載しなかった。", "Ａが建物の売買契約を買主として締結した場合に、売主Ｆに承諾を得たので、37 条書面をＦに交付しなかった。"], "answer": 0, "exp": "工事完了前の建物を特定するための表示は、重要事項説明で使用した図書を交付する方法によることが認められています。よって選択肢1は違反しません。借賃の記載省略、業者間での引渡し時期の省略、買主業者から売主への交付省略はいずれも違反です。", "year": "R6-44", "diff": "A"}, {"id": "kako-gyoA-H28-41", "subject": "宅建業法", "topic": "自己の所有に属しない物件の契約制限", "type": "select", "q": "宅地建物取引業者Ａが行う業務に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["Ａは、宅地建物取引業者Ｂから宅地の売却についての依頼を受けた場合、媒介契約を締結したときは媒介契約の内容を記載した書面を交付しなければならないが、代理契約を締結したときは代理契約の内容を記載した書面を交付する必要はない。", "Ａは、自ら売主として宅地の売買契約を締結したときは、相手方に対して、遅滞なく、法第 37 条の規定による書面を交付するとともに、その内容について宅地建物取引士をして説明させなければならない。", "Ａは、宅地建物取引業者でないＣが所有する宅地について、自らを売主、宅地建物取引業者Ｄを買主とする売買契約を締結することができる。", "Ａは、宅地建物取引業者でないＥから宅地の売却についての依頼を受け、専属専任媒介契約を締結したときは、当該宅地について法で規定されている事項を、契約締結の日から休業日数を含め 5 日以内に指定流通機構へ登録する義務がある。"], "answer": 2, "exp": "他人が所有する物件を自ら売主として売買する契約は原則できませんが、この制限は宅建業者間の取引には適用されません。よって買主が宅建業者Dであれば非業者C所有の宅地でも契約でき、選択肢3が正しくなります。", "year": "H28-41", "diff": "A"}, {"id": "kako-gyoA-R3-12月-38", "subject": "宅建業法", "topic": "自己の所有に属しない物件の契約制限", "type": "select", "q": "次の記述のうち、宅地建物取引業法の規定に違反しないものの組合せとして、正しいものはどれか。なお、この問において「建築確認」とは、建築基準法第 6 条第 1 項の確認をいうものとする。ア 宅地建物取引業者Ａは、建築確認の済んでいない建築工事完了前の賃貸住宅の貸主Ｂから当該住宅の貸借の媒介を依頼され、取引態様を媒介と明示して募集広告を行った。イ 宅地建物取引業者Ｃは、建築確認の済んでいない建築工事完了前の賃貸住宅の貸主Ｄから当該住宅の貸借の代理を依頼され、代理人として借主Ｅとの間で当該住宅の賃貸借契約を締結した。ウ 宅地建物取引業者Ｆは、自己の所有に属しない宅地について、自ら売主として、宅地建物取引業者Ｇと売買契約の予約を締結した。エ 宅地建物取引業者Ｈは、農地の所有者Ｉと建物の敷地に供するため農地法第 5 条の許可を条件とする売買契約を締結したので、自ら売主として宅地建物取引業者ではない個人ＪとＩ所有の農地の売買契約を締結した。", "choices": ["ア、イ", "ア、エ", "イ、ウ", "ウ、エ"], "answer": 2, "exp": "違反しないのはイとウの組合せです。イは貸借の代理・媒介には契約時期の制限がなく建築確認前でも可能なため正しく、ウは他人物件でも買主が宅建業者なら予約を含め契約できるため正しく、アは未完成物件の確認前広告が不可、エは停止条件付では取得が確実でないため自ら売主契約が不可で、いずれも違反します。", "year": "R3-12月-38", "diff": "A"}, {"id": "kako-gyoA-H27-34", "subject": "宅建業法", "topic": "クーリング・オフ", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者でないＢとの間で建物の売買契約を締結する場合における次の記述のうち、民法及び宅地建物取引業法の規定によれば、正しいものはどれか。（改題）", "choices": ["Ｃが建物の所有権を有している場合、ＡはＢとの間で当該建物の売買契約を締結してはならない。ただし、ＡがＣとの間で、すでに当該建物を取得する契約（当該建物を取得する契約の効力の発生に一定の条件が付されている。）を締結している場合は、この限りではない。", "Ａは、Ｂとの間における建物の売買契約において、「ＡがＢに対して契約内容に適合しない担保責任を負う通知の期間は、 ゆるクーリング・オフによる契約の解除をする場合における次の記述のうち、誤っているものはどれか。", "choices": ["Ｂは、Ａの仮設テント張りの案内所で買受けの申込みをし、 2 日後、Ａの事務所で契約を締結した上で代金全額を支払った。その 5 日後、Ｂが、宅地の引渡しを受ける前に当該契約について解除の書面を送付した場合、Ａは代金全額が支払われていることを理由に契約の解除を拒むことができる。", "Ｂは、自らの希望により自宅近くの喫茶店において買受けの申込みをし、売買契約を締結した。当該契約に係るクーリング・オフについては、その 3 日後にＡから書面で告げられた場合、Ｂは、当該契約の締結日から 10 日後であっても契約の解除をすることができる。", "Ｂは、Ａの仮設テント張りの案内所で買受けの申込みをし、Ａの事務所でクーリング・オフについて書面で告げられ、その日に契約を締結した。この書面の中で、クーリング・オフによる契約の解除ができる期間を 14 日間としていた場合、Ｂは、当該契約の締結日から 10 日後であっても契約の解除をすることができる。", "Ｂは、売買契約締結後に速やかに建物建築工事請負契約を締結したいと考え、自ら指定した宅地建物取引業者であるハウスメーカー（Ａから当該宅地の売却について代理又は媒介の依頼は受けていない。）の事務所で買受けの申込み及び売買契約の締結をし、その際、クーリング・オフについて書面で告げられた。その 6 日後、Ｂが当該契約について解除の書面を送付した場合、Ａは契約の解除を拒むことができない。"], "answer": 0, "exp": "設問は誤りを問うものです。代金全額を支払っても引渡しを受けていなければクーリング・オフはでき、また申込日から起算しても8日以内の解除通知です。代金全額支払いを理由に解除を拒めるとする選択肢1が誤りとなります。", "year": "R2-12月-39", "diff": "B"}, {"id": "kako-gyoA-R3-10月-39", "subject": "宅建業法", "topic": "クーリング・オフ", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者Ｂの媒介により、宅地建物取引業者ではないＣを買主とするマンションの売買契約を締結した場合における宅地建物取引業法第 37 条の2 の規定に基づくいわゆるクーリング・オフについて告げるときに交付すべき書面（以下この問において「告知書面」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["告知書面には、クーリング・オフによる買受けの申込みの撤回又は売買契約の解除があったときは、Ａは、その買受けの申込みの撤回又は売買契約の解除に伴う損害賠償又は違約金の支払を請求することができないことを記載しなければならない。", "告知書面には、クーリング・オフについて告げられた日から起算して 8 日を経過するまでの間は、Ｃが当該マンションの引渡しを受け又は代金の全部を支払った場合を除き、書面によりクーリング・オフによる買受けの申込みの撤回又は売買契約の解除を行うことができることを記載しなければならない。", "告知書面には、Ｃがクーリング・オフによる売買契約の解除をするときは、その旨を記載した書面がＡに到達した時点で、その効力が発生することを記載しなければならない。", "告知書面には、Ａ及びＢの商号又は名称及び住所並びに免許証番号を記載しなければならない。"], "answer": 0, "exp": "告知書面には、クーリング・オフによる撤回・解除があっても宅建業者が損害賠償や違約金を請求できない旨を記載しなければなりません。よって選択肢1が正しくなります。期間の除外事由は引渡しと代金全部の両方、効力は書面発信時、記載する業者情報は売主Aのものです。", "year": "R3-10月-39", "diff": "C"}, {"id": "kako-gyoA-R3-12月-43", "subject": "宅建業法", "topic": "クーリング・オフ", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者ではない法人Ｂ又は宅地建物取引業者ではない個人Ｃをそれぞれ買主とする土地付建物の売買契約を締結する場合において、宅地建物取引業法第 37 条の 2 の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、誤っているものはどれか。なお、この問において、買主は本件売買契約に係る代金の全部を支払ってはおらず、かつ、土地付建物の引渡しを受けていないものとする。", "choices": ["Ｂは、Ａの仮設テント張りの案内所で買受けの申込みをし、その 8 日後にＡの事務所で契約を締結したが、その際クーリング・オフについて書面の交付を受けずに告げられた。この場合、クーリング・オフについて告げられた日から 8 日後には、Ｂはクーリング・オフによる契約の解除をすることができない。", "Ｂは、Ａの仮設テント張りの案内所で買受けの申込みをし、その 3 日後にＡの事務所でクーリング・オフについて書面の交付を受け、告げられた上で契約を締結した。この書面の中で、クーリング・オフによる契約の解除ができる期間を 14 日間としていた場合、Ｂは、その書面を交付された日から 12 日後であっても契約の解除をすることができる。", "Ｃは、Ａの仮設テント張りの案内所で買受けの申込みをし、その 3 日後にＡの事務所でクーリング・オフについて書面の交付を受け、告げられた上で契約を締結した。Ｃは、その書面を受け取った日から起算して 8 日目に、Ａに対しクーリング・オフによる契約の解除を行う旨の文書を送付し、その 2 日後にＡに到達した。この場合、Ａは契約の解除を拒むことができない。", "Ｃは、Ａの事務所で買受けの申込みをし、その翌日、喫茶店で契約を締結したが、Ａはクーリング・オフについて告げる書面をＣに交付しなかった。この場合、Ｃはクーリング・オフによる契約の解除をすることができない。"], "answer": 0, "exp": "設問は誤りを問うものです。クーリング・オフの8日の期間は書面で告げられて初めて進行し、口頭で告げられただけでは期間は経過しません。したがって告げられた日から8日後でも解除でき、解除できないとする選択肢1が誤りとなります。", "year": "R3-12月-43", "diff": "B"}, {"id": "kako-gyoA-R4-38", "subject": "宅建業法", "topic": "クーリング・オフ", "type": "select", "q": "宅地建物取引業者が自ら売主となる宅地の売買契約について、買受けの申込みを喫茶店で行った場合における宅地建物取引業法第 37 条の 2 の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、正しいものはどれか。", "choices": ["買受けの申込みをした者が、売買契約締結後、当該宅地の引渡しを受けた場合、クーリング・オフによる当該売買契約の解除を行うことができない。", "買受けの申込みをした者が宅地建物取引業者であった場合、クーリング・オフについて告げられていなくても、申込みを行った日から起算して 8 日を経過するまでは、書面により買受けの申込みの撤回をすることができる。", "売主業者の申出により、買受けの申込みをした者の勤務先で売買契約を行った場合、クーリング・オフによる当該売買契約の解除を行うことはできない。", "クーリング・オフによる売買契約の解除がなされた場合において、宅地建物取引業者は、買受けの申込みをした者に対し、速やかに、当該売買契約の締結に際し受領した手付金その他の金銭を返還しなければならない。"], "answer": 3, "exp": "クーリング・オフで解除されたら、業者は受領した手付金その他の金銭を速やかに全額返還する義務があり、これが正解。他の肢は「解除できない」と言い切っているが、喫茶店での申込みは事務所等以外なので買主が非業者なら解除でき、代金全額支払い前なら引渡し済みでも解除可能。勤務先も業者側の申出なら解除できる。", "year": "R4-38", "diff": "A"}, {"id": "kako-gyoA-R5-35", "subject": "宅建業法", "topic": "クーリング・オフ", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者ではない買主Ｂから宅地の買受けの申込みを受けた場合における宅地建物取引業法第 37 条の 2 の規定に基づくいわゆるクーリング・オフに関する次の記述のうち、正しいものはどれか。", "choices": ["Ａは、仮設テント張りの案内所でＢから買受けの申込みを受けた際、以後の取引について、その取引に係る書類に関してＢから電磁的方法で提供をすることについての承諾を得た場合、クーリング・オフについて電磁的方法で告げることができる。", "Ａが、仮設テント張りの案内所でＢから買受けの申込みを受けた場合、Ｂは、クーリング・オフについて告げられた日から 8 日以内に電磁的方法により当該申込みの撤回を申し出れば、申込みの撤回を行うことができる。", "Ａが、Ａの事務所でＢから買受けの申込みを受けた場合、Ｂは、申込みの日から 8 日以内に電磁的方法により当該申込みの撤回を申し出れば、申込みの撤回を行うことができる。", "Ａが、売却の媒介を依頼している宅地建物取引業者Ｃの事務所でＢから買受けの申込みを受けた場合、Ｂは、申込みの日から 8 日以内に書面により当該申込みの撤回を申し出ても、申込みの撤回を行うことができない。"], "answer": 3, "exp": "クーリング・オフができるのは「事務所等以外」で申込みをしたときで、売主が媒介を依頼した他業者Ｃの事務所は事務所等に含まれるため、そこで申込みをしたＢは解除できず、これが正しい。告知や撤回はいずれも書面が必要で電磁的方法は不可、事務所での申込みはそもそも対象外。", "year": "R5-35", "diff": "A"}, {"id": "kako-gyoA-R6-30", "subject": "宅建業法", "topic": "クーリング・オフ", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者ではない個人Ｂとの間で宅地の売買契約を締結し、手付金を支払ったＢが、宅地建物取引業法第 37 条の２の規定に基づくいわゆるクーリング・オフにより、当該売買契約を契約締結の日の翌日に解除しようとしている。この場合に関する次の記述のうち、誤っているものはどれか。", "choices": ["Ａがクーリング・オフについて告げるときに交付すべき書面には、Ａの商号又は名称及び住所並びに免許証番号の記載は必要であるが、Ａの宅地建物取引士の記名は必要ない。", "Ｂが、自らの申出により、Ｂの勤務する会社の事務所において、宅地の買受けの申込み及びＡとの売買契約の締結をした場合、Ｂは、クーリング・オフによる当該売買契約の解除を行うことができない。", "Ｂが、自らの申出により、喫茶店において、宅地の買受けの申込み及びＡとの売買契約の締結をした場合、Ｂは、クーリング・オフによる当該売買契約の解除を行うことができる。", "Ｂは、自らの申出により、Ｂが融資を受ける銀行（宅地建物取引業者ではない。）において、宅地の買受けの申込み及びＡとの売買契約の締結をした場合、クーリング・オフによる当該売買契約の解除を行うことができない。"], "answer": 3, "exp": "誤りを選ぶ問題。買主が自ら申し出た自宅や勤務先は事務所等扱いで解除不可だが、銀行は業者でもなく自宅・勤務先でもないため、そこでの申込み・契約はクーリング・オフの対象となり解除できる。よって「解除できない」とする肢4が誤り。告知書面に宅建士の記名不要、勤務先での申出は解除不可、喫茶店は解除可能はいずれも正しい。", "year": "R6-30", "diff": "A"}, {"id": "kako-gyoA-H28-43", "subject": "宅建業法", "topic": "手付金等の保全", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者でないＢと建築工事完了前のマンション（代金 3 ,000 万円）の売買契約を締結した場合、宅地建物取引業法第 41 条の規定に基づく手付金等の保全措置（以下この問において「保全措置」という。）に関する次の記述のうち、正しいものはいくつあるか。ア Ａが、Ｂから手付金 600 万円を受領する場合において、その手付金の保全措置を講じていないときは、Ｂは、この手付金の支払を拒否することができる。イ Ａが、保全措置を講じて、Ｂから手付金 300 万円を受領した場合、Ｂから媒介を依頼されていた宅地建物取引業者Ｃは、Ｂから媒介報酬を受領するに当たり、Ａと同様、あらかじめ保全措置を講じなければ媒介報酬を受領することができない。ウ Ａは、Ｂから手付金 150 万円を保全措置を講じないで受領し、その後引渡し前に、中間金350 万円を受領する場合は、すでに受領した手付金と中間金の合計額 500 万円について保全措置を講じなければならない。エ Ａは、保全措置を講じないで、Ｂから手付金 150 万円を受領した場合、その後、建築工事が完了しＢに引き渡す前に中間金 150 万円を受領するときは、建物についてＢへの所有権移転の登記がなされるまで、保全措置を講じる必要がない。", "choices": ["一つ", "二つ", "三つ", "四つ"], "answer": 1, "exp": "正しいのはアとウの二つ。アは手付金600万円が代金の5％超で保全措置未了なら買主は支払拒否でき正しい。ウは中間金受領前に手付金と中間金の合計500万円について保全措置が必要で正しい。イは媒介業者に保全義務はなく誤り、エは完成・未完成は契約時で判断し未完成扱いなので保全措置が必要で誤り。", "year": "H28-43", "diff": "B"}, {"id": "kako-gyoA-H30-38", "subject": "宅建業法", "topic": "手付金等の保全", "type": "select", "q": "宅地建物取引業者である売主は、宅地建物取引業者ではない買主との間で、戸建住宅の売買契約（所有権の登記は当該住宅の引渡し時に行うものとする。）を締結した。この場合における宅地建物取引業法第 41 条又は第 41 条の 2 の規定に基づく手付金等の保全措置（以下この問において「保全措置」という。）に関する次の記述のうち、正しいものはどれか。", "choices": ["当該住宅が建築工事の完了後で、売買代金が 3 ,000 万円であった場合、売主は、買主から手付金 200 万円を受領した後、当該住宅を引き渡す前に中間金 300 万円を受領するためには、手付金 200 万円と合わせて保全措置を講じた後でなければ、その中間金を受領することができない。", "当該住宅が建築工事の完了前で、売買代金が 2 ,500 万円であった場合、売主は、当該住宅を引き渡す前に買主から保全措置を講じないで手付金 150 万円を受領することができる。", "当該住宅が建築工事の完了前で、売主が買主から保全措置が必要となる額の手付金を受領する場合、売主は、事前に、国土交通大臣が指定する指定保管機関と手付金等寄託契約を締結し、かつ、当該契約を証する書面を買主に交付した後でなければ、買主からその手付金を受領することができない。", "当該住宅が建築工事の完了前で、売主が買主から保全措置が必要となる額の手付金等を受領する場合において売主が銀行との間で締結する保証委託契約に基づく保証契約は、建築工事の完了までの間を保証期間とするものでなければならない。"], "answer": 0, "exp": "完成物件でも手付金と中間金の合計が代金の10％超になれば保全が必要。手付金200万円は不要でも、中間金300万円を受けるには合計500万円について先に保全措置が要り、これが正しい。未完成で125万円超の肢2は保全必要、未完成に指定保管機関は使えず、保証期間は引渡しまでで肢4は誤り。", "year": "H30-38", "diff": "A"}, {"id": "kako-gyoA-R5-39", "subject": "宅建業法", "topic": "手付金等の保全", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者ではない個人Ｂとの間で宅地の売買契約を締結する場合における手付金の保全措置に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、当該契約に係る手付金は保全措置が必要なものとする。", "choices": ["Ａは、Ｂから手付金を受領した後に、速やかに手付金の保全措置を講じなければならない。", "Ａは、手付金の保全措置を保証保険契約を締結することにより講ずる場合、保険期間は保証保険契約が成立した時から宅地建物取引業者が受領した手付金に係る宅地の引渡しまでの期間とすればよい。", "Ａは、手付金の保全措置を保証保険契約を締結することにより講ずる場合、保険事業者との間において保証保険契約を締結すればよく、保険証券をＢに交付する必要はない。", "Ａは、手付金の保全措置を保証委託契約を締結することにより講ずるときは、保証委託契約に基づいて銀行等が手付金の返還債務を連帯して保証することを約する書面のＢへの交付に代えて、Ｂの承諾を得ることなく電磁的方法により講ずることができる。"], "answer": 1, "exp": "保証保険契約による保全は、保険期間が少なくとも契約成立時から物件引渡しまでであればよく、これが正しい。保全措置は受領の「前」に講じる必要があり肢1は誤り、保険証券の買主交付が必要で肢3は誤り、電磁的方法には買主の承諾が必要で肢4は誤り。", "year": "R5-39", "diff": "B"}, {"id": "kako-gyoA-R6-34", "subject": "宅建業法", "topic": "手付金等の保全", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者ではない個人Ｂとの間で、土地付建物を 4 ,000 万円で売却する売買契約（所有権の登記は当該土地付建物の引渡し時に行うものとする。）を締結する場合における宅地建物取引業 "select", "q": "宅地建物取引業法に関する次の記述のうち、正しいものはいくつあるか。なお、取引の相手方は宅地建物取引業者ではないものとする。（改題）ア 宅地建物取引業者は、自己の所有に属しない宅地又は建物についての自ら売主となる売買契約を締結してはならないが、当該売買契約の予約を行うことはできる。イ 宅地建物取引業者は、自ら売主となる宅地又は建物の売買契約において、その目的物が種類又は品質に関して契約の内容に適合しない場合におけるその不適合を担保すべき責任に関し、取引の相手方が同意した場合に限り、当該不適合について買主が売主に通知すべき期間を当該宅地又は建物の引渡しの日から 1 年とする特約を有効に定めることができる。ウ 宅地建物取引業者は、いかなる理由があっても、その業務上取り扱ったことについて知り得た秘密を他に漏らしてはならない。エ 宅地建物取引業者は、宅地建物取引業に係る契約の締結の勧誘をするに際し、その相手方に対し、利益を生ずることが確実であると誤解させるべき断定的判断を提供する行為をしてはならない。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 0, "exp": "正しいものは一つ（エ）。エは断定的判断の提供禁止で正しい。アは自己所有でない物件は予約も含め自ら売主契約は禁止で誤り、イは相手方の同意があっても引渡しから1年とする通知期間特約は無効で誤り、ウは正当な理由があれば秘密を漏らせるため「いかなる理由でも」は誤り。よって正しいのはエだけ。", "year": "R1-27", "diff": "B"}, {"id": "kako-gyoA-R2-10月-42", "subject": "宅建業法", "topic": "担保責任についての特約の制限", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として締結する売買契約に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）及び民法の規定によれば、誤っているものはどれか。\b（改題）", "choices": ["Ａが宅地建物取引業者ではないＢとの間で締結する宅地の売買契約において、当該宅地の種類又は品質に関して契約の内容に適合しない場合、ＢがＡに対して行う通知の期間を引渡日から 2 年とする特約を定めた場合、この特約は有効である。", "Ａが宅地建物取引業者ではないＣとの間で建築工事の完了前に締結する建物（代金 5 ,000万円）の売買契約においては、Ａは、手付金 200 万円を受領した後、法第 41 条に定める手付金等の保全措置を講じなければ、当該建物の引渡し前に中間金 300 万円を受領することができない。", "Ａが宅地建物取引業者Ｄとの間で造成工事の完了後に締結する宅地（代金 3 ,000 万円）の売買契約においては、Ａは、法第 41 条の 2 に定める手付金等の保全措置を講じないで、当該宅地の引渡し前に手付金 800 万円を受領することができる。", "Ａが宅地建物取引業者ではないＥとの間で締結する建物の売買契約において、Ａは当該建物の種類又は品質に関して契約の内容に適合しない場合におけるその不適合を担保すべき責任を一切負わないとする特約を定めた場合、この特約は無効となり、Ａが当該責任を負う期間は当該建物の引渡日から 2 年となる。"], "answer": 3, "exp": "誤りを選ぶ問題。担保責任を一切負わない特約は買主に不利で無効となり民法が適用されるが、肢4は「責任を負う期間」を引渡日起算としており、この場合は債権の消滅時効の問題で引渡日から10年となる。よって「2年」とする肢4が誤り。", "year": "R2-10月-42", "diff": "B"}, {"id": "kako-gyoA-H28-29", "subject": "宅建業法", "topic": "割賦販売契約の解除等の制限", "type": "select", "q": "宅地建物取引業者Ａの業務に関する次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定に違反するものの組合せはどれか。ア Ａは、マンションを分譲するに際して案内所を設置したが、売買契約の締結をせず、かつ、契約の申込みの受付も行わない案内所であったので、当該案内所に法第 50 条第 1 項に規定する標識を掲示しなかった。イ Ａは、建物の売買の媒介に際し、買主に対して手付の貸付けを行う旨を告げて契約の締結を勧誘したが、売買は成立しなかった。ウ Ａは、法第 49 条の規定によりその事務所ごとに備えるべきこととされている業務に関する帳簿について、取引関係者から閲覧の請求を受けたが、閲覧に供さなかった。エ Ａは、自ら売主となるマンションの割賦販売の契約について、宅地建物取引業者でない買主から賦払金が支払期日までに支払われなかったので、直ちに賦払金の支払の遅延を理由として契約を解除した。", "choices": ["ア、イ", "ア、ウ", "ア、イ、エ", "イ、ウ、エ"], "answer": 2, "exp": "違反するのはア・イ・エ。アは申込受付をしない案内所でも標識掲示は必要で違反、イは手付貸付など信用供与による勧誘は契約不成立でも違反、エは割賦販売の解除には30日以上の書面催告が必要で直ちに解除は違反。ウの帳簿は閲覧させる義務がなく違反しない。よって違反はア・イ・エ。", "year": "H28-29", "diff": "B"}, {"id": "kako-gyoA-R2-10月-32", "subject": "宅建業法", "topic": "割賦販売契約の解除等の制限", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者ではないＢとの間で建物の売買契約を締結する場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。", "choices": ["ＡＢ間の建物の売買契約において、Ｂが当該契約の履行に着手した後においては、Ａは、契約の締結に際してＢから受領した手付金の倍額をＢに現実に提供したとしても、契約を解除することはできない。", "ＡＢ間の建物の売買契約における「法第 37 条の 2 の規定に基づくクーリング・オフによる契約の解除の際に、当該契約の締結に際しＡがＢから受領した手付金は返還しない」旨の特約は有効である。", "ＡＢ間の建物の割賦販売の契約において、Ｂからの賦払金が当初設定していた支払期日までに支払われなかった場合、Ａは直ちに賦払金の支払の遅滞を理由として当該契約を解除することができる。", "ＡＢ間で工事の完了前に当該工事に係る建物（代金 5 ,000 万円）の売買契約を締結する場合、Ａは、法第 41 条に定める手付金等の保全措置を講じた後でなければ、Ｂから 200 万円の手付金を受領してはならない。"], "answer": 0, "exp": "正しいのは肢1。買主が履行に着手した後は、売主は手付倍額を提供しても手付解除できず正しい。肢2は解除時の手付金返還を否定する特約は買主に不利で無効、肢3は割賦販売の解除は30日以上の書面催告が必要で直ちには不可、肢4は手付金200万円が5％以下かつ1000万円以下で保全不要のため誤り。", "year": "R2-10月-32", "diff": "A"}, {"id": "kako-gyoA-R4-30", "subject": "宅建業法", "topic": "割賦販売契約の解除等の制限", "type": "select", "q": "次の記述のうち、宅地建物取引業法（以下この問において「法」という。）及び犯罪による収益の移転防止に関する法律の規定によれば、正しいものはいくつあるか。ア 法第 35 条第 2 項の規定による割賦販売とは、代金の全部又は一部について、目的物の引渡し後 6 か月以上の期間にわたり、かつ、 2 回以上に分割して受領することを条件として販売することをいう。イ 犯罪による収益の移転防止に関する法律において、宅地建物取引業のうち、宅地若しくは建物の売買契約の締結又はその代理若しくは媒介が特定取引として規定されている。ウ 宅地建物取引業者は、その従業者に対し、その業務を適正に実施させるため、必要な教育を行うよう努めなければならないと法に定められている。エ宅地建物取引業者の使用人その他の従業者は、正当な理由がある場合でなければ、宅地建物取引業の業務を補助したことについて知り得た秘密を他に漏らしてはならないと法に定められている。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 2, "exp": "正しいものは三つ（イ・ウ・エ）。イは売買・代理・媒介が特定取引に規定され正しい、ウは従業者への教育の努力義務があり正しい、エは従業者も正当な理由なく秘密を漏らせず正しい。アは割賦販売の定義は引渡し後「1年以上」で「6か月以上」は誤り。よって正しいのは三つ。", "year": "R4-30", "diff": "B"}, {"id": "kako-gyoA-H27-36", "subject": "宅建業法", "topic": "損害賠償額の予定等の制限", "type": "select", "q": "宅地建物取引業 該手付金 500 万円を償還して、契約を一方的に解除した。エ Ａは、建築工事完了後のマンションの売買契約を締結する際に、当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の予定額を 1 ,000 万円とする特約を定めた。", "choices": ["ア、ウ", "イ、ウ", "ア、イ、エ", "ア、ウ、エ"], "answer": 3, "exp": "違反するのはア・ウ・エ。アは未完成で中間金受領前に合計400万円の保全が必要なのに後から講じており違反、ウは手付解除は倍額（1000万円）提供が必要で500万円償還は違反、エは損害賠償予定額は代金4000万円の2割800万円が限度で1000万円は違反。イは完成物件で400万円がちょうど10％以下のため保全不要で違反しない。", "year": "H28-28", "diff": "A"}, {"id": "kako-gyoA-H29-31", "subject": "宅建業法", "topic": "損害賠償額の予定等の制限", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者でないＢとの間でマンション（代金3 ,000 万円）の売買契約を締結しようとする場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはいくつあるか。ア Ｂは自ら指定した自宅においてマンションの買受けの申込みをした場合においても、法第37 条の 2 の規定に基づき、書面により買受けの申込みの撤回を行うことができる。イ ＢがＡに対し、法第 37 条の 2 の規定に基づき、書面により買受けの申込みの撤回を行った場合、その効力は、当該書面をＡが受け取った時に生じることとなる。ウ Ａは、Ｂとの間で、当事者の債務不履行を理由とする契約解除に伴う違約金について 300万円とする特約を定めた場合、加えて、損害賠償の予定額を 600 万円とする特約を定めることができる。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 3, "exp": "正しいものは「なし」。アは自ら申し出た自宅での申込みはクーリング・オフ対象外で撤回できず誤り、イは撤回の効力は書面を発した時に生じ受取時ではなく誤り、ウは違約金300万円と予定額600万円の合計900万円が代金の2割600万円を超え誤り。よって正しい記述はゼロ。", "year": "H29-31", "diff": "A"}, {"id": "kako-gyoA-H30-29", "subject": "宅建業法", "topic": "損害賠償額の予定等の制限", "type": "select", "q": "Ａは、Ｂとの間で、Ａが所有する建物を代金 2 ,000 万円で売却する売買契約（以下この問において「本件契約」という。）を締結した。この場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定に違反しないものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["Ａ及びＢがともに宅地建物取引業者である場合において、Ａは、本件契約の成立後、法第37 条の規定により交付すべき書面を作成し、記名は宅地建物取引士ではない者が行い、これをＢに交付した。", "Ａ及びＢがともに宅地建物取引業者である場合において、当事者の債務の不履行を理由とする契約の解除があったときの損害賠償の額を 600 万円とする特約を定めた。", "Ａは宅地建物取引業者であるが、Ｂは宅地建物取引業者ではない場合において、Ａは、本件契約の締結に際して、500 万円の手付を受領した。", "Ａは宅地建物取引業者であるが、Ｂは宅地建物取引業者ではない場合において、建物が種類又は品質に関して契約の内容に適合しない場合におけるその不適合を担保すべき責任に関し、契約の解除又は損害賠償の請求をするために、Ｂは、当該不適合について目的物の引渡しの日から 1 年以内にＡに通知しなければならないものとする旨の特約を定めた。"], "answer": 1, "exp": "違反しないのは肢2。業者間取引では損害賠償額予定の制限が適用されず、代金2000万円の2割400万円超の600万円も定められる。肢1は業者間でも37条書面に宅建士の記名が必要で違反、肢3は非業者相手に2割400万円超の手付500万円は違反、肢4は引渡しから1年とする通知期間特約は買主に不利で違反。", "year": "H30-29", "diff": "A"}, {"id": "kako-gyoA-R3-12月-27", "subject": "宅建業法", "topic": "損害賠償額の予定等の制限", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として、宅地建物取引業者ではないＢとの間で建物の売買契約を締結する場合における次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、電磁的方法は考慮しないものとする。（改題）", "choices": ["ＡＢ間で建物の売買契約を締結する場合において、当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の額についての特約を、代金の額の 10 分の 2 を超えて定めた場合、当該特約は全体として無効となる。", "ＡＢ間で建築工事完了前の建物の売買契約を締結する場合において、ＡがＢから保全措置が必要となる額の手付金を受領する場合、Ａは、事前に、国土交通大臣が指定する指定保管機関と手付金等寄託契約を締結し、かつ、当該契約を証する書面を買主に交付した後でなければ、Ｂからその手付金を受領することができない。", "ＡＢ間で建物の売買契約を締結する場合において、Ａは、あらかじめＢの承諾を書面で得た場合に限り、売買代金の額の 10 分の 2 を超える額の手付を受領することができる。", "ＡＢ間で建築工事完了前の建物の売買契約を締結する場合において、売買代金の 10 分の2 の額を手付金として定めた場合、Ａが手付金の保全措置を講じていないときは、Ｂは手付金の支払を拒否することができる。"], "answer": 3, "exp": "正しいのは肢4。未完成で代金2割の手付金は5％超なので保全が必要で、業者が保全しなければ買主は支払を拒否でき正しい。肢1は2割超の損害賠償特約は超過部分のみ無効で全体無効ではなく誤り、肢2は未完成に指定保管機関は使えず誤り、肢3は承諾があっても2割超の手付は受領できず誤り。", "year": "R3-12月-27", "diff": "A"}, {"id": "kako-gyoA-R3-10月-42", "subject": "宅建業法", "topic": "所有権の留保等の禁止", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として宅地建物取引業者ではないＢを買主とする土地付建物の売買契約（代金 3 ,200 万円）を締結する場合に関する次の記述のうち、民法及び宅地建物取引業法の規定によれば、正しいものはどれか。", "choices": ["割賦販売の契約を締結し、当該土地付建物を引き渡した場合、Ａは、Ｂから 800 万円の賦払金の支払を受けるまでに、当該土地付建物に係る所有権の移転登記をしなければならない。", "当該土地付建物の工事の完了前に契約を締結した場合、Ａは、宅地建物取引業法第 41 条に定める手付金等の保全措置を講じなくても手付金 100 万円、中間金 60 万円を受領することができる。", "当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の予定額を 400 万円とし、かつ、違約金の額を 240 万円とする特約を定めた場合、当該特約は無効となる。", "当事者の債務の不履行を理由とする契約の解除に伴う損害賠償の予定額を定めていない場合、債務の不履行による損害賠償の請求額は売買代金の額の 10 分の 2 を超えてはならない。"], "answer": 1, "exp": "正しいのは肢2。未完成物件は手付金等の合計が代金の5％以下かつ1000万円以下なら保全不要。手付金100万円と中間金60万円の合計160万円は代金3200万円の5％（160万円）ちょうどで保全なしに受領できる。肢1は800万円が30％以下で移転登記義務なし、肢3は合計640万円が2割ちょうどで有効、肢4は予定なしなら実損は2割超請求可のため誤り。", "year": "R3-10月-42", "diff": "B"}, {"id": "kako-gyoA-R4-43", "subject": "宅建業法", "topic": "所有権の留保等の禁止", "type": "select", "q": "宅地建物取引業者Ａが、自ら売主として行う売買契約に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。なお、買主は宅地建物取引業者ではないものとする。", "choices": ["Ａが、宅地又は建物の売買契約に際して手付を受領した場合、その手付がいかなる性質のものであっても、Ａが契約の履行に着手するまでの間、買主はその手付を放棄して契約の解除をすることができる。", "Ａが、土地付建物の売買契約を締結する場合において、買主との間で、「売主は、売買物件の引渡しの日から 1 年間に限り当該物件の種類又は品質に関して契約の内容に適合しない場合におけるその不適合を担保する責任を負う」とする旨の特約を設けることができる。", "販売代金 2 ,500 万円の宅地について、Ａが売買契約の締結を行い、損害賠償の額の予定及び違約金の定めをする場合、その合計額を 500 万円と設定することができる。", "Ａが建物の割賦販売を行った場合、当該建物を買主に引き渡し、かつ、代金の額の 10 分の 3 を超える額の支払を受けた後は、担保の目的で当該建物を譲り受けてはならない。"], "answer": 1, "exp": "誤りを選ぶ問題。担保責任の通知期間は引渡しから2年以上とする特約以外は買主に不利にできず、引渡しから1年間に限る特約は無効。よって「特約を設けることができる」とする肢2が誤り。他は正しい記述。", "year": "R4-43", "diff": "A"}, {"id": "kako-gyoA-H27-33", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者Ａ及びＢ（ともに消費税課税事業者）が受領した報酬に関する次の記述のうち、宅地建物取引業法の規定に違反するものの組合せはどれか。なお、この問において「消費税等相当額」とは、消費税額及び地方消費税額に相当する金額をいうものとし、長期の空家等の貸借における特例は考慮しないものとする。（改題）ア 土地付新築住宅（代金 3 ,000 万円。消費税等相当額を含まない。）の売買について、Ａは売主から代理を、Ｂは買主から媒介を依頼され、Ａは売主から 211 万 2 ,000 円を、Ｂは買主から 105 万 6 ,000 円を報酬として受領した。イ Ａは、店舗用建物について、貸主と借主双方から媒介を依頼され、借賃 1 か月分 20 万円（消費税等相当額を含まない。）、権利金 500 万円（権利設定の対価として支払われる金銭であって返還されないもので、消費税等相当額を含まない。）の賃貸借契約を成立させ、貸主と借主からそれぞれ 22 万 5 ,000 円を報酬として受領した。ウ 居住用建物（借賃 1 か月分 10 万円）について、Ａは貸主から媒介を依頼され、Ｂは借主から媒介を依頼され、Ａは貸主から 8 万円、Ｂは借主から 5 万 4 ,000 円を報酬として受領した。なお、Ａは、媒介の依頼を受けるに当たって、報酬が借賃の 0 .55 か月分を超えることについて貸主から承諾を得ていた。", "choices": ["ア、イ", "イ、ウ", "ア、ウ", "ア、イ、ウ"], "answer": 2, "exp": "違反するのはアとウ。アは代理と媒介が関与する場合の合計は媒介の2倍211万2000円が限度で、合計316万8000円は違反。ウは貸主の承諾があってもA・B合計で借賃1か月分11万円が限度で超過は違反。イは非居住用で権利金500万円を売買代金とみなすと双方から23万1000円まで受領でき22万5000円は違反しない。", "year": "H27-33", "diff": "B"}, {"id": "kako-gyoA-H28-33", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者が売買等の媒介に関して受けることができる報酬についての次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはいくつあるか。（改題）ア 宅地建物取引業者が媒介する物件の売買について、売主があらかじめ受取額を定め、実際の売却額との差額を当該宅地建物取引業者が受け取る場合は、媒介に係る報酬の限度額の適用を受けない。イ 宅地建物取引業者は、媒介に係る報酬の限度額の他に、依頼者の依頼によらない通常の広告の料金に相当する額を報酬に合算して、依頼者から受け取ることができる。ウ 居住用の建物（長期の空家等ではない。）の貸借の媒介に係る報酬の額は、借賃の 1 月分の 1 .1 倍に相当する額以内であるが、権利金の授受がある場合は、当該権利金の額を売買に係る代金の額とみなして算定することができる。", "choices": ["一つ", "二つ", "三つ", "なし"], "answer": 2, "exp": "誤っているものは三つ（ア・イ・ウ全部）。アは差額を受け取る形でも報酬上限は超えられず誤り、イは依頼者の依頼によらない広告費は受領できず誤り、ウは居住用建物では権利金を売買代金とみなせず誤り。よって誤りは三つ。", "year": "H28-33", "diff": "A"}, {"id": "kako-gyoA-H29-26", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者Ａ（消費税課税事業者）は貸主Ｂから建物の貸借の媒介の依頼を受け、宅地建物取引業者Ｃ（消費税課税事業者）は借主Ｄから建物の貸借の媒介の依頼を受け、ＢとＤの間での賃貸借契約を成立させた。この場合における次の記述のうち、宅地建物取引業法（以下この問において「法」という。）の規定によれば、正しいものはどれか。なお、 1 か月分の借賃は 9 万円（消費税等相当額を含まない。）であり、長期の空家等の貸借における特例は考慮しないものとする。（改題）", "choices": ["建物を店舗として貸借する場合、当該賃貸借契約において 200 万円の権利金（権利設定の対価として支払われる金銭であって返還されないものをいい、消費税等相当額を含まない。）の授受があるときは、Ａ及びＣが受領できる報酬の限度額の合計は 220,000 円である。", "ＡがＢから 48 ,600 円の報酬を受領し、ＣがＤから 49 ,500 円の報酬を受領した場合、ＡはＢの依頼によって行った広告の料金に相当する額を別途受領することができない。", "Ｃは、Ｄから報酬をその限度額まで受領できるほかに、法第 35 条の規定に基づく重要事項の説明を行った対価として、報酬を受領することができる。", "建物を居住用として貸借する場合、当該賃貸借契約において 100 万円の保証金（Ｄの退去時にＤに全額返還されるものとする。）の授受があるときは、Ａ及びＣが受領できる報酬の限度額の合計は 110 ,000 円である。"], "answer": 0, "exp": "正しいのは肢1。店舗の貸借で権利金200万円を売買代金とみなすと1件200万円×5％×1.1＝11万円をA・Cそれぞれ受領でき合計22万円で正しい。肢2は依頼者の依頼による広告費は別途受領でき誤り、肢3は重要事項説明は媒介業務に含まれ別途対価不可で誤り、肢4は返還される保証金は権利金扱いできず誤り。", "year": "H29-26", "diff": "A"}, {"id": "kako-gyoA-H30-30", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者Ａ（消費税課税事業者）は、Ｂが所有する建物について、Ｂ及びＣから媒介の依頼を受け、Ｂを貸主、Ｃを借主とし、 1 か月分の借賃を 10 万円（消費税等相当額を含まない。）、ＣからＢに支払われる権利金（権利設定の対価として支払われる金銭であって返還されないものであり、消費税等相当額を含まない。）を 150 万円とする定期建物賃貸借契約を成立させた。この場合における次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。なお、長期の空家等の貸借における特例は考慮しないものとする。（改題）", "choices": ["建物が店舗用である場合、Ａは、Ｂ及びＣの承諾を得たときは、Ｂ及びＣの双方からそれぞれ 11 万円の報酬を受けることができる。", "建物が居住用である場合、Ａが受け取ることができる報酬の額は、ＣからＢに支払われる権利金の額を売買に係る代金の額とみなして算出される 16 万 5 ,000 円が上限となる。", "建物が店舗用である場合、Ａは、Ｂからの依頼に基づくことなく広告をした場合でも、その広告が賃貸借契約の成立に寄与したときは、報酬とは別に、その広告料金に相当する額をＢに請求することができる。", "定期建物賃貸借契約の契約期間が終了した直後にＡが依頼を受けてＢＣ間の定期建物賃貸借契約の再契約を成立させた場合、Ａが受け取る報酬については、宅地建物取引業法の規定が適用される。"], "answer": 3, "exp": "正しいのは肢4。定期建物賃貸借の再契約でも新規契約と同様に報酬は宅建業法の規制を受け正しい。肢1は権利金150万円ベースで合計16万5000円が限度で承諾があっても双方11万円ずつは不可、肢2は居住用は権利金ベース計算不可、肢3は依頼によらない広告費は別途請求不可のため誤り。", "year": "H30-30", "diff": "A"}, {"id": "kako-gyoA-H30-31", "subject": "宅建業法", "topic": "報酬額の制限", "type": "select", "q": "宅地建物取引業者Ａ（消費税課税事業者）が受け取ることのできる報酬の上限額に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。（改題）
